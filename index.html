let AC = null, masterGain = null;
function audioInit() {
  if (!AC) {
    try {
      AC = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = AC.createGain();
      masterGain.gain.value = 0.32;
      masterGain.connect(AC.destination);
      startDrone();
    } catch (e) { AC = null; return; }
  }
  if (AC.state !== "running") {
    AC.resume();
    // iOS unlock: play a one-sample silent buffer inside the user gesture
    try {
      const b = AC.createBuffer(1, 1, 22050);
      const src = AC.createBufferSource();
      src.buffer = b;
      src.connect(AC.destination);
      src.start(0);
    } catch (e) {}
  }
}

function startDrone() {
  const voice = (freq, gain) => {
    const o = AC.createOscillator(), gn = AC.createGain();
    o.type = "sine"; o.frequency.value = freq;
    gn.gain.value = gain;
    o.connect(gn); gn.connect(masterGain);
    o.start();
    return gn;
  };
  const mid = voice(55, 0.045);
  voice(82.5, 0.03);
  // Unsettling sub-bass: a deep detuned pair that slowly beats against
  // itself, breathing on an even slower cycle
  const sub1 = voice(31, 0.12);
  const sub2 = voice(32.3, 0.1);
  const lfo = AC.createOscillator(), lfoG = AC.createGain();
  lfo.frequency.value = 0.05; lfoG.gain.value = 0.06;
  lfo.connect(lfoG); lfoG.connect(sub1.gain); lfoG.connect(sub2.gain);
  lfo.start();
  const lfo2 = AC.createOscillator(), lfo2G = AC.createGain();
  lfo2.frequency.value = 0.09; lfo2G.gain.value = 0.02;
  lfo2.connect(lfo2G); lfo2G.connect(mid.gain);
  lfo2.start();
}

function blip(freq, endFreq, dur, type, vol, delay) {
  if (!AC || AC.state !== "running") return;
  const t = AC.currentTime + (delay || 0);
  const o = AC.createOscillator(), gn = AC.createGain();
  o.type = type;
  o.frequency.setValueAtTime(freq, t);
  o.frequency.exponentialRampToValueAtTime(Math.max(1, endFreq), t + dur);
  gn.gain.setValueAtTime(vol, t);
  gn.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.connect(gn); gn.connect(masterGain);
  o.start(t); o.stop(t + dur + 0.02);
}

function whoosh(dur, vol, freq) {
  if (!AC || AC.state !== "running") return;
  const t = AC.currentTime;
  const len = Math.max(1, (dur * AC.sampleRate) | 0);
  const b = AC.createBuffer(1, len, AC.sampleRate);
  const d = b.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  const src = AC.createBufferSource(); src.buffer = b;
  const f = AC.createBiquadFilter();
  f.type = "bandpass"; f.frequency.value = freq; f.Q.value = 0.8;
  const gn = AC.createGain();
  gn.gain.setValueAtTime(vol, t);
  gn.gain.exponentialRampToValueAtTime(0.001, t + dur);
  src.connect(f); f.connect(gn); gn.connect(masterGain);
  src.start(t);
}

  const s = dailySeedStr();

  const rand = () => {
    h = Math.imul(h ^ (h >>> 15), 2246822507);
    h = Math.imul(h ^ (h >>> 13), 3266489909);
    return ((h ^= h >>> 16) >>> 0) / 4294967296;
  };
  const pool = ["mirror", "dim", "sparks2", "brittle", "restless", "heavy", "petal"];
  const mods = [];
  while (mods.length < 2) {
    const m = pool[(rand() * pool.length) | 0];
    if (mods.includes(m)) continue;
    if ((m === "petal" && mods.includes("sparks2")) ||
        (m === "sparks2" && mods.includes("petal"))) continue;
    mods.push(m);
  }
  return mods;
}

const fmtMs = ms => {
  const t = Math.max(0, Math.round(ms / 100) / 10);
  const m = Math.floor(t / 60);
  const s2 = t - m * 60;
  return m + ":" + (s2 < 10 ? "0" : "") + s2.toFixed(1);
};

async function lbFetch(cat) {
  try {
    const r = await fetch(LB.url + "/rest/v1/scores?category=eq." + cat +
      "&select=name,time_ms,id,has_ghost&order=time_ms.asc&limit=15", {
      headers: { apikey: LB.key, Authorization: "Bearer " + LB.key },
    });
    return r.ok ? await r.json() : null;
  } catch (e) { return null; }
}

function lbRefresh() {
  if (!lbOn()) return;
  lbFetch("any").then(d => { if (d) LB_CACHE.any = d; });
  lbFetch("full").then(d => { if (d) LB_CACHE.full = d; });
  lbFetch("daily-" + dailySeedStr()).then(d => { if (d) LB_CACHE.daily = d; });
}

// Returns { ok, id } — the id makes "race my echo" challenge links possible
async function lbPost(name, cat, ms, ghost) {
  try {
    const body = { name, category: cat, time_ms: ms };
    if (ghost) { body.ghost = ghost; body.has_ghost = true; }
    const r = await fetch(LB.url + "/rest/v1/scores", {
      method: "POST",
      headers: {
        apikey: LB.key, Authorization: "Bearer " + LB.key,
        "Content-Type": "application/json", Prefer: "return=representation",
      },
      body: JSON.stringify(body),
    });
    if (!r.ok) return { ok: false, id: null };
    const j = await r.json();
    return { ok: true, id: j[0] ? j[0].id : null };
  } catch (e) { return { ok: false, id: null }; }
}

// Where do you stand? Count faster runs, add one.
async function lbRank(cat, ms) {
  try {
    const r = await fetch(LB.url + "/rest/v1/scores?category=eq." + cat + "&time_ms=lt." + ms + "&select=id&limit=1", {
      headers: { apikey: LB.key, Authorization: "Bearer " + LB.key, Prefer: "count=exact" },
    });
    const total = parseInt((r.headers.get("content-range") || "").split("/")[1], 10);
    return isNaN(total) ? null : total + 1;
  } catch (e) { return null; }
}

// A shareable card: your time, your completion, your rank
function buildShareCard(name, cat, ms, rank) {
  const cv = mkCv(640, 360);
  const c2 = cv.getContext("2d");
  c2.imageSmoothingEnabled = false;
  const gr = c2.createLinearGradient(0, 0, 0, 360);
  gr.addColorStop(0, "#0a0e18");
  gr.addColorStop(1, "#1c1030");
  c2.fillStyle = gr;
  c2.fillRect(0, 0, 640, 360);
  for (let i = 0; i < 70; i++) {
    c2.globalAlpha = 0.2 + rnd01(i) * 0.4;
    c2.fillStyle = i % 3 ? "#90e8b0" : "#f0a888";
    const sz = 2 + (rnd01(i * 7) * 3 | 0);
    c2.fillRect(rnd01(i * 3) * 640, rnd01(i * 13) * 360, sz, sz);
  }
  c2.globalAlpha = 1;
  c2.fillStyle = "#90e8b0";
  c2.fillRect(0, 0, 640, 3);
  c2.fillRect(0, 357, 640, 3);
  c2.textAlign = "center";
  c2.fillStyle = "#f0c878";
  c2.font = "bold 34px monospace";
  c2.fillText("SPORELING DASH", 320, 50);
  const isDaily = cat.indexOf("daily-") === 0;
  c2.fillStyle = isDaily ? "#f0c878" : cat === "full" ? "#f098b8" : "#90e8b0";
  c2.font = "bold 18px monospace";
  c2.fillText(isDaily ? "☾ DAILY SPORE — " + cat.slice(6) + " ☽"
    : cat === "full" ? "★ FULL BLOOM — 100% ★" : "ANY% CLEAR", 320, 80);
  c2.save();
  c2.translate(320 - 36, 100);
  c2.scale(6, 6);
  drawMap(c2, SPRITES.idle1, 0, 0, false);
  c2.restore();
  c2.fillStyle = "#fff6e0";
  c2.font = "bold 46px monospace";
  c2.fillText(fmtMs(ms), 320, 230);
  c2.fillStyle = "#90e8b0";
  c2.font = "bold 21px monospace";
  c2.fillText(rank ? "#" + rank + " ON THE LEADERBOARD" : "ON THE LEADERBOARD", 320, 260);
  const met = Object.keys(S.score.metNpcs).length;
  c2.fillStyle = "#e8e0d0";
  c2.font = "15px monospace";
  c2.fillText(name + "  ·  " + S.score.berries + "/" + S.score.total + " berries  ·  " +
    met + "/" + TOTAL_NPCS + " voices  ·  " + S.score.deaths + " deaths", 320, 292);
  if (isDaily && S.dailyMods) {
    c2.fillStyle = "#90e8b0";
    c2.font = "13px monospace";
    c2.fillText(S.dailyMods.map(m => MOD_NAMES[m]).join("  +  "), 320, 316);
  } else if (S.score.secretMemory) {
    c2.fillStyle = "#dee6c8";
    c2.font = "13px monospace";
    c2.fillText("— found the place the maps forgot —", 320, 316);
  }
  c2.fillStyle = "#7a8494";
  c2.font = "14px monospace";
  c2.fillText("thoughtcrimegpt.github.io/sporeling-dash", 320, 344);
  return cv.toDataURL("image/jpeg", 0.92);
}

function submitScore() {
  if (!lbOn()) { S.lbMsg = "Leaderboard offline"; return; }
  if (S.score.lbDone) { S.lbMsg = "Already submitted"; return; }
  let name = "";
  try { name = localStorage.getItem("sd_name") || ""; } catch (e) {}
  if (!name) name = "@";   // start them off with the handle prefix
  name = window.prompt("Name or @handle for the leaderboard:", name) || "";
  name = name.trim().replace(/[^\w@.\- ]/g, "").slice(0, 20);
  if (!name) return;
  try { localStorage.setItem("sd_name", name); } catch (e) {}
  const ms = Math.round(S.score.time * 1000);
  const met = Object.keys(S.score.metNpcs).length;
  const full = !S.daily && S.score.berries === S.score.total && S.score.secretMemory && met === TOTAL_NPCS;
  // this run's echo rides along with the score
  let ghost = null;
  try {
    const j = JSON.stringify(S.rec);
    if (j.length > 20 && j.length < 150000) ghost = j;
  } catch (e) {}
  S.score.lbDone = true;
  S.lbMsg = "Submitting...";
  const gameUrl = "https://thoughtcrimegpt.github.io/sporeling-dash/";

  if (S.daily) {
    const cat = "daily-" + dailySeedStr();
    lbPost(name, cat, ms, ghost).then(res => {
      S.lbMsg = res.ok ? "On today's board!" : "Submit failed, try again later";
      if (!res.ok) { S.score.lbDone = false; return; }
      lbRefresh();
      lbRank(cat, ms).then(rank => {
        const modTxt = (S.dailyMods || []).map(m => MOD_NAMES[m]).join(" + ");
        const link = res.id ? gameUrl + "?race=" + res.id : gameUrl;
        const tweet = fmtMs(ms) + " — " + (rank ? "#" + rank + " " : "") +
          "on today's DAILY SPORE (" + modTxt + ") 🍄 race my echo: " + link;
        showShare(buildShareCard(name, cat, ms, rank), tweet);
      });
    });
    return;
  }

  Promise.all([lbPost(name, "any", ms, ghost), full ? lbPost(name, "full", ms, null) : Promise.resolve({ ok: true, id: null })])
    .then(res => {
      S.lbMsg = res[0].ok && res[1].ok ? (full ? "On both boards — FULL BLOOM!" : "On the board — any%") : "Submit failed, try again later";
      if (!res[0].ok) S.score.lbDone = false;
      lbRefresh();
      if (res[0].ok) {
        const cat = full ? "full" : "any";
        lbRank(cat, ms).then(rank => {
          const link = res[0].id && ghost ? gameUrl + "?race=" + res[0].id : gameUrl;
          const tweet = fmtMs(ms) + " — " + (rank ? "#" + rank + " " : "") +
            "on the Sporeling Dash " + (full ? "100%" : "any%") + " leaderboard 🍄 race my echo: " + link;
          showShare(buildShareCard(name, cat, ms, rank), tweet);
        });
      }
    });
}

// ── Input ──────────────────────────────────────────────────────────────────
const keys = Object.create(null);
const just = Object.create(null);
const padPrev = { jump: false, dash: false, pause: false };
const TOUCH = { active: false, ax: 0, ay: 0, jump: false, dash: false, pause: false };
const touchPrev = { jump: false, dash: false, pause: false };

addEventListener("keydown", e => {
  if (!keys[e.code]) just[e.code] = true;
  keys[e.code] = true;
  if (["Space","ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.code)) e.preventDefault();
});
addEventListener("keyup", e => { keys[e.code] = false; });

function gp() {
  const list = navigator.getGamepads ? navigator.getGamepads() : [];
  for (let i = 0; i < list.length; i++) if (list[i]?.connected) return list[i];
  return null;
}

function readInput() {
  let ax = 0, ay = 0;
  if (keys.KeyA || keys.ArrowLeft)  ax -= 1;
  if (keys.KeyD || keys.ArrowRight) ax += 1;
  if (keys.KeyW || keys.ArrowUp)    ay -= 1;
  if (keys.KeyS || keys.ArrowDown)  ay += 1;

  let jumpDown = !!(keys.Space || keys.KeyZ || keys.KeyK);
  let dashDown = !!(keys.ShiftLeft || keys.ShiftRight || keys.KeyJ);
  let pauseDown = !!(keys.Escape || keys.KeyP);
  let jumpEdge = !!(just.Space || just.KeyZ || just.KeyK);
  let dashEdge = !!(just.ShiftLeft || just.ShiftRight || just.KeyJ);
  let pauseEdge = !!(just.Escape || just.KeyP);
  let startEdge = !!(just.Enter || just.Space);

  const pad = gp();
  if (pad) {
    // Analog stick — magnitude is preserved for fine control
    const dead = 0.22;
    let sx = pad.axes[0] || 0, sy = pad.axes[1] || 0;
    if (Math.abs(sx) < dead) sx = 0; else sx = Math.sign(sx) * (Math.abs(sx) - dead) / (1 - dead);
    if (Math.abs(sy) < dead) sy = 0; else sy = Math.sign(sy) * (Math.abs(sy) - dead) / (1 - dead);

    if (pad.buttons[14]?.pressed) sx = -1;
    if (pad.buttons[15]?.pressed) sx =  1;
    if (pad.buttons[12]?.pressed) sy = -1;
    if (pad.buttons[13]?.pressed) sy =  1;

    const ax6 = pad.axes[6], ax7 = pad.axes[7];
    if (typeof ax6 === "number" && Math.abs(ax6) > 0.5) sx = Math.sign(ax6);
    if (typeof ax7 === "number" && Math.abs(ax7) > 0.5) sy = Math.sign(ax7);

    if (sx || sy) { ax = sx; ay = sy; }

    const a = !!pad.buttons[0]?.pressed;
    const b = !!pad.buttons[1]?.pressed;
    const x = !!pad.buttons[2]?.pressed;
    const rb = !!pad.buttons[5]?.pressed;
    const lb = !!pad.buttons[4]?.pressed;
    const st = !!pad.buttons[9]?.pressed || !!pad.buttons[8]?.pressed;
    if (a || b) jumpDown = true;
    if (x || rb || lb) dashDown = true;
    if (st) pauseDown = true;
    if ((a || b) && !padPrev.jump) { jumpEdge = true; startEdge = true; }
    if ((x || rb || lb) && !padPrev.dash) dashEdge = true;
    if (st && !padPrev.pause) pauseEdge = true;
    padPrev.jump = a || b; padPrev.dash = x || rb || lb; padPrev.pause = st;
  } else {
    padPrev.jump = jumpDown; padPrev.dash = dashDown; padPrev.pause = pauseDown;
  }

  if (TOUCH.active) {
    if (TOUCH.ax || TOUCH.ay) { ax = TOUCH.ax; ay = TOUCH.ay; }
    if (TOUCH.jump) jumpDown = true;
    if (TOUCH.dash) dashDown = true;
    if (TOUCH.pause) pauseDown = true;
    if (TOUCH.jump && !touchPrev.jump) { jumpEdge = true; startEdge = true; }
    if (TOUCH.dash && !touchPrev.dash) dashEdge = true;
    if (TOUCH.pause && !touchPrev.pause) pauseEdge = true;
    touchPrev.jump = TOUCH.jump; touchPrev.dash = TOUCH.dash; touchPrev.pause = TOUCH.pause;
  }

  const len = Math.hypot(ax, ay);
  if (len > 1) { ax /= len; ay /= len; }
  return { ax, ay, jumpDown, jumpEdge, dashEdge, pauseEdge, startEdge };
}

function clearJust() { for (const k in just) delete just[k]; }

// Touch controls — virtual stick + buttons, shown only once a touch device is detected
function setupTouch() {
  const root = document.getElementById("touch");
  const stick = document.getElementById("stick");
  const nub = document.getElementById("nub");

  function enable() {
    if (TOUCH.active) return;
    TOUCH.active = true;
    root.hidden = false;
    resize();
  }
  if (matchMedia("(pointer: coarse)").matches) enable();
  addEventListener("touchstart", enable, { passive: true });

  let stickId = null;
  function setStick(t) {
    const r = stick.getBoundingClientRect();
    const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
    let dx = (t.clientX - cx) / (r.width / 2), dy = (t.clientY - cy) / (r.height / 2);
    const len = Math.hypot(dx, dy);
    if (len > 1) { dx /= len; dy /= len; }
    const dead = 0.25;
    TOUCH.ax = Math.abs(dx) < dead ? 0 : (dx - Math.sign(dx) * dead) / (1 - dead);
    TOUCH.ay = Math.abs(dy) < dead ? 0 : (dy - Math.sign(dy) * dead) / (1 - dead);
    nub.style.transform = "translate(" + (dx * 30).toFixed(0) + "px," + (dy * 30).toFixed(0) + "px)";
  }
  stick.addEventListener("touchstart", e => {
    e.preventDefault();
    stickId = e.changedTouches[0].identifier;
    setStick(e.changedTouches[0]);
  }, { passive: false });
  stick.addEventListener("touchmove", e => {
    e.preventDefault();
    for (const t of e.changedTouches) if (t.identifier === stickId) setStick(t);
  }, { passive: false });
  const stickEnd = e => {
    for (const t of e.changedTouches) {
      if (t.identifier === stickId) {
        stickId = null;
        TOUCH.ax = 0; TOUCH.ay = 0;
        nub.style.transform = "";
      }
    }
  };
  stick.addEventListener("touchend", stickEnd);
  stick.addEventListener("touchcancel", stickEnd);

  function bindBtn(id, prop) {
    const el = document.getElementById(id);
    el.addEventListener("touchstart", e => {
      e.preventDefault();
      TOUCH[prop] = true;
      el.classList.add("pressed");
    }, { passive: false });
    const up = e => {
      e.preventDefault();
      TOUCH[prop] = false;
      el.classList.remove("pressed");
    };
    el.addEventListener("touchend", up, { passive: false });
    el.addEventListener("touchcancel", up, { passive: false });
  }
  bindBtn("btnJump", "jump");
  bindBtn("btnDash", "dash");
  bindBtn("btnPause", "pause");
}

// ── Levels ─────────────────────────────────────────────────────────────────
// . empty  # solid  S spike (auto-oriented)  P start  C checkpoint  B berry  G goal
function buildLevel(w, h, fn) {
  const grid = Array.from({ length: h }, () => Array(w).fill("."));
  const set = (c, r, ch) => { if (r >= 0 && r < h && c >= 0 && c < w) grid[r][c] = ch; };
  const rect = (c0, r0, c1, r1, ch) => {
    for (let r = r0; r <= r1; r++) for (let c = c0; c <= c1; c++) set(c, r, ch || "#");
  };
  const seg = (c0, c1, top) => rect(c0, top, c1, h - 1, "#");
  fn({ set, rect, seg });
  return grid.map(r => r.join(""));
}

function loadLevel(idx) {
  S.levelIdx = idx;

  LEVEL = dMod("mirror") ? L.map.map(r => r.split("").reverse().join("")) : L.map;

  S.berries = 0; S.berriesTotal = 0;
  S.berryList = []; S.checkpoints = []; S.blooms = []; S.particles = []; S.trail = [];
  S.goal = null; S.goalOpen = 0; S.winT = 0; S.deathT = 0;
  S.shakeT = 0; S.freezeT = 0; S.jumpHeldForCut = false;
  S.bannerT = L.unlockText ? 3.6 : 2.4;
  SPIKES = []; STATIC_LIGHTS = []; DECOR = []; SPORES = []; ENEMY_SPAWNS = [];
  S.memoryObj = null; S.boss = null; S.bossDoor = null;
  S.movers = (L.movers || []).map(m => {
    const c0 = dMod("mirror") ? COLS - 1 - m.c1 : m.c0;
    const c1 = dMod("mirror") ? COLS - 1 - m.c0 : m.c1;
    return {
      x: c0 * TILE, w: (c1 - c0 + 1) * TILE,
      yA: m.rA * TILE, yB: m.rB * TILE,
      period: m.period, phase: m.phase || 0, shift: 0,
      y: m.rA * TILE,
    };
  });
  if (L.boss) {
    S.boss = {
      kind: L.boss, state: "intro", t: 0, pips: 3,
      arm: null, shots: [], bolts: [], lanes: [], windowHint: false,
      floorPulseT: 0, capFlash: 0,
    };
    if (L.boss === "unbloomed") {
      S.boss.x = 31.5 * TILE; S.boss.y = 6 * TILE; S.boss.homeY = 6 * TILE;
    } else if (L.boss === "barrow") {
      S.boss.x = 24 * TILE; S.boss.y = 13 * TILE - BARROW.H; S.boss.dir = 1;
      S.boss.spitN = 0; S.boss.spitT = 0;
    } else if (L.boss === "chorus") {
      S.boss.x = 20 * TILE; S.boss.y = 10 * TILE;
      S.boss.wisps = [];
    }
  }
  S.talk = null;
  S.npcs = (L.npcs || []).map(n => ({
    ...n,
    x: (dMod("mirror") ? COLS - 1 - n.c : n.c) * TILE + 2,
    y: (n.r + 1) * TILE - NPC_H[n.sprite],
    ph: Math.random() * 6,
  }));

  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      const ch = LEVEL[y][x];
      const px = x * TILE, py = y * TILE;
      if (ch === "P") {
        S.spawn = { x: px + 3, y: py + 4 };
        S.checkPt = { x: S.spawn.x, y: S.spawn.y };
      } else if (ch === "B") {
        S.berryList.push({ x: px + 4, y: py + 4, w: 8, h: 8, taken: false });
        S.berriesTotal++;
      } else if (ch === "C") {
        S.checkpoints.push({ x: px, y: py, w: TILE, h: TILE, active: false });
      } else if (ch === "G") {
        S.goal = { x: px, y: py - 4, w: TILE, h: TILE + 8 };
      } else if (ch === "S") {
        let dir = "up";
        if (isSolid(tileAt(x, y + 1))) dir = "up";
        else if (isSolid(tileAt(x, y - 1))) dir = "down";
        else if (isSolid(tileAt(x - 1, y))) dir = "right";
        else if (isSolid(tileAt(x + 1, y))) dir = "left";
        SPIKES.push({ tx: x, ty: y, dir });
      } else if (ch === "M") {
        S.memoryObj = { x: px + 1, y: py, w: 14, h: 16 };
      } else if (ch === "e" || ch === "E") {
        ENEMY_SPAWNS.push({ t: "slug", x: px + 2, y: py + TILE - 8, fast: ch === "E" });
      } else if (ch === "f") {
        ENEMY_SPAWNS.push({ t: "puff", x: px + 3, y: py + 3 });
      } else if (ch === "w") {
        ENEMY_SPAWNS.push({ t: "wisp", x: px + 4, y: py + 4 });
      } else if (ch === "k") {
        ENEMY_SPAWNS.push({ t: "skitter", x: px + 2, y: py + TILE - 6 });
      } else if (ch === "s") {
        ENEMY_SPAWNS.push({ t: "spitter", x: px + 2, y: py + TILE - 12 });
      } else if (ch === "n") {
        ENEMY_SPAWNS.push({ t: "mine", x: px + 4, y: py + 4 });
      }
    }
  }

  // Flora on walkable ground + vines under ceilings
  const seed = idx * 977;
  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      if (!isSolid(tileAt(x, y))) continue;
      const px = x * TILE, py = y * TILE;
      if (tileAt(x, y - 1) === ".") {
        const r = rnd01(x * 7 + y * 131 + seed);
        if (r < 0.5) {
          const type = r < 0.09 ? "glow" : r < 0.28 ? "mush" : "grass";
          DECOR.push({ x: px + 3 + ((rnd01(x * 13 + y + seed) * 10) | 0), y: py, type, ph: rnd01(x + y * 57) * Math.PI * 2 });
        }
      }
      if (tileAt(x, y + 1) === "." && rnd01(x * 31 + y * 17 + seed) < 0.22) {
        DECOR.push({ x: px + 4 + ((rnd01(x * 5 + y + seed) * 8) | 0), y: py + TILE, type: "vine", ph: rnd01(x * 3 + y) * Math.PI * 2, len: 6 + rnd01(x + y + seed) * 12 });
      }
    }
  }

  const nSp = Math.min(70, 24 + ((WORLD_W * WORLD_H) / 12000 | 0));
  for (let i = 0; i < nSp; i++) {
    SPORES.push({
      x: rnd01(i * 5 + 2 + seed) * WORLD_W,
      y: rnd01(i * 11 + 3 + seed) * WORLD_H,
      depth: 0.25 + rnd01(i * 3 + 1) * 1.15,
      drift: 4 + rnd01(i * 17 + 4) * 10,
      ph: rnd01(i * 23 + 5) * Math.PI * 2,
    });
  }

  spawnEnemies();
  bakeSky();
  bakeParallax();
  bakeTerrain();

  S.player = makePlayer(S.spawn.x, S.spawn.y);
  S.camX = clamp(S.player.x - W / 2, 0, Math.max(0, WORLD_W - W));
  S.camY = clamp(S.player.y - H / 2, 0, Math.max(0, WORLD_H - H));

// ── Baking: sky (dithered gradient) ────────────────────────────────────────
function bakeSky() {
  skyCv = mkCv(W, H);
  const c = skyCv.getContext("2d");
  const img = c.createImageData(W, H);
  const bayer = [[0, 2], [3, 1]];
  const steps = 9;
  for (let y = 0; y < H; y++) {
    const v = (y / H) * steps;
    const base = Math.floor(v), frac = v - base;
    for (let x = 0; x < W; x++) {
      const th = (bayer[y & 1][x & 1] + 0.5) / 4;
      const band = clamp(frac > th ? base + 1 : base, 0, steps);
      const col = mix(PAL.skyT, PAL.skyB, band / steps);
      const i = (y * W + x) * 4;
      img.data[i] = col[0]; img.data[i + 1] = col[1]; img.data[i + 2] = col[2]; img.data[i + 3] = 255;
    }
  }
  c.putImageData(img, 0, 0);
}

// ── Baking: parallax silhouette strips ─────────────────────────────────────
function bakeParallax() {
  const seed = S.levelIdx * 977;
  farCv = mkCv(480, H);
  const f = farCv.getContext("2d");
  f.fillStyle = rgb(PAL.far);
  for (let i = 0; i < 5; i++) {
    const x = 20 + i * 96 + rnd01(i * 3 + seed) * 50;
    const hgt = 52 + rnd01(i * 7 + seed) * 40;
    const cw = 36 + rnd01(i * 11 + seed) * 30;
    f.fillRect(x - 3, H - hgt, 7, hgt);
    f.fillRect(x - cw / 2, H - hgt - 4, cw, 11);
    f.fillRect(x - cw / 2 + 4, H - hgt - 8, cw - 8, 5);
    f.fillRect(x - cw / 2 + 9, H - hgt - 11, cw - 18, 3);
    // pale spots on caps
    f.fillStyle = rgb(mix(PAL.far, PAL.fog, 0.25));
    f.fillRect(x - cw / 4, H - hgt - 2, 3, 2);
    f.fillRect(x + cw / 5, H - hgt + 1, 2, 2);
    f.fillStyle = rgb(PAL.far);
  }
  midCv = mkCv(480, H);
  const m = midCv.getContext("2d");
  m.fillStyle = rgb(PAL.mid);
  for (let i = 0; i < 7; i++) {
    const x = 10 + i * 68 + rnd01(i * 13 + seed) * 36;
    const len = 14 + rnd01(i * 5 + seed) * 28;
    const wid = 7 + rnd01(i * 9 + seed) * 9;
    m.beginPath();
    m.moveTo(x - wid / 2, 0); m.lineTo(x + wid / 2, 0); m.lineTo(x, len);
    m.closePath(); m.fill();
    if (rnd01(i * 17 + seed) < 0.6) {
      const mh = 16 + rnd01(i * 19 + seed) * 16;
      const mw = 14 + rnd01(i * 23 + seed) * 12;
      const mx = x + 26;
      m.fillRect(mx - 2, H - mh, 4, mh);
      m.fillRect(mx - mw / 2, H - mh - 3, mw, 6);
      m.fillRect(mx - mw / 2 + 3, H - mh - 5, mw - 6, 3);
    }
  }
}

// ── Baking: autotiled terrain ──────────────────────────────────────────────
function bakeTerrain() {
  terrainCv = mkCv(WORLD_W, WORLD_H);
  const t = terrainCv.getContext("2d");
  const seed = S.levelIdx * 977;
  const rock = rgb(PAL.rock), rockHi = rgb(PAL.rockHi), rockLo = rgb(PAL.rockLo);
  const moss = rgb(PAL.moss), mossHi = rgb(PAL.mossHi), accent = rgb(PAL.accent);

  for (let ty = 0; ty < ROWS; ty++) {
    for (let tx = 0; tx < COLS; tx++) {
      if (!isSolid(tileAt(tx, ty))) continue;
      const px = tx * TILE, py = ty * TILE;
      const upO = !isSolid(tileAt(tx, ty - 1));
      const dnO = !isSolid(tileAt(tx, ty + 1));
      const lfO = !isSolid(tileAt(tx - 1, ty));
      const rtO = !isSolid(tileAt(tx + 1, ty));

      // Base with dithered 4x4 shade clusters
      t.fillStyle = rock;
      t.fillRect(px, py, TILE, TILE);
      for (let cy = 0; cy < 4; cy++) {
        for (let cx = 0; cx < 4; cx++) {
          const r = rnd01(tx * 53 + ty * 97 + cx * 7 + cy * 13 + seed);
          if (r < 0.16) { t.fillStyle = rockHi; t.fillRect(px + cx * 4, py + cy * 4, 4, 4); }
          else if (r > 0.8) { t.fillStyle = rockLo; t.fillRect(px + cx * 4, py + cy * 4, 4, 4); }
        }
      }
      // Speckle
      for (let i = 0; i < 4; i++) {
        const r = rnd01(tx * 131 + ty * 37 + i * 5 + seed);
        t.fillStyle = r < 0.5 ? rockHi : rockLo;
        t.fillRect(px + ((r * 371) % 14 | 0) + 1, py + ((r * 733) % 14 | 0) + 1, 1, 1);
      }

      // Edges
      if (upO) {
        t.fillStyle = moss;
        t.fillRect(px, py, TILE, 4);
        t.fillStyle = mossHi;
        t.fillRect(px, py, TILE, 1);
        for (let i = 0; i < 3; i++) {
          const r = rnd01(tx * 19 + i * 41 + seed);
          t.fillRect(px + (r * 14 | 0) + 1, py + 1, 2, 1 + (r * 2 | 0));
        }
        // moss drip down left/right rims
        if (lfO) t.fillRect(px, py, 1, 6);
        if (rtO) t.fillRect(px + TILE - 1, py, 1, 6);
      }
      if (dnO) {
        t.fillStyle = rockLo;
        t.fillRect(px, py + TILE - 3, TILE, 3);
        if (rnd01(tx * 29 + ty * 3 + seed) < 0.3) {
          t.fillRect(px + 4 + (rnd01(tx + seed) * 8 | 0), py + TILE, 2, 3 + (rnd01(tx * 3 + seed) * 4 | 0));
        }
      }
      if (lfO) { t.fillStyle = rockHi; t.fillRect(px, py + (upO ? 4 : 0), 1, TILE - (upO ? 4 : 0)); }
      if (rtO) { t.fillStyle = rockLo; t.fillRect(px + TILE - 1, py + (upO ? 4 : 0), 1, TILE - (upO ? 4 : 0)); }

      // Deep-rock details: cracks + glowing crystals
      const deep = !upO && !dnO && !lfO && !rtO;
      if (deep) {
        const r = rnd01(tx * 211 + ty * 173 + seed);
        if (r < 0.25) {
          t.fillStyle = rockLo;
          const cx0 = px + 3 + (r * 33 % 8 | 0), cy0 = py + 3 + (r * 77 % 8 | 0);
          t.fillRect(cx0, cy0, 1, 3); t.fillRect(cx0 + 1, cy0 + 2, 2, 1);
        } else if (r > 0.94 && STATIC_LIGHTS.length < 40) {
          t.fillStyle = accent;
          const cx0 = px + 5 + (r * 51 % 6 | 0), cy0 = py + 5 + (r * 91 % 6 | 0);
          t.fillRect(cx0, cy0, 2, 2);
          t.fillRect(cx0 + 1, cy0 - 1, 1, 1);
          STATIC_LIGHTS.push({ x: cx0 + 1, y: cy0 + 1, r: 16, a: 0.4, col: rgbs(PAL.accent), ga: 0.05, ph: r * 7 });
        }
      }
    }
  }

  // Spikes baked in
  for (const sp of SPIKES) {
    const px = sp.tx * TILE, py = sp.ty * TILE;
    t.fillStyle = rgb(PAL.spike);
    for (let i = 0; i < 4; i++) {
      t.beginPath();
      if (sp.dir === "up") {
        t.moveTo(px + i * 4, py + TILE); t.lineTo(px + i * 4 + 2, py + 5); t.lineTo(px + i * 4 + 4, py + TILE);
      } else if (sp.dir === "down") {
        t.moveTo(px + i * 4, py); t.lineTo(px + i * 4 + 2, py + TILE - 5); t.lineTo(px + i * 4 + 4, py);
      } else if (sp.dir === "right") {
        t.moveTo(px, py + i * 4); t.lineTo(px + TILE - 5, py + i * 4 + 2); t.lineTo(px, py + i * 4 + 4);
      } else {
        t.moveTo(px + TILE, py + i * 4); t.lineTo(px + 5, py + i * 4 + 2); t.lineTo(px + TILE, py + i * 4 + 4);
      }
      t.closePath(); t.fill();
    }
    t.fillStyle = rgb(PAL.spikeHi);
    for (let i = 0; i < 4; i++) {
      if (sp.dir === "up") t.fillRect(px + 1 + i * 4, py + 10, 1, 3);
      else if (sp.dir === "down") t.fillRect(px + 1 + i * 4, py + 3, 1, 3);
      else if (sp.dir === "right") t.fillRect(px + 3, py + 1 + i * 4, 3, 1);
      else t.fillRect(px + 10, py + 1 + i * 4, 3, 1);
    }
  }
}

// ── Collision ──────────────────────────────────────────────────────────────
function overlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function solidsNear(x, y, w, h) {
  const out = [];
  const x0 = Math.floor(x / TILE) - 1, y0 = Math.floor(y / TILE) - 1;
  const x1 = Math.floor((x + w) / TILE) + 1, y1 = Math.floor((y + h) / TILE) + 1;
  for (let ty = y0; ty <= y1; ty++) {
    for (let tx = x0; tx <= x1; tx++) {
      if (isSolid(tileAt(tx, ty)))
        out.push({ x: tx * TILE, y: ty * TILE, w: TILE, h: TILE });
    }
  }
  for (const b of S.blooms) {
    if (b.life > BLOOM_WILT * 0.3)
      out.push({ x: b.x, y: b.y, w: b.w, h: b.h, oneWay: true });
  }
  for (const m of S.movers) {
    out.push({ x: m.x, y: m.y, w: m.w, h: 8, oneWay: true, mover: true });
  }
  return out;
}

function solidBlocked(x, y, w, h) {
  const box = { x, y, w, h };
  for (const r of solidsNear(x, y, w, h)) {
    if (!r.oneWay && overlap(box, r)) return true;
  }
  return false;
}

function moveAxis(p, dx, dy) {
  if (dx !== 0) {
    p.x += dx;
    for (const r of solidsNear(p.x, p.y, p.w, p.h)) {
      if (r.oneWay) continue;
      if (!overlap(p, r)) continue;
      // Ledge assist: pop up onto ledges you barely clip
      const lift = (p.y + p.h) - r.y;
      if (lift > 0 && lift <= LEDGE_ASSIST && p.vy >= -30 &&
          !solidBlocked(p.x, r.y - p.h, p.w, p.h)) {
        p.y = r.y - p.h;
        p.grounded = true; p.canDash = true; p.spores = MAX_SPORES; p.coyote = COYOTE;
        continue;
      }
      p.x = dx > 0 ? r.x - p.w : r.x + r.w;
      p.vx = 0;
      if (p.dashing) endDash(p);
    }
  }
  if (dy !== 0) {
    const prevBottom = p.y + p.h;
    p.y += dy;
    for (const r of solidsNear(p.x, p.y, p.w, p.h)) {
      if (!overlap(p, r)) continue;
      if (r.oneWay && (dy < 0 || prevBottom > r.y + 1)) continue;
      if (dy > 0) {
        p.y = r.y - p.h;
        p.vy = 0;
        p.grounded = true;
        // Only REAL ground (incl. moving shelves) refreshes the dash and
        // refills spores — landing on your own bloom does not
        if (!r.oneWay || r.mover) { p.canDash = true; p.spores = MAX_SPORES; }
        p.coyote = COYOTE;
        if (p.dashing) endDash(p);
      } else {
        // Ceiling corner forgiveness
        const oL = (p.x + p.w) - r.x, oR = (r.x + r.w) - p.x;
        if (oL > 0 && oL <= CORNER_NUDGE && !solidBlocked(p.x - oL, p.y, p.w, p.h)) { p.x -= oL; continue; }
        if (oR > 0 && oR <= CORNER_NUDGE && !solidBlocked(p.x + oR, p.y, p.w, p.h)) { p.x += oR; continue; }
        p.y = r.y + r.h;
        p.vy = 0;
        if (p.dashing) endDash(p);
      }
    }
  }
}

function onGround(p) {
  const probe = { x: p.x + 1, y: p.y + p.h, w: p.w - 2, h: 2 };
  for (const r of solidsNear(probe.x, probe.y, probe.w, probe.h)) {
    if (r.oneWay && r.y < p.y + p.h - 1) continue;
    if (overlap(probe, r)) return true;
  }
  return false;
}

const wallsUnlocked = () => S.levelIdx >= WALL_LEVEL;
const glideUnlocked = () => S.levelIdx >= GLIDE_LEVEL && !dMod("heavy");

// -1 = wall on the left, 1 = wall on the right, 0 = none (real tiles only)
function touchingWallDir(p) {
  const l = { x: p.x - 1, y: p.y + 2, w: 1, h: p.h - 4 };
  const r = { x: p.x + p.w, y: p.y + 2, w: 1, h: p.h - 4 };
  for (const s of solidsNear(p.x - 2, p.y, p.w + 4, p.h)) {
    if (s.oneWay) continue;
    if (overlap(r, s)) return 1;
    if (overlap(l, s)) return -1;
  }
  return 0;
}

function onRealGround(p) {
  const probe = { x: p.x + 1, y: p.y + p.h, w: p.w - 2, h: 3 };
  for (const r of solidsNear(probe.x, probe.y, probe.w, probe.h)) {
    if (r.oneWay && !r.mover) continue;
    if (overlap(probe, r)) return true;
  }
  return false;
}

function hitSpike(p) {
  const hb = { x: p.x + 2, y: p.y + 2, w: p.w - 4, h: p.h - 3 };
  for (const sp of SPIKES) {
    const box = { x: sp.tx * TILE + 3, y: sp.ty * TILE + 3, w: 10, h: 10 };
    if (overlap(hb, box)) return true;
  }
  return p.y > WORLD_H + 8;
}

// ── Actions ────────────────────────────────────────────────────────────────
function burst(x, y, vx, vy, life, col, s) {
  S.particles.push({ x, y, vx, vy, life, max: life, col, s });
}

// ── Enemies ────────────────────────────────────────────────────────────────
function spawnEnemies() {
  const sm = dMod("restless") ? 1.35 : 1;   // RESTLESS: everything hurries
  S.enemies = ENEMY_SPAWNS.map(sp => {
    if (sp.t === "slug")
      return { t: "slug", x: sp.x, y: sp.y, w: 12, h: 8, dir: 1, speed: (sp.fast ? 44 : 22) * sm, fast: sp.fast, ph: Math.random() * 6, pauseT: 0 };
    if (sp.t === "puff")
      return { t: "puff", cx: sp.x, cy: sp.y, x: sp.x, y: sp.y, w: 10, h: 10, ph: Math.random() * 6 };
    if (sp.t === "skitter")
      return { t: "skitter", x: sp.x, y: sp.y, w: 12, h: 6, dir: Math.random() < 0.5 ? -1 : 1, speed: 165 * sm, ph: Math.random() * 6, pauseT: 0 };
    if (sp.t === "spitter")
      return { t: "spitter", x: sp.x, y: sp.y, w: 12, h: 12, cd: 1 + Math.random(), ph: Math.random() * 6 };
    if (sp.t === "mine")
      return { t: "mine", cx: sp.x, cy: sp.y, x: sp.x, y: sp.y, w: 10, h: 10, armT: 0, ph: Math.random() * 6 };
    return { t: "wisp", x: sp.x, y: sp.y, hx: sp.x, hy: sp.y, w: 8, h: 8, ph: Math.random() * 6 };
  });
  S.eshots = [];
}

function killEnemy(e, byDash) {
  e.dead = true;
  S.score.freed++;
  // Enemies are fuel: every kill refunds a spore
  S.player.spores = Math.min(MAX_SPORES, S.player.spores + 1);
  SFX.pop();
  if (byDash) { S.shakeT = 0.1; S.shakeMag = 1.5; }
  for (let i = 0; i < 10; i++) {
    const a = Math.random() * Math.PI * 2;
    burst(e.x + e.w / 2, e.y + e.h / 2, Math.cos(a) * 70, Math.sin(a) * 70 - 20, 0.45,
      i & 1 ? rgb(PAL.accent) : C.body, 2);
  }
}

function updateEnemies(dt) {
  const p = S.player;
  for (const e of S.enemies) {
    if (e.t === "slug") {
      // They hesitate at the edge before turning back — the last place
      // they meant to keep going from
      if (e.pauseT > 0) {
        e.pauseT -= dt;
      } else {
        const nx = e.x + e.dir * e.speed * dt;
        const aheadX = e.dir > 0 ? nx + e.w + 1 : nx - 2;
        const atx = Math.floor(aheadX / TILE);
        const midTy = Math.floor((e.y + e.h - 2) / TILE);
        const footTy = Math.floor((e.y + e.h + 3) / TILE);
        if (isSolid(tileAt(atx, midTy)) || !isSolid(tileAt(atx, footTy))) {
          e.dir *= -1;
          e.pauseT = 0.55;
        } else {
          e.x = nx;
        }
      }
    } else if (e.t === "puff") {
      e.x = e.cx + Math.sin(S.time * 0.9 + e.ph) * 10;
      e.y = e.cy + Math.sin(S.time * 1.4 + e.ph) * 14;
    } else if (e.t === "skitter") {
      // fast floor racer — hop it
      const nx = e.x + e.dir * e.speed * dt;
      const aheadX = e.dir > 0 ? nx + e.w + 1 : nx - 2;
      const atx = Math.floor(aheadX / TILE);
      const midTy = Math.floor((e.y + e.h - 2) / TILE);
      const footTy = Math.floor((e.y + e.h + 3) / TILE);
      if (isSolid(tileAt(atx, midTy)) || !isSolid(tileAt(atx, footTy))) e.dir *= -1;
      else e.x = nx;
      if (Math.random() < 0.25)
        burst(e.x + (e.dir > 0 ? 0 : e.w), e.y + e.h, -e.dir * 25, -8, 0.2, rgb(PAL.rockHi), 1);
    } else if (e.t === "spitter") {
      // stationary turret — lobs a slow glob when you linger in range
      e.cd -= dt;
      const dx = (p.x + 5) - (e.x + 6);
      const d = Math.hypot(dx, (p.y + 5) - (e.y + 6));
      if (e.cd <= 0 && d < 150) {
        e.cd = 2.6;
        S.eshots.push({ x: e.x + 4, y: e.y - 4, vx: Math.sign(dx) * (40 + Math.abs(dx) * 0.45), vy: -175, grav: true, w: 7, h: 7 });
        blip(300, 170, 0.12, "square", 0.09);
        burst(e.x + 6, e.y - 2, 0, -35, 0.3, "#f06080", 2);
      }
    } else if (e.t === "mine") {
      // drifting sporemine — arms when you come close, bursts into four pellets
      e.x = e.cx + Math.sin(S.time * 0.8 + e.ph) * 8;
      e.y = e.cy + Math.sin(S.time * 1.1 + e.ph) * 10;
      if (e.armT > 0) {
        e.armT -= dt;
        if (Math.random() < 0.6)
          burst(e.x + 5, e.y + 5, (Math.random() - 0.5) * 30, (Math.random() - 0.5) * 30, 0.2, "#f06080", 1);
        if (e.armT <= 0) {
          e.dead = true;
          SFX.pop();
          for (const v of [[62, 62], [-62, 62], [62, -62], [-62, -62]])
            S.eshots.push({ x: e.x + 3, y: e.y + 3, vx: v[0], vy: v[1], w: 6, h: 6 });
          for (let i = 0; i < 8; i++) {
            const a = Math.random() * Math.PI * 2;
            burst(e.x + 5, e.y + 5, Math.cos(a) * 70, Math.sin(a) * 70, 0.4, "#f06080", 2);
          }
        }
      } else if (Math.hypot((p.x + 5) - (e.x + 5), (p.y + 5) - (e.y + 5)) < 44) {
        e.armT = 0.6;
        blip(700, 950, 0.1, "square", 0.1);
      }
    } else {
      const dx = (p.x + 5) - (e.x + 4), dy = (p.y + 5) - (e.y + 4);
      const d = Math.hypot(dx, dy);
      if (d < 90 && !S.wispHinted) {
        S.wispHinted = true;
        S.hint = { text: "Dash through the lost ones to set them free.", t: 4 };
      }
      // Wisps hang back while someone living is speaking
      if (d < 110 && d > 4 && !S.talk) {
        const wv = dMod("restless") ? 40 : 30;
        e.x += dx / d * wv * dt;
        e.y += dy / d * wv * dt;
      } else {
        e.x += (e.hx - e.x) * dt * 0.6;
        e.y += (e.hy - e.y + Math.sin(S.time * 2 + e.ph) * 8) * dt * 0.6;
      }
      if (Math.random() < 0.08)
        burst(e.x + 4, e.y + 4, (Math.random() - 0.5) * 12, (Math.random() - 0.5) * 12, 0.35, rgb(PAL.accent), 1);
    }

    if (!overlap(p, e)) continue;
    if (p.dashing) { killEnemy(e, true); continue; }
    if (p.vy > 40 && (p.y + p.h) - e.y < 7) {
      // Stomp: bounce + dash re-armed
      killEnemy(e, false);
      p.vy = -235;
      p.canDash = true;
      p.grounded = false;
      p.squish = 1.25; p.squishT = 0.1;
      SFX.stomp();
      continue;
    }
    const eb = { x: e.x + 2, y: e.y + 2, w: e.w - 4, h: e.h - 4 };
    const pb = { x: p.x + 2, y: p.y + 2, w: p.w - 4, h: p.h - 4 };
    if (p.invuln <= 0 && overlap(pb, eb)) hurtPlayer(e.x + e.w / 2);
  }
  S.enemies = S.enemies.filter(e => !e.dead);

  // Enemy projectiles: spitter globs (arcing) and mine pellets (straight)
  for (const sh of S.eshots) {
    if (sh.grav) sh.vy += 620 * dt;
    sh.x += sh.vx * dt;
    sh.y += sh.vy * dt;
    if (p.invuln <= 0 && overlap(p, sh)) { hurtPlayer(sh.x + 3); sh.dead = true; }
    if (!sh.ghost && isSolid(tileAt(Math.floor((sh.x + 3) / TILE), Math.floor((sh.y + 3) / TILE)))) {
      sh.dead = true;
      for (let i = 0; i < 3; i++)
        burst(sh.x + 3, sh.y + 3, (Math.random() - 0.5) * 40, -20 * Math.random(), 0.25, "#f06080", 1);
    }
    if (sh.ghost && sh.floor && sh.y + sh.h >= sh.floor) {
      sh.dead = true;
      for (let i = 0; i < 3; i++)
        burst(sh.x + 3, sh.y + 3, (Math.random() - 0.5) * 40, -25 * Math.random(), 0.25, "#f06080", 1);
    }
    if (sh.x < -20 || sh.x > WORLD_W + 20 || sh.y > WORLD_H + 20) sh.dead = true;
  }
  S.eshots = S.eshots.filter(sh => !sh.dead);
}

// ── Moving platforms (fungal shelves / boss elevators) ─────────────────────
function updateMovers(dt) {
  const p = S.player;
  for (const m of S.movers) {
    const prevY = m.y;
    const u = S.time / m.period + m.phase + (m.shift || 0);
    m.y = m.yA + (m.yB - m.yA) * tri(u);
    const dy = m.y - prevY;
    if (p && !p.dashing && p.vy >= 0 &&
        p.y + p.h >= prevY - 2 && p.y + p.h <= prevY + 3 &&
        p.x + p.w > m.x && p.x < m.x + m.w) {
      p.y += dy;
      p.grounded = true;
    }
  }
}

function drawMovers() {
  for (const m of S.movers) {
    const x = Math.round(m.x), y = Math.round(m.y);
    g.fillStyle = C.bloomStem;
    g.fillRect(x + m.w / 2 - 2, y + 3, 4, 5);
    g.fillStyle = rgb(PAL.rockHi);
    g.fillRect(x, y, m.w, 4);
    g.fillStyle = rgb(PAL.mossHi);
    g.fillRect(x, y, m.w, 1);
    g.fillStyle = rgb(PAL.rockLo);
    g.fillRect(x + 2, y + 4, m.w - 4, 2);
    g.fillStyle = rgb(PAL.accent);
    g.globalAlpha = 0.5 + Math.sin(S.time * 3 + m.x) * 0.2;
    g.fillRect(x + 3, y + 1, 2, 2);
    g.fillRect(x + m.w - 5, y + 1, 2, 2);
    g.globalAlpha = 1;
  }
}

function spawnBloom(p) {
  if (S.blooms.length >= MAX_BLOOMS) {
    const oldest = S.blooms.reduce((a, b) => a.age > b.age ? a : b);
    oldest.life = Math.min(oldest.life, BLOOM_WILT * 0.6);
  }
  const bx = Math.round(p.x + p.w / 2 - BLOOM_W / 2);
  const by = Math.round(p.y + p.h);
  S.blooms.push({ x: bx, y: by, w: BLOOM_W, h: BLOOM_H, life: BLOOM_LIFE * (dMod("brittle") ? 0.5 : 1), age: 0 });
  SFX.bloom();
  for (let i = 0; i < 10; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = 30 + Math.random() * 70;
    burst(bx + BLOOM_W / 2, by + 2, Math.cos(a) * sp, Math.sin(a) * sp - 20, 0.4,
      Math.random() > 0.5 ? C.bloomHi : C.cap, 1 + (Math.random() * 2 | 0));
  }
}

function endDash(p) {
  if (!p.dashing) return;
  p.dashing = false;
  p.dashT = 0;
  p.vx *= 0.3;
  p.vy *= 0.3;
  // The bloom sprouts where the dash ENDS — if you have spores left
  if (!p.grounded && !onGround(p)) {
    if (p.spores > 0) { p.spores--; spawnBloom(p); }
    else failBloom(p);
  }
}

function failBloom(p) {
  blip(240, 90, 0.15, "triangle", 0.1);
  for (let i = 0; i < 6; i++) {
    burst(p.x + p.w / 2, p.y + p.h, (Math.random() - 0.5) * 60, 10 + Math.random() * 30, 0.35, C.wilt, 1 + (Math.random() * 2 | 0));
  }
}

function dir8(x, y, facing) {
  if (Math.abs(x) < 0.25 && Math.abs(y) < 0.25) return { dx: facing, dy: 0 };
  const snap = Math.round(Math.atan2(y, x) / (Math.PI / 4)) * (Math.PI / 4);
  let dx = Math.cos(snap), dy = Math.sin(snap);
  if (Math.abs(dx) < 0.1) dx = 0;
  if (Math.abs(dy) < 0.1) dy = 0;
  if (Math.abs(dx) > 0.9) dx = Math.sign(dx);
  if (Math.abs(dy) > 0.9) dy = Math.sign(dy);
  const len = Math.hypot(dx, dy) || 1;
  return { dx: dx / len, dy: dy / len };
}

function doDash(p, ax, ay) {
  const d = dir8(ax, ay, p.facing);
  SFX.dash();
  p.dashing = true;
  p.dashT = DASH_TIME;
  p.dashDX = d.dx; p.dashDY = d.dy;
  p.canDash = false;
  p.vx = d.dx * DASH_SPEED;
  p.vy = d.dy * DASH_SPEED;
  p.grounded = false;
  p.coyote = 0;
  if (d.dx) p.facing = Math.sign(d.dx);
  S.freezeT = DASH_FREEZE;
  S.shakeT = SHAKE_TIME;
  S.shakeMag = SHAKE_MAG;
}

function doWallJump(p) {
  p.vy = -280;
  p.vx = -p.wallDir * WALL_JUMP_VX;
  p.facing = -p.wallDir;
  p.canDash = true;   // kicking off a wall re-arms the dash; spores untouched
  p.grounded = false;
  p.coyote = 0;
  p.jumpBuf = 0;
  p.wallCoyote = 0;
  p.wjLock = 0.14;
  p.squish = 1.25; p.squishT = 0.1;
  S.jumpHeldForCut = true;
  blip(370, 720, 0.12, "square", 0.15);
  for (let i = 0; i < 5; i++) {
    burst(p.wallDir > 0 ? p.x + p.w : p.x, p.y + 5,
      -p.wallDir * (20 + Math.random() * 40), (Math.random() - 0.5) * 40, 0.25, rgb(PAL.mossHi), 1);
  }
}

function doJump(p) {
  p.vy = JUMP_V;
  p.grounded = false;
  p.coyote = 0;
  p.canDash = true;   // jumping (incl. off a bloom) is what re-arms the dash
  p.jumpBuf = 0;
  p.squish = 1.28;
  p.squishT = 0.1;
  S.jumpHeldForCut = true;
  SFX.jump();
  for (let i = 0; i < 4; i++) {
    burst(p.x + p.w / 2, p.y + p.h, (Math.random() - 0.5) * 50, -15 - Math.random() * 25, 0.22, rgb(PAL.mossHi), 1);
  }
}

// ── Secret room (THE UNDRAWN MAP) ──────────────────────────────────────────
function enterSecret() {
  S.spireSave = {
    berries: S.berries,
    taken: S.berryList.map(b => b.taken),
    checkPt: { ...S.checkPt },
  };
  loadLevel(10);
  S.mode = "play";
  SFX.check();
}

function exitSecret() {
  const sv = S.spireSave;
  loadLevel(2);
  if (sv) {
    S.berries = sv.berries;
    S.berryList.forEach((b, i) => { b.taken = sv.taken[i]; });
    S.checkPt = sv.checkPt;
    S.spireSave = null;
  }
  S.bannerT = 0;
  S.secretCd = 1.5;
  const p = S.player;
  p.x = 5.5 * TILE; p.y = 4 * TILE - p.h;   // east end of the ledge, outside the crack
  p.vx = 0; p.vy = 0; p.invuln = 1;
  S.camX = clamp(p.x - W / 2, 0, Math.max(0, WORLD_W - W));
  S.camY = clamp(p.y - H / 2, 0, Math.max(0, WORLD_H - H));
  S.mode = "play";
}

// A chamber is cleared — by goal-flower or by soothing its boss
function chamberClear() {
  S.mode = "clear";
  S.winT = 0;
  S.goalOpen = 0;
  S.score.berries += S.berries;
  S.score.total += S.berriesTotal;
  if (S.lives < MAX_LIVES) S.lives++;
  SFX.clear();
}

// Mid-bosses open a door instead of whisking you away —
// finish your berry-collecting, leave when you're ready
function bossVanquished(b) {
  b.state = "defeated";
  S.eshots = [];
  SFX.bossHit();
  for (let i = 0; i < 30; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = 50 + Math.random() * 120;
    burst(b.x, b.y, Math.cos(a) * sp, Math.sin(a) * sp - 30, 0.8,
      i & 1 ? rgb(PAL.accent) : C.bloomHi, 2);
  }
  S.bossDoor = b.kind === "barrow"
    ? { x: 44 * TILE + 6, y: 13 * TILE - 48, w: 22, h: 48 }
    : { x: 36 * TILE + 6, y: 14 * TILE - 48, w: 22, h: 48 };
  SFX.check();
  S.hint = { text: "The way onward has opened.", t: 3.5 };
}

// ── Boss: Barrow, the Oldest Slug — stomp the remembering head ─────────────
function updateBarrow(dt) {
  const b = S.boss, p = S.player;
  b.t += dt;
  const phase = 4 - b.pips;
  const floorY = 13 * TILE;
  b.y = floorY - BARROW.H;
  const half = BARROW.W / 2;

  if (b.state === "intro") {
    if (b.t > 1.8) { b.state = "crawl"; b.t = 0; SFX.bossWarn(); }
  } else if (b.state === "crawl") {
    b.x += b.dir * BARROW.SPEED[phase - 1] * dt;
    if (b.x - half < 2 * TILE) { b.x = 2 * TILE + half; b.dir = 1; }
    if (b.x + half > 46 * TILE) { b.x = 46 * TILE - half; b.dir = -1; }
    if (Math.random() < 0.2)
      burst(b.x - b.dir * half, floorY, -b.dir * 15, -8, 0.3, rgb(PAL.rockLo), 2);
    if (b.t > BARROW.CRAWL) { b.state = "remember"; b.t = 0; blip(880, 1175, 0.3, "sine", 0.13); }
  } else if (b.state === "remember") {
    if (b.t > BARROW.REMEMBER[phase - 1]) { b.state = "spit"; b.t = 0; b.spitN = 0; b.spitT = 0.2; }
  } else if (b.state === "spit") {
    b.spitT -= dt;
    if (b.spitT <= 0 && b.spitN < BARROW.GLOBS[phase - 1]) {
      b.spitT = 0.4;
      b.spitN++;
      const dx = (p.x + 5) - b.x;
      S.eshots.push({
        x: b.x + b.dir * (half - 10), y: b.y + 2,
        vx: Math.sign(dx || 1) * (50 + Math.abs(dx) * 0.4),
        vy: -220 - Math.random() * 60, grav: true, w: 8, h: 8,
        ghost: true, floor: 13 * TILE,   // passes through the shelves — no hiding
      });
      blip(260, 150, 0.12, "square", 0.1);
    }
    if (b.spitN >= BARROW.GLOBS[phase - 1] && b.spitT <= -0.4) { b.state = "crawl"; b.t = 0; }
  }
  if (b.state === "defeated") return;

  const headX = b.x + b.dir * (half - 12);
  const head = { x: headX - 10, y: b.y - 6, w: 20, h: 10 };
  const body = { x: b.x - half, y: b.y, w: BARROW.W, h: BARROW.H };
  if (p.vy > 40 && overlap(p, head)) {
    if (b.state === "remember") {
      b.pips--;
      p.vy = -250; p.invuln = 1.5; p.canDash = true; p.spores = MAX_SPORES;
      S.shakeT = 0.2; S.shakeMag = 2.5;
      SFX.bossHit();
      for (let i = 0; i < 18; i++) {
        const a = Math.random() * Math.PI * 2;
        burst(headX, b.y, Math.cos(a) * 90, Math.sin(a) * 90 - 20, 0.6,
          i & 1 ? rgb(PAL.accent) : C.body, 2);
      }
      if (b.pips <= 0) { bossVanquished(b); return; }
      b.state = "spit"; b.t = 0; b.spitN = 0; b.spitT = 0.3;
      // the brood stirs
      if (S.enemies.filter(e => e.t === "slug").length < 3) {
        S.enemies.push({ t: "slug", x: b.x - 34, y: floorY - 8, w: 12, h: 8, dir: -1, speed: 34, ph: Math.random() * 6, pauseT: 0 });
        S.enemies.push({ t: "slug", x: b.x + 24, y: floorY - 8, w: 12, h: 8, dir: 1, speed: 34, ph: Math.random() * 6, pauseT: 0 });
      }
    } else if (p.invuln <= 0) {
      SFX.bossHorn();
      hurtPlayer(b.x);
      p.vy = -200;
    }
  } else if (p.invuln <= 0 && overlap(p, body)) {
    hurtPlayer(b.x);
  }
}

// ── Boss: The Lonely Chorus — dash through the gathered core ───────────────
function updateChorus(dt) {
  const b = S.boss, p = S.player;
  b.t += dt;
  const phase = 4 - b.pips;
  if (!b.wisps.length) {
    for (let i = 0; i < CHORUS.N_WISPS; i++)
      b.wisps.push({ ang: i / CHORUS.N_WISPS * Math.PI * 2, x: b.x, y: b.y, w: 8, h: 8, mode: "orbit", t: 0, dead: false });
  }

  for (const wsp of b.wisps) {
    if (wsp.dead) continue;
    wsp.t += dt;
    if (wsp.mode === "orbit") {
      wsp.ang += dt * 1.4;
      wsp.x = b.x + Math.cos(wsp.ang) * CHORUS.ORBIT_R - 4;
      wsp.y = b.y + Math.sin(wsp.ang) * CHORUS.ORBIT_R * 0.7 - 4;
    } else if (wsp.mode === "warn") {
      if (Math.random() < 0.6) burst(wsp.x + 4, wsp.y + 4, 0, 0, 0.2, "#fff0f6", 1);
      if (wsp.t > CHORUS.DIVE_WARN) {
        wsp.mode = "dive"; wsp.t = 0;
        const tx = p.x + 1, ty = p.y + 1;
        const d = Math.hypot(tx - wsp.x, ty - wsp.y) || 1;
        wsp.vx = (tx - wsp.x) / d * CHORUS.DIVE_V;
        wsp.vy = (ty - wsp.y) / d * CHORUS.DIVE_V;
        blip(600, 300, 0.15, "sawtooth", 0.1);
      }
    } else if (wsp.mode === "dive") {
      wsp.x += wsp.vx * dt;
      wsp.y += wsp.vy * dt;
      if (Math.random() < 0.5) burst(wsp.x + 4, wsp.y + 4, 0, 0, 0.25, "#ff82aa", 1);
      if (wsp.t > 0.7 || wsp.x < 16 || wsp.x > WORLD_W - 24 || wsp.y > 14 * TILE - 10 || wsp.y < 2 * TILE) {
        wsp.mode = "return"; wsp.t = 0;
      }
    } else if (wsp.mode === "return") {
      wsp.x += (b.x + Math.cos(wsp.ang) * CHORUS.ORBIT_R - 4 - wsp.x) * Math.min(1, dt * 3);
      wsp.y += (b.y + Math.sin(wsp.ang) * CHORUS.ORBIT_R * 0.7 - 4 - wsp.y) * Math.min(1, dt * 3);
      if (wsp.t > 1) wsp.mode = "orbit";
    }
    if (b.state !== "gather" && overlap(p, wsp)) {
      if (p.dashing) {
        wsp.dead = true;
        SFX.pop();
        for (let i = 0; i < 6; i++) {
          const a = Math.random() * Math.PI * 2;
          burst(wsp.x + 4, wsp.y + 4, Math.cos(a) * 70, Math.sin(a) * 70, 0.4, "#ff82aa", 2);
        }
      } else if (p.invuln <= 0) {
        hurtPlayer(wsp.x + 4);
      }
    }
  }

  if (b.state === "intro") {
    if (b.t > 2) {
      b.state = "orbit"; b.t = 0; SFX.bossWarn();
      S.hint = { text: "When they gather into one — dash through the heart.", t: 4.5 };
    }
  } else if (b.state === "orbit") {
    if (b.t > CHORUS.ORBIT) {
      b.t = 0; b.state = "dives";
      const alive = b.wisps.filter(w2 => !w2.dead && w2.mode === "orbit");
      for (let i = 0; i < Math.min(CHORUS.DIVERS[phase - 1], alive.length); i++) {
        alive[i].mode = "warn"; alive[i].t = 0;
      }
    }
  } else if (b.state === "dives") {
    if (b.t > 2.2) {
      b.state = "gather"; b.t = 0;
      blip(880, 1320, 0.35, "sine", 0.15);
      for (const wsp of b.wisps) { wsp.dead = false; wsp.mode = "gathered"; wsp.t = 0; }
      // teach at the exact actionable moment, every window until the first hit
      if (b.pips === 3) S.hint = { text: "NOW — dash through the heart!", t: 2.2 };
    }
  } else if (b.state === "gather") {
    for (const wsp of b.wisps) {
      wsp.x += (b.x - 4 - wsp.x) * Math.min(1, dt * 6);
      wsp.y += (b.y - 4 - wsp.y) * Math.min(1, dt * 6);
    }
    const core = { x: b.x - 14, y: b.y - 14, w: 28, h: 28 };
    if (overlap(p, core)) {
      if (p.dashing) {
        b.pips--;
        p.invuln = 1.5; p.spores = MAX_SPORES; p.canDash = true;
        S.shakeT = 0.2; S.shakeMag = 2.5;
        SFX.bossHit();
        for (let i = 0; i < 20; i++) {
          const a = Math.random() * Math.PI * 2;
          burst(b.x, b.y, Math.cos(a) * 100, Math.sin(a) * 100, 0.6,
            i & 1 ? rgb(PAL.accent) : "#fff0f6", 2);
        }
        if (b.pips <= 0) { bossVanquished(b); return; }
        b.state = "orbit"; b.t = 0;
        for (const wsp of b.wisps) { wsp.mode = "orbit"; wsp.t = 0; }
      } else if (p.invuln <= 0) {
        hurtPlayer(b.x);
      }
    }
    if (b.t > CHORUS.GATHER[phase - 1]) {
      b.state = "orbit"; b.t = 0;
      for (const wsp of b.wisps) { wsp.mode = "orbit"; wsp.t = 0; }
    }
  }
  if (b.state !== "gather" && b.state !== "defeated" && p.invuln <= 0 && !p.dashing &&
      overlap(p, { x: b.x - 10, y: b.y - 10, w: 20, h: 20 })) {
    hurtPlayer(b.x);
  }
}

// ── Boss: The Unbloomed ────────────────────────────────────────────────────
function bossPhase(b) { return 4 - b.pips; } // 1, 2, 3

function bossStartAttack(b) {
  const phase = bossPhase(b);
  b.boltN = 0;
  b.boltT = 0.3;
  // The root sweep only joins from phase 2 — phase 1 teaches the landing
  if (phase >= 2) {
    const fromLeft = phase === 3 ? (b.sweepSide = !b.sweepSide) : Math.random() < 0.5;
    b.arm = {
      x: fromLeft ? 2 * TILE : 60 * TILE, dir: fromLeft ? 1 : -1,
      y: 20 * TILE - 26, w: 28, h: 26, warm: BOSS.WARN,
    };
    b.lanes = [16 * TILE, 31.5 * TILE, 47 * TILE].map(x => x + (Math.random() - 0.5) * 30);
    b.rainT = 0; b.rainN = 0;
  }
}

function bossLanded(b) {
  const p = S.player;
  b.pips--;
  b.capFlash = 0;
  p.vy = -260; p.invuln = 1.5; p.canDash = true; p.spores = MAX_SPORES;
  S.shakeT = 0.25; S.shakeMag = 3;
  S.freezeT = 0.1;
  SFX.bossHit();
  for (let i = 0; i < 24; i++) {
    const a = Math.random() * Math.PI * 2;
    burst(b.x, b.y - 14, Math.cos(a) * 110, Math.sin(a) * 110 - 30, 0.7,
      i & 1 ? rgb(PAL.accent) : C.bloomHi, 2);
  }
  if (b.pips <= 0) {
    b.state = "defeated"; b.t = 0;
    b.arm = null; b.shots = []; b.bolts = [];
    startEnding();
  } else {
    b.state = "recover"; b.t = 0;
    if (b.pips === 2) S.movers.forEach((m, i) => { m.shift += 0.45 + i * 0.15; });
  }
}

function updateBoss(dt) {
  const b = S.boss, p = S.player;
  if (!b || b.state === "defeated") return;
  if (b.kind === "barrow") return updateBarrow(dt);
  if (b.kind === "chorus") return updateChorus(dt);
  b.t += dt;
  b.capFlash = Math.max(0, b.capFlash - dt);
  const phase = bossPhase(b);
  const openY = b.homeY - (phase === 3 ? 12 : 0);

  if (b.state === "intro") {
    if (b.t > 2.2) { b.state = "warn"; b.t = 0; SFX.bossWarn(); }
  } else if (b.state === "warn") {
    if (Math.random() < 0.3)
      burst(b.x + (Math.random() - 0.5) * 60, b.y - 10, (Math.random() - 0.5) * 30, -20, 0.4, "#f0a060", 2);
    if (b.t > BOSS.WARN) { b.state = "attack"; b.t = 0; bossStartAttack(b); }
  } else if (b.state === "attack") {
    // Aimed spore bolts — dodge them, you can't stand on them
    const nBolts = phase === 3 ? 4 : 3;
    if (b.boltN < nBolts) {
      b.boltT -= dt;
      if (b.boltT <= 0) {
        b.boltT = phase === 3 ? 0.45 : 0.55;
        b.boltN++;
        const ox = b.x, oy = b.y - 6;
        const dx = (p.x + 5) - ox, dy = (p.y + 5) - oy;
        const d = Math.hypot(dx, dy) || 1;
        b.bolts.push({ x: ox - 4, y: oy - 4, vx: dx / d * BOSS.BOLT_V, vy: dy / d * BOSS.BOLT_V, w: 8, h: 8 });
        blip(520, 220, 0.1, "sawtooth", 0.1);
        for (let i = 0; i < 4; i++)
          burst(ox, oy, (Math.random() - 0.5) * 40, (Math.random() - 0.5) * 40, 0.25, "#f06080", 2);
      }
    }
    if (b.t > BOSS.ATTACK) {
      b.state = "rise"; b.t = 0;
      if (phase === 3) [0, 0.28, 0.56].forEach(d => blip(392, 392, 0.12, "triangle", 0.16, d));
    }
  } else if (b.state === "rise") {
    b.y += (openY - b.y) * Math.min(1, dt * 4);
    if (b.t > BOSS.RISE) { b.state = "open"; b.t = 0; blip(880, 1175, 0.3, "sine", 0.14); }
  } else if (b.state === "open") {
    if (!b.windowHint) {
      b.windowHint = true;
      S.hint = { text: "Hold Jump — drift down onto the open crown.", t: 4 };
    }
    if (b.t > BOSS.OPEN[3 - b.pips]) { b.state = "recover"; b.t = 0; b.capFlash = 0.4; }
  } else if (b.state === "recover") {
    b.y += (b.homeY - b.y) * Math.min(1, dt * 3);
    if (b.t > BOSS.RECOVER) { b.state = "warn"; b.t = 0; SFX.bossWarn(); }
  }

  // Root sweep
  if (b.arm) {
    const a = b.arm;
    if (a.warm > 0) {
      a.warm -= dt;
      if (Math.random() < 0.5)
        burst(a.x + 14, a.y + 10, (Math.random() - 0.5) * 20, -30 - Math.random() * 30, 0.35, "#f0a060", 2);
    } else {
      a.x += a.dir * BOSS.SWEEP_V * dt;
      if (Math.random() < 0.4)
        burst(a.x + 14, a.y + a.h, (Math.random() - 0.5) * 30, 10, 0.3, rgb(PAL.mossHi), 1);
      if (overlap(p, a)) hurtPlayer(a.x + 14);
      if (a.x < 1 * TILE || a.x > 61 * TILE) b.arm = null;
    }
  }

  // Spore rain (phase 2+)
  if (phase >= 2 && b.lanes.length && b.rainN < 9 && b.state !== "open") {
    b.rainT -= dt;
    if (b.rainT <= 0) {
      b.rainT = 0.55;
      const lane = b.lanes[b.rainN % 3];
      b.shots.push({ x: lane, y: 2 * TILE, w: 8, h: 8 });
      burst(lane + 4, 2 * TILE, 0, 20, 0.4, "#f06080", 2);
      b.rainN++;
    }
  }
  for (const sh of b.shots) {
    sh.y += BOSS.RAIN_V * dt;
    if (overlap(p, sh)) { hurtPlayer(sh.x + 4); sh.dead = true; }
    if (sh.y > 21 * TILE - 8) {
      sh.dead = true;
      for (let i = 0; i < 4; i++) burst(sh.x + 4, sh.y + 6, (Math.random() - 0.5) * 40, -20, 0.3, "#f06080", 1);
    }
  }
  b.shots = b.shots.filter(sh => !sh.dead);

  // Aimed bolts — pure dodge hazards
  for (const bo of b.bolts) {
    bo.x += bo.vx * dt;
    bo.y += bo.vy * dt;
    if (Math.random() < 0.4)
      burst(bo.x + 4, bo.y + 4, (Math.random() - 0.5) * 15, (Math.random() - 0.5) * 15, 0.2, "#f06080", 1);
    if (overlap(p, bo)) { hurtPlayer(bo.x + 4); bo.dead = true; }
    if (isSolid(tileAt(Math.floor((bo.x + 4) / TILE), Math.floor((bo.y + 4) / TILE))) ||
        bo.x < -16 || bo.x > WORLD_W + 16 || bo.y < -16 || bo.y > WORLD_H + 16) {
      bo.dead = true;
      for (let i = 0; i < 4; i++)
        burst(bo.x + 4, bo.y + 4, (Math.random() - 0.5) * 50, (Math.random() - 0.5) * 50, 0.25, "#f06080", 1);
    }
  }
  b.bolts = b.bolts.filter(bo => !bo.dead);

  // Phase 3: the center floor pulses hazardous
  if (phase === 3) {
    b.floorPulseT += dt;
    const cyc = b.floorPulseT % 3.2;
    if (cyc > 2.2 && cyc < 3.0) {
      if (Math.random() < 0.5)
        burst(20 * TILE + Math.random() * 24 * TILE, 21 * TILE, 0, -30 - Math.random() * 40, 0.3, "#f06080", 1);
      if (p.grounded && p.x > 20 * TILE && p.x < 44 * TILE && p.y + p.h > 20.5 * TILE)
        hurtPlayer(p.x + 5 + (Math.random() < 0.5 ? 30 : -30));
    } else if (cyc > 1.6 && cyc <= 2.2 && Math.random() < 0.3) {
      burst(20 * TILE + Math.random() * 24 * TILE, 21 * TILE, 0, -15, 0.4, "#f0a060", 1);
    }
  }

  // Cap contact
  const capTop = { x: b.x - BOSS.CAP_W / 2 + 6, y: b.y - BOSS.CAP_H - 8, w: BOSS.CAP_W - 12, h: 12 };
  const capBox = { x: b.x - BOSS.CAP_W / 2, y: b.y - BOSS.CAP_H, w: BOSS.CAP_W, h: BOSS.CAP_H + 6 };
  if (p.vy > 0 && overlap(p, capTop)) {
    if (b.state === "open") {
      bossLanded(b);
    } else if (p.invuln <= 0) {
      b.capFlash = 0.5;
      SFX.bossHorn();
      hurtPlayer(p.x + 5 + (p.x + 5 < b.x ? 60 : -60));
      p.vy = -220;
    }
  } else if (overlap(p, capBox)) {
    if (p.dashing) { endDash(p); p.vx = (p.x + 5 < b.x ? -1 : 1) * 140; p.vy = -100; }
    else if (p.invuln <= 0) hurtPlayer(b.x);
  }
}

// ── Ending: freed flower → reunion → credits ───────────────────────────────
// The ghost of a better run, interpolated on the run clock
function updateGhost() {
  S.ghostPos = null;
  const gh = S.ghost;
  if (!gh || !gh.frames || !gh.frames.length) return;
  const t = S.score.time / 0.2;
  const i = Math.min(gh.frames.length - 1, Math.floor(t));
  const j = Math.min(gh.frames.length - 1, i + 1);
  const a = gh.frames[i], b2 = gh.frames[j];
  if (!a || a[0] !== S.levelIdx) return;   // the echo is in another chamber
  const f = t - i;
  const sameLvl = b2 && b2[0] === a[0];
  S.ghostPos = {
    x: a[1] + ((sameLvl ? b2[1] : a[1]) - a[1]) * f,
    y: a[2] + ((sameLvl ? b2[2] : a[2]) - a[2]) * f,
    facing: a[3],
  };
}

async function fetchGhost(id) {
  try {
    const r = await fetch(LB.url + "/rest/v1/scores?id=eq." + id + "&select=ghost", {
      headers: { apikey: LB.key, Authorization: "Bearer " + LB.key },
    });
    if (!r.ok) return null;
    const j = await r.json();
    return j[0] && j[0].ghost ? JSON.parse(j[0].ghost) : null;
  } catch (e) { return null; }
}

function startEnding() {
  try { localStorage.setItem("sd_beaten", "1"); } catch (e) {}
  // remember your best echo
  try {
    if (!S.daily) {
      const pb = JSON.parse(localStorage.getItem("sd_pb") || "null");
      if (!pb || S.score.time < pb.t)
        localStorage.setItem("sd_pb", JSON.stringify({ t: S.score.time, frames: S.rec }));
    }
  } catch (e) {}
  S.mode = "freed";
  S.endT = 0; S.endBeat = 0;
  S.glow = 0; S.endBoom = false;
  S.talk = null;
  S.shakeT = 0.8; S.shakeMag = 2;   // a short tremble, then the bloom
  SFX.clear();
}

function fastForwardEnding() {
  S.endT = Math.max(S.endT, 6.4);
  S.endBoom = true;
  S.glow = 0.25;
  S.endBeat = 2;
  S.shakeT = 0;
  if (S.boss) S.boss.y = 21 * TILE - 24;
}

function startReunion() {
  const names = Object.keys(S.score.metNpcs).filter(n => REUNION_LINES[n]);
  if (!names.length) { S.mode = "credits"; S.creditsT = 0; SFX.win(); return; }
  S.reunion = { names, idx: -1, t: 2.2, actors: [] };
  S.npcs = [];
  S.mode = "reunion";
}

function gainLife(msg) {
  if (S.lives < MAX_LIVES) {
    S.lives++;
    S.hint = { text: msg || "A new spark kindles. +1 life.", t: 2.5 };
  }
  SFX.oneUp();
}

// Getting hit knocks you back and costs a spark. No checkpoint teleport —
// unless it was your last spark, in which case the hit is the death.
function hurtPlayer(sx) {
  const p = S.player;
  if (p.invuln > 0) return;
  if (!(DEV && S.devInf) && S.lives <= 1) { killPlayer(); return; }   // the killing blow
  if (!(DEV && S.devInf)) S.lives--;
  p.invuln = 1.2;
  p.vx = (p.x + p.w / 2 < sx ? -1 : 1) * 170;
  p.vy = -170;
  p.wjLock = 0.2;
  p.dashing = false; p.dashT = 0;
  S.shakeT = 0.12; S.shakeMag = 2;
  SFX.hurt();
  for (let i = 0; i < 8; i++) {
    burst(p.x + 5, p.y + 5, (Math.random() - 0.5) * 90, -20 - Math.random() * 40, 0.35, C.berryHi, 1);
  }
}

function killPlayer() {
  const p = S.player;
  S.mode = "dead";
  S.deathT = 0;
  S.score.deaths++;
  if (!(DEV && S.devInf)) S.lives--;
  SFX.death();
  for (let i = 0; i < 16; i++) {
    const a = Math.random() * Math.PI * 2;
    burst(p.x + 5, p.y + 5, Math.cos(a) * 80, Math.sin(a) * 80, 0.5,
      Math.random() > 0.5 ? C.cap : C.body, 2);
  }
}

function respawn() {
  const p = S.player;
  p.x = S.checkPt.x; p.y = S.checkPt.y;
  p.vx = 0; p.vy = 0;
  p.dashing = false; p.dashT = 0;
  p.canDash = true; p.spores = MAX_SPORES; p.grounded = false;
  p.grip = GRIP_TIME; p.wallCoyote = 0; p.wjLock = 0; p.gliding = false; p.sliding = false;
  p.coyote = 0; p.jumpBuf = 0;
  p.invuln = 0.5;
  S.blooms = [];
  spawnEnemies();
  S.deathT = 0;
  S.mode = "play";
  S.jumpHeldForCut = false;
  for (let i = 0; i < 10; i++) {
    const a = Math.random() * Math.PI * 2;
    burst(p.x + 5, p.y + 5, Math.cos(a) * 40, Math.sin(a) * 40, 0.4, rgb(PAL.accent), 2);
  }
}

function updateParticles(dt) {
  for (const pt of S.particles) {
    pt.life -= dt;
    pt.x += pt.vx * dt;
    pt.y += pt.vy * dt;
    pt.vy += 140 * dt;
  }
  S.particles = S.particles.filter(pt => pt.life > 0);
  for (const t of S.trail) t.life -= dt;
  S.trail = S.trail.filter(t => t.life > 0);
}

// ── Update ─────────────────────────────────────────────────────────────────
function tick(dt) {
  const inp = readInput();
  S.time += dt;

  if (S.mode === "board") {
    const tabOrder = ["any", "full", "daily"];
    const ti = tabOrder.indexOf(S.boardTab);
    if (inp.ax > 0.5 && S.boardAx <= 0.5) { S.boardTab = tabOrder[(ti + 1) % 3]; SFX.talk(); }
    if (inp.ax < -0.5 && S.boardAx >= -0.5) { S.boardTab = tabOrder[(ti + 2) % 3]; SFX.talk(); }
    S.boardAx = inp.ax;
    if (inp.jumpEdge || inp.pauseEdge) S.mode = S.boardFrom || "title";
    clearJust();
    return;
  }

  if (S.mode === "title") {
    if (just.KeyL && lbOn()) {
      S.boardFrom = "title"; S.mode = "board";
      clearJust();
      return;
    }
    if (DEV) {
      if (inp.ax > 0.5 && S.devAx <= 0.5) { S.devLevel = (S.devLevel + 1) % LEVELS.length; SFX.talk(); }
      if (inp.ax < -0.5 && S.devAx >= -0.5) { S.devLevel = (S.devLevel + LEVELS.length - 1) % LEVELS.length; SFX.talk(); }
      if ((inp.ay < -0.5 && S.devAy >= -0.5) || (inp.ay > 0.5 && S.devAy <= 0.5)) { S.devInf = !S.devInf; SFX.talk(); }
      S.devAx = inp.ax; S.devAy = inp.ay;
    }
    if (just.KeyD && lbOn() && dailyUnlocked()) {
      startDaily();
      clearJust();
      return;
    }
    if (inp.startEdge || inp.jumpEdge || inp.dashEdge) {
      S.score = { berries: 0, total: 0, deaths: 0, time: 0, freed: 0, pickups: 0, secretMemory: false, metNpcs: {} };
      S.lives = START_LIVES;
      S.wispHinted = false; S.hint = null;
      S.daily = false; S.dailyMods = null;
      S.rec = [];
      // arm an echo to race: a challenge link's ghost, or your own best run
      S.ghost = null; S.ghostPos = null;
      if (S.pendingGhost) {
        S.ghost = S.pendingGhost;
        S.pendingGhost = null;
        S.hint = { text: "Racing " + (S.ghost.name || "an echo") + " — catch the pale one.", t: 4 };
      } else {
        try {
          const pb = JSON.parse(localStorage.getItem("sd_pb") || "null");
          if (pb && pb.frames) {
            S.ghost = { frames: pb.frames, name: "your echo" };
            S.hint = { text: "Your best echo runs beside you (" + fmtMs(pb.t * 1000) + ").", t: 3.5 };
          }
        } catch (e) {}
      }
      loadLevel(DEV ? S.devLevel : 0);
      S.mode = "play";
    }
    clearJust();
    return;
  }

  if (S.mode === "gameover") {
    updateParticles(dt);
    if (inp.jumpEdge) S.mode = "title";
    clearJust();
    return;
  }

  if (S.mode === "freed") {
    S.endT += dt;
    const p = S.player, b = S.boss;
    p.vy = Math.min(p.vy + GRAVITY * dt, MAX_FALL);
    p.grounded = false;
    moveAxis(p, 0, p.vy * dt);
    if (b) b.y += ((21 * TILE - 24) - b.y) * Math.min(1, dt * 2.5);
    // The floral explosion
    if (S.endT > 0.8 && !S.endBoom) {
      S.endBoom = true;
      SFX.bloom(); SFX.win();
      S.shakeT = 0.2; S.shakeMag = 3;
      const petals = ["#d8a8b8", "#f0d0da", "#8fb08a", "#c8d8c0", rgb(PAL.accent), "#fff8dc"];
      for (let i = 0; i < 46; i++) {
        const a = Math.random() * Math.PI * 2;
        const sp = 60 + Math.random() * 160;
        burst(b.x, b.y - 14, Math.cos(a) * sp, Math.sin(a) * sp - 40, 0.9 + Math.random() * 0.8,
          petals[i % petals.length], 2 + (Math.random() * 2 | 0));
      }
    }
    // Light pours out and fills the screen, then settles to a warm haze
    if (S.endBoom) {
      const gt = S.endT - 0.8;
      S.glow = gt < 0.8 ? Math.min(1, gt / 0.8) : Math.max(0.25, 1 - (gt - 0.8) * 0.7);
      if (Math.random() < 0.4)
        burst(b.x + (Math.random() - 0.5) * 90, b.y - 20, (Math.random() - 0.5) * 20, -40 - Math.random() * 40, 1.4, rgb(PAL.accent), 2);
    }
    // A gentle 3-second tremble that fades out, then stillness
    if (S.endT < 3) {
      S.shakeT = 0.1;
      S.shakeMag = 1.8 * (1 - S.endT / 3);
    } else {
      S.shakeT = 0;
    }
    if (S.endT > 1.8 && S.endBeat === 0) S.endBeat = 1;
    if (S.endT > 3.2 && S.endBeat === 1) S.endBeat = 2;
    if (inp.jumpEdge) { fastForwardEnding(); startReunion(); clearJust(); return; }
    if (S.endT > 5.2) startReunion();
    S.camX += (clamp(b.x - W / 2, 0, WORLD_W - W) - S.camX) * Math.min(1, dt * 2);
    S.camY += (Math.max(0, WORLD_H - H) - S.camY) * Math.min(1, dt * 2);
    updateParticles(dt);
    clearJust();
    return;
  }

  if (S.mode === "reunion") {
    const r = S.reunion;
    S.shakeT = 0;
    if (inp.jumpEdge) {
      fastForwardEnding();
      S.talk = null;
      S.mode = "credits"; S.creditsT = 0; SFX.win();
      clearJust();
      return;
    }
    r.t += dt;
    if (S.talk) S.talk.t += dt;
    // spirits drift gently
    for (const a of r.actors) a.y = a.baseY + Math.sin(S.time * 1.4 + a.ph) * 4;
    // linger on the full group before the credits
    const wait = r.idx >= r.names.length - 1 ? 5.0 : 3.6;
    if (r.t > wait) {
      r.t = 0;
      r.idx++;
      if (r.idx >= r.names.length) {
        S.mode = "credits"; S.creditsT = 0; SFX.win();
        clearJust();
        return;
      }
      const name = r.names[r.idx];
      const sprite = REUNION_SPRITES[name];
      // floating in an arc above the player, front and center
      const arc = [[-40, -6], [42, -6], [-80, 8], [82, 8], [0, -22], [-120, 20], [122, 20]][r.idx] || [0, -40];
      const line = (name === "THE CARTOGRAPHER" && S.score.secretMemory)
        ? CARTOGRAPHER_SECRET_LINE : REUNION_LINES[name];
      const actor = {
        name, sprite, lines: [line], big: true,
        x: S.player.x + arc[0],
        baseY: 21 * TILE - 96 + arc[1],
        y: 21 * TILE - 96 + arc[1],
        ph: Math.random() * 6, c: 0, r: 0,
      };
      r.actors.push(actor);
      S.npcs = r.actors;
      S.talk = { npc: actor, line: 0, t: 0 };
      SFX.talk();
      for (let i = 0; i < 10; i++)
        burst(actor.x + 6, actor.y + 8, (Math.random() - 0.5) * 60, (Math.random() - 0.5) * 50, 0.6, rgb(PAL.accent), 2);
    }
    updateParticles(dt);
    clearJust();
    return;
  }

  if (S.mode === "credits") {
    S.shakeT = 0;
    S.creditsT += dt;
    if (S.reunion)
      for (const a of S.reunion.actors) a.y = a.baseY + Math.sin(S.time * 1.4 + a.ph) * 4;
    updateParticles(dt);
    if (inp.jumpEdge || S.creditsT > 17) {
      S.mode = "win";
      S.lbMsg = "";
      S.lbConfirm = false;
      lbRefresh();
    }
    clearJust();
    return;
  }

  if (S.mode === "clear") {
    S.winT += dt;
    S.goalOpen = Math.min(1, S.goalOpen + dt * 1.4);
    updateParticles(dt);
    if (S.winT > 2.0) {
      if (S.levelIdx + 1 < LEVELS.length) {
        loadLevel(S.levelIdx + 1);
        S.mode = "play";
      } else {
        S.mode = "win";
        SFX.win();
      }
    }
    clearJust();
    return;
  }

  if (S.mode === "win") {
    updateParticles(dt);
    if (just.KeyL && lbOn()) {
      S.boardFrom = "win"; S.mode = "board";
      clearJust();
      return;
    }
    if (inp.dashEdge) {
      if (!lbOn()) S.lbMsg = "Leaderboard offline";
      else if (S.score.lbDone) S.lbMsg = "Already submitted";
      else if (!S.lbConfirm) S.lbConfirm = true;   // are you sure?
      else { S.lbConfirm = false; submitScore(); }
    }
    if (inp.jumpEdge) {
      if (S.lbConfirm) S.lbConfirm = false;        // cancel, stay on this screen
      else S.mode = "title";
    }
    clearJust();
    return;
  }

  if (inp.pauseEdge) {
    if (S.mode === "play") { S.mode = "pause"; S.pauseSel = 0; S.pauseAy = 0; S.devAx = 0; S.devLevel = S.levelIdx; }
    else if (S.mode === "pause") S.mode = "play";
  }
  if (S.mode === "pause") {
    const nOpts = DEV ? 5 : 4;
    if (inp.ay < -0.5 && S.pauseAy >= -0.5) { S.pauseSel = (S.pauseSel + nOpts - 1) % nOpts; SFX.talk(); }
    if (inp.ay > 0.5 && S.pauseAy <= 0.5) { S.pauseSel = (S.pauseSel + 1) % nOpts; SFX.talk(); }
    S.pauseAy = inp.ay;
    if (DEV && S.pauseSel === 4) {
      if (inp.ax > 0.5 && S.devAx <= 0.5) { S.devLevel = (S.devLevel + 1) % LEVELS.length; SFX.talk(); }
      if (inp.ax < -0.5 && S.devAx >= -0.5) { S.devLevel = (S.devLevel + LEVELS.length - 1) % LEVELS.length; SFX.talk(); }
    }
    S.devAx = inp.ax;
    if (inp.jumpEdge || inp.dashEdge) {
      SFX.berry();
      if (S.pauseSel === 0) {
        S.mode = "play";
      } else if (S.pauseSel === 1) {
        loadLevel(S.levelIdx);
        S.mode = "play";
      } else if (S.pauseSel === 2) {
        S.score = { berries: 0, total: 0, deaths: 0, time: 0, freed: 0, pickups: 0, secretMemory: false, metNpcs: {} };
        S.lives = START_LIVES;
        S.wispHinted = false; S.hint = null;
        S.daily = false; S.dailyMods = null;
        S.rec = []; S.ghost = null; S.ghostPos = null;
        loadLevel(0);
        S.mode = "play";
      } else if (S.pauseSel === 3) {
        S.talk = null;
        S.mode = "title";
      } else {
        loadLevel(S.devLevel);
        S.mode = "play";
      }
    }
    clearJust();
    return;
  }

  if (S.mode === "dead") {
    S.deathT += dt;
    updateParticles(dt);
    if (S.deathT > 0.55) {
      if (S.lives <= 0) {
        S.mode = "gameover";
        SFX.gameOver();
      } else {
        respawn();
      }
    }
    clearJust();
    return;
  }

  S.score.time += dt;
  // echo recording (5Hz on the run clock) + ghost playback
  while (S.score.time >= S.rec.length * 0.2) {
    S.rec.push([S.levelIdx, Math.round(S.player.x), Math.round(S.player.y), S.player.facing]);
  }
  updateGhost();
  if (S.bannerT > 0) S.bannerT -= dt;
  if (S.hint) { S.hint.t -= dt; if (S.hint.t <= 0) S.hint = null; }

  if (S.freezeT > 0) {
    S.freezeT -= dt;
    if (inp.jumpEdge) S.player.jumpBuf = JUMP_BUF;
    if (S.shakeT > 0) S.shakeT -= dt;
    clearJust();
    return;
  }

  updateMovers(dt);

  const p = S.player;
  const wasGrounded = p.grounded;
  p.grounded = onGround(p);

  if (p.grounded) {
    p.coyote = COYOTE;
    p.grip = GRIP_TIME;
    if (!p.dashing && onRealGround(p)) { p.canDash = true; p.spores = MAX_SPORES; }
    if (!wasGrounded) {
      p.squish = 0.72; p.squishT = 0.12;
      SFX.land();
      for (let i = 0; i < 3; i++) {
        burst(p.x + p.w / 2 + (Math.random() - 0.5) * 8, p.y + p.h, (Math.random() - 0.5) * 40, -8 - Math.random() * 14, 0.25, rgb(PAL.rockHi), 1);
      }
    }
  } else {
    p.coyote = Math.max(0, p.coyote - dt);
  }

  if (inp.jumpEdge) p.jumpBuf = JUMP_BUF;
  else p.jumpBuf = Math.max(0, p.jumpBuf - dt);

  if (!p.dashing && p.canDash && inp.dashEdge) doDash(p, inp.ax, inp.ay);

  if (p.dashing) {
    p.dashT -= dt;
    S.trail.push({ x: p.x, y: p.y, facing: p.facing, life: 0.22, max: 0.22 });
    p.vx = p.dashDX * DASH_SPEED;
    p.vy = p.dashDY * DASH_SPEED;
    p.grounded = false;
    moveAxis(p, p.vx * dt, 0);
    moveAxis(p, 0, p.vy * dt);
    if (p.dashing && p.dashT <= 0) {
      p.grounded = onGround(p);
      endDash(p);
    }
  } else {
    // Wall-cling: push into a real wall while airborne. Free but temporary —
    // the threads tire (grip) and never refill spores. Unlocks at The Spire.
    p.sliding = false;
    if (wallsUnlocked() && !p.grounded) {
      const wd = touchingWallDir(p);
      if (wd !== 0 && Math.sign(inp.ax) === wd && p.vy > -40) {
        p.sliding = true;
        p.wallDir = wd;
        p.wallCoyote = 0.1;
        if (p.grip > 0) p.grip -= dt;
        if (Math.random() < 0.25)
          burst(wd > 0 ? p.x + p.w : p.x, p.y + 4 + Math.random() * 6, -wd * 12, 20 + Math.random() * 20, 0.25, rgb(PAL.rockHi), 1);
      }
    }
    if (!p.sliding) p.wallCoyote = Math.max(0, p.wallCoyote - dt);

    // Horizontal movement (briefly locked after a wall-jump so the kick sticks)
    if (p.wjLock > 0) {
      p.wjLock -= dt;
    } else {
      const target = inp.ax * MAX_RUN;
      let acc;
      if (p.grounded) acc = (target === 0 || Math.abs(target) < Math.abs(p.vx) || Math.sign(target) !== Math.sign(p.vx || target)) ? MOVE_FRICTION : MOVE_ACCEL;
      else acc = AIR_ACCEL;
      p.vx = approach(p.vx, target, acc * dt);
      if (inp.ax !== 0) p.facing = Math.sign(inp.ax);
    }

    if (p.jumpBuf > 0) {
      if (p.coyote > 0) doJump(p);
      else if (wallsUnlocked() && p.wallCoyote > 0) doWallJump(p);
    }

    if (S.jumpHeldForCut && !inp.jumpDown && p.vy < 0) {
      p.vy *= JUMP_CUT;
      S.jumpHeldForCut = false;
    }
    if (p.vy >= 0) S.jumpHeldForCut = false;

    // Spore-glide: hold jump while falling and the cap opens like a parasol.
    // Only slows descent — never gains height. Unlocks at Mycel Gardens.
    const wasGliding = p.gliding;
    p.gliding = glideUnlocked() && !p.grounded && !p.dashing && !p.sliding && p.vy > 20 && inp.jumpDown;
    if (p.gliding && !wasGliding) whoosh(0.15, 0.05, 600);

    p.vy += GRAVITY * dt;
    if (p.vy > MAX_FALL) p.vy = MAX_FALL;
    if (p.sliding) p.vy = Math.min(p.vy, p.grip > 0 ? WALL_SLIDE_V : WALL_TIRED_V);
    else if (p.gliding) {
      p.vy = Math.min(p.vy, GLIDE_FALL);
      if (Math.random() < 0.15)
        burst(p.x + Math.random() * 10, p.y - 4, (Math.random() - 0.5) * 10, -12, 0.4, "#c4a878", 1);
    }

    p.grounded = false;
    moveAxis(p, p.vx * dt, 0);
    moveAxis(p, 0, p.vy * dt);
    if (!p.grounded) p.grounded = onGround(p);
  }

  if (p.squishT > 0) {
    p.squishT -= dt;
    p.squish += (1 - p.squish) * Math.min(1, dt * 14);
  } else {
    p.squish += (1 - p.squish) * Math.min(1, dt * 16);
  }

  p.animT += dt;
  if (p.dashing) p.anim = "dash";
  else if (!p.grounded) p.anim = p.sliding ? "slide" : p.gliding ? "glide" : (p.vy < -20 ? "jump" : "fall");
  else if (Math.abs(p.vx) > 12) p.anim = "run";
  else p.anim = "idle";
  if (p.animT > 0.1) { p.animT = 0; p.frame = (p.frame + 1) & 3; }

  if (p.invuln > 0) p.invuln -= dt;

  for (const b of S.blooms) { b.life -= dt; b.age += dt; }
  for (const b of S.blooms) {
    if (b.life <= 0) {
      for (let i = 0; i < 6; i++) {
        burst(b.x + Math.random() * b.w, b.y + 2, (Math.random() - 0.5) * 30, 20 + Math.random() * 40, 0.4, C.wilt, 1 + (Math.random() * 2 | 0));
      }
    }
  }
  S.blooms = S.blooms.filter(b => b.life > 0);

  for (const ber of S.berryList) {
    if (ber.taken) continue;
    if (overlap(p, ber)) {
      ber.taken = true;
      S.berries++;
      S.score.pickups++;
      if (S.score.pickups % BERRIES_PER_LIFE === 0)
        gainLife("The berries remember you. +1 spark.");
      SFX.berry();
      for (let i = 0; i < 7; i++) {
        const a = Math.random() * Math.PI * 2;
        burst(ber.x + 4, ber.y + 4, Math.cos(a) * 55, Math.sin(a) * 55 - 25, 0.35, C.berryHi, 2);
      }
    } else if (Math.random() < 0.015) {
      burst(ber.x + Math.random() * 8, ber.y + Math.random() * 6, 0, -8, 0.5, C.berryHi, 1);
    }
  }

  for (const cp of S.checkpoints) {
    if (!cp.active && overlap(p, cp)) {
      cp.active = true;
      S.checkPt = { x: cp.x + 3, y: cp.y - 4 };
      SFX.check();
      for (let i = 0; i < 10; i++) {
        burst(cp.x + 8, cp.y + 4, (Math.random() - 0.5) * 50, -40 - Math.random() * 40, 0.55, rgb(PAL.accent), 2);
      }
    }
  }

  updateEnemies(dt);
  if (S.boss) updateBoss(dt);
  if (S.mode !== "play") { clearJust(); return; }   // boss landing may have started the ending

  // The crack in the map (Spire) and the quiet way back out
  if (S.secretCd > 0) S.secretCd -= dt;
  if (S.levelIdx === 2 && !S.daily && S.secretCd <= 0 && p.y + p.h < 5 * TILE && p.x < 64) { enterSecret(); clearJust(); return; }
  if (LEVELS[S.levelIdx].secret && p.x > 21 * TILE) { exitSecret(); clearJust(); return; }

  // The First Map
  if (S.memoryObj && !S.score.secretMemory && overlap(p, S.memoryObj)) {
    S.score.secretMemory = true;
    S.memoryBeat = 5;
    SFX.check(); SFX.oneUp();
    for (let i = 0; i < 18; i++) {
      const a = Math.random() * Math.PI * 2;
      burst(S.memoryObj.x + 7, S.memoryObj.y + 8, Math.cos(a) * 60, Math.sin(a) * 60 - 20, 0.8, rgb(PAL.accent), 2);
    }
  }
  if (S.memoryBeat > 0) S.memoryBeat -= dt;

  // NPC dialogue — ambient, proximity-based, never blocks play
  let nearNpc = null;
  for (const n of S.npcs) {
    if (Math.abs(p.x + 5 - (n.x + 6)) < 26 && Math.abs(p.y + 5 - (n.y + 6)) < 26) { nearNpc = n; break; }
  }
  if (nearNpc) {
    if (!S.talk || S.talk.npc !== nearNpc) {
      S.talk = { npc: nearNpc, line: 0, t: 0 };
      S.score.metNpcs[nearNpc.name] = true;
      SFX.talk();
    } else {
      S.talk.t += dt;
      const cur = nearNpc.lines[S.talk.line];
      if (S.talk.t > cur.length * 0.035 + 2.4 && S.talk.line < nearNpc.lines.length - 1) {
        S.talk.line++;
        S.talk.t = 0;
        SFX.talk();
      }
    }
  } else {
    S.talk = null;
  }

  // Goal beacon particles
  if (S.goal && Math.random() < 0.12) {
    burst(S.goal.x + 3 + Math.random() * 10, S.goal.y + 8, (Math.random() - 0.5) * 8, -25 - Math.random() * 30, 1.1, C.goalGlow, 1);
  }

  if (S.bossDoor && overlap(p, S.bossDoor)) {
    S.bossDoor = null;
