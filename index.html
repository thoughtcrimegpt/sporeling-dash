  for (const t of S.trail) t.life -= dt;
  S.trail = S.trail.filter(t => t.life > 0);
}

// ── Update ─────────────────────────────────────────────────────────────────
function tick(dt) {
  const inp = readInput();
  S.time += dt;
  if (S.shogTitleT > 0) S.shogTitleT -= dt;
  if (just.KeyM) {
    musicOn = !musicOn;
    try { localStorage.setItem("sd_music", musicOn ? "1" : "0"); } catch (e) {}
    S.hint = { text: musicOn ? "♪ music on" : "♪ music off", t: 1.4 };
  }

  if (S.mode === "board") {
    const tabOrder = ["any", "full", "daily"];
    const ti = tabOrder.indexOf(S.boardTab);
    if (inp.ax > 0.5 && S.boardAx <= 0.5) { S.boardTab = tabOrder[(ti + 1) % 3]; SFX.talk(); }
    if (inp.ax < -0.5 && S.boardAx >= -0.5) { S.boardTab = tabOrder[(ti + 2) % 3]; SFX.talk(); }
    S.boardAx = inp.ax;
    if (inp.jumpEdge || inp.pauseEdge) S.mode = S.boardFrom || "title";
    clearJust();
    return;
  }

  if (S.mode === "notes") {
    S.notesY = clamp(S.notesY + inp.ay * 130 * dt, 0, Math.max(0, NOTES_TOTAL - (H - 58)));
    if (inp.jumpEdge || inp.pauseEdge) S.mode = "title";
    clearJust();
    return;
  }

  if (S.mode === "title") {
    // UTC midnight rolled over while idling — refetch today's dream
    if (lbOn() && LB_DAY && LB_DAY !== dailySeedStr()) { LB_CACHE.daily = null; lbRefresh(); }
    if (just.KeyN) {
      S.mode = "notes"; S.notesY = 0;
      clearJust();
      return;
    }
    if (inp.boardEdge && lbOn()) {
      S.boardFrom = "title"; S.mode = "board";
      clearJust();
      return;
    }
    if (DEV) {
      if (inp.ax > 0.5 && S.devAx <= 0.5) { S.devLevel = (S.devLevel + 1) % LEVELS.length; SFX.talk(); }
      if (inp.ax < -0.5 && S.devAx >= -0.5) { S.devLevel = (S.devLevel + LEVELS.length - 1) % LEVELS.length; SFX.talk(); }
      if ((inp.ay < -0.5 && S.devAy >= -0.5) || (inp.ay > 0.5 && S.devAy <= 0.5)) { S.devInf = !S.devInf; SFX.talk(); }
      S.devAx = inp.ax; S.devAy = inp.ay;
    } else {
      // One selector: 0 = full run, 1..reach = practice that chamber,
      // 99 = the Shoggoth directly (once you've met it)
      const reach = reachGet();
      const hasShog = shogSeen();
      if (S.pracSel !== 99 && S.pracSel > reach) S.pracSel = 0;
      if (S.pracSel === 99 && !hasShog) S.pracSel = 0;
      if (reach > 0 || hasShog) {
        if (inp.ax > 0.5 && S.devAx <= 0.5) { stepPrac(1, true); SFX.talk(); }
        if (inp.ax < -0.5 && S.devAx >= -0.5) { stepPrac(-1, true); SFX.talk(); }
      }
      S.devAx = inp.ax;
    }
    if (inp.dailyEdge && lbOn() && dailyUnlocked()) {
      startDaily();
      clearJust();
      return;
    }
    if (inp.startEdge || inp.jumpEdge || inp.dashEdge) {
      S.score = { berries: 0, total: 0, deaths: 0, time: 0, freed: 0, pickups: 0, secretMemory: false, metNpcs: {} };
      S.lives = START_LIVES;
      S.wispHinted = false; S.hint = null;
      S.daily = false; S.dailyMods = null;
      S.practice = !DEV && S.pracSel > 0;
      S.rec = [];
      // arm an echo to race: a challenge link's ghost, or your own best run
      S.ghost = null; S.ghostPos = null;
      if (S.practice) {
        // practice starts mid-cave — echoes would run out of sync
        const pn = S.pracSel === 99 ? "THE SHOGGOTH" : LEVELS[S.pracSel].name;
        S.hint = { text: "PRACTICE — " + pn + ". Full runs start from the top.", t: 4 };
      } else if (S.pendingGhost) {
        S.ghost = S.pendingGhost;
        S.pendingGhost = null;
        S.hint = { text: "Racing " + (S.ghost.name || "an echo") + " — catch the pale one.", t: 4 };
      } else if (GHOST_CACHE.any) {
        // the reigning champion always runs beside you
        S.ghost = { frames: GHOST_CACHE.any.frames, name: GHOST_CACHE.any.name };
        S.hint = { text: S.ghost.name + " holds the record. Their echo runs with you.", t: 4 };
      } else {
        try {
          const pb = JSON.parse(localStorage.getItem("sd_pb") || "null");
          if (pb && pb.frames) {
            S.ghost = { frames: pb.frames, name: "your echo" };
            S.hint = { text: "Your best echo runs beside you (" + fmtMs(pb.t * 1000) + ").", t: 3.5 };
          }
        } catch (e) {}
      }
      loadLevel(DEV ? S.devLevel : S.practice ? (S.pracSel === 99 ? 10 : S.pracSel) : 0);
      S.mode = "play";
      if (!DEV && S.pracSel === 99) spawnShoggoth();   // straight to phase two
    }
    clearJust();
    return;
  }

  if (S.mode === "gameover") {
    updateParticles(dt);
    if (inp.jumpEdge) S.mode = "title";
    clearJust();
    return;
  }

  if (S.mode === "freed") {
    S.endT += dt;
    const p = S.player, b = S.boss;
    p.vy = Math.min(p.vy + GRAVITY * dt, MAX_FALL);
    p.grounded = false;
    moveAxis(p, 0, p.vy * dt);
    if (b) b.y += ((21 * TILE - 24) - b.y) * Math.min(1, dt * 2.5);
    // The floral explosion
    if (S.endT > 0.8 && !S.endBoom) {
      S.endBoom = true;
      SFX.bloom(); SFX.win();
      S.shakeT = 0.2; S.shakeMag = 3;
      const petals = ["#d8a8b8", "#f0d0da", "#8fb08a", "#c8d8c0", rgb(PAL.accent), "#fff8dc"];
      for (let i = 0; i < 46; i++) {
        const a = Math.random() * Math.PI * 2;
        const sp = 60 + Math.random() * 160;
        burst(b.x, b.y - 14, Math.cos(a) * sp, Math.sin(a) * sp - 40, 0.9 + Math.random() * 0.8,
          petals[i % petals.length], 2 + (Math.random() * 2 | 0));
      }
    }
    // Light pours out and fills the screen, then settles to a warm haze
    if (S.endBoom) {
      const gt = S.endT - 0.8;
      S.glow = gt < 0.8 ? Math.min(1, gt / 0.8) : Math.max(0.25, 1 - (gt - 0.8) * 0.7);
      if (Math.random() < 0.4)
        burst(b.x + (Math.random() - 0.5) * 90, b.y - 20, (Math.random() - 0.5) * 20, -40 - Math.random() * 40, 1.4, rgb(PAL.accent), 2);
    }
    // A gentle 3-second tremble that fades out, then stillness
    if (S.endT < 3) {
      S.shakeT = 0.1;
      S.shakeMag = 1.8 * (1 - S.endT / 3);
    } else {
      S.shakeT = 0;
    }
    if (S.endT > 1.8 && S.endBeat === 0) S.endBeat = 1;
    if (S.endT > 3.2 && S.endBeat === 1) S.endBeat = 2;
    if (inp.jumpEdge) { fastForwardEnding(); startReunion(); clearJust(); return; }
    if (S.endT > 5.2) startReunion();
    S.camX += (clamp(b.x - W / 2, 0, WORLD_W - W) - S.camX) * Math.min(1, dt * 2);
    S.camY += (Math.max(0, WORLD_H - H) - S.camY) * Math.min(1, dt * 2);
    updateParticles(dt);
    clearJust();
    return;
  }

  if (S.mode === "reunion") {
    const r = S.reunion;
    S.shakeT = 0;
    if (inp.jumpEdge) {
      fastForwardEnding();
      S.talk = null;
      S.mode = "credits"; S.creditsT = 0; SFX.win();
      clearJust();
      return;
    }
    r.t += dt;
    if (S.talk) S.talk.t += dt;
    // spirits drift gently
    for (const a of r.actors) a.y = a.baseY + Math.sin(S.time * 1.4 + a.ph) * 4;
    // linger on the full group before the credits
    const wait = r.idx >= r.names.length - 1 ? 5.0 : 3.6;
    if (r.t > wait) {
      r.t = 0;
      r.idx++;
      if (r.idx >= r.names.length) {
        S.mode = "credits"; S.creditsT = 0; SFX.win();
        clearJust();
        return;
      }
      const name = r.names[r.idx];
      const sprite = REUNION_SPRITES[name];
      // floating in an arc above the player, front and center
      const arc = [[-40, -6], [42, -6], [-80, 8], [82, 8], [0, -22], [-120, 20], [122, 20]][r.idx] || [0, -40];
      const line = (name === "THE CARTOGRAPHER" && S.score.secretMemory)
        ? CARTOGRAPHER_SECRET_LINE : REUNION_LINES[name];
      const actor = {
        name, sprite, lines: [line], big: true,
        x: S.player.x + arc[0],
        baseY: 21 * TILE - 96 + arc[1],
        y: 21 * TILE - 96 + arc[1],
        ph: Math.random() * 6, c: 0, r: 0,
      };
      r.actors.push(actor);
      S.npcs = r.actors;
      S.talk = { npc: actor, line: 0, t: 0 };
      SFX.talk();
      for (let i = 0; i < 10; i++)
        burst(actor.x + 6, actor.y + 8, (Math.random() - 0.5) * 60, (Math.random() - 0.5) * 50, 0.6, rgb(PAL.accent), 2);
    }
    updateParticles(dt);
    clearJust();
    return;
  }

  if (S.mode === "credits") {
    S.shakeT = 0;
    S.creditsT += dt;
    if (S.reunion)
      for (const a of S.reunion.actors) a.y = a.baseY + Math.sin(S.time * 1.4 + a.ph) * 4;
    updateParticles(dt);
    if (inp.jumpEdge || S.creditsT > 17) {
      S.mode = "win";
      S.lbMsg = "";
      S.lbConfirm = false;
      lbRefresh();
    }
    clearJust();
    return;
  }

  if (S.mode === "clear") {
    S.winT += dt;
    S.goalOpen = Math.min(1, S.goalOpen + dt * 1.4);
    updateParticles(dt);
    if (S.winT > 2.0) {
      if (S.levelIdx + 1 < LEVELS.length) {
        loadLevel(S.levelIdx + 1);
        S.mode = "play";
      } else {
        S.mode = "win";
        SFX.win();
      }
    }
    clearJust();
    return;
  }

  if (S.mode === "win") {
    updateParticles(dt);
    if (inp.boardEdge && lbOn()) {
      S.boardFrom = "win"; S.mode = "board";
      clearJust();
      return;
    }
    if (inp.dashEdge) {
      if (!lbOn()) S.lbMsg = "Leaderboard offline";
      else if (S.score.lbDone) S.lbMsg = "Already submitted";
      else if (!S.lbConfirm) S.lbConfirm = true;   // are you sure?
      else { S.lbConfirm = false; submitScore(); }
    }
    if (inp.jumpEdge) {
      if (S.lbConfirm) S.lbConfirm = false;        // cancel, stay on this screen
      else S.mode = "title";
    }
    clearJust();
    return;
  }

  if (inp.pauseEdge) {
    if (S.mode === "play") {
      S.mode = "pause"; S.pauseSel = 0; S.pauseAy = 0; S.devAx = 0; S.devLevel = S.levelIdx;
      if (S.pracSel === 0 && reachGet() > 0) S.pracSel = Math.max(1, Math.min(S.levelIdx, reachGet()));
    }
    else if (S.mode === "pause") S.mode = "play";
  }
  if (S.mode === "pause") {
    const ids = pauseIds();
    if (S.pauseSel >= ids.length) S.pauseSel = 0;
    const nOpts = ids.length;
    if (inp.ay < -0.5 && S.pauseAy >= -0.5) { S.pauseSel = (S.pauseSel + nOpts - 1) % nOpts; SFX.talk(); }
    if (inp.ay > 0.5 && S.pauseAy <= 0.5) { S.pauseSel = (S.pauseSel + 1) % nOpts; SFX.talk(); }
    S.pauseAy = inp.ay;
    const cur = ids[S.pauseSel];
    if (cur === "devrow") {
      if (inp.ax > 0.5 && S.devAx <= 0.5) { S.devLevel = (S.devLevel + 1) % LEVELS.length; SFX.talk(); }
      if (inp.ax < -0.5 && S.devAx >= -0.5) { S.devLevel = (S.devLevel + LEVELS.length - 1) % LEVELS.length; SFX.talk(); }
    } else if (cur === "practice") {
      if (inp.ax > 0.5 && S.devAx <= 0.5) { stepPrac(1, false); SFX.talk(); }
      if (inp.ax < -0.5 && S.devAx >= -0.5) { stepPrac(-1, false); SFX.talk(); }
    }
    S.devAx = inp.ax;
    if (inp.jumpEdge || inp.dashEdge) {
      SFX.berry();
      if (cur === "resume") {
        S.mode = "play";
      } else if (cur === "restart") {
        loadLevel(S.levelIdx);
        S.mode = "play";
      } else if (cur === "practice") {
        startPracticeRun(S.pracSel === 0 ? 1 : S.pracSel);
      } else if (cur === "newgame") {
        S.score = { berries: 0, total: 0, deaths: 0, time: 0, freed: 0, pickups: 0, secretMemory: false, metNpcs: {} };
        S.lives = START_LIVES;
        S.wispHinted = false; S.hint = null;
        S.daily = false; S.dailyMods = null;
        S.practice = false;
        S.rec = []; S.ghost = null; S.ghostPos = null;
        loadLevel(0);
        S.mode = "play";
      } else if (cur === "titlescr") {
        S.talk = null;
        S.mode = "title";
      } else {
        loadLevel(S.devLevel);
        S.mode = "play";
      }
    }
    clearJust();
    return;
  }

  if (S.mode === "dead") {
    S.deathT += dt;
    updateParticles(dt);
    if (S.deathT > 0.55) {
      if (S.lives <= 0) {
        S.mode = "gameover";
        SFX.gameOver();
      } else {
        respawn();
      }
    }
    clearJust();
    return;
  }

  S.score.time += dt;
  // echo recording (5Hz on the run clock) + ghost playback
  while (S.score.time >= S.rec.length * 0.2) {
    S.rec.push([S.levelIdx, Math.round(S.player.x), Math.round(S.player.y), S.player.facing]);
  }
  updateGhost();
  if (S.bannerT > 0) S.bannerT -= dt;
  if (S.hint) { S.hint.t -= dt; if (S.hint.t <= 0) S.hint = null; }

  if (S.freezeT > 0) {
    S.freezeT -= dt;
    if (inp.jumpEdge) S.player.jumpBuf = JUMP_BUF;
    if (S.shakeT > 0) S.shakeT -= dt;
    clearJust();
    return;
  }

  updateMovers(dt);

  const p = S.player;
  const wasGrounded = p.grounded;
  p.grounded = onGround(p);

  if (p.grounded) {
    p.coyote = COYOTE;
    p.grip = GRIP_TIME;
    if (!p.dashing && onRealGround(p)) { p.canDash = true; p.spores = MAX_SPORES; p.chainN = 0; }
    if (!wasGrounded) {
      p.squish = 0.72; p.squishT = 0.12;
      SFX.land();
      for (let i = 0; i < 3; i++) {
        burst(p.x + p.w / 2 + (Math.random() - 0.5) * 8, p.y + p.h, (Math.random() - 0.5) * 40, -8 - Math.random() * 14, 0.25, rgb(PAL.rockHi), 1);
      }
    }
  } else {
    p.coyote = Math.max(0, p.coyote - dt);
  }

  if (inp.jumpEdge) p.jumpBuf = JUMP_BUF;
  else p.jumpBuf = Math.max(0, p.jumpBuf - dt);

  if (inp.dashEdge) p.dashBuf = DASH_BUF;
  else p.dashBuf = Math.max(0, (p.dashBuf || 0) - dt);
  if (!p.dashing && p.canDash && p.dashBuf > 0) { p.dashBuf = 0; doDash(p, inp.ax, inp.ay); }

  if (p.dashing) {
    p.dashT -= dt;
    S.trail.push({ x: p.x, y: p.y, facing: p.facing, life: 0.22, max: 0.22 });
    p.vx = p.dashDX * DASH_SPEED;
    p.vy = p.dashDY * DASH_SPEED;
    p.grounded = false;
    moveAxis(p, p.vx * dt, 0);
    moveAxis(p, 0, p.vy * dt);
    if (p.dashing && p.dashT <= 0) {
      p.grounded = onGround(p);
      endDash(p);
    }
  } else {
    // Wall-cling: push into a real wall while airborne. Free but temporary —
    // the threads tire (grip) and never refill spores. Unlocks at The Spire.
    p.sliding = false;
    if (wallsUnlocked() && !p.grounded) {
      const wd = touchingWallDir(p);
      if (wd !== 0 && Math.sign(inp.ax) === wd && p.vy > -40) {
        p.sliding = true;
        p.wallDir = wd;
        p.wallCoyote = 0.1;
        if (p.grip > 0) p.grip -= dt;
        if (Math.random() < 0.25)
          burst(wd > 0 ? p.x + p.w : p.x, p.y + 4 + Math.random() * 6, -wd * 12, 20 + Math.random() * 20, 0.25, rgb(PAL.rockHi), 1);
      }
    }
    if (!p.sliding) p.wallCoyote = Math.max(0, p.wallCoyote - dt);

    // Horizontal movement (briefly locked after a wall-jump so the kick sticks)
    if (p.wjLock > 0) {
      p.wjLock -= dt;
    } else {
      const target = inp.ax * MAX_RUN;
      let acc;
      if (p.grounded) acc = (target === 0 || Math.abs(target) < Math.abs(p.vx) || Math.sign(target) !== Math.sign(p.vx || target)) ? MOVE_FRICTION : MOVE_ACCEL;
      else acc = AIR_ACCEL;
      p.vx = approach(p.vx, target, acc * dt);
      if (inp.ax !== 0) p.facing = Math.sign(inp.ax);
    }

    if (p.jumpBuf > 0) {
      if (p.coyote > 0) doJump(p);
      else if (wallsUnlocked() && p.wallCoyote > 0) doWallJump(p);
    }

    if (S.jumpHeldForCut && !inp.jumpDown && p.vy < 0) {
      p.vy *= JUMP_CUT;
      S.jumpHeldForCut = false;
    }
    if (p.vy >= 0) S.jumpHeldForCut = false;

    // Spore-glide: hold jump while falling and the cap opens like a parasol.
    // Only slows descent — never gains height. Unlocks at Mycel Gardens.
    const wasGliding = p.gliding;
    p.gliding = glideUnlocked() && !p.grounded && !p.dashing && !p.sliding && p.vy > 20 && inp.jumpDown;
    if (p.gliding && !wasGliding) whoosh(0.15, 0.05, 600);

    p.vy += GRAVITY * dt;
    if (p.vy > MAX_FALL) p.vy = MAX_FALL;
    if (p.sliding) p.vy = Math.min(p.vy, p.grip > 0 ? WALL_SLIDE_V : WALL_TIRED_V);
    else if (p.gliding) {
      p.vy = Math.min(p.vy, GLIDE_FALL);
      if (Math.random() < 0.15)
        burst(p.x + Math.random() * 10, p.y - 4, (Math.random() - 0.5) * 10, -12, 0.4, "#c4a878", 1);
    }

    p.grounded = false;
    moveAxis(p, p.vx * dt, 0);
    moveAxis(p, 0, p.vy * dt);
    if (!p.grounded) p.grounded = onGround(p);
  }

  if (p.squishT > 0) {
    p.squishT -= dt;
    p.squish += (1 - p.squish) * Math.min(1, dt * 14);
  } else {
    p.squish += (1 - p.squish) * Math.min(1, dt * 16);
  }

  p.animT += dt;
  if (p.dashing) p.anim = "dash";
  else if (!p.grounded) p.anim = p.sliding ? "slide" : p.gliding ? "glide" : (p.vy < -20 ? "jump" : "fall");
  else if (Math.abs(p.vx) > 12) p.anim = "run";
  else p.anim = "idle";
  if (p.animT > 0.1) { p.animT = 0; p.frame = (p.frame + 1) & 3; }

  if (p.invuln > 0) p.invuln -= dt;

  for (const b of S.blooms) { b.life -= dt; b.age += dt; }
  for (const b of S.blooms) {
    if (b.life <= 0) {
      for (let i = 0; i < 6; i++) {
        burst(b.x + Math.random() * b.w, b.y + 2, (Math.random() - 0.5) * 30, 20 + Math.random() * 40, 0.4, C.wilt, 1 + (Math.random() * 2 | 0));
      }
    }
  }
  S.blooms = S.blooms.filter(b => b.life > 0);

  for (const ber of S.berryList) {
    if (ber.taken) continue;
    if (overlap(p, ber)) {
      ber.taken = true;
      S.berries++;
      S.score.pickups++;
      if (S.score.pickups % BERRIES_PER_LIFE === 0)
        gainLife("The berries remember you. +1 spark.");
      SFX.berry();
      for (let i = 0; i < 7; i++) {
        const a = Math.random() * Math.PI * 2;
        burst(ber.x + 4, ber.y + 4, Math.cos(a) * 55, Math.sin(a) * 55 - 25, 0.35, C.berryHi, 2);
      }
    } else if (Math.random() < 0.015) {
      burst(ber.x + Math.random() * 8, ber.y + Math.random() * 6, 0, -8, 0.5, C.berryHi, 1);
    }
  }

  for (const cp of S.checkpoints) {
    if (!cp.active && overlap(p, cp)) {
      cp.active = true;
      S.checkPt = { x: cp.x + 3, y: cp.y - 4 };
      SFX.check();
      for (let i = 0; i < 10; i++) {
        burst(cp.x + 8, cp.y + 4, (Math.random() - 0.5) * 50, -40 - Math.random() * 40, 0.55, rgb(PAL.accent), 2);
      }
    }
  }

  updateEnemies(dt);
  updateFallen(dt);
  if (S.boss) updateBoss(dt);
  if (S.mode !== "play") { clearJust(); return; }   // boss landing may have started the ending

  // The crack in the map (Spire) and the quiet way back out
  if (S.secretCd > 0) S.secretCd -= dt;
  if (S.levelIdx === 2 && !S.daily && S.secretCd <= 0 && p.y + p.h < 5 * TILE && p.x < 64) { enterSecret(); clearJust(); return; }
  if (LEVELS[S.levelIdx].secret && p.x > 21 * TILE) { exitSecret(); clearJust(); return; }

  // The First Map
  if (S.memoryObj && !S.score.secretMemory && overlap(p, S.memoryObj)) {
    S.score.secretMemory = true;
    S.memoryBeat = 5;
    SFX.check(); SFX.oneUp();
    for (let i = 0; i < 18; i++) {
      const a = Math.random() * Math.PI * 2;
      burst(S.memoryObj.x + 7, S.memoryObj.y + 8, Math.cos(a) * 60, Math.sin(a) * 60 - 20, 0.8, rgb(PAL.accent), 2);
    }
  }
  if (S.memoryBeat > 0) S.memoryBeat -= dt;

  // NPC dialogue — ambient, proximity-based, never blocks play
  let nearNpc = null;
  for (const n of S.npcs) {
    if (Math.abs(p.x + 5 - (n.x + 6)) < 26 && Math.abs(p.y + 5 - (n.y + 6)) < 26) { nearNpc = n; break; }
  }
  if (nearNpc) {
    if (!S.talk || S.talk.npc !== nearNpc) {
      S.talk = { npc: nearNpc, line: 0, t: 0 };
      S.score.metNpcs[nearNpc.name] = true;
      SFX.talk();
    } else {
      S.talk.t += dt;
      const cur = nearNpc.lines[S.talk.line];
      if (S.talk.t > cur.length * 0.035 + 2.4 && S.talk.line < nearNpc.lines.length - 1) {
        S.talk.line++;
        S.talk.t = 0;
        SFX.talk();
      }
    }
  } else {
    S.talk = null;
  }

  // Goal beacon particles
  if (S.goal && Math.random() < 0.12) {
    burst(S.goal.x + 3 + Math.random() * 10, S.goal.y + 8, (Math.random() - 0.5) * 8, -25 - Math.random() * 30, 1.1, C.goalGlow, 1);
  }

  if (S.bossDoor && overlap(p, S.bossDoor)) {
    S.bossDoor = null;
    chamberClear();
  }

  if (S.goal && overlap(p, S.goal)) {
    chamberClear();
    for (let i = 0; i < 22; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = 40 + Math.random() * 90;
      burst(S.goal.x + 8, S.goal.y + 10, Math.cos(a) * sp, Math.sin(a) * sp - 50, 0.9,
        i & 1 ? C.goalGlow : C.goalOpen, 2);
    }
  }

  if (p.invuln <= 0 && hitSpike(p)) killPlayer(p.y > WORLD_H + 8 ? "the long dark below" : "the spikes");

  updateParticles(dt);

  // Camera: eased lookahead toward travel direction, vertical dead zone so
  // jumps don't bounce the screen, fast downward catch-up so landings read
  if (p.facing === S.lookFace) S.lookHoldT += dt;
  else { S.lookFace = p.facing; S.lookHoldT = 0; }
  if (S.lookHoldT > CAM_LOOK_DELAY)
    S.camLook += (p.facing * CAM_LOOK - S.camLook) * Math.min(1, CAM_LOOK_EASE * dt);
  const tcx = p.x + p.w / 2 - W / 2 + S.camLook;
  S.camX += (tcx - S.camX) * Math.min(1, CAM_X_EASE * dt);
  const pcy = p.y + p.h / 2 - 10;
  const ccy = S.camY + H / 2;
  let tyc = ccy;
  if (pcy < ccy - CAM_DEAD_Y) tyc = pcy + CAM_DEAD_Y;
  else if (pcy > ccy + CAM_DEAD_Y) tyc = pcy - CAM_DEAD_Y;
  const vEase = p.vy > 60 ? CAM_DOWN_EASE : CAM_UP_EASE;
  S.camY += (tyc - H / 2 - S.camY) * Math.min(1, vEase * dt);
  S.camX = clamp(S.camX, 0, Math.max(0, WORLD_W - W));
  S.camY = clamp(S.camY, 0, Math.max(0, WORLD_H - H));

  if (S.shakeT > 0) S.shakeT -= dt;
  clearJust();
}

// ── Draw ───────────────────────────────────────────────────────────────────
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
// The buffer renders at 2x: every art pixel is still a perfect uniform
// block (drawn as exact 2x2 cells), but text rasterizes at double
// resolution — the same chunky world, far crisper lettering.
const SS = 2;
const buf = mkCv(W * SS, H * SS);
const g = buf.getContext("2d");
g.scale(SS, SS);
let scale = 1;

function resize() {
  // Size the backing store in DEVICE pixels: on 4K/HiDPI screens the game
  // pixels land 1:1 on physical pixels instead of being filtered up by the
  // compositor. Still chunky, no longer blurry.
  const dpr = window.devicePixelRatio || 1;
  const raw = Math.min(innerWidth * dpr / W, innerHeight * dpr / H);
  // Touch devices get fractional scaling so the game fills the screen;
  // desktop stays integer-scaled for crisp pixels
  scale = TOUCH.active ? Math.max(1, raw) : Math.max(1, Math.floor(raw));
  canvas.width = Math.round(W * scale);
  canvas.height = Math.round(H * scale);
  canvas.style.width = (canvas.width / dpr) + "px";
  canvas.style.height = (canvas.height / dpr) + "px";
  ctx.imageSmoothingEnabled = false;
  // re-run when the window moves to a monitor with a different pixel ratio
  try { matchMedia("(resolution: " + dpr + "dppx)").addEventListener("change", resize, { once: true }); } catch (e) {}
}
addEventListener("resize", resize);
resize();

// Leaderboard interactivity: @names open X profiles, the small panel opens
// the full board, and the board's tabs switch between the two lists.
function canvasPos(e) {
  // rect-relative: correct at any pixel ratio
  const r = canvas.getBoundingClientRect();
  return { x: (e.clientX - r.left) * (W / r.width), y: (e.clientY - r.top) * (H / r.height) };
}
function lbHitAt(e) {
  if (S.mode !== "title" && S.mode !== "win" && S.mode !== "board") return null;
  const p2 = canvasPos(e);
  for (const h of LB_HITS)
    if (p2.x >= h.x && p2.x <= h.x + h.w && p2.y >= h.y - 7 && p2.y <= h.y + 3) return h;
  return null;
}
function lbUiHitAt(e) {
  const p2 = canvasPos(e);
  if (S.mode === "board") {
    for (const t of BOARD_TABS)
      if (p2.x >= t.x && p2.x <= t.x + t.w && p2.y >= t.y && p2.y <= t.y + t.h) return { tab: t.tab };
    for (const rh of RACE_HITS)
      if (p2.x >= rh.x && p2.x <= rh.x + rh.w && p2.y >= rh.y - 7 && p2.y <= rh.y + 3) return { race: rh };
    return null;
  }
  if (S.mode === "title" && DAILY_PANEL &&
      p2.x >= DAILY_PANEL.x && p2.x <= DAILY_PANEL.x + DAILY_PANEL.w &&
      p2.y >= DAILY_PANEL.y && p2.y <= DAILY_PANEL.y + DAILY_PANEL.h) return { daily: true };
  if (S.mode === "title" && NOTES_HIT &&
      p2.x >= NOTES_HIT.x && p2.x <= NOTES_HIT.x + NOTES_HIT.w &&
      p2.y >= NOTES_HIT.y && p2.y <= NOTES_HIT.y + NOTES_HIT.h) return { notes: true };
  if ((S.mode === "title" || S.mode === "win") && LB_PANEL &&
      p2.x >= LB_PANEL.x && p2.x <= LB_PANEL.x + LB_PANEL.w &&
      p2.y >= LB_PANEL.y && p2.y <= LB_PANEL.y + LB_PANEL.h) return { open: true };
  return null;
}
canvas.addEventListener("click", e => {
  const h = lbHitAt(e);
  if (h) { window.open("https://x.com/" + h.name.slice(1).replace(/[^\w]/g, ""), "_blank"); return; }
  const u = lbUiHitAt(e);
  if (!u) return;
  if (u.tab) { S.boardTab = u.tab; SFX.talk(); }
  else if (u.race) {
    SFX.check();
    fetchGhost(u.race.id).then(fr => {
      if (fr) {
        S.pendingGhost = { frames: fr, name: u.race.name };
        S.mode = "title";
        SFX.oneUp();
      }
    });
  }
  else if (u.daily && lbOn()) { startDaily(); }
  else if (u.notes) { S.mode = "notes"; S.notesY = 0; SFX.talk(); }
  else if (u.open && lbOn()) { S.boardFrom = S.mode; S.mode = "board"; SFX.talk(); }
});
canvas.addEventListener("mousemove", e => {
  canvas.style.cursor = (lbHitAt(e) || lbUiHitAt(e)) ? "pointer" : "";
});

function blit() {
  ctx.imageSmoothingEnabled = false;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(buf, 0, 0, buf.width, buf.height, 0, 0, canvas.width, canvas.height);
}

function draw() {
  g.imageSmoothingEnabled = false;

  if (S.mode === "title") { drawTitle(); blit(); return; }
  if (S.mode === "board") { drawBoard(); blit(); return; }
  if (S.mode === "notes") { drawNotes(); blit(); return; }
  if (S.mode === "win") { drawWin(); blit(); return; }
  if (S.mode === "gameover") { drawGameOver(); blit(); return; }

  let ox = 0, oy = 0;
  if (S.shakeT > 0) {
    const t = S.shakeT / SHAKE_TIME;
    ox = (Math.random() - 0.5) * 2 * S.shakeMag * t;
    oy = (Math.random() - 0.5) * 2 * S.shakeMag * t;
  }

  drawBackdrop();

  g.save();
  g.translate(Math.round(-S.camX + ox), Math.round(-S.camY + oy));
  g.drawImage(terrainCv, 0, 0);
  drawDecor();
  drawOke();
  drawBlooms();
  drawCheckpoints();
  drawBerries();
  drawMovers();
  drawDoors();
  drawMemory();
  drawNPCs();
  drawEnemies();
  drawBoss();
  drawStrikeMark();
  drawGoal();
  drawTrail();
  // The Stopped — faded where real players fell, swaying faintly
  if (S.fallen) {
    for (const f of S.fallen) {
      if (f.freed) continue;
      const sway = Math.sin(S.time * 1.3 + f.ph);
      g.globalAlpha = 0.3 + 0.05 * sway;
      drawMap(g, SPRITES.idle2, Math.round(f.x) - 1, Math.round(f.y) - 2 + (sway > 0 ? 0 : 1), sway < 0, WILT_PAL);
      g.globalAlpha = 1;
    }
  }

  if (S.ghostPos && S.mode === "play") {
    g.globalAlpha = 0.45;
    drawMap(g, SPRITES.idle1, Math.round(S.ghostPos.x) - 1, Math.round(S.ghostPos.y) - 2, S.ghostPos.facing < 0, ECHO_PAL);
    if (S.ghost && S.ghost.name) {
      g.globalAlpha = 0.7;
      g.font = "7px monospace";
      g.textAlign = "center";
      g.fillStyle = "#c0e0e8";
      g.fillText(S.ghost.name, Math.round(S.ghostPos.x) + 5, Math.round(S.ghostPos.y) - 6);
      g.textAlign = "left";
    }
    g.globalAlpha = 1;
  }
  if (S.mode !== "dead") drawPlayer();
  drawParticles();
  g.restore();

  drawLighting(ox, oy);
  drawForeground();
  if (S.mode !== "credits") drawHUD();
  // THE SHOGGOTH — announced in something like blood
  if (S.shogTitleT > 0 && S.mode === "play") {
    const life = 3.4;
    const a = Math.min(1, (life - S.shogTitleT) / 0.35) * Math.min(1, S.shogTitleT / 0.6);
    const jx = (Math.random() - 0.5) * 2, jy = (Math.random() - 0.5) * 1.5;
    g.globalAlpha = a;
    g.textAlign = "center";
    g.font = "bold 22px monospace";
    g.fillStyle = "#2a060c";
    g.fillText("THE SHOGGOTH", W / 2 + jx + 2, 66 + jy + 2);
    g.fillStyle = "#a01420";
    g.fillText("THE SHOGGOTH", W / 2 + jx, 66 + jy);
    g.fillStyle = "#c22030";
    g.fillText("THE SHOGGOTH", W / 2 + jx - 1, 66 + jy - 1);
    // the letters run
    const grown = Math.max(0, life - S.shogTitleT) * 9;
    for (let i = 0; i < 10; i++) {
      const dx2 = W / 2 - 70 + i * 15 + ((i * 37) % 6);
      const dl = 3 + ((i * 53) % 9) + grown * (0.5 + ((i * 29) % 10) / 10);
      g.fillStyle = i % 2 ? "#a01420" : "#7a0e18";
      g.fillRect(Math.round(dx2 + jx), Math.round(69 + jy), 2, Math.round(Math.min(dl, 30)));
    }
    g.globalAlpha = 1;
    g.textAlign = "left";
  }

  // What took you — big and legible, only during the death pause
  if (S.mode === "dead" && S.deathCause) {
    g.textAlign = "center";
    g.fillStyle = "rgba(4,6,10,0.82)";
    const cw = ("taken by " + S.deathCause).length * 5.2 + 14;
    g.fillRect(W / 2 - cw / 2, 48, cw, 16);
    g.fillStyle = "#f0b0a0";
    g.font = "bold 8px monospace";
    g.fillText("taken by " + S.deathCause, W / 2, 59);
    g.textAlign = "left";
  }
  drawTalk();
  drawBanner();
  drawEndOverlay();

  if (S.mode === "pause") {
    g.fillStyle = "rgba(5,8,12,0.7)";
    g.fillRect(0, 0, W, H);
    g.fillStyle = C.ui;
    g.font = "bold 12px monospace";
    g.textAlign = "center";
    g.fillText("PAUSED", W / 2, 56);
    g.fillStyle = C.uiDim;
    g.font = "8px monospace";
    g.fillText(LEVELS[S.levelIdx].name, W / 2, 70);

    const ids = pauseIds();
    const labels = ids.map(id =>
      id === "resume" ? "RESUME" :
      id === "restart" ? "RESTART CHAMBER" :
      id === "practice" ? "◄ PRACTICE: " + pracName(S.pracSel === 0 ? 1 : S.pracSel) + " ►" :
      id === "newgame" ? "NEW GAME" :
      id === "titlescr" ? "TITLE SCREEN" :
      "◄ " + (S.devLevel + 1) + ". " + LEVELS[S.devLevel].name + " ►");
    g.font = "9px monospace";
    for (let i = 0; i < labels.length; i++) {
      const oy = 86 + i * 14;
      const sel = i === S.pauseSel;
      g.fillStyle = ids[i] === "devrow" ? (sel ? C.goalOpen : "#6a5060")
        : ids[i] === "practice" ? (sel ? rgb(PALS[0].accent) : C.uiDim)
        : (sel ? C.title : C.uiDim);
      g.fillText(labels[i], W / 2, oy);
      if (sel) {
        const bx = W / 2 - labels[i].length * 2.8 - 14;
        g.fillStyle = C.cap;
        g.fillRect(bx, oy - 7, 6, 3);
        g.fillStyle = C.bloomStem;
        g.fillRect(bx + 2, oy - 4, 2, 3);
      }
    }
    if (ids[S.pauseSel] === "practice") {
      g.fillStyle = C.wilt;
      g.font = "7px monospace";
      g.fillText("starts a fresh run — it won't count for the leaderboard", W / 2, 152);
    }
    g.fillStyle = C.uiDim;
    g.font = "7px monospace";
    g.fillText("Move to choose   Jump to select", W / 2, 163);
  }

  if (S.mode === "clear") {
    const a = Math.min(0.5, S.winT * 1.2);
    g.fillStyle = "rgba(6,10,16," + a + ")";
    g.fillRect(0, 0, W, H);
    g.fillStyle = C.title;
    g.font = "bold 14px monospace";
    g.textAlign = "center";
    g.fillText("CHAMBER CLEAR", W / 2, H / 2 - 10);
    g.fillStyle = C.ui;
    g.font = "9px monospace";
    g.fillText("Berries  " + S.berries + " / " + S.berriesTotal, W / 2, H / 2 + 8);
    g.fillStyle = rgb(PAL.accent);
    g.font = "8px monospace";
    g.fillText("+1 spark", W / 2, H / 2 - 26);
    if (LEVELS[S.levelIdx].clearText && S.winT > 0.6) {
      g.fillStyle = C.uiDim;
      g.font = "8px monospace";
      g.fillText(LEVELS[S.levelIdx].clearText, W / 2, H / 2 + 26);
    }
  }

  blit();
}

function drawBackdrop() {
  g.drawImage(skyCv, 0, 0);

  // God rays
  g.globalAlpha = 0.05;
  g.fillStyle = rgb(mix(PAL.fog, [255, 255, 255], 0.3));
  const rOff = wrap(S.camX * 0.1, 170);
  for (let x = -rOff - 170; x < W + 40; x += 170) {
    g.beginPath();
    g.moveTo(x, -10); g.lineTo(x + 26, -10);
    g.lineTo(x - 14, H + 10); g.lineTo(x - 40, H + 10);
    g.closePath(); g.fill();
  }
  g.globalAlpha = 1;

  const lag = Math.max(0, (WORLD_H - H)) === 0 ? 0 : ((WORLD_H - H) - S.camY);

  // Far layer
  const fOff = wrap(S.camX * 0.22, 480);
  const fY = Math.min(40, lag * 0.12);
  g.drawImage(farCv, -fOff, fY); g.drawImage(farCv, 480 - fOff, fY);

  // Fog band
  g.globalAlpha = 0.1;
  g.fillStyle = rgb(PAL.fog);
  g.fillRect(0, H * 0.55, W, H * 0.2);
  g.globalAlpha = 1;

  // Mid layer
  const mOff = wrap(S.camX * 0.5, 480);
  const mY = Math.min(70, lag * 0.25);
  g.drawImage(midCv, -mOff, -mY * 0.3); g.drawImage(midCv, 480 - mOff, -mY * 0.3);

  drawSpores("far");
}

function drawSpores(layer) {
  for (const sp of SPORES) {
    const nearSp = sp.depth > 1;
    if ((layer === "near") !== nearSp) continue;
    const sx = wrap(sp.x + S.time * sp.drift - S.camX * sp.depth, W + 24) - 12;
    const sy = wrap(sp.y + Math.sin(S.time * 0.6 + sp.ph) * 8 - S.camY * sp.depth, H + 24) - 12;
    g.globalAlpha = nearSp ? 0.5 : 0.28;
    g.fillStyle = nearSp ? rgb(PAL.accent) : rgb(mix(PAL.accent, PAL.mid, 0.5));
    g.fillRect(Math.round(sx), Math.round(sy), nearSp ? 2 : 1, nearSp ? 2 : 1);
  }
  g.globalAlpha = 1;
}

function drawDecor() {
  const p = S.player;
  const moss = rgb(PAL.moss), mossHi = rgb(PAL.mossHi), accent = rgb(PAL.accent);
  for (const d of DECOR) {
    if (d.x < S.camX - 24 || d.x > S.camX + W + 24) continue;
    const sway = Math.sin(S.time * 1.8 + d.ph);
    if (d.type === "vine") {
      g.fillStyle = moss;
      const len = Math.round(d.len);
      for (let i = 0; i < len; i += 3) {
        g.fillRect(Math.round(d.x + sway * (i / len) * 2), d.y + i, 1, 3);
      }
      g.fillStyle = mossHi;
      g.fillRect(Math.round(d.x + sway * 2), d.y + len, 2, 2);
      continue;
    }
    const near = p && Math.abs(p.x + p.w / 2 - d.x) < 10 && Math.abs(p.y + p.h - d.y) < 8;
    const sq = near ? 0.6 : 1;
    if (d.type === "grass") {
      g.fillStyle = moss;
      for (let i = 0; i < 3; i++) {
        const bh = (4 + (i % 2) * 2) * sq;
        const bx = d.x + i * 3 - 3 + (i === 1 ? sway : 0);
        g.fillRect(Math.round(bx), Math.round(d.y - bh), 1, Math.round(bh));
      }
      g.fillStyle = mossHi;
      g.fillRect(Math.round(d.x - 3 + sway), Math.round(d.y - 6 * sq), 1, 2);
    } else if (d.type === "mush") {
      const hh = Math.round(5 * sq);
      g.fillStyle = C.bloomStem;
      g.fillRect(d.x, d.y - hh, 2, hh);
      g.fillStyle = C.capLo;
      g.fillRect(d.x - 2, d.y - hh - 2, 6, 3);
      g.fillStyle = C.cap;
      g.fillRect(d.x - 1, d.y - hh - 3, 4, 2);
    } else {
      const pulse = 0.7 + Math.sin(S.time * 3 + d.ph) * 0.3;
      const hh = Math.round(6 * sq);
      g.fillStyle = C.bloomStem;
      g.fillRect(d.x, d.y - hh, 2, hh);
      g.fillStyle = rgb(mix(PAL.accent, PAL.rockLo, 0.5));
      g.fillRect(d.x - 3, d.y - hh - 3, 8, 4);
      g.fillStyle = accent;
      g.globalAlpha = pulse;
      g.fillRect(d.x - 1, d.y - hh - 2, 4, 2);
      g.globalAlpha = 1;
    }
  }
}

function drawBlooms() {
  for (const b of S.blooms) {
    const wilt = b.life < BLOOM_WILT;
    g.globalAlpha = wilt ? Math.max(0.25, b.life / BLOOM_WILT) : 1;
    // sprout with overshoot
    const gt = b.age / 0.12;
    const grow = gt >= 1 ? 1 : gt < 0.7 ? gt * 1.5 : 1.15 - (gt - 0.7) * 0.5;
    const cx = b.x + b.w / 2;
    const bw = Math.round(b.w * Math.min(1.12, grow)), bh = Math.round(b.h * Math.min(1, grow + 0.2));

    g.fillStyle = wilt ? C.wilt : C.bloomStem;
    g.fillRect(Math.round(cx - 1), Math.round(b.y + 2), 3, bh);
    g.fillStyle = wilt ? C.wilt : C.bloom;
    g.fillRect(Math.round(cx - bw / 2), Math.round(b.y), bw, Math.max(1, bh - 1));
    g.fillStyle = wilt ? "#5a4038" : C.bloomHi;
    g.fillRect(Math.round(cx - bw / 2 + 2), Math.round(b.y + 1), Math.max(1, bw - 4), 2);
    if (!wilt) {
      g.fillStyle = C.capHi;
      g.fillRect(Math.round(cx - 6), Math.round(b.y + 3), 2, 2);
      g.fillRect(Math.round(cx + 4), Math.round(b.y + 2), 2, 2);
    } else {
      // crumble warning: notches appear
      g.fillStyle = "#3a2c28";
      g.fillRect(Math.round(cx - bw / 2 + 3), Math.round(b.y), 2, 2);
      g.fillRect(Math.round(cx + bw / 2 - 6), Math.round(b.y + 1), 2, 2);
    }
    g.globalAlpha = 1;
  }
}

function drawCheckpoints() {
  for (const cp of S.checkpoints) {
    const pulse = 0.55 + Math.sin(S.time * 5) * 0.45;
    g.fillStyle = C.bloomStem;
    g.fillRect(cp.x + 6, cp.y + 4, 4, 12);
    g.fillStyle = cp.active ? rgb(PAL.accent) : rgb(mix(PAL.accent, PAL.rockLo, 0.55));
    g.globalAlpha = cp.active ? pulse : 0.75;
    g.fillRect(cp.x + 2, cp.y, 12, 8);
    g.fillStyle = cp.active ? "#ffffff" : rgb(mix(PAL.accent, [255,255,255], 0.3));
    g.globalAlpha = cp.active ? pulse : 0.4;
    g.fillRect(cp.x + 4, cp.y + 1, 3, 2);
    g.globalAlpha = 1;
  }
}

function drawBerries() {
  const bob = Math.sin(S.time * 4) * 1.5;
  for (const ber of S.berryList) {
    if (ber.taken) continue;
    const x = ber.x, y = Math.round(ber.y + bob);
    g.fillStyle = C.berry;
    g.fillRect(x + 1, y + 2, 6, 6);
    g.fillRect(x + 2, y + 1, 4, 8);
    g.fillStyle = C.berryHi;
    g.fillRect(x + 2, y + 3, 2, 2);
    g.fillStyle = C.leaf;
    g.fillRect(x + 3, y, 2, 2);
    g.fillRect(x + 5, y + 1, 2, 1);
  }
}

function drawGoal() {
  if (!S.goal) return;
  const go = S.goal;
  const open = S.mode === "clear" ? S.goalOpen : 0;
  // beacon column
  const pulse = 0.5 + Math.sin(S.time * 2) * 0.2;
  g.globalAlpha = 0.08 * pulse + open * 0.2;
  g.fillStyle = C.goalGlow;
  g.fillRect(go.x + 2, 0, 12, go.y + 10);
  g.globalAlpha = 0.05 * pulse;
  g.fillRect(go.x - 2, 0, 20, go.y + 10);
  g.globalAlpha = 1;

  g.fillStyle = C.bloomStem;
  g.fillRect(go.x + 6, go.y + 12, 4, 12);
  if (open < 0.15) {
    const sway = Math.sin(S.time * 1.5) * 1;
    g.fillStyle = C.goalClosed;
    g.fillRect(Math.round(go.x + 4 + sway), go.y + 4, 8, 12);
    g.fillStyle = "#503040";
    g.fillRect(Math.round(go.x + 6 + sway), go.y + 6, 4, 8);
    g.fillStyle = C.goalOpen;
    g.fillRect(Math.round(go.x + 6 + sway), go.y + 4, 4, 2);
  } else {
    const s = open;
    g.fillStyle = C.goalOpen;
    g.fillRect(Math.round(go.x + 2 - s * 5), go.y + 6, 6, 6);
    g.fillRect(Math.round(go.x + 8 + s * 5), go.y + 6, 6, 6);
    g.fillRect(go.x + 5, Math.round(go.y + 1 - s * 4), 6, 6);
    g.fillRect(go.x + 5, Math.round(go.y + 10 + s * 2), 6, 5);
    g.fillStyle = C.goalGlow;
    g.fillRect(go.x + 6, go.y + 7, 4, 4);
    g.globalAlpha = 0.28 * open;
    g.fillRect(go.x - 6, go.y - 6, 28, 28);
    g.globalAlpha = 1;
  }
}

function drawNPCs() {
  for (const n of S.npcs) {
    const bob = Math.sin(S.time * 2 + n.ph);
    const x = Math.round(n.x), y = Math.round(n.y);
    if (n.big) {
      // reunion spirits float large and luminous
      g.save();
      g.translate(x + 6, y + 8);
      g.scale(1.7, 1.7);
      g.translate(-(x + 6), -(y + 8));
    }
    if (n.sprite === "keeper") {
      g.fillStyle = "#8a7a5a"; g.fillRect(x, y + 8, 12, 6);
      g.fillStyle = "#a89878"; g.fillRect(x + 1, y + 9, 10, 2);
      g.fillStyle = "#6a5a42"; g.fillRect(x + 8, Math.round(y + 2 + bob), 4, 7);
      g.fillStyle = C.eye; g.fillRect(x + 10, Math.round(y + 3 + bob), 1, 2);
      g.fillStyle = "#5a4a36"; g.fillRect(x + 8, Math.round(y - 1 + bob), 4, 3);
      g.fillStyle = "#4a4036"; g.fillRect(x - 3, y + 2, 1, 12);
      g.fillStyle = C.title; g.fillRect(x - 5, Math.round(y + bob * 0.5), 4, 5);
      g.fillStyle = "#fff0c0"; g.fillRect(x - 4, Math.round(y + 1 + bob * 0.5), 2, 2);
    } else if (n.sprite === "twins") {
      const b2 = Math.sin(S.time * 2 + n.ph + 2);
      g.fillStyle = C.bloomStem;
      g.fillRect(x + 1, y + 4, 3, 6); g.fillRect(x + 8, y + 5, 3, 5);
      g.fillStyle = "#d8a848"; g.fillRect(x - 1, Math.round(y + 2 + bob * 0.6), 7, 3);
      g.fillStyle = "#f0c878"; g.fillRect(x, Math.round(y + 1 + bob * 0.6), 5, 2);
      g.fillStyle = "#c89040"; g.fillRect(x + 6, Math.round(y + 3 + b2 * 0.6), 7, 3);
      g.fillStyle = "#e8b060"; g.fillRect(x + 7, Math.round(y + 2 + b2 * 0.6), 5, 2);
      g.fillStyle = C.eye; g.fillRect(x + 2, y + 6, 1, 1); g.fillRect(x + 9, y + 7, 1, 1);
    } else if (n.sprite === "moth") {
      const fl = (S.time * 8 + n.ph) % 2 < 1 ? 1 : 0;
      g.fillStyle = "#c8c0d8";
      g.fillRect(x - fl, y + 2, 4, 3 + fl);
      g.fillRect(x + 6 + (fl ? 0 : 1), y + 2, 4, 3 + fl);
      g.fillStyle = "#8a84a0"; g.fillRect(x + 3, y + 1, 4, 8);
      g.fillStyle = C.eye; g.fillRect(x + 4, y + 2, 1, 1); g.fillRect(x + 6, y + 2, 1, 1);
      g.fillStyle = "#e8e0d0"; g.fillRect(x + 8, y + 7, 5, 4);
      g.fillStyle = "#8a84a0"; g.fillRect(x + 9, y + 8, 3, 1);
    } else if (n.sprite === "granny") {
      g.fillStyle = "#b89060"; g.fillRect(x - 1, Math.round(y + 1 + bob * 0.4), 14, 4);
      g.fillStyle = "#d8b080"; g.fillRect(x + 1, Math.round(y + bob * 0.4), 10, 2);
      g.fillStyle = "#8a6848"; g.fillRect(x + 1, y + 5, 10, 9);
      g.fillStyle = C.eye; g.fillRect(x + 3, y + 7, 2, 1); g.fillRect(x + 7, y + 7, 2, 1);
      g.fillStyle = "#e8d0b0"; g.fillRect(x + 3, y + 10, 6, 3);
      g.fillStyle = C.berry; g.fillRect(x + 5, y + 11, 2, 1);
    } else if (n.sprite === "dog") {
      // German Shepherd, sitting profile — tan coat, black saddle and muzzle
      const tan = "#c68a4e", tanDk = "#9a6634", blk = "#26201c";
      const hb = bob * 0.4;
      g.fillStyle = tan;
      g.fillRect(x + 5, y + 6, 9, 6);                          // haunches
      g.fillRect(x + 2, y + 4, 5, 10);                         // chest + front
      g.fillStyle = blk;
      g.fillRect(x + 6, y + 5, 8, 4);                          // saddle
      g.fillRect(x + 13, y + 9, 3, 2);                         // tail
      g.fillStyle = tanDk;
      g.fillRect(x + 14, y + 10, 2, 2);                        // tail tip
      g.fillRect(x + 3, y + 12, 2, 2);                         // front leg
      g.fillRect(x + 9, y + 12, 2, 2);                         // hind paw
      g.fillStyle = tan;
      g.fillRect(x, Math.round(y + hb), 6, 5);                 // head
      g.fillStyle = blk;
      g.fillRect(x - 3, Math.round(y + 2 + hb), 4, 3);         // muzzle
      g.fillRect(x + 1, Math.round(y - 4 + hb), 2, 5);         // ear
      g.fillRect(x + 4, Math.round(y - 3 + hb), 2, 4);         // ear
      g.fillStyle = tanDk;
      g.fillRect(x + 2, Math.round(y - 3 + hb), 1, 2);         // inner ear
      g.fillStyle = "#d8a040";
      g.fillRect(x + 1, Math.round(y + 1 + hb), 1, 1);         // amber eye
    } else if (n.sprite === "grel") {
      // Three pale pointy-eared friends — the first believers
      const line = "#1a1a20";
      const fig = (fx, fy, fw, fh, body) => {
        fx = Math.round(fx); fy = Math.round(fy);
        g.fillStyle = line;
        g.fillRect(fx, fy, fw, fh);                       // outline
        g.fillRect(fx + 1, fy - 4, 2, 5);                 // left ear spike
        g.fillRect(fx + fw - 3, fy - 3, 2, 4);            // right ear spike
        g.fillStyle = body;
        g.fillRect(fx + 1, fy + 1, fw - 2, fh - 1);       // body fill
        g.fillRect(fx + 1, fy - 3, 1, 3);                 // ear fill
        g.fillRect(fx + fw - 3, fy - 2, 1, 2);
        g.fillStyle = line;
        g.fillRect(fx + fw / 2 - 2 | 0, fy + 4, 1, 2);    // dot eyes (tall)
        g.fillRect(fx + fw / 2 + 1 | 0, fy + 4, 1, 2);
      };
      const b2 = Math.sin(S.time * 2 + n.ph + 2);
      const b3 = Math.sin(S.time * 2 + n.ph + 4);
      fig(x - 5, y + 4 + bob * 0.5, 8, 10, "#d4d4da");    // back left
      fig(x + 9, y + 3 + b3 * 0.5, 8, 11, "#dcdce2");     // back right
      fig(x + 1, y + b2 * 0.5, 10, 14, "#f2f2f6");        // front, tallest
    } else { // echo — a sporeling gone pale
      g.globalAlpha = 0.55 + Math.sin(S.time * 1.5 + n.ph) * 0.1;
      drawMap(g, SPRITES.idle1, x, Math.round(y + bob * 0.5), false, ECHO_PAL);
      g.globalAlpha = 1;
    }
    if (!S.talk || S.talk.npc !== n) {
      g.fillStyle = "rgba(8,12,18,0.6)";
      g.fillRect(x + 2, y - 9, 10, 6);
      g.fillStyle = C.ui;
      g.fillRect(x + 4, y - 7, 1, 1); g.fillRect(x + 6, y - 7, 1, 1); g.fillRect(x + 8, y - 7, 1, 1);
    }
    if (n.big) g.restore();
  }
}

function drawTalk() {
  if (!S.talk || (S.mode !== "play" && S.mode !== "pause" && S.mode !== "reunion")) return;
  const npc = S.talk.npc;
  const full = npc.lines[S.talk.line];
  const shown = full.slice(0, Math.floor(S.talk.t / 0.035) + 1);
  // If the speaker is in the lower half of the screen, the box goes to the
  // top so it never covers them (Grel lives in a pit, after all)
  const npcSy = npc.y - S.camY;
  const bx = 10, bw = W - 20, bh = 38;
  const by = npcSy > H * 0.52 ? 6 : H - bh - 5;
  g.fillStyle = "rgba(4,7,12,0.94)";
  g.fillRect(bx, by, bw, bh);
  g.fillStyle = rgb(PAL.accent);
  g.fillRect(bx, by, bw, 1);
  g.fillRect(bx, by + bh - 1, bw, 1);
  g.textAlign = "left";
  g.fillStyle = C.title;
  g.font = "bold 8px monospace";
  g.fillText(npc.name, bx + 6, by + 10);
  g.fillStyle = "#f6efdd";
  g.font = "8px monospace";
  const maxc = 56;
  let l1 = shown, l2 = "";
  if (shown.length > maxc) {
    let cut = shown.lastIndexOf(" ", maxc);
    if (cut < 20) cut = maxc;
    l1 = shown.slice(0, cut);
    l2 = shown.slice(cut + 1);
  }
  g.fillText(l1, bx + 6, by + 22);
  if (l2) g.fillText(l2, bx + 6, by + 32);
  for (let i = 0; i < npc.lines.length; i++) {
    g.fillStyle = i === S.talk.line ? C.ui : "#3a4250";
    g.fillRect(bx + bw - 8 - (npc.lines.length - 1 - i) * 6, by + bh - 6, 4, 2);
  }
}

function drawEnemies() {
  for (const e of S.enemies) {
    if (e.x < S.camX - 24 || e.x > S.camX + W + 24) continue;
    if (e.t === "slug") {
      const wob = Math.sin(S.time * 6 + e.ph);
      const hh = e.h + (wob > 0 ? 1 : 0);
      const col = e.fast ? "#d85850" : rgb(mix(PAL.mossHi, [0, 0, 0], 0.2));
      const hi = e.fast ? "#f09880" : rgb(mix(PAL.mossHi, [255, 255, 255], 0.35));
      g.fillStyle = col;
      g.fillRect(Math.round(e.x), Math.round(e.y + e.h - hh), e.w, hh);
      g.fillRect(Math.round(e.x + 1), Math.round(e.y + e.h - hh - 1), e.w - 2, 1);
      g.fillStyle = hi;
      g.fillRect(Math.round(e.x + 2), Math.round(e.y + e.h - hh + 1), e.w - 4, 2);
      g.fillStyle = C.eye;
      g.fillRect(Math.round(e.dir > 0 ? e.x + e.w - 4 : e.x + 2), Math.round(e.y + 3), 2, 2);
      g.fillStyle = hi;
      g.fillRect(Math.round(e.x + (e.dir > 0 ? e.w - 3 : 2)), Math.round(e.y - 2 + wob * 0.5), 1, 2);
    } else if (e.t === "puff") {
      const pulse = 1 + Math.sin(S.time * 3 + e.ph) * 0.12;
      const r = 5 * pulse;
      const cx = e.x + 5, cy = e.y + 5;
      g.fillStyle = "#e8e0d0";
      g.fillRect(Math.round(cx - r + 1), Math.round(cy - r), Math.round(r * 2 - 2), Math.round(r * 2));
      g.fillRect(Math.round(cx - r), Math.round(cy - r + 1), Math.round(r * 2), Math.round(r * 2 - 2));
      g.fillStyle = "#c8b8a8";
      g.fillRect(Math.round(cx - 1), Math.round(cy + 1), 2, 2);
      g.fillRect(Math.round(cx - 3), Math.round(cy - 2), 2, 2);
      g.fillStyle = "#fff8ec";
      g.fillRect(Math.round(cx + 1), Math.round(cy - 3), 2, 2);
    } else if (e.t === "skitter") {
      g.fillStyle = rgb(mix(PAL.mossHi, [40, 20, 0], 0.25));
      g.fillRect(Math.round(e.x), Math.round(e.y), e.w, e.h - 1);
      g.fillStyle = rgb(mix(PAL.mossHi, [255, 240, 200], 0.35));
      g.fillRect(Math.round(e.x + 2), Math.round(e.y + 1), e.w - 4, 2);
      g.fillStyle = C.eye;
      g.fillRect(Math.round(e.dir > 0 ? e.x + e.w - 3 : e.x + 1), Math.round(e.y + 1), 2, 2);
      g.fillStyle = rgb(PAL.rockLo);
      for (let i = 0; i < 3; i++)
        g.fillRect(Math.round(e.x + 1 + i * 4 + ((S.time * 30) % 2)), Math.round(e.y + e.h - 1), 2, 1);
    } else if (e.t === "spitter") {
      g.fillStyle = C.bloomStem;
      g.fillRect(Math.round(e.x + 4), Math.round(e.y + 5), 4, 7);
      g.fillStyle = "#c05868";
      g.fillRect(Math.round(e.x), Math.round(e.y + 1), 12, 5);
      g.fillStyle = "#e88898";
      g.fillRect(Math.round(e.x + 2), Math.round(e.y), 8, 2);
      g.fillStyle = e.cd < 0.5 ? "#f06080" : "#5a3040";
      g.fillRect(Math.round(e.x + 5), Math.round(e.y + 3), 3, 2);
    } else if (e.t === "mine") {
      const flash = e.armT > 0 && ((S.time * 12) | 0) % 2 === 0;
      const cx = Math.round(e.x + 5), cy = Math.round(e.y + 5);
      g.fillStyle = flash ? "#ffd0da" : "#8a5560";
      g.fillRect(cx - 3, cy - 3, 6, 6);
      g.fillStyle = flash ? "#f06080" : "#5a3540";
      g.fillRect(cx - 1, cy - 5, 2, 10);
      g.fillRect(cx - 5, cy - 1, 10, 2);
      g.fillStyle = "#fff0f4";
      g.fillRect(cx - 1, cy - 1, 2, 2);
    } else {
      const bob = Math.sin(S.time * 4 + e.ph);
      const cx = e.x + 4, cy = e.y + 4 + bob;
      // Pulsing aura ring — reads as "pop me"
      const ring = (S.time * 1.2 + e.ph) % 1;
      const rr = 3 + ring * 6;
      g.globalAlpha = (1 - ring) * 0.35;
      g.fillStyle = "#ff82aa";
      g.fillRect(Math.round(cx - rr), Math.round(cy - rr), Math.round(rr * 2), 1);
      g.fillRect(Math.round(cx - rr), Math.round(cy + rr), Math.round(rr * 2), 1);
      g.fillRect(Math.round(cx - rr), Math.round(cy - rr), 1, Math.round(rr * 2));
      g.fillRect(Math.round(cx + rr), Math.round(cy - rr), 1, Math.round(rr * 2) + 1);
      g.globalAlpha = 1;
      g.fillStyle = "#ff82aa";
      g.fillRect(Math.round(cx - 3), Math.round(cy - 1), 6, 2);
      g.fillRect(Math.round(cx - 1), Math.round(cy - 3), 2, 6);
      g.fillStyle = "#fff0f6";
      g.fillRect(Math.round(cx - 1), Math.round(cy - 1), 2, 2);
    }
  }
  for (const sh of S.eshots) {
    g.fillStyle = "#f06080";
    g.fillRect(Math.round(sh.x), Math.round(sh.y), sh.w, sh.h);
    g.fillStyle = "#ffc0cc";
    g.fillRect(Math.round(sh.x + 1), Math.round(sh.y + 1), 2, 2);
  }
}

function levelDoors() {
  const out = [];
  if (S.levelIdx === 2) out.push({ x: 18, y: 32, w: 22, h: 32 });      // the crack in the map, on the hidden ledge
  if (LEVELS[S.levelIdx].secret) {
    out.push({ x: 344, y: 144, w: 22, h: 48 });                        // the way back out
    out.push({ x: 18, y: 144, w: 22, h: 48 });                         // the way you came in
  }
  if (S.bossDoor) out.push(S.bossDoor);                                // opened by a soothed boss
  return out;
}

function drawDoors() {
  for (const d of levelDoors()) {
    const pulse = 0.5 + Math.sin(S.time * 2 + d.x) * 0.2;
    g.fillStyle = "#05070b";
    g.fillRect(d.x, d.y, d.w, d.h);
    g.fillStyle = rgb(PAL.accent);
    g.globalAlpha = 0.75;
    g.fillRect(d.x - 1, d.y - 2, d.w + 2, 2);
    g.fillRect(d.x - 1, d.y, 1, d.h);
    g.fillRect(d.x + d.w, d.y, 1, d.h);
    g.globalAlpha = pulse * 0.35;
    g.fillRect(d.x + 2, d.y + 3, d.w - 4, d.h - 3);
    g.globalAlpha = 1;
    g.fillStyle = rgb(PAL.moss);
    g.fillRect(d.x + 3, d.y, 2, 5);
    g.fillRect(d.x + 10, d.y, 2, 8);
    g.fillRect(d.x + 16, d.y, 2, 4);
  }
}

function drawMemory() {
  const m = S.memoryObj;
  if (!m || S.score.secretMemory) return;
  const bob = Math.sin(S.time * 2) * 1.5;
  const x = Math.round(m.x), y = Math.round(m.y + 4 + bob);
  // a folded map of pale spore-ink
  g.fillStyle = rgb(PAL.accent);
  g.fillRect(x + 1, y, 12, 9);
  g.fillStyle = "#f8f6ea";
  g.fillRect(x + 2, y + 1, 10, 7);
  g.fillStyle = rgb(mix(PAL.accent, [60, 70, 90], 0.6));
  g.fillRect(x + 4, y + 2, 3, 1);
  g.fillRect(x + 6, y + 4, 4, 1);
  g.fillRect(x + 3, y + 6, 2, 1);
  g.fillRect(x + 7, y + 1, 1, 6);
  g.globalAlpha = 0.4 + Math.sin(S.time * 3) * 0.2;
  g.fillStyle = rgb(PAL.accent);
  g.fillRect(x - 1, y - 2, 16, 1);
  g.globalAlpha = 1;
}

function drawBarrow(b) {
  const x = Math.round(b.x), y = Math.round(b.y);
  const half = BARROW.W / 2;
  const asleep = b.state === "defeated";
  const t = S.time;
  const breathe = Math.sin(t * (asleep ? 1.2 : 2.6)) * 1.5;
  const bodyC = rgb(mix(PAL.rock, [120, 100, 60], 0.35));
  const bodyHi = rgb(mix(PAL.rockHi, [160, 140, 90], 0.35));
  const bodyLo = rgb(mix(PAL.rockLo, [60, 50, 30], 0.5));
  const H2 = BARROW.H;

  // slime sheen it drags along
  g.globalAlpha = 0.25;
  g.fillStyle = rgb(PAL.accent);
  g.fillRect(x - half - 10, y + H2 - 2, BARROW.W + 20, 2);
  g.globalAlpha = 1;

  // domed body — stepped, breathing
  g.fillStyle = bodyC;
  g.fillRect(x - half, Math.round(y + 8 + breathe * 0.2), BARROW.W, H2 - 8);
  g.fillRect(x - half + 4, Math.round(y + 4 + breathe * 0.4), BARROW.W - 8, 6);
  g.fillRect(x - half + 10, Math.round(y + breathe * 0.6), BARROW.W - 20, 6);
  g.fillRect(x - half + 18, Math.round(y - 4 + breathe * 0.8), BARROW.W - 36, 5);
  // mantle bands
  g.fillStyle = bodyLo;
  g.fillRect(x - half + 6, Math.round(y + 7 + breathe * 0.4), BARROW.W - 12, 2);
  g.fillRect(x - half + 12, Math.round(y + 1 + breathe * 0.6), BARROW.W - 24, 2);
  // sheen + speckles
  g.fillStyle = bodyHi;
  g.fillRect(x - half + 12, Math.round(y - 2 + breathe * 0.8), 14, 3);
  for (let i = 0; i < 7; i++) {
    g.fillStyle = i % 2 ? bodyHi : bodyLo;
    g.fillRect(
      x - half + 8 + ((rnd01(i * 3) * (BARROW.W - 18)) | 0),
      Math.round(y + 6 + rnd01(i * 7) * 14 + breathe * 0.3), 2, 2);
  }
  // undulating foot skirt
  g.fillStyle = bodyLo;
  for (let i = 0; i < 8; i++) {
    g.fillRect(x - half + i * 8, Math.round(y + H2 - 3 + Math.sin(t * 6 + i) * 1.2), 8, 3);
  }
  // shell ridge plates along the back — still means "don't touch"
  if (!asleep) {
    for (let i = 0; i < 5; i++) {
      const sx2 = x - half + 10 + i * 10;
      const ry2 = Math.round(y + breathe * 0.6);
      g.fillStyle = rgb(PAL.spikeHi);
      g.beginPath();
      g.moveTo(sx2, ry2);
      g.lineTo(sx2 + 3, ry2 - 8 + Math.round(Math.sin(t * 3 + i)));
      g.lineTo(sx2 + 7, ry2);
      g.closePath(); g.fill();
      g.fillStyle = rgb(PAL.spike);
      g.fillRect(sx2 + 2, ry2 - 4, 2, 4);
    }
  }
  // head — a distinct bulged front segment
  const hx = Math.round(b.x + b.dir * (half - 12));
  const glowing = b.state === "remember";
  g.fillStyle = bodyC;
  g.fillRect(hx - 12, y - 2, 24, 16);
  g.fillRect(hx - 9, y - 6, 18, 6);
  if (glowing) {
    g.fillStyle = rgb(PAL.accent);
    g.globalAlpha = 0.6 + Math.sin(t * 10) * 0.3;
    g.fillRect(hx - 10, y - 5, 20, 13);
    g.globalAlpha = 1;
  }
  g.fillStyle = bodyHi;
  g.fillRect(hx - 7, y - 5, 6, 2);
  g.fillStyle = bodyLo;
  g.fillRect(hx - 8 + (b.dir > 0 ? 6 : 0), y + 8, 10, 2);   // mouth line
  // eye stalks — swaying; they droop when it remembers
  const droop = glowing ? 3 : 0;
  const sway = Math.sin(t * 2.2) * 1.5;
  g.fillStyle = bodyC;
  g.fillRect(Math.round(hx - 3 + b.dir * 5 + sway * 0.4), Math.round(y - 15 + droop), 3, 11);
  g.fillRect(Math.round(hx + 3 + b.dir * 5 + sway * 0.7), Math.round(y - 12 + droop), 3, 8);
  g.fillStyle = bodyHi;
  g.fillRect(Math.round(hx - 4 + b.dir * 5 + sway * 0.4), Math.round(y - 18 + droop), 5, 4);
  g.fillRect(Math.round(hx + 2 + b.dir * 5 + sway * 0.7), Math.round(y - 15 + droop), 5, 4);
  g.fillStyle = asleep ? bodyLo : C.eye;
  g.fillRect(Math.round(hx - 3 + b.dir * 5 + sway * 0.4 + (asleep ? 0 : b.dir)), Math.round(y - 17 + droop), 2, asleep ? 1 : 2);
  g.fillRect(Math.round(hx + 3 + b.dir * 5 + sway * 0.7 + (asleep ? 0 : b.dir)), Math.round(y - 14 + droop), 2, asleep ? 1 : 2);
  if (asleep && Math.random() < 0.02)
    burst(hx, y - 16, 5, -18, 1.4, rgb(PAL.accent), 1);
}

function drawChorus(b) {
  const gathered = b.state === "gather";
  const gone = b.state === "defeated";
  // the core
  if (!gone) {
    const pulse = 1 + Math.sin(S.time * (gathered ? 10 : 3)) * 0.15;
    const r = (gathered ? 14 : 8) * pulse;
    const cx = Math.round(b.x), cy = Math.round(b.y);
    g.globalAlpha = gathered ? 0.9 : 0.5;
    g.fillStyle = gathered ? "#aaf0c8" : "#ff82aa";   // mint = strike now, everywhere in this game
    g.fillRect(Math.round(cx - r), Math.round(cy - r / 2), Math.round(r * 2), Math.round(r));
    g.fillRect(Math.round(cx - r / 2), Math.round(cy - r), Math.round(r), Math.round(r * 2));
    g.fillStyle = "#fff0f6";
    g.fillRect(cx - 2, cy - 2, 4, 4);
    g.globalAlpha = 1;
    if (gathered) {
      // open-heart ring — dash through it
      const ring = (S.time * 2) % 1;
      const rr = 16 + ring * 14;
      g.globalAlpha = (1 - ring) * 0.5;
      g.fillStyle = "#aaf0c8";
      g.fillRect(cx - rr, cy - 1, rr * 2, 2);
      g.fillRect(cx - 1, cy - rr, 2, rr * 2);
      g.globalAlpha = 1;
      // chevrons collapsing inward: hit this, now
      const adv = (S.time * 2.5) % 1;
      const dist = 40 - adv * 18;
      g.globalAlpha = 0.9 - adv * 0.5;
      g.fillStyle = "#aaf0c8";
      for (const [dx2, dy2] of [[-1, 0], [1, 0], [0, -1], [0, 1]]) {
        const ax2 = cx + dx2 * dist, ay2 = cy + dy2 * dist;
        g.beginPath();
        g.moveTo(ax2 - dx2 * 6 - dy2 * 5, ay2 - dy2 * 6 - dx2 * 5);
        g.lineTo(ax2, ay2);
        g.lineTo(ax2 - dx2 * 6 + dy2 * 5, ay2 - dy2 * 6 + dx2 * 5);
        g.closePath();
        g.fill();
      }
      g.globalAlpha = 1;
    }
  }
  // the singers
  for (const wsp of b.wisps || []) {
    if (wsp.dead) continue;
    const wx = Math.round(wsp.x + 4), wy = Math.round(wsp.y + 4);
    const warn = wsp.mode === "warn";
    g.fillStyle = warn ? "#fff0f6" : "#ff82aa";
    g.fillRect(wx - 3, wy - 1, 6, 2);
    g.fillRect(wx - 1, wy - 3, 2, 6);
    g.fillStyle = "#fff0f6";
    g.fillRect(wx - 1, wy - 1, 2, 2);
  }
  if (gone && Math.random() < 0.1)
    burst(b.x + (Math.random() - 0.5) * 60, b.y + (Math.random() - 0.5) * 40, 0, -15, 1.2, "#ff82aa", 1);
}

// A pulsing mint chevron over the weak point — but only until your first
// successful hit (the grace window). After that the glow is the only tell.
function drawStrikeMark() {
  const b = S.boss;
  if (!b || !b.grace) return;
  let x = null, y = null;
  if (b.kind === "barrow" && b.state === "remember") {
    x = b.x + b.dir * (BARROW.W / 2 - 12); y = b.y - 18;
  } else if (b.kind === "chorus" && b.state === "gather") {
    x = b.x; y = b.y - 26;
  } else if (b.kind === "unbloomed" && b.state === "open") {
    x = b.x; y = b.y - BOSS.CAP_H - 20;
  } else if (b.kind === "shoggoth" && b.state === "eyeOpen") {
    x = b.x; y = b.y - 54;
  } else if (b.kind === "shoggoth" && b.state === "stunned") {
    x = b.x; y = b.y - 8;
  }
  if (x === null) return;
  const bob = Math.sin(S.time * 6) * 2.5;
  const xx = Math.round(x), yy = Math.round(y + bob);
  g.globalAlpha = 0.75 + Math.sin(S.time * 8) * 0.25;
  g.fillStyle = "#aaf0c8";
  for (let i = 0; i < 2; i++) {
    const oy = yy - i * 7;
    g.fillRect(xx - 4, oy - 4, 9, 2);
    g.fillRect(xx - 3, oy - 2, 7, 2);
    g.fillRect(xx - 2, oy, 5, 2);
    g.fillRect(xx - 1, oy + 2, 3, 2);
  }
  g.globalAlpha = 1;
}

function drawShoggoth(b) {
  const t = S.time;
  const x = Math.round(b.x), floorY = SHOG.FLOOR;
  const phase = 4 - b.pips;

  // After the melt: only a stain remains under the real ending
  if (b.state === "defeated") {
    g.fillStyle = "#241a30";
    g.fillRect(x - 26, floorY - 4, 52, 4);
    g.fillStyle = "#6a4a8a";
    g.fillRect(x - 10, floorY - 6, 20, 2);
    return;
  }

  // The sealed gates — the fight ends when it ends
  if (S.shogGates) {
    g.fillStyle = "#171020";
    g.fillRect(2 * 16, floorY - 130, 12, 130);
    g.fillRect(61 * 16 + 4, floorY - 130, 12, 130);
    g.fillStyle = "rgba(154,110,192,0.35)";
    g.fillRect(2 * 16 + 5, floorY - 124, 2, 118);
    g.fillRect(61 * 16 + 9, floorY - 124, 2, 118);
  }

  // Tentacle slams: warning marks, then the eruption
  for (const tn of b.tents) {
    if (!tn.live) {
      const pu = 0.4 + Math.sin(t * 10) * 0.3;
      g.globalAlpha = pu;
      g.fillStyle = "#f06080";
      for (let d = 0; d < 4; d++)
        g.fillRect(Math.round(tn.x + 2 + d * 5), floorY - 3 - (d % 2) * 3, 3, 3);
      g.fillRect(Math.round(tn.x), floorY - 1, SHOG.TENT_W, 1);
      g.globalAlpha = 1;
    } else {
      // a real tentacle: it whips up with overshoot, tapers, and curls
      const up = Math.min(1, (tn.t - tn.warn) / 0.12);
      const hh = SHOG.TENT_H * (up < 1 ? up * 1.15 : 1 + Math.sin((tn.t - tn.warn) * 16) * 0.05);
      const cx2 = tn.x + SHOG.TENT_W / 2;
      const segs = 6;
      for (let s2 = 0; s2 < segs; s2++) {
        const fr2 = s2 / segs;
        const sw = Math.round(16 - fr2 * 10);
        const wob = Math.sin(t * 9 + s2 * 1.2) * (2 + fr2 * 4);
        g.fillStyle = s2 % 2 ? "#3a2b4a" : "#2a2136";
        g.fillRect(Math.round(cx2 - sw / 2 + wob), Math.round(floorY - hh * (fr2 + 1 / segs)), sw, Math.ceil(hh / segs) + 1);
      }
      // curled tip
      const tipY = floorY - hh, tipW = Math.sin(t * 9 + segs * 1.2) * 6;
      g.fillStyle = "#6a4a8a";
      g.fillRect(Math.round(cx2 + tipW), Math.round(tipY - 4), 6, 4);
      g.fillRect(Math.round(cx2 + tipW + 4), Math.round(tipY - 1), 4, 3);
      // suckers up the inner edge
      g.fillStyle = "#c9a0f0";
      for (let d = 0; d < 4; d++)
        g.fillRect(Math.round(cx2 - 6 + Math.sin(t * 9 + d * 1.2) * 3), Math.round(floorY - hh * (d + 1) / 5), 2, 2);
    }
  }

  // Spore minions — soft purple caps you can stand a moment on
  for (const m of b.minions) {
    const sq = m.squish > 0 ? 0.7 : 1;
    const mx = Math.round(m.x), my = Math.round(m.y + (1 - sq) * 6);
    g.fillStyle = "#6a4a8a";
    g.fillRect(mx + 2, my + Math.round(8 * sq), 10, Math.round(4 * sq) + 1);
    g.fillStyle = "#9a6ec0";
    g.fillRect(mx, my + 2, 14, Math.round(6 * sq));
    g.fillRect(mx + 2, my, 10, 3);
    g.fillStyle = "#c9a0f0";
    g.fillRect(mx + 3, my + 2, 2, 2);
    g.fillRect(mx + 9, my + 3, 2, 2);
    g.fillStyle = "#241a30";
    g.fillRect(mx + 5, my + Math.round(7 * sq), 1, 2);
    g.fillRect(mx + 8, my + Math.round(7 * sq), 1, 2);
  }

  // Grinning spores rolling the floor — the face never turns with the ball
  for (const r of b.rollers) {
    const rx = Math.round(r.x), ry = floorY - 12 + Math.round(Math.abs(Math.sin(r.spin * 2)) * -1.5);
    g.fillStyle = "#3a2b4a";
    g.fillRect(rx, ry + 2, 12, 8);
    g.fillRect(rx + 2, ry, 8, 12);
    g.fillStyle = "#6a4a8a";
    const sa = r.spin % (Math.PI * 2);
    g.fillRect(rx + 5 + Math.round(Math.cos(sa) * 4), ry + 5 + Math.round(Math.sin(sa) * 4), 2, 2);
    // the stolen face, always upright
    g.fillStyle = "#e8d8b0";
    g.fillRect(rx + 3, ry + 3, 2, 2);
    g.fillRect(rx + 7, ry + 3, 2, 2);
    g.fillRect(rx + 3, ry + 8, 6, 1);
    g.fillRect(rx + 2, ry + 7, 1, 1);
    g.fillRect(rx + 9, ry + 7, 1, 1);
  }

  // The mass itself — it coils before it moves
  let sc = 1;
  if (b.state === "emerge") sc = Math.min(1, 0.15 + (b.t / 2.2) * 0.85);
  if (b.state === "melting") sc = Math.max(0.12, 1 - b.t / 2.6);
  const flat = b.state === "stunned" ? 0.78 : 1;
  const coil = b.state === "lungeWarn" ? Math.min(1, b.t / 0.3) : 0;
  const H = SHOG.H * sc * flat * (1 - 0.16 * coil);
  const W = SHOG.W * (b.state === "melting" ? 1 + b.t * 0.35 : 0.7 + 0.3 * sc) * (b.state === "stunned" ? 1.12 : 1) * (1 + 0.26 * coil);
  const lean = b.state === "lungeWarn" ? -b.dir * 7 : b.state === "lunge" ? b.dir * 9 : 0;
  const rows = 9;
  for (let i = 0; i < rows; i++) {
    const fr = i / rows;
    const rw = W * Math.sqrt(1 - fr * fr) * (0.94 + Math.sin(t * 2.1 + i) * 0.06);
    const ry = floorY - (i + 1) * (H / rows);
    g.fillStyle = i % 2 ? "#2a2136" : "#3a2b4a";
    g.fillRect(Math.round(x - rw / 2 + lean * fr), Math.round(ry), Math.round(rw), Math.ceil(H / rows) + 1);
  }
  // glow veins
  g.fillStyle = "#6a4a8a";
  for (let v = 0; v < 4; v++) {
    const vx = x + Math.sin(t * 1.3 + v * 2.2) * (W * 0.3);
    g.fillRect(Math.round(vx), Math.round(floorY - H * (0.3 + (v % 3) * 0.18)), 3, 2);
  }

  // Tentacles waving off the mound
  if (sc > 0.5 && b.state !== "melting") {
    const nT = phase === 3 ? 7 : 5;
    g.fillStyle = "#3a2b4a";
    for (let ti2 = 0; ti2 < nT; ti2++) {
      let ax = x + (ti2 - (nT - 1) / 2) * (W / nT) + lean;
      let ay = floorY - H * 0.35;
      const side = ti2 < nT / 2 ? -1 : 1;
      for (let s2 = 0; s2 < 5; s2++) {
        ax += Math.sin(t * 2.2 + ti2 * 1.7 + s2) * 3 + side * 1.5;
        ay -= 5 + Math.sin(t * 1.4 + ti2 + s2) * 1.5;
        g.fillRect(Math.round(ax), Math.round(ay), s2 > 2 ? 3 : 4, 6);
      }
    }
  }

  // Small eyes across the mass — more of them when it's angry
  if (b.state !== "melting" && sc > 0.6) {
    const nEyes = phase === 3 ? 5 : 3;
    const eyeOff = [[-16, 0.45], [2, 0.6], [14, 0.38], [-7, 0.24], [9, 0.2]];
    for (let e2 = 0; e2 < nEyes; e2++) {
      // before a lunge every eye snaps open and strobes — the tell
      const strobe = b.state === "lungeWarn" && Math.sin(t * 14 + e2) > 0;
      const blink = strobe || Math.sin(t * 1.8 + e2 * 2.6) > -0.86;
      if (!blink && b.state !== "lungeWarn") continue;
      const ex = x + eyeOff[e2][0] + lean * eyeOff[e2][1];
      const ey = floorY - H * eyeOff[e2][1];
      g.fillStyle = b.state === "stunned" ? "#584a66" : strobe ? "#ffffff" : "#e8d4ff";
      g.fillRect(Math.round(ex), Math.round(ey), 4, 4);
      if (!strobe) {
        g.fillStyle = "#241a30";
        g.fillRect(Math.round(ex + 1), Math.round(ey + 1), 2, 2);
      }
    }
  }

  // The grin — it opens a mouth full of borrowed friendliness before it spits
  if (b.state === "grin" && sc > 0.6) {
    const gw = 34;
    const gy = Math.round(floorY - H * 0.4);
    g.fillStyle = "#e8d8b0";
    g.fillRect(x - gw / 2 + lean, gy, gw, 3);
    g.fillRect(x - gw / 2 - 2 + lean, gy - 2, 3, 3);
    g.fillRect(x + gw / 2 - 1 + lean, gy - 2, 3, 3);
    g.fillStyle = "#241a30";
    for (let th = 0; th < 5; th++)
      g.fillRect(x - gw / 2 + 3 + th * 7 + lean, gy + 1, 2, 2);
  }

  // The risen eye — the way in
  if (b.state === "eyeOpen") {
    let sx2 = x, sy2 = floorY - H;
    g.fillStyle = "#3a2b4a";
    const topY = b.y - 44;
    for (let s2 = 0; s2 < 6; s2++) {
      sx2 += Math.sin(t * 2.6 + s2) * 2.5;
      sy2 -= (sy2 - topY) / (6 - s2);
      g.fillRect(Math.round(sx2 - 2), Math.round(sy2), 4, 8);
    }
    const pu = 0.7 + Math.sin(t * 7) * 0.3;
    g.globalAlpha = pu;
    g.fillStyle = "#aaf0c8";
    g.fillRect(x - 9, topY - 1, 18, 16);
    g.globalAlpha = 1;
    g.fillStyle = "#f4ecff";
    g.fillRect(x - 7, topY + 1, 14, 12);
    g.fillStyle = "#241a30";
    g.fillRect(x - 2, topY + 5, 5, 5);
  }

  // The exposed core — dash through it
  if (b.state === "stunned") {
    const pu = 0.65 + Math.sin(t * 8) * 0.35;
    g.globalAlpha = pu;
    g.fillStyle = "#aaf0c8";
    g.fillRect(x - 10, Math.round(b.y + 8), 20, 20);
    g.globalAlpha = 1;
    g.fillStyle = "#e8fff2";
    g.fillRect(x - 5, Math.round(b.y + 13), 10, 10);
  }
}

function drawBoss() {
  const b = S.boss;
  if (!b) return;
  if (b.kind === "shoggoth") return drawShoggoth(b);
  if (b.kind === "barrow") return drawBarrow(b);
  if (b.kind === "chorus") return drawChorus(b);
  const x = Math.round(b.x), y = Math.round(b.y);
  const t = S.time;
  // Through the whole false bloom it wears the freed glow — you won, as far
  // as you know, right up until the thing pours out of it
  const freed = b.state === "defeated" || b.state === "falsebloom";
  const open = b.state === "open";
  const opening = b.state === "rise" || open;
  const horns = b.capFlash > 0;
  const capW = BOSS.CAP_W, capH = BOSS.CAP_H;
  const rockC = rgb(mix(PAL.rock, [90, 100, 80], 0.35));
  const rockHiC = rgb(mix(PAL.rockHi, [110, 120, 90], 0.3));
  const rockLoC = rgb(PAL.rockLo);
  const mint = rgb(PAL.accent);

  if (freed) {
    // The freed flower — pops open at the floral explosion
    const bloom = clamp((S.endT - 0.8) / 0.5, 0, 1);
    const sway = Math.sin(t * 1.2) * 2;
    g.fillStyle = "#6a8468";
    g.fillRect(x - 4, y - 6, 8, 26);
    for (let i = 0; i < 5; i++) {
      const px = x - 30 + i * 15 + sway * (i % 2 ? 0.5 : -0.5);
      const ph = 14 + bloom * 14 + (i % 2) * 4;
      g.fillStyle = i % 2 ? "#7ea27c" : "#8fb08a";
      g.fillRect(Math.round(px), Math.round(y - 8 - ph * bloom), 12, Math.round(ph));
      g.fillStyle = "#c8d8c0";
      g.fillRect(Math.round(px + 2), Math.round(y - 8 - ph * bloom), 8, 2);
    }
    g.fillStyle = "#d8a8b8";
    g.fillRect(x - 16, y - 12 - 10 * bloom, 32, 8 + 8 * bloom);
    g.fillStyle = "#f0d0da";
    g.fillRect(x - 10, y - 10 - 10 * bloom, 20, 4 + 4 * bloom);
    for (let i = 0; i < 4; i++) {
      const sx2 = x - 9 + i * 6;
      g.fillStyle = "#e8e4c8";
      g.fillRect(sx2, Math.round(y - 16 - 14 * bloom + Math.sin(t * 2 + i) * 1.5), 2, 8);
      g.fillStyle = "#fff8dc";
      g.fillRect(sx2 - 1, Math.round(y - 18 - 14 * bloom + Math.sin(t * 2 + i) * 1.5), 4, 3);
    }
    return;
  }

  // Hazards: falling rain + aimed bolts
  for (const sh of b.shots) {
    g.fillStyle = "#f06080";
    g.fillRect(Math.round(sh.x), Math.round(sh.y), 8, 8);
    g.fillStyle = "#ffb0c0";
    g.fillRect(Math.round(sh.x + 2), Math.round(sh.y + 1), 3, 3);
  }
  for (const bo of b.bolts) {
    g.fillStyle = "#f06080";
    g.fillRect(Math.round(bo.x), Math.round(bo.y + 2), 8, 4);
    g.fillRect(Math.round(bo.x + 2), Math.round(bo.y), 4, 8);
    g.fillStyle = "#fff0f4";
    g.fillRect(Math.round(bo.x + 3), Math.round(bo.y + 3), 2, 2);
  }

  // Root arms — three hanging, swaying tangles
  g.fillStyle = "#5a4a36";
  for (let i = 0; i < 3; i++) {
    let ax = x - 18 + i * 18, ay = y + 2;
    for (let s = 0; s < 6; s++) {
      ax += Math.sin(t * 1.6 + i * 2 + s * 0.8) * 2.5;
      g.fillRect(Math.round(ax), Math.round(ay), 3, 6);
      ay += 5;
    }
  }
  // Sweeping arm
  if (b.arm && b.arm.warm <= 0) {
    const a = b.arm;
    g.fillStyle = "#6a5a42";
    for (let s = 0; s < 5; s++) {
      g.fillRect(Math.round(a.x + s * 6 * -a.dir), Math.round(a.y + 6 + Math.sin(t * 8 + s) * 3), 6, 5);
    }
    g.fillStyle = "#8a744e";
    g.fillRect(Math.round(a.x), Math.round(a.y + 4), 8, 8);
  }

  // Throat slash under the cap
  if (opening || b.state === "warn") {
    const glow = open ? 1 : 0.5 + Math.sin(t * 8) * 0.2;
    g.fillStyle = open ? mint : "#f08a50";
    g.globalAlpha = glow;
    g.fillRect(x - 2, y - 8, 4, 14);
    g.fillRect(x - 1, y - 12, 2, 22);
    g.globalAlpha = 1;
  }

  // Cracked cap — a broken crown
  const gap = open ? 10 : opening ? 5 : 0;
  const tilt = open ? 3 : 0;
  // left half
  g.fillStyle = rockC;
  g.fillRect(x - capW / 2 - gap, y - capH - tilt, capW / 2 - 2, capH);
  g.fillStyle = rockHiC;
  g.fillRect(x - capW / 2 - gap, y - capH - tilt, capW / 2 - 2, 4);
  g.fillRect(x - capW / 2 - gap + 4, y - capH - 8 - tilt, 10, 8);   // crown point
  g.fillRect(x - 14 - gap, y - capH - 6 - tilt, 8, 6);
  // right half
  g.fillStyle = rockC;
  g.fillRect(x + 2 + gap, y - capH - tilt, capW / 2 - 2, capH);
  g.fillStyle = rockHiC;
  g.fillRect(x + 2 + gap, y - capH - tilt, capW / 2 - 2, 4);
  g.fillRect(x + capW / 2 - 14 + gap, y - capH - 9 - tilt, 10, 9);  // crown point
  g.fillRect(x + 8 + gap, y - capH - 5 - tilt, 8, 5);
  // crack lines + spore-eyes
  g.fillStyle = rockLoC;
  g.fillRect(x - 24 - gap, y - capH + 4, 2, 14);
  g.fillRect(x + 16 + gap, y - capH + 6, 2, 12);
  g.fillRect(x - 8 - gap, y - 14, 2, 8);
  const blinkE = Math.sin(t * 2.2) > -0.85;
  g.fillStyle = blinkE ? mint : rockLoC;
  g.fillRect(x - 23 - gap, y - capH + 8, 3, 3);
  g.fillRect(x + 17 + gap, y - capH + 10, 3, 3);
  g.fillRect(x - 7 - gap, y - 12, 3, 3);
  // horns when punished
  if (horns) {
    g.fillStyle = rgb(PAL.spikeHi);
    for (let i = 0; i < 5; i++) {
      const hx = x - capW / 2 + 6 + i * 16;
      g.beginPath();
      g.moveTo(hx, y - capH - tilt);
      g.lineTo(hx + 3, y - capH - 10 - tilt);
      g.lineTo(hx + 6, y - capH - tilt);
      g.closePath(); g.fill();
    }
  }
  // mint landing glow: builds during rise, blazes while open
  if (open) {
    g.globalAlpha = 0.3 + Math.sin(t * 12) * 0.12;
    g.fillStyle = mint;
    g.fillRect(x - capW / 2 + 4, y - capH - 14, capW - 8, 12);
    g.globalAlpha = 1;
  } else if (b.state === "rise") {
    g.globalAlpha = 0.08 + (b.t / BOSS.RISE) * 0.16;
    g.fillStyle = mint;
    g.fillRect(x - capW / 2 + 4, y - capH - 12, capW - 8, 10);
    g.globalAlpha = 1;
  }
}

function drawTrail() {
  for (const t of S.trail) {
    g.globalAlpha = (t.life / t.max) * 0.4;
    g.fillStyle = C.bloomHi;
    g.fillRect(Math.round(t.x) - 1, Math.round(t.y) - 2, 12, 5);
    g.fillRect(Math.round(t.x), Math.round(t.y) + 1, 10, 9);
  }
  g.globalAlpha = 1;
}

function drawPlayer() {
  const p = S.player;
  let map;
  if (p.anim === "run") map = SPRITES["run" + ((p.frame & 3) + 1)];
  else if (p.anim === "jump" || p.anim === "dash") map = SPRITES.jump;
  else if (p.anim === "fall" || p.anim === "glide" || p.anim === "slide") map = SPRITES.fall;
  else map = (p.frame === 3) ? SPRITES.idle2 : SPRITES.idle1;

  g.save();
  g.translate(Math.round(p.x + 5), Math.round(p.y + 5));
  const sx = (p.anim === "dash" ? 1.25 : 1) * (2 - p.squish);
  const sy = (p.anim === "dash" ? 0.8 : 1) * p.squish;
  g.scale(sx, sy);
  if (p.dashing || p.anim === "dash") {
    g.fillStyle = C.bloomHi;
    g.globalAlpha = 0.35;
    g.fillRect(-8, -7, 16, 14);
    g.globalAlpha = 1;
  }
  drawMap(g, map, -6, -7, p.facing < 0);
  if (p.anim === "glide") {
    // The cap inflates into a parasol
    g.fillStyle = C.capLo;
    g.fillRect(-8, -7, 16, 2);
    g.fillStyle = C.cap;
    g.fillRect(-8, -9, 16, 2);
    g.fillRect(-7, -11, 14, 2);
    g.fillRect(-5, -12, 10, 1);
    g.fillStyle = C.capHi;
    g.fillRect(-4, -11, 5, 2);
    g.fillRect(-7, -9, 2, 1);
    g.fillStyle = C.capSpot;
    g.fillRect(3, -10, 2, 2);
  }
  if (p.anim === "slide") {
    // Mycelial threads gripping the wall
    g.fillStyle = rgb(PAL.mossHi);
    const wx = p.wallDir > 0 ? 5 : -7;
    g.fillRect(wx, -3, 2, 1);
    g.fillRect(wx, 1, 2, 1);
    g.fillRect(wx, 5, 2, 1);
  }
  if (p.anim === "idle" && (p.frame & 1) === 0) {
    g.fillStyle = "#c4a878";
    g.fillRect(6, -9, 1, 1);
  }
  g.restore();
}

function drawParticles() {
  for (const pt of S.particles) {
    g.globalAlpha = Math.max(0, pt.life / pt.max);
    g.fillStyle = pt.col;
    g.fillRect(pt.x | 0, pt.y | 0, pt.s, pt.s);
  }
  g.globalAlpha = 1;
}

// ── Lighting (posterized, half-res for pixel chunk) ────────────────────────
const LSC = 2;
const darkCv = mkCv(W / LSC, H / LSC);
const dctx = darkCv.getContext("2d");
const glowCv = mkCv(W / LSC, H / LSC);
const gctx = glowCv.getContext("2d");

function collectLights() {
  const out = [];
  const p = S.player;
  if (p && S.mode !== "dead")
    out.push({ x: p.x + 5, y: p.y + 5, r: 56 + Math.sin(S.time * 7) * 3, a: 0.95, col: "244,220,174", ga: 0.06 });
  for (const b of S.blooms)
    out.push({ x: b.x + b.w / 2, y: b.y + 2, r: 30, a: 0.7, col: "240,168,136", ga: 0.1 });
  for (const cp of S.checkpoints) {
    const pulse = 0.75 + Math.sin(S.time * 5) * 0.25;
    out.push({ x: cp.x + 8, y: cp.y + 4, r: cp.active ? 40 : 24, a: (cp.active ? 0.9 : 0.55) * pulse, col: rgbs(PAL.accent), ga: cp.active ? 0.14 : 0.07 });
  }
  for (const ber of S.berryList)
    if (!ber.taken) out.push({ x: ber.x + 4, y: ber.y + 4, r: 16, a: 0.5, col: "240,128,152", ga: 0.08 });
  if (S.goal) {
    const open = S.mode === "clear" ? S.goalOpen : 0;
    out.push({ x: S.goal.x + 8, y: S.goal.y + 9, r: 36 + open * 40, a: 0.75 + open * 0.25, col: "255,208,232", ga: 0.12 + open * 0.2 });
  }
  for (const L of STATIC_LIGHTS)
    out.push({ x: L.x, y: L.y, r: L.r, a: L.a + Math.sin(S.time * 3 + L.ph) * 0.12, col: L.col, ga: L.ga });
  for (const e of S.enemies) {
    if (e.t === "puff") out.push({ x: e.x + 5, y: e.y + 5, r: 14, a: 0.35, col: "232,224,208", ga: 0.05 });
    else if (e.t === "wisp") out.push({ x: e.x + 4, y: e.y + 4, r: 20, a: 0.55, col: "255,130,170", ga: 0.1 });
    else out.push({ x: e.x + 6, y: e.y + 4, r: 12, a: 0.3, col: "224,232,180", ga: 0.04 });
  }
  for (const n of S.npcs)
    out.push({ x: n.x + 6, y: n.y + 4, r: 28, a: 0.65, col: n.sprite === "echo" ? "184,216,248" : n.sprite === "grel" ? "240,240,246" : "240,200,120", ga: 0.07 });
  if (S.memoryObj && !S.score.secretMemory)
    out.push({ x: S.memoryObj.x + 7, y: S.memoryObj.y + 8, r: 34, a: 0.8, col: rgbs(PAL.accent), ga: 0.1 });
  for (const d of levelDoors())
    out.push({ x: d.x + d.w / 2, y: d.y + d.h / 2, r: 26, a: 0.5, col: rgbs(PAL.accent), ga: 0.06 });
  if (S.boss) {
    const b = S.boss;
    if (b.kind === "barrow") {
      out.push({ x: b.x, y: b.y + 8, r: 44, a: 0.4, col: "200,220,140", ga: 0.05 });
      if (b.state === "remember")
        out.push({ x: b.x + b.dir * 20, y: b.y, r: 30, a: 0.85, col: rgbs(PAL.accent), ga: 0.14 });
    } else if (b.kind === "chorus") {
      const gath = b.state === "gather";
      out.push({ x: b.x, y: b.y, r: gath ? 52 : 30, a: gath ? 0.9 : 0.5, col: gath ? "170,240,200" : "255,164,205", ga: gath ? 0.16 : 0.08 });
      for (const wsp of b.wisps || [])
        if (!wsp.dead) out.push({ x: wsp.x + 4, y: wsp.y + 4, r: 14, a: 0.45, col: "255,164,205", ga: 0.05 });
    } else if (b.state === "defeated") {
      out.push({ x: b.x, y: b.y - 16, r: 70, a: 0.9, col: rgbs(PAL.accent), ga: 0.14 });
    } else {
      out.push({ x: b.x, y: b.y - 14, r: 46, a: 0.5, col: b.state === "open" ? rgbs(PAL.accent) : b.state === "warn" ? "240,138,80" : "170,240,200", ga: b.state === "open" ? 0.16 : 0.06 });
    }
  }
  for (const e of S.enemies)
    if (e.t === "mine") out.push({ x: e.x + 5, y: e.y + 5, r: 14, a: e.armT > 0 ? 0.8 : 0.35, col: "255,130,150", ga: 0.06 });
  for (const m of S.movers)
    out.push({ x: m.x + m.w / 2, y: m.y + 3, r: 20, a: 0.4, col: rgbs(PAL.accent), ga: 0.04 });
  return out;
}

function ringCircle(cc, sx, sy, r, alphaBase, colPrefix) {
  const steps = [1, 0.62, 0.34];
  for (const st of steps) {
    cc.fillStyle = colPrefix + (alphaBase * 0.4) + ")";
    cc.beginPath();
    cc.arc(sx, sy, r * st, 0, Math.PI * 2);
    cc.fill();
  }
}

function drawLighting(ox, oy) {
  const lights = collectLights();
  const lw = W / LSC, lh = H / LSC;

  dctx.globalCompositeOperation = "source-over";
  dctx.clearRect(0, 0, lw, lh);
  dctx.fillStyle = dMod("dim") ? "rgba(2,4,9,0.78)" : "rgba(3,6,13,0.52)";
  dctx.fillRect(0, 0, lw, lh);
  dctx.globalCompositeOperation = "destination-out";

  gctx.globalCompositeOperation = "source-over";
  gctx.clearRect(0, 0, lw, lh);

  const dimR = dMod("dim") ? 0.6 : 1;
  for (const L of lights) {
    const sx = (L.x - S.camX + ox) / LSC, sy = (L.y - S.camY + oy) / LSC;
    const r = L.r * dimR / LSC;
    if (sx < -r || sx > lw + r || sy < -r || sy > lh + r) continue;
    ringCircle(dctx, sx, sy, r, L.a, "rgba(255,255,255,");
    if (L.ga) ringCircle(gctx, sx, sy, r, L.ga * 2.2, "rgba(" + L.col + ",");
  }

  g.imageSmoothingEnabled = false;
  g.drawImage(darkCv, 0, 0, lw, lh, 0, 0, W, H);
  g.globalCompositeOperation = "lighter";
  g.drawImage(glowCv, 0, 0, lw, lh, 0, 0, W, H);
  g.globalCompositeOperation = "source-over";
}

function drawForeground() {
  drawSpores("near");
  const dark = mix(PAL.skyT, [0, 0, 0], 0.4);
  g.fillStyle = rgb(dark);
  // Silhouette grass along the bottom edge
  const per = 46, off = wrap(S.camX * 1.35, per);
  const base = Math.floor(S.camX * 1.35 / per);
  for (let k = -1; k <= Math.ceil(W / per) + 1; k++) {
    const x = k * per - off, i = base + k;
    const n = 2 + (rnd01(i * 9) * 3 | 0);
    for (let j = 0; j < n; j++) {
      const bx = x + rnd01(i * 31 + j) * 30;
      const hgt = 5 + rnd01(i * 13 + j * 5) * 9;
      const sway = Math.sin(S.time * 1.6 + i + j) * 1.2;
      g.beginPath();
      g.moveTo(bx - 2, H + 1);
      g.lineTo(bx + sway, H - hgt);
      g.lineTo(bx + 2, H + 1);
      g.closePath(); g.fill();
    }
  }
  // Hanging tendrils along the top edge
  const per2 = 90, off2 = wrap(S.camX * 1.2, per2);
  const base2 = Math.floor(S.camX * 1.2 / per2);
  for (let k = -1; k <= Math.ceil(W / per2) + 1; k++) {
    const x = k * per2 - off2, i = base2 + k;
    if (rnd01(i * 5) > 0.6) continue;
    const len = 8 + rnd01(i * 3) * 14;
    const sway = Math.sin(S.time * 1.3 + i) * 1.5;
    g.fillRect(Math.round(x + sway), -1, 2, Math.round(len));
    g.fillRect(Math.round(x + sway * 1.4), Math.round(len - 3), 2, 3);
  }
}
