      drawMap(g, SPRITES.idle1, x, Math.round(y + bob * 0.5), false, ECHO_PAL);
      g.globalAlpha = 1;
    }
    if (!S.talk || S.talk.npc !== n) {
      g.fillStyle = "rgba(8,12,18,0.6)";
      g.fillRect(x + 2, y - 9, 10, 6);
      g.fillStyle = C.ui;
      g.fillRect(x + 4, y - 7, 1, 1); g.fillRect(x + 6, y - 7, 1, 1); g.fillRect(x + 8, y - 7, 1, 1);
    }
    if (n.big) g.restore();
  }
}

function drawTalk() {
  if (!S.talk || (S.mode !== "play" && S.mode !== "pause" && S.mode !== "reunion")) return;
  const npc = S.talk.npc;
  const full = npc.lines[S.talk.line];
  const shown = full.slice(0, Math.floor(S.talk.t / TALK_CHAR_TIME) + 1);
  // If the speaker is in the lower half of the screen, the box goes to the
  // top so it never covers them (Grel lives in a pit, after all)
  const box = talkLayout();
  const bx = box.x, by = box.y, bw = box.w, bh = box.h;
  g.fillStyle = "rgba(4,7,12,0.94)";
  g.fillRect(bx, by, bw, bh);
  g.fillStyle = rgb(PAL.accent);
  g.fillRect(bx, by, bw, 1);
  g.fillRect(bx, by + bh - 1, bw, 1);
  g.textAlign = "left";
  g.fillStyle = C.title;
  g.font = "bold 8px monospace";
  g.fillText(npc.name, bx + 6, by + 10);
  g.textAlign = "right";
  g.fillStyle = shown.length >= full.length ? C.goalOpen : C.uiDim;
  g.font = "6px monospace";
  g.fillText(TOUCH.active ? "TAP: NEXT" : gp() ? "Y: NEXT" : "E / ENTER: NEXT", bx + bw - 6, by + 10);
  g.textAlign = "left";
  g.fillStyle = "#f6efdd";
  g.font = "8px monospace";
  const maxc = box.compactTouch ? 42 : 56;
  const maxLines = box.compactTouch ? 3 : 2;
  const wrapped = [];
  let rest = shown;
  while (rest && wrapped.length < maxLines) {
    if (rest.length <= maxc || wrapped.length === maxLines - 1) {
      wrapped.push(rest);
      break;
    }
    let cut = rest.lastIndexOf(" ", maxc);
    if (cut < 20) cut = maxc;
    wrapped.push(rest.slice(0, cut));
    rest = rest.slice(cut + 1);
  }
  wrapped.forEach((line, i) => g.fillText(line, bx + 6, by + 22 + i * 10));
  for (let i = 0; i < npc.lines.length; i++) {
    g.fillStyle = i === S.talk.line ? C.ui : "#3a4250";
    g.fillRect(bx + bw - 8 - (npc.lines.length - 1 - i) * 6, by + bh - 6, 4, 2);
  }
}

function drawEnemies() {
  for (const e of S.enemies) {
    if (e.x < S.camX - 24 || e.x > S.camX + W + 24) continue;
    if (e.t === "slug") {
      const wob = Math.sin(S.time * 6 + e.ph);
      const hh = e.h + (wob > 0 ? 1 : 0);
      const col = e.fast ? "#d85850" : rgb(mix(PAL.mossHi, [0, 0, 0], 0.2));
      const hi = e.fast ? "#f09880" : rgb(mix(PAL.mossHi, [255, 255, 255], 0.35));
      g.fillStyle = col;
      g.fillRect(Math.round(e.x), Math.round(e.y + e.h - hh), e.w, hh);
      g.fillRect(Math.round(e.x + 1), Math.round(e.y + e.h - hh - 1), e.w - 2, 1);
      g.fillStyle = hi;
      g.fillRect(Math.round(e.x + 2), Math.round(e.y + e.h - hh + 1), e.w - 4, 2);
      g.fillStyle = C.eye;
      g.fillRect(Math.round(e.dir > 0 ? e.x + e.w - 4 : e.x + 2), Math.round(e.y + 3), 2, 2);
      g.fillStyle = hi;
      g.fillRect(Math.round(e.x + (e.dir > 0 ? e.w - 3 : 2)), Math.round(e.y - 2 + wob * 0.5), 1, 2);
    } else if (e.t === "puff") {
      const pulse = 1 + Math.sin(S.time * 3 + e.ph) * 0.12;
      const r = 5 * pulse;
      const cx = e.x + 5, cy = e.y + 5;
      g.fillStyle = "#e8e0d0";
      g.fillRect(Math.round(cx - r + 1), Math.round(cy - r), Math.round(r * 2 - 2), Math.round(r * 2));
      g.fillRect(Math.round(cx - r), Math.round(cy - r + 1), Math.round(r * 2), Math.round(r * 2 - 2));
      g.fillStyle = "#c8b8a8";
      g.fillRect(Math.round(cx - 1), Math.round(cy + 1), 2, 2);
      g.fillRect(Math.round(cx - 3), Math.round(cy - 2), 2, 2);
      g.fillStyle = "#fff8ec";
      g.fillRect(Math.round(cx + 1), Math.round(cy - 3), 2, 2);
    } else if (e.t === "skitter") {
      g.fillStyle = rgb(mix(PAL.mossHi, [40, 20, 0], 0.25));
      g.fillRect(Math.round(e.x), Math.round(e.y), e.w, e.h - 1);
      g.fillStyle = rgb(mix(PAL.mossHi, [255, 240, 200], 0.35));
      g.fillRect(Math.round(e.x + 2), Math.round(e.y + 1), e.w - 4, 2);
      g.fillStyle = C.eye;
      g.fillRect(Math.round(e.dir > 0 ? e.x + e.w - 3 : e.x + 1), Math.round(e.y + 1), 2, 2);
      g.fillStyle = rgb(PAL.rockLo);
      for (let i = 0; i < 3; i++)
        g.fillRect(Math.round(e.x + 1 + i * 4 + ((S.time * 30) % 2)), Math.round(e.y + e.h - 1), 2, 1);
    } else if (e.t === "spitter") {
      g.fillStyle = C.bloomStem;
      g.fillRect(Math.round(e.x + 4), Math.round(e.y + 5), 4, 7);
      g.fillStyle = "#c05868";
      g.fillRect(Math.round(e.x), Math.round(e.y + 1), 12, 5);
      g.fillStyle = "#e88898";
      g.fillRect(Math.round(e.x + 2), Math.round(e.y), 8, 2);
      g.fillStyle = e.cd < 0.5 ? "#f06080" : "#5a3040";
      g.fillRect(Math.round(e.x + 5), Math.round(e.y + 3), 3, 2);
    } else if (e.t === "mine") {
      const flash = e.armT > 0 && ((S.time * 12) | 0) % 2 === 0;
      const cx = Math.round(e.x + 5), cy = Math.round(e.y + 5);
      g.fillStyle = flash ? "#ffd0da" : "#8a5560";
      g.fillRect(cx - 3, cy - 3, 6, 6);
      g.fillStyle = flash ? "#f06080" : "#5a3540";
      g.fillRect(cx - 1, cy - 5, 2, 10);
      g.fillRect(cx - 5, cy - 1, 10, 2);
      g.fillStyle = "#fff0f4";
      g.fillRect(cx - 1, cy - 1, 2, 2);
    } else {
      const bob = Math.sin(S.time * 4 + e.ph);
      const cx = e.x + 4, cy = e.y + 4 + bob;
      // Pulsing aura ring — reads as "pop me"
      const ring = (S.time * 1.2 + e.ph) % 1;
      const rr = 3 + ring * 6;
      g.globalAlpha = (1 - ring) * 0.35;
      g.fillStyle = "#ff82aa";
      g.fillRect(Math.round(cx - rr), Math.round(cy - rr), Math.round(rr * 2), 1);
      g.fillRect(Math.round(cx - rr), Math.round(cy + rr), Math.round(rr * 2), 1);
      g.fillRect(Math.round(cx - rr), Math.round(cy - rr), 1, Math.round(rr * 2));
      g.fillRect(Math.round(cx + rr), Math.round(cy - rr), 1, Math.round(rr * 2) + 1);
      g.globalAlpha = 1;
      g.fillStyle = "#ff82aa";
      g.fillRect(Math.round(cx - 3), Math.round(cy - 1), 6, 2);
      g.fillRect(Math.round(cx - 1), Math.round(cy - 3), 2, 6);
      g.fillStyle = "#fff0f6";
      g.fillRect(Math.round(cx - 1), Math.round(cy - 1), 2, 2);
    }
  }
  for (const sh of S.eshots) {
    g.fillStyle = "#f06080";
    g.fillRect(Math.round(sh.x), Math.round(sh.y), sh.w, sh.h);
    g.fillStyle = "#ffc0cc";
    g.fillRect(Math.round(sh.x + 1), Math.round(sh.y + 1), 2, 2);
  }
}

function levelDoors() {
  const out = [];
  if (S.levelIdx === 2) out.push({ x: 18, y: 32, w: 22, h: 32 });      // the crack in the map, on the hidden ledge
  if (LEVELS[S.levelIdx].secret) {
    out.push({ x: 344, y: 144, w: 22, h: 48 });                        // the way back out
    out.push({ x: 18, y: 144, w: 22, h: 48 });                         // the way you came in
  }
  if (S.bossDoor) out.push(S.bossDoor);                                // opened by a soothed boss
  return out;
}

function drawDoors() {
  for (const d of levelDoors()) {
    const pulse = 0.5 + Math.sin(S.time * 2 + d.x) * 0.2;
    g.fillStyle = "#05070b";
    g.fillRect(d.x, d.y, d.w, d.h);
    g.fillStyle = rgb(PAL.accent);
    g.globalAlpha = 0.75;
    g.fillRect(d.x - 1, d.y - 2, d.w + 2, 2);
    g.fillRect(d.x - 1, d.y, 1, d.h);
    g.fillRect(d.x + d.w, d.y, 1, d.h);
    g.globalAlpha = pulse * 0.35;
    g.fillRect(d.x + 2, d.y + 3, d.w - 4, d.h - 3);
    g.globalAlpha = 1;
    g.fillStyle = rgb(PAL.moss);
    g.fillRect(d.x + 3, d.y, 2, 5);
    g.fillRect(d.x + 10, d.y, 2, 8);
    g.fillRect(d.x + 16, d.y, 2, 4);
  }
}

function drawKeepsakes() {
  for (const item of S.keepsakeList) {
    if (item.taken) continue;
    const bob = Math.sin(S.time * 3 + item.x * 0.01) * 1.5;
    const x = Math.round(item.x), y = Math.round(item.y + bob);
    g.globalAlpha = 0.28 + Math.sin(S.time * 4) * 0.12;
    g.fillStyle = C.goalGlow;
    g.fillRect(x - 3, y - 3, 18, 20);
    g.globalAlpha = 1;
    g.fillStyle = rgb(PAL.accent);
    g.fillRect(x + 2, y + 1, 8, 12);
    g.fillStyle = C.goalOpen;
    g.fillRect(x + 4, y - 1, 4, 16);
    g.fillRect(x, y + 4, 12, 5);
    g.fillStyle = "#fff4d0";
    g.fillRect(x + 5, y + 2, 2, 7);
  }
}

function drawMemory() {
  const m = S.memoryObj;
  if (!m || S.score.secretMemory) return;
  const bob = Math.sin(S.time * 2) * 1.5;
  const x = Math.round(m.x), y = Math.round(m.y + 4 + bob);
  // a folded map of pale spore-ink
  g.fillStyle = rgb(PAL.accent);
  g.fillRect(x + 1, y, 12, 9);
  g.fillStyle = "#f8f6ea";
  g.fillRect(x + 2, y + 1, 10, 7);
  g.fillStyle = rgb(mix(PAL.accent, [60, 70, 90], 0.6));
  g.fillRect(x + 4, y + 2, 3, 1);
  g.fillRect(x + 6, y + 4, 4, 1);
  g.fillRect(x + 3, y + 6, 2, 1);
  g.fillRect(x + 7, y + 1, 1, 6);
  g.globalAlpha = 0.4 + Math.sin(S.time * 3) * 0.2;
  g.fillStyle = rgb(PAL.accent);
  g.fillRect(x - 1, y - 2, 16, 1);
  g.globalAlpha = 1;
}

function drawBarrow(b) {
  const t = S.time;
  // Burrowed: only a swimming mound of disturbed earth betrays it
  if (b.state === "burrow" || b.state === "telegraph") {
    const floorY = 13 * TILE;
    const mx = Math.round(b.mx);
    const wob = Math.sin(t * 9) * 1.5;
    g.fillStyle = rgb(PAL.rockLo);
    g.fillRect(mx - 18, floorY - 4, 36, 4);
    g.fillStyle = rgb(PAL.rock);
    g.fillRect(mx - 12, Math.round(floorY - 7 + wob * 0.4), 24, 4);
    g.fillStyle = rgb(PAL.rockHi);
    g.fillRect(mx - 6, Math.round(floorY - 9 + wob * 0.6), 12, 3);
    if (b.state === "telegraph") {
      // the ground splits pink before the eruption
      const pu = 0.4 + Math.sin(t * 12) * 0.3;
      g.globalAlpha = pu;
      g.fillStyle = "#f06080";
      for (let d = 0; d < 5; d++)
        g.fillRect(mx - 16 + d * 8, floorY - 2 - (d % 2) * 4, 3, 3);
      g.globalAlpha = 1;
    }
    return;
  }
  const x = Math.round(b.x), y = Math.round(b.y);
  const half = BARROW.W / 2;
  const asleep = b.state === "defeated";
  const breathe = Math.sin(t * (asleep ? 1.2 : 2.6)) * 1.5;
  const bodyC = rgb(mix(PAL.rock, [120, 100, 60], 0.35));
  const bodyHi = rgb(mix(PAL.rockHi, [160, 140, 90], 0.35));
  const bodyLo = rgb(mix(PAL.rockLo, [60, 50, 30], 0.5));
  const H2 = BARROW.H;

  // slime sheen it drags along — grounded only
  if (b.state !== "arc" && b.state !== "stunfall") {
    g.globalAlpha = 0.25;
    g.fillStyle = rgb(PAL.accent);
    g.fillRect(x - half - 10, y + H2 - 2, BARROW.W + 20, 2);
    g.globalAlpha = 1;
  }

  // domed body — stepped, breathing
  g.fillStyle = bodyC;
  g.fillRect(x - half, Math.round(y + 8 + breathe * 0.2), BARROW.W, H2 - 8);
  g.fillRect(x - half + 4, Math.round(y + 4 + breathe * 0.4), BARROW.W - 8, 6);
  g.fillRect(x - half + 10, Math.round(y + breathe * 0.6), BARROW.W - 20, 6);
  g.fillRect(x - half + 18, Math.round(y - 4 + breathe * 0.8), BARROW.W - 36, 5);
  // mantle bands
  g.fillStyle = bodyLo;
  g.fillRect(x - half + 6, Math.round(y + 7 + breathe * 0.4), BARROW.W - 12, 2);
  g.fillRect(x - half + 12, Math.round(y + 1 + breathe * 0.6), BARROW.W - 24, 2);
  // sheen + speckles
  g.fillStyle = bodyHi;
  g.fillRect(x - half + 12, Math.round(y - 2 + breathe * 0.8), 14, 3);
  for (let i = 0; i < 7; i++) {
    g.fillStyle = i % 2 ? bodyHi : bodyLo;
    g.fillRect(
      x - half + 8 + ((rnd01(i * 3) * (BARROW.W - 18)) | 0),
      Math.round(y + 6 + rnd01(i * 7) * 14 + breathe * 0.3), 2, 2);
  }
  // undulating foot skirt
  g.fillStyle = bodyLo;
  for (let i = 0; i < 8; i++) {
    g.fillRect(x - half + i * 8, Math.round(y + H2 - 3 + Math.sin(t * 6 + i) * 1.2), 8, 3);
  }
  // shell ridge plates along the back — still means "don't touch"
  if (!asleep) {
    for (let i = 0; i < 5; i++) {
      const sx2 = x - half + 10 + i * 10;
      const ry2 = Math.round(y + breathe * 0.6);
      g.fillStyle = rgb(PAL.spikeHi);
      g.beginPath();
      g.moveTo(sx2, ry2);
      g.lineTo(sx2 + 3, ry2 - 8 + Math.round(Math.sin(t * 3 + i)));
      g.lineTo(sx2 + 7, ry2);
      g.closePath(); g.fill();
      g.fillStyle = rgb(PAL.spike);
      g.fillRect(sx2 + 2, ry2 - 4, 2, 4);
    }
  }
  // mid-leap: the soft underbelly glows — that's the way in
  const glowing = b.state === "arc";
  if (glowing) {
    g.globalAlpha = 0.55 + Math.sin(t * 10) * 0.3;
    g.fillStyle = rgb(PAL.accent);
    g.fillRect(x - half + 2, y + H2 - 6, BARROW.W - 4, 7);
    g.fillRect(x - half + 8, y + H2 + 1, BARROW.W - 16, 3);
    g.globalAlpha = 1;
  }
  // head — a distinct bulged front segment
  const hx = Math.round(b.x + b.dir * (half - 12));
  g.fillStyle = bodyC;
  g.fillRect(hx - 12, y - 2, 24, 16);
  g.fillRect(hx - 9, y - 6, 18, 6);
  g.fillStyle = bodyHi;
  g.fillRect(hx - 7, y - 5, 6, 2);
  g.fillStyle = bodyLo;
  g.fillRect(hx - 8 + (b.dir > 0 ? 6 : 0), y + 8, 10, 2);   // mouth line
  // eye stalks — swaying; they droop when it remembers
  const droop = glowing ? 3 : 0;
  const sway = Math.sin(t * 2.2) * 1.5;
  g.fillStyle = bodyC;
  g.fillRect(Math.round(hx - 3 + b.dir * 5 + sway * 0.4), Math.round(y - 15 + droop), 3, 11);
  g.fillRect(Math.round(hx + 3 + b.dir * 5 + sway * 0.7), Math.round(y - 12 + droop), 3, 8);
  g.fillStyle = bodyHi;
  g.fillRect(Math.round(hx - 4 + b.dir * 5 + sway * 0.4), Math.round(y - 18 + droop), 5, 4);
  g.fillRect(Math.round(hx + 2 + b.dir * 5 + sway * 0.7), Math.round(y - 15 + droop), 5, 4);
  g.fillStyle = asleep ? bodyLo : C.eye;
  g.fillRect(Math.round(hx - 3 + b.dir * 5 + sway * 0.4 + (asleep ? 0 : b.dir)), Math.round(y - 17 + droop), 2, asleep ? 1 : 2);
  g.fillRect(Math.round(hx + 3 + b.dir * 5 + sway * 0.7 + (asleep ? 0 : b.dir)), Math.round(y - 14 + droop), 2, asleep ? 1 : 2);
  if (asleep && Math.random() < 0.02)
    burst(hx, y - 16, 5, -18, 1.4, rgb(PAL.accent), 1);
}

function drawChorus(b) {
  const gathered = b.state === "gather";
  const gone = b.state === "defeated";
  // the core
  if (!gone) {
    const pulse = 1 + Math.sin(S.time * (gathered ? 10 : 3)) * 0.15;
    const r = (gathered ? 14 : 8) * pulse;
    const cx = Math.round(b.x), cy = Math.round(b.y);
    g.globalAlpha = gathered ? 0.9 : 0.5;
    g.fillStyle = gathered ? "#aaf0c8" : "#ff82aa";   // mint = strike now, everywhere in this game
    g.fillRect(Math.round(cx - r), Math.round(cy - r / 2), Math.round(r * 2), Math.round(r));
    g.fillRect(Math.round(cx - r / 2), Math.round(cy - r), Math.round(r), Math.round(r * 2));
    g.fillStyle = "#fff0f6";
    g.fillRect(cx - 2, cy - 2, 4, 4);
    g.globalAlpha = 1;
    if (gathered) {
      // open-heart ring — dash through it
      const ring = (S.time * 2) % 1;
      const rr = 16 + ring * 14;
      g.globalAlpha = (1 - ring) * 0.5;
      g.fillStyle = "#aaf0c8";
      g.fillRect(cx - rr, cy - 1, rr * 2, 2);
      g.fillRect(cx - 1, cy - rr, 2, rr * 2);
      g.globalAlpha = 1;
      // chevrons collapsing inward: hit this, now
      const adv = (S.time * 2.5) % 1;
      const dist = 40 - adv * 18;
      g.globalAlpha = 0.9 - adv * 0.5;
      g.fillStyle = "#aaf0c8";
      for (const [dx2, dy2] of [[-1, 0], [1, 0], [0, -1], [0, 1]]) {
        const ax2 = cx + dx2 * dist, ay2 = cy + dy2 * dist;
        g.beginPath();
        g.moveTo(ax2 - dx2 * 6 - dy2 * 5, ay2 - dy2 * 6 - dx2 * 5);
        g.lineTo(ax2, ay2);
        g.lineTo(ax2 - dx2 * 6 + dy2 * 5, ay2 - dy2 * 6 + dx2 * 5);
        g.closePath();
        g.fill();
      }
      g.globalAlpha = 1;
    }
  }
  // the singers
  for (const wsp of b.wisps || []) {
    if (wsp.dead) continue;
    const wx = Math.round(wsp.x + 4), wy = Math.round(wsp.y + 4);
    const warn = wsp.mode === "warn";
    if (wsp.mode === "dive") {
      const speed = Math.hypot(wsp.vx || 0, wsp.vy || 0) || 1;
      const dx = (wsp.vx || 0) / speed, dy = (wsp.vy || 0) / speed;
      g.globalAlpha = 0.32;
      g.fillStyle = "#ff82aa";
      for (let i = 1; i <= 2; i++) {
        const tx = Math.round(wx - dx * i * 7), ty = Math.round(wy - dy * i * 7);
        g.fillRect(tx - 2, ty, 4, 1);
        g.fillRect(tx, ty - 2, 1, 4);
      }
      g.globalAlpha = 1;
    }
    g.fillStyle = warn ? "#fff0f6" : "#ff82aa";
    g.fillRect(wx - 3, wy - 1, 6, 2);
    g.fillRect(wx - 1, wy - 3, 2, 6);
    g.fillStyle = "#fff0f6";
    g.fillRect(wx - 1, wy - 1, 2, 2);
  }
  if (gone && Math.random() < 0.1)
    burst(b.x + (Math.random() - 0.5) * 60, b.y + (Math.random() - 0.5) * 40, 0, -15, 1.2, "#ff82aa", 1);
}

// A pulsing mint chevron over the weak point — but only until your first
// successful hit (the grace window). After that the glow is the only tell.
function drawStrikeMark() {
  const b = S.boss;
  if (!b || !b.grace) return;
  let x = null, y = null;
  if (b.kind === "barrow" && b.state === "arc") {
    x = b.x; y = b.y - 16;
  } else if (b.kind === "chorus" && b.state === "gather") {
    x = b.x; y = b.y - 26;
  } else if (b.kind === "unbloomed" && b.state === "open") {
    x = b.x; y = b.y - BOSS.CAP_H - 20;
  } else if (b.kind === "shoggoth" && b.state === "eyeOpen") {
    x = b.x; y = b.y - 54;
  } else if (b.kind === "shoggoth" && b.state === "stunned") {
    x = b.x; y = b.y - 8;
  }
  if (x === null) return;
  const bob = Math.sin(S.time * 6) * 2.5;
  const xx = Math.round(x), yy = Math.round(y + bob);
  g.globalAlpha = 0.75 + Math.sin(S.time * 8) * 0.25;
  g.fillStyle = "#aaf0c8";
  for (let i = 0; i < 2; i++) {
    const oy = yy - i * 7;
    g.fillRect(xx - 4, oy - 4, 9, 2);
    g.fillRect(xx - 3, oy - 2, 7, 2);
    g.fillRect(xx - 2, oy, 5, 2);
    g.fillRect(xx - 1, oy + 2, 3, 2);
  }
  g.globalAlpha = 1;
}

// Boss warnings that must remain legible even when their source is off-camera.
function drawBossWarnings() {
  const b = S.boss;
  if (!b || b.kind !== "unbloomed" || !b.arm || b.arm.warm <= 0) return;
  const a = b.arm;
  const fromLeft = a.dir > 0;
  const tutorial = b.sweepHints <= 2;
  const boxW = tutorial ? 108 : 34;
  const boxX = fromLeft ? 4 : W - boxW - 4;
  const y = clamp(Math.round(a.y + a.h / 2 - S.camY) - 9, 50, H - 36);
  const progress = 1 - clamp(a.warm / BOSS.WARN, 0, 1);
  const pulse = reducedMotion ? 1 : 0.78 + Math.sin(S.time * 18) * 0.22;

  g.save();
  g.globalAlpha = 0.88;
  g.fillStyle = "rgba(8,7,6,0.82)";
  g.fillRect(boxX, y, boxW, 19);
  g.globalAlpha = pulse;
  g.fillStyle = "#f0a060";
  if (tutorial) {
    const tier = a.tier.toUpperCase();
    g.font = "bold 7px monospace";
    g.textAlign = fromLeft ? "left" : "right";
    g.fillText(fromLeft ? "ROOT SWEEP " + tier + " >>" : "<< " + tier + " ROOT SWEEP", fromLeft ? boxX + 5 : boxX + boxW - 5, y + 9);
  } else {
    for (let i = 0; i < 3; i++) {
      const base = fromLeft ? boxX + 7 + i * 8 : boxX + boxW - 9 - i * 8;
      g.fillRect(base, y + 5, 2, 2);
      g.fillRect(base + (fromLeft ? 2 : -2), y + 7, 2, 2);
      g.fillRect(base, y + 9, 2, 2);
    }
  }
  g.globalAlpha = 0.35;
  g.fillRect(boxX + 5, y + 13, boxW - 10, 2);
  g.globalAlpha = 1;
  const fillW = Math.max(1, Math.round((boxW - 10) * progress));
  g.fillRect(fromLeft ? boxX + 5 : boxX + boxW - 5 - fillW, y + 13, fillW, 2);
  g.restore();
}

function drawShoggoth(b) {
  const t = S.time;
  const x = Math.round(b.x), floorY = SHOG.FLOOR;
  const phase = 4 - b.pips;

  // After the melt: only a stain remains under the real ending
  if (b.state === "defeated") {
    g.fillStyle = "#241a30";
    g.fillRect(x - 26, floorY - 4, 52, 4);
    g.fillStyle = "#6a4a8a";
    g.fillRect(x - 10, floorY - 6, 20, 2);
    return;
  }

  // The sealed gates — the fight ends when it ends
  if (S.shogGates) {
    g.fillStyle = "#171020";
    g.fillRect(2 * 16, floorY - 130, 12, 130);
    g.fillRect(61 * 16 + 4, floorY - 130, 12, 130);
    g.fillStyle = "rgba(154,110,192,0.35)";
    g.fillRect(2 * 16 + 5, floorY - 124, 2, 118);
    g.fillRect(61 * 16 + 9, floorY - 124, 2, 118);
  }

  // Tentacle slams: warning marks, then the eruption
  for (const tn of b.tents) {
    if (!tn.live) {
      const pu = 0.4 + Math.sin(t * 10) * 0.3;
      g.globalAlpha = pu;
      g.fillStyle = "#f06080";
      for (let d = 0; d < 4; d++)
        g.fillRect(Math.round(tn.x + 2 + d * 5), floorY - 3 - (d % 2) * 3, 3, 3);
      g.fillRect(Math.round(tn.x), floorY - 1, SHOG.TENT_W, 1);
      g.globalAlpha = 1;
    } else {
      // a real tentacle: it whips up with overshoot, tapers, and curls
      const up = Math.min(1, (tn.t - tn.warn) / 0.12);
      const hh = SHOG.TENT_H * (up < 1 ? up * 1.15 : 1 + Math.sin((tn.t - tn.warn) * 16) * 0.05);
      const cx2 = tn.x + SHOG.TENT_W / 2;
      const segs = 6;
      for (let s2 = 0; s2 < segs; s2++) {
        const fr2 = s2 / segs;
        const sw = Math.round(16 - fr2 * 10);
        const wob = Math.sin(t * 9 + s2 * 1.2) * (2 + fr2 * 4);
        g.fillStyle = s2 % 2 ? "#3a2b4a" : "#2a2136";
        g.fillRect(Math.round(cx2 - sw / 2 + wob), Math.round(floorY - hh * (fr2 + 1 / segs)), sw, Math.ceil(hh / segs) + 1);
      }
      // curled tip
      const tipY = floorY - hh, tipW = Math.sin(t * 9 + segs * 1.2) * 6;
      g.fillStyle = "#6a4a8a";
      g.fillRect(Math.round(cx2 + tipW), Math.round(tipY - 4), 6, 4);
      g.fillRect(Math.round(cx2 + tipW + 4), Math.round(tipY - 1), 4, 3);
      // suckers up the inner edge
      g.fillStyle = "#c9a0f0";
      for (let d = 0; d < 4; d++)
        g.fillRect(Math.round(cx2 - 6 + Math.sin(t * 9 + d * 1.2) * 3), Math.round(floorY - hh * (d + 1) / 5), 2, 2);
    }
  }

  // Spore minions — soft purple caps you can stand a moment on
  for (const m of b.minions) {
    const sq = m.squish > 0 ? 0.7 : 1;
    const mx = Math.round(m.x), my = Math.round(m.y + (1 - sq) * 6);
    g.fillStyle = "#6a4a8a";
    g.fillRect(mx + 2, my + Math.round(8 * sq), 10, Math.round(4 * sq) + 1);
    g.fillStyle = "#9a6ec0";
    g.fillRect(mx, my + 2, 14, Math.round(6 * sq));
    g.fillRect(mx + 2, my, 10, 3);
    g.fillStyle = "#c9a0f0";
    g.fillRect(mx + 3, my + 2, 2, 2);
    g.fillRect(mx + 9, my + 3, 2, 2);
    g.fillStyle = "#241a30";
    g.fillRect(mx + 5, my + Math.round(7 * sq), 1, 2);
    g.fillRect(mx + 8, my + Math.round(7 * sq), 1, 2);
  }

  // Grinning spores rolling the floor — the face never turns with the ball
  for (const r of b.rollers) {
    const rx = Math.round(r.x), ry = floorY - 12 + Math.round(Math.abs(Math.sin(r.spin * 2)) * -1.5);
    g.fillStyle = "#3a2b4a";
    g.fillRect(rx, ry + 2, 12, 8);
    g.fillRect(rx + 2, ry, 8, 12);
    g.fillStyle = "#6a4a8a";
    const sa = r.spin % (Math.PI * 2);
    g.fillRect(rx + 5 + Math.round(Math.cos(sa) * 4), ry + 5 + Math.round(Math.sin(sa) * 4), 2, 2);
    // the stolen face, always upright
    g.fillStyle = "#e8d8b0";
    g.fillRect(rx + 3, ry + 3, 2, 2);
    g.fillRect(rx + 7, ry + 3, 2, 2);
    g.fillRect(rx + 3, ry + 8, 6, 1);
    g.fillRect(rx + 2, ry + 7, 1, 1);
    g.fillRect(rx + 9, ry + 7, 1, 1);
  }

  // The mass itself — it coils before it moves
  let sc = 1;
  if (b.state === "emerge") sc = Math.min(1, 0.15 + (b.t / 2.2) * 0.85);
  if (b.state === "melting") sc = Math.max(0.12, 1 - b.t / 2.6);
  const flat = b.state === "stunned" ? 0.78 : 1;
  const coil = b.state === "lungeWarn" ? Math.min(1, b.t / 0.3) : 0;
  const H = SHOG.H * sc * flat * (1 - 0.16 * coil);
  const W = SHOG.W * (b.state === "melting" ? 1 + b.t * 0.35 : 0.7 + 0.3 * sc) * (b.state === "stunned" ? 1.12 : 1) * (1 + 0.26 * coil);
  const lean = b.state === "lungeWarn" ? -b.dir * 7 : b.state === "lunge" ? b.dir * 9 : 0;
  const rows = 9;
  for (let i = 0; i < rows; i++) {
    const fr = i / rows;
    const rw = W * Math.sqrt(1 - fr * fr) * (0.94 + Math.sin(t * 2.1 + i) * 0.06);
    const ry = floorY - (i + 1) * (H / rows);
    g.fillStyle = i % 2 ? "#2a2136" : "#3a2b4a";
    g.fillRect(Math.round(x - rw / 2 + lean * fr), Math.round(ry), Math.round(rw), Math.ceil(H / rows) + 1);
  }
  // glow veins
  g.fillStyle = "#6a4a8a";
  for (let v = 0; v < 4; v++) {
    const vx = x + Math.sin(t * 1.3 + v * 2.2) * (W * 0.3);
    g.fillRect(Math.round(vx), Math.round(floorY - H * (0.3 + (v % 3) * 0.18)), 3, 2);
  }

  // Tentacles waving off the mound
  if (sc > 0.5 && b.state !== "melting") {
    const nT = phase === 3 ? 7 : 5;
    g.fillStyle = "#3a2b4a";
    for (let ti2 = 0; ti2 < nT; ti2++) {
      let ax = x + (ti2 - (nT - 1) / 2) * (W / nT) + lean;
      let ay = floorY - H * 0.35;
      const side = ti2 < nT / 2 ? -1 : 1;
      for (let s2 = 0; s2 < 5; s2++) {
        ax += Math.sin(t * 2.2 + ti2 * 1.7 + s2) * 3 + side * 1.5;
        ay -= 5 + Math.sin(t * 1.4 + ti2 + s2) * 1.5;
        g.fillRect(Math.round(ax), Math.round(ay), s2 > 2 ? 3 : 4, 6);
      }
    }
  }

  // Small eyes across the mass — more of them when it's angry
  if (b.state !== "melting" && sc > 0.6) {
    const nEyes = phase === 3 ? 5 : 3;
    const eyeOff = [[-16, 0.45], [2, 0.6], [14, 0.38], [-7, 0.24], [9, 0.2]];
    for (let e2 = 0; e2 < nEyes; e2++) {
      // before a lunge every eye snaps open and strobes — the tell
      const strobe = b.state === "lungeWarn" && Math.sin(t * 14 + e2) > 0;
      const blink = strobe || Math.sin(t * 1.8 + e2 * 2.6) > -0.86;
      if (!blink && b.state !== "lungeWarn") continue;
      const ex = x + eyeOff[e2][0] + lean * eyeOff[e2][1];
      const ey = floorY - H * eyeOff[e2][1];
      g.fillStyle = b.state === "stunned" ? "#584a66" : strobe ? "#ffffff" : "#e8d4ff";
      g.fillRect(Math.round(ex), Math.round(ey), 4, 4);
      if (!strobe) {
        g.fillStyle = "#241a30";
        g.fillRect(Math.round(ex + 1), Math.round(ey + 1), 2, 2);
      }
    }
  }

  // The grin — it opens a mouth full of borrowed friendliness before it spits
  if (b.state === "grin" && sc > 0.6) {
    const gw = 34;
    const gy = Math.round(floorY - H * 0.4);
    g.fillStyle = "#e8d8b0";
    g.fillRect(x - gw / 2 + lean, gy, gw, 3);
    g.fillRect(x - gw / 2 - 2 + lean, gy - 2, 3, 3);
    g.fillRect(x + gw / 2 - 1 + lean, gy - 2, 3, 3);
    g.fillStyle = "#241a30";
    for (let th = 0; th < 5; th++)
      g.fillRect(x - gw / 2 + 3 + th * 7 + lean, gy + 1, 2, 2);
  }

  // The risen eye — the way in
  if (b.state === "eyeOpen") {
    let sx2 = x, sy2 = floorY - H;
    g.fillStyle = "#3a2b4a";
    const topY = b.y - 44;
    for (let s2 = 0; s2 < 6; s2++) {
      sx2 += Math.sin(t * 2.6 + s2) * 2.5;
      sy2 -= (sy2 - topY) / (6 - s2);
      g.fillRect(Math.round(sx2 - 2), Math.round(sy2), 4, 8);
    }
    const pu = 0.7 + Math.sin(t * 7) * 0.3;
    g.globalAlpha = pu;
    g.fillStyle = "#aaf0c8";
    g.fillRect(x - 9, topY - 1, 18, 16);
    g.globalAlpha = 1;
    g.fillStyle = "#f4ecff";
    g.fillRect(x - 7, topY + 1, 14, 12);
    g.fillStyle = "#241a30";
    g.fillRect(x - 2, topY + 5, 5, 5);
  }

  // The exposed core — dash through it
  if (b.state === "stunned") {
    const pu = 0.65 + Math.sin(t * 8) * 0.35;
    g.globalAlpha = pu;
    g.fillStyle = "#aaf0c8";
    g.fillRect(x - 10, Math.round(b.y + 8), 20, 20);
    g.globalAlpha = 1;
    g.fillStyle = "#e8fff2";
    g.fillRect(x - 5, Math.round(b.y + 13), 10, 10);
  }
}

function drawBoss() {
  const b = S.boss;
  if (!b) return;
  if (b.kind === "shoggoth") return drawShoggoth(b);
  if (b.kind === "barrow") return drawBarrow(b);
  if (b.kind === "chorus") return drawChorus(b);
  const x = Math.round(b.x), y = Math.round(b.y);
  const t = S.time;
  // Through the whole false bloom it wears the freed glow — you won, as far
  // as you know, right up until the thing pours out of it
  const freed = b.state === "defeated" || b.state === "falsebloom";
  const open = b.state === "open";
  const opening = b.state === "rise" || open;
  const horns = b.capFlash > 0;
  const capW = BOSS.CAP_W, capH = BOSS.CAP_H;
  const rockC = rgb(mix(PAL.rock, [90, 100, 80], 0.35));
  const rockHiC = rgb(mix(PAL.rockHi, [110, 120, 90], 0.3));
  const rockLoC = rgb(PAL.rockLo);
  const mint = rgb(PAL.accent);

  if (freed) {
    // The freed flower — pops open at the floral explosion
    const bloom = clamp((S.endT - 0.8) / 0.5, 0, 1);
    const sway = Math.sin(t * 1.2) * 2;
    g.fillStyle = "#6a8468";
    g.fillRect(x - 4, y - 6, 8, 26);
    for (let i = 0; i < 5; i++) {
      const px = x - 30 + i * 15 + sway * (i % 2 ? 0.5 : -0.5);
      const ph = 14 + bloom * 14 + (i % 2) * 4;
      g.fillStyle = i % 2 ? "#7ea27c" : "#8fb08a";
      g.fillRect(Math.round(px), Math.round(y - 8 - ph * bloom), 12, Math.round(ph));
      g.fillStyle = "#c8d8c0";
      g.fillRect(Math.round(px + 2), Math.round(y - 8 - ph * bloom), 8, 2);
    }
    g.fillStyle = "#d8a8b8";
    g.fillRect(x - 16, y - 12 - 10 * bloom, 32, 8 + 8 * bloom);
    g.fillStyle = "#f0d0da";
    g.fillRect(x - 10, y - 10 - 10 * bloom, 20, 4 + 4 * bloom);
    for (let i = 0; i < 4; i++) {
      const sx2 = x - 9 + i * 6;
      g.fillStyle = "#e8e4c8";
      g.fillRect(sx2, Math.round(y - 16 - 14 * bloom + Math.sin(t * 2 + i) * 1.5), 2, 8);
      g.fillStyle = "#fff8dc";
      g.fillRect(sx2 - 1, Math.round(y - 18 - 14 * bloom + Math.sin(t * 2 + i) * 1.5), 4, 3);
    }
    return;
  }

  // Hazards: falling rain + aimed bolts
  for (const sh of b.shots) {
    g.fillStyle = "#f06080";
    g.fillRect(Math.round(sh.x), Math.round(sh.y), 8, 8);
    g.fillStyle = "#ffb0c0";
    g.fillRect(Math.round(sh.x + 2), Math.round(sh.y + 1), 3, 3);
  }
  for (const bo of b.bolts) {
    g.fillStyle = "#f06080";
    g.fillRect(Math.round(bo.x), Math.round(bo.y + 2), 8, 4);
    g.fillRect(Math.round(bo.x + 2), Math.round(bo.y), 4, 8);
    g.fillStyle = "#fff0f4";
    g.fillRect(Math.round(bo.x + 3), Math.round(bo.y + 3), 2, 2);
  }

  // Root arms — three hanging, swaying tangles
  g.fillStyle = "#5a4a36";
  for (let i = 0; i < 3; i++) {
    let ax = x - 18 + i * 18, ay = y + 2;
    for (let s = 0; s < 6; s++) {
      ax += Math.sin(t * 1.6 + i * 2 + s * 0.8) * 2.5;
      g.fillRect(Math.round(ax), Math.round(ay), 3, 6);
      ay += 5;
    }
  }
  // Sweeping arm. Its source may be off-camera, so drawBossWarnings also gives
  // the player a screen-edge direction and the exact remaining danger timer.
  if (b.arm) {
    const a = b.arm;
    if (a.warm > 0) {
      const pulse = reducedMotion ? 0.5 : 0.35 + Math.sin(t * 18) * 0.15;
      g.globalAlpha = pulse;
      g.fillStyle = "#f0a060";
      const lineY = Math.round(a.y + a.h / 2);
      for (let wx = ROOT_X_MIN; wx <= ROOT_X_MAX + ROOT_W; wx += 24)
        g.fillRect(wx, lineY, 10, 2);
      for (let s = 0; s < 5; s++) {
        const sx = a.x + a.dir * (6 + s * 9);
        g.fillRect(Math.round(sx), Math.round(a.y + 8 + Math.abs(2 - s) * 2), 5, 3);
      }
      g.globalAlpha = 1;
    } else {
      g.fillStyle = "#6a5a42";
      for (let row = 0; row < 3; row++) {
        for (let s = 0; s < 5; s++) {
          g.fillRect(Math.round(a.x + s * 6 * -a.dir), Math.round(a.y + 3 + row * 7 + Math.sin(t * 8 + s + row) * 2), 6, 4);
        }
      }
      g.fillStyle = "#8a744e";
      g.fillRect(Math.round(a.x), Math.round(a.y + 3), 8, a.h - 6);
    }
  }

  // Throat slash under the cap
  if (opening || b.state === "warn") {
    const glow = open ? 1 : 0.5 + Math.sin(t * 8) * 0.2;
    g.fillStyle = open ? mint : "#f08a50";
    g.globalAlpha = glow;
    g.fillRect(x - 2, y - 8, 4, 14);
    g.fillRect(x - 1, y - 12, 2, 22);
    g.globalAlpha = 1;
  }

  // Cracked cap — a broken crown
  const gap = open ? 10 : opening ? 5 : 0;
  const tilt = open ? 3 : 0;
  // left half
  g.fillStyle = rockC;
  g.fillRect(x - capW / 2 - gap, y - capH - tilt, capW / 2 - 2, capH);
  g.fillStyle = rockHiC;
  g.fillRect(x - capW / 2 - gap, y - capH - tilt, capW / 2 - 2, 4);
  g.fillRect(x - capW / 2 - gap + 4, y - capH - 8 - tilt, 10, 8);   // crown point
  g.fillRect(x - 14 - gap, y - capH - 6 - tilt, 8, 6);
  // right half
  g.fillStyle = rockC;
  g.fillRect(x + 2 + gap, y - capH - tilt, capW / 2 - 2, capH);
  g.fillStyle = rockHiC;
  g.fillRect(x + 2 + gap, y - capH - tilt, capW / 2 - 2, 4);
  g.fillRect(x + capW / 2 - 14 + gap, y - capH - 9 - tilt, 10, 9);  // crown point
  g.fillRect(x + 8 + gap, y - capH - 5 - tilt, 8, 5);
  // crack lines + spore-eyes
  g.fillStyle = rockLoC;
  g.fillRect(x - 24 - gap, y - capH + 4, 2, 14);
  g.fillRect(x + 16 + gap, y - capH + 6, 2, 12);
  g.fillRect(x - 8 - gap, y - 14, 2, 8);
  const blinkE = Math.sin(t * 2.2) > -0.85;
  g.fillStyle = blinkE ? mint : rockLoC;
  g.fillRect(x - 23 - gap, y - capH + 8, 3, 3);
  g.fillRect(x + 17 + gap, y - capH + 10, 3, 3);
  g.fillRect(x - 7 - gap, y - 12, 3, 3);
  // horns when punished
  if (horns) {
    g.fillStyle = rgb(PAL.spikeHi);
    for (let i = 0; i < 5; i++) {
      const hx = x - capW / 2 + 6 + i * 16;
      g.beginPath();
      g.moveTo(hx, y - capH - tilt);
      g.lineTo(hx + 3, y - capH - 10 - tilt);
      g.lineTo(hx + 6, y - capH - tilt);
      g.closePath(); g.fill();
    }
  }
  // mint landing glow: builds during rise, blazes while open
  if (open) {
    g.globalAlpha = 0.3 + Math.sin(t * 12) * 0.12;
    g.fillStyle = mint;
    g.fillRect(x - capW / 2 + 4, y - capH - 14, capW - 8, 12);
    g.globalAlpha = 1;
  } else if (b.state === "rise") {
    g.globalAlpha = 0.08 + (b.t / BOSS.RISE) * 0.16;
    g.fillStyle = mint;
    g.fillRect(x - capW / 2 + 4, y - capH - 12, capW - 8, 10);
    g.globalAlpha = 1;
  }
}

function drawTrail() {
  for (const t of S.trail) {
    g.globalAlpha = (t.life / t.max) * 0.4;
    g.fillStyle = C.bloomHi;
    g.fillRect(Math.round(t.x) - 1, Math.round(t.y) - 2, 12, 5);
    g.fillRect(Math.round(t.x), Math.round(t.y) + 1, 10, 9);
  }
  g.globalAlpha = 1;
}

function drawPlayer() {
  const p = S.player;
  let map;
  if (p.anim === "run") map = SPRITES["run" + ((p.frame & 3) + 1)];
  else if (p.anim === "jump" || p.anim === "dash") map = SPRITES.jump;
  else if (p.anim === "fall" || p.anim === "glide" || p.anim === "slide") map = SPRITES.fall;
  else map = (p.frame === 3) ? SPRITES.idle2 : SPRITES.idle1;

  g.save();
  g.translate(Math.round(p.x + 5), Math.round(p.y + 5));
  const sx = (p.anim === "dash" ? 1.25 : 1) * (2 - p.squish);
  const sy = (p.anim === "dash" ? 0.8 : 1) * p.squish;
  g.scale(sx, sy);
  if (p.dashing || p.anim === "dash") {
    g.fillStyle = C.bloomHi;
    g.globalAlpha = 0.35;
    g.fillRect(-8, -7, 16, 14);
    g.globalAlpha = 1;
  }
  drawMap(g, map, -6, -7, p.facing < 0);
  if (p.anim === "glide") {
    // The cap inflates into a parasol
    g.fillStyle = C.capLo;
    g.fillRect(-8, -7, 16, 2);
    g.fillStyle = C.cap;
    g.fillRect(-8, -9, 16, 2);
    g.fillRect(-7, -11, 14, 2);
    g.fillRect(-5, -12, 10, 1);
    g.fillStyle = C.capHi;
    g.fillRect(-4, -11, 5, 2);
    g.fillRect(-7, -9, 2, 1);
    g.fillStyle = C.capSpot;
    g.fillRect(3, -10, 2, 2);
  }
  if (p.anim === "slide") {
    // Mycelial threads gripping the wall
    g.fillStyle = rgb(PAL.mossHi);
    const wx = p.wallDir > 0 ? 5 : -7;
    g.fillRect(wx, -3, 2, 1);
    g.fillRect(wx, 1, 2, 1);
    g.fillRect(wx, 5, 2, 1);
  }
  if (p.anim === "idle" && (p.frame & 1) === 0) {
    g.fillStyle = "#c4a878";
    g.fillRect(6, -9, 1, 1);
  }
  g.restore();
}

function drawParticles() {
  for (const pt of S.particles) {
    g.globalAlpha = Math.max(0, pt.life / pt.max);
    g.fillStyle = pt.col;
    g.fillRect(pt.x | 0, pt.y | 0, pt.s, pt.s);
  }
  g.globalAlpha = 1;
}

// ── Lighting (posterized, half-res for pixel chunk) ────────────────────────
const LSC = 2;
const darkCv = mkCv(W / LSC, H / LSC);
const dctx = darkCv.getContext("2d");
const glowCv = mkCv(W / LSC, H / LSC);
const gctx = glowCv.getContext("2d");

function collectLights() {
  const out = [];
  const p = S.player;
  if (p && S.mode !== "dead")
    out.push({ x: p.x + 5, y: p.y + 5, r: 56 + Math.sin(S.time * 7) * 3, a: 0.95, col: "244,220,174", ga: 0.06 });
  for (const b of S.blooms)
    out.push({ x: b.x + b.w / 2, y: b.y + 2, r: 30, a: 0.7, col: "240,168,136", ga: 0.1 });
  for (const cp of S.checkpoints) {
    const pulse = 0.75 + Math.sin(S.time * 5) * 0.25;
    out.push({ x: cp.x + 8, y: cp.y + 4, r: cp.active ? 40 : 24, a: (cp.active ? 0.9 : 0.55) * pulse, col: rgbs(PAL.accent), ga: cp.active ? 0.14 : 0.07 });
  }
  for (const ber of S.berryList)
    if (!ber.taken) out.push({ x: ber.x + 4, y: ber.y + 4, r: 16, a: 0.5, col: "240,128,152", ga: 0.08 });
  if (S.goal) {
    const open = S.mode === "clear" ? S.goalOpen : 0;
    out.push({ x: S.goal.x + 8, y: S.goal.y + 9, r: 36 + open * 40, a: 0.75 + open * 0.25, col: "255,208,232", ga: 0.12 + open * 0.2 });
  }
  for (const L of STATIC_LIGHTS)
    out.push({ x: L.x, y: L.y, r: L.r, a: L.a + Math.sin(S.time * 3 + L.ph) * 0.12, col: L.col, ga: L.ga });
  for (const e of S.enemies) {
    if (e.t === "puff") out.push({ x: e.x + 5, y: e.y + 5, r: 14, a: 0.35, col: "232,224,208", ga: 0.05 });
    else if (e.t === "wisp") out.push({ x: e.x + 4, y: e.y + 4, r: 20, a: 0.55, col: "255,130,170", ga: 0.1 });
    else out.push({ x: e.x + 6, y: e.y + 4, r: 12, a: 0.3, col: "224,232,180", ga: 0.04 });
  }
  for (const n of S.npcs)
    out.push({ x: n.x + 6, y: n.y + 4, r: 28, a: 0.65, col: n.sprite === "echo" ? "184,216,248" : n.sprite === "grel" ? "240,240,246" : "240,200,120", ga: 0.07 });
  if (S.memoryObj && !S.score.secretMemory)
    out.push({ x: S.memoryObj.x + 7, y: S.memoryObj.y + 8, r: 34, a: 0.8, col: rgbs(PAL.accent), ga: 0.1 });
  for (const d of levelDoors())
    out.push({ x: d.x + d.w / 2, y: d.y + d.h / 2, r: 26, a: 0.5, col: rgbs(PAL.accent), ga: 0.06 });
  if (S.boss) {
    const b = S.boss;
    if (b.kind === "barrow") {
      if (b.state !== "burrow" && b.state !== "telegraph") {
        out.push({ x: b.x, y: b.y + 8, r: 44, a: 0.4, col: "200,220,140", ga: 0.05 });
        if (b.state === "arc")
          out.push({ x: b.x, y: b.y + BARROW.H, r: 34, a: 0.85, col: rgbs(PAL.accent), ga: 0.14 });
      }
    } else if (b.kind === "chorus") {
      const gath = b.state === "gather";
      out.push({ x: b.x, y: b.y, r: gath ? 52 : 30, a: gath ? 0.9 : 0.5, col: gath ? "170,240,200" : "255,164,205", ga: gath ? 0.16 : 0.08 });
      for (const wsp of b.wisps || [])
        if (!wsp.dead) out.push({ x: wsp.x + 4, y: wsp.y + 4, r: 14, a: 0.45, col: "255,164,205", ga: 0.05 });
    } else if (b.state === "defeated") {
      out.push({ x: b.x, y: b.y - 16, r: 70, a: 0.9, col: rgbs(PAL.accent), ga: 0.14 });
    } else {
      out.push({ x: b.x, y: b.y - 14, r: 46, a: 0.5, col: b.state === "open" ? rgbs(PAL.accent) : b.state === "warn" ? "240,138,80" : "170,240,200", ga: b.state === "open" ? 0.16 : 0.06 });
    }
  }
  for (const e of S.enemies)
    if (e.t === "mine") out.push({ x: e.x + 5, y: e.y + 5, r: 14, a: e.armT > 0 ? 0.8 : 0.35, col: "255,130,150", ga: 0.06 });
  for (const m of S.movers)
    out.push({ x: m.x + m.w / 2, y: m.y + 3, r: 20, a: 0.4, col: rgbs(PAL.accent), ga: 0.04 });
  return out;
}

function ringCircle(cc, sx, sy, r, alphaBase, colPrefix) {
  const steps = [1, 0.62, 0.34];
  for (const st of steps) {
    cc.fillStyle = colPrefix + (alphaBase * 0.4) + ")";
    cc.beginPath();
    cc.arc(sx, sy, r * st, 0, Math.PI * 2);
    cc.fill();
  }
}

function drawLighting(ox, oy) {
  const lights = collectLights();
  const lw = W / LSC, lh = H / LSC;

  dctx.globalCompositeOperation = "source-over";
  dctx.clearRect(0, 0, lw, lh);
  dctx.fillStyle = dMod("dim") ? "rgba(2,4,9,0.78)" : "rgba(3,6,13,0.52)";
  dctx.fillRect(0, 0, lw, lh);
  dctx.globalCompositeOperation = "destination-out";

  gctx.globalCompositeOperation = "source-over";
  gctx.clearRect(0, 0, lw, lh);

  const dimR = dMod("dim") ? 0.6 : 1;
  for (const L of lights) {
    const sx = (L.x - S.camX + ox) / LSC, sy = (L.y - S.camY + oy) / LSC;
    const r = L.r * dimR / LSC;
    if (sx < -r || sx > lw + r || sy < -r || sy > lh + r) continue;
    ringCircle(dctx, sx, sy, r, L.a, "rgba(255,255,255,");
    if (L.ga) ringCircle(gctx, sx, sy, r, L.ga * 2.2, "rgba(" + L.col + ",");
  }

  g.imageSmoothingEnabled = false;
  g.drawImage(darkCv, 0, 0, lw, lh, 0, 0, W, H);
  g.globalCompositeOperation = "lighter";
  g.drawImage(glowCv, 0, 0, lw, lh, 0, 0, W, H);
  g.globalCompositeOperation = "source-over";
}

function drawForeground() {
  drawSpores("near");
  const dark = mix(PAL.skyT, [0, 0, 0], 0.4);
  g.fillStyle = rgb(dark);
  // Silhouette grass along the bottom edge
  const per = 46, off = wrap(S.camX * 1.35, per);
  const base = Math.floor(S.camX * 1.35 / per);
  for (let k = -1; k <= Math.ceil(W / per) + 1; k++) {
    const x = k * per - off, i = base + k;
    const n = 2 + (rnd01(i * 9) * 3 | 0);
    for (let j = 0; j < n; j++) {
      const bx = x + rnd01(i * 31 + j) * 30;
      const hgt = 5 + rnd01(i * 13 + j * 5) * 9;
      const sway = Math.sin(S.time * 1.6 + i + j) * 1.2;
      g.beginPath();
      g.moveTo(bx - 2, H + 1);
      g.lineTo(bx + sway, H - hgt);
      g.lineTo(bx + 2, H + 1);
      g.closePath(); g.fill();
    }
  }
  // Hanging tendrils along the top edge
  const per2 = 90, off2 = wrap(S.camX * 1.2, per2);
  const base2 = Math.floor(S.camX * 1.2 / per2);
  for (let k = -1; k <= Math.ceil(W / per2) + 1; k++) {
    const x = k * per2 - off2, i = base2 + k;
    if (rnd01(i * 5) > 0.6) continue;
    const len = 8 + rnd01(i * 3) * 14;
    const sway = Math.sin(S.time * 1.3 + i) * 1.5;
    g.fillRect(Math.round(x + sway), -1, 2, Math.round(len));
    g.fillRect(Math.round(x + sway * 1.4), Math.round(len - 3), 2, 3);
  }
}

function drawEndOverlay() {
  if (S.memoryBeat > 0) {
    const a = clamp(Math.min(S.memoryBeat, 5 - S.memoryBeat) * 1.5, 0, 1);
    g.globalAlpha = a;
    g.fillStyle = "rgba(4,7,12,0.85)";
    g.fillRect(W / 2 - 130, 48, 260, 40);
    g.fillStyle = rgb(PAL.accent);
    g.fillRect(W / 2 - 130, 48, 260, 1);
    g.textAlign = "center";
    g.fillStyle = C.title;
    g.font = "bold 9px monospace";
    g.fillText("FIRST MAP FOUND", W / 2, 62);
    g.fillStyle = C.ui;
    g.font = "8px monospace";
    g.fillText("The first map ends at the Spire wall.", W / 2, 74);
    g.fillText("Someone drew a door past the edge.", W / 2, 83);
    g.globalAlpha = 1;
  }

  // The light that fills the screen — from the floral explosion onward
  if ((S.mode === "freed" || S.mode === "reunion" || S.mode === "credits") && S.glow > 0) {
    const pulse = S.glow >= 1 ? 1 : S.glow + Math.sin(S.time * 1.5) * 0.03;
    g.globalAlpha = clamp(pulse * 0.85, 0, 0.92);
    g.fillStyle = "rgb(228,252,238)";
    g.fillRect(0, 0, W, H);
    g.globalAlpha = 1;
  }

  if (S.mode === "freed" || S.mode === "reunion") {
    g.textAlign = "center";
    g.fillStyle = S.glow > 0.45 ? "#3a4a40" : C.uiDim;
    g.font = "7px monospace";
    g.fillText("Jump to skip", W / 2, H - 6);
  }

  if (S.mode === "freed") {
    const ink = S.glow > 0.45;
    if (S.endBeat >= 1) {
      g.textAlign = "center";
      g.fillStyle = ink ? "#3a4a40" : C.goalOpen;
      g.font = "8px monospace";
      g.fillText("“I heard you climbing.”", W / 2, 44);
    }
    if (S.endBeat >= 2) {
      g.fillStyle = ink ? "#2a3a30" : C.ui;
      g.font = "8px monospace";
      g.fillText("“Thank you for coming.”", W / 2, 58);
    }
  }

  if (S.mode === "credits") {
    const lines = [
      ["SPORELING DASH", "bold 14px monospace", C.title],
      ["A platformer about a dash that leaves a temporary platform", "8px monospace", C.uiDim],
      ["", "", ""],
      ["Created by thoughtcrimegpt", "9px monospace", C.ui],
      ["Code, art, and sound by thoughtcrimegpt", "8px monospace", C.ui],
      ["", "", ""],
      ["Thanks for playing", "8px monospace", C.uiDim],
    ];
    const scroll = H + 20 - S.creditsT * 16;
    g.textAlign = "center";
    for (let i = 0; i < lines.length; i++) {

      g.font = lines[i][1];
      g.fillText(lines[i][0], W / 2, ly);
    }
    g.fillStyle = C.uiDim;
    g.font = "7px monospace";
    g.fillText("Jump to skip", W / 2, H - 6);
  }
}

    g.globalAlpha = 1;
  }
  if (S.hint && S.mode === "play" && !S.talk && !rootWarningActive() && !openingLessonNeeded()) {
    const a = clamp(Math.min(S.hint.t, S.hint.duration - S.hint.t) * 2.5, 0, 1);
    const words = S.hint.text.split(/\s+/);
    const lines = [""];
    for (const word of words) {
      const next = lines[lines.length - 1] ? lines[lines.length - 1] + " " + word : word;
      if (next.length > 52 && lines.length < 2) lines.push(word);
      else lines[lines.length - 1] = next;
    }
    const panelH = lines.length > 1 ? 22 : 13;
    g.globalAlpha = a;
    g.fillStyle = "rgba(8,12,18,0.75)";
    g.fillRect(W / 2 - 110, 38, 220, panelH);
    g.fillStyle = C.goalOpen;
    g.font = "7px monospace";
    g.textAlign = "center";
    lines.forEach((line, i) => g.fillText(line, W / 2, 47 + i * 9));
    g.globalAlpha = 1;
  }
}

  const cycle = tall
    ? (S.daily ? ["daily"] : S.reachTrial ? ["reach"] : ["any", "full"])

  const px = tall ? W - 144 : W - 122;
  const pw = tall ? 140 : 118;
  const ph = tall ? H - 8 : 72;

  const nameLen = tall ? 16 : 11;
  LB_PANEL = { x: px, y: 4, w: pw, h: ph };
  g.textAlign = "left";
  g.fillStyle = "rgba(8,12,18,0.82)";
  g.fillRect(px, 4, pw, ph);
  g.fillStyle = rgb(PALS[0].accent);
  g.fillRect(px, 4, pw, 1);
  g.fillStyle = C.title;
  g.font = "bold 7px monospace";
  g.fillText(slot === "daily" ? "☾ THE PALE ROOT"
    : slot === "full" ? "FULL BLOOM 100%"
      : slot === "reach" ? "THE REACH"
        : "FASTEST ANY%", px + 5, 14);

  if (!list || !list.length) {
    g.fillStyle = C.uiDim;
    g.fillText(list ? "no runs yet" : "...", px + 5, 26);
  } else {
    for (let i = 0; i < Math.min(rows, list.length); i++) {
      const ry = 26 + i * (tall ? 10 : 9);
      const nm = String(list[i].name);
      const label = (i + 1) + " " + nm.slice(0, nameLen);
      g.fillStyle = i === 0 ? rgb(PALS[0].accent) : C.ui;
      g.fillText(label, px + 5, ry);
      if (nm[0] === "@") {
        // underlined = click to open their X profile
        g.fillRect(px + 5, ry + 1, Math.min(label.length * 4.2, pw - 42) | 0, 1);
        LB_HITS.push({ x: px + 5, y: ry, w: pw - 10, name: nm });
      }
      g.textAlign = "right";
      g.fillText(fmtMs(list[i].time_ms), px + pw - 5, ry);

}

  g.beginPath();
  g.rect(10, 26, W - 20, H - 44);
  g.clip();
  g.textAlign = "left";

  for (const blk of PATCH_NOTES) {
    g.fillStyle = rgb(PALS[0].accent);
    g.font = "bold 8px monospace";
    g.fillText(blk.v, 16, y);
    if (blk.d) {
      g.textAlign = "right";
      g.fillStyle = C.uiDim;
      g.font = "7px monospace";
      g.fillText(blk.d, W - 16, y);
      g.textAlign = "left";
    }
    y += 13;
    g.fillStyle = C.uiDim;
    g.font = "7px monospace";
    // word-wrap: nothing runs off the right edge; continuations indent
    const maxTw = W - 38;
    for (const ln of blk.lines) {
      let rest = ln, first = true;
      while (rest.length) {
        let seg = rest;
        while (g.measureText(seg).width > (first ? maxTw : maxTw - 6) && seg.includes(" "))
          seg = seg.slice(0, seg.lastIndexOf(" "));
        g.fillText(seg, first ? 18 : 24, y);
        y += 9;
        rest = rest.slice(seg.length).trim();
        first = false;
      }
    }
    y += 8;
  }
  NOTES_MEASURED = y + S.notesY - 38;
  g.restore();
  g.textAlign = "center";
  g.fillStyle = C.uiDim;
  g.font = "7px monospace";
  g.fillText("▲ ▼ scroll   ·   " + jumpBtnName() + ": back", W / 2, H - 11);
}

        g.fillText(S.lbMsg || "Press " + dashBtnName() + " to submit your time.", 10, 160);
      }
      } else if (!competitiveRun()) {
      g.fillStyle = C.goalOpen;
      g.font = "7px monospace";
      g.fillText("Adventure complete. No time was submitted.", 10, 160);
      } else if (met < TOTAL_NPCS) {
      g.fillStyle = C.uiDim;
      g.font = "7px monospace";
      g.fillText("You missed someone on the way up.", 10, 160);
      }

      if ((Math.sin(S.time * 4) * 0.5 + 0.5) > 0.28) {
        g.fillStyle = C.uiDim;
        g.font = "7px monospace";
        g.fillText(jumpBtnName() + " returns to the title screen.", 10, 172);
      }
    }

    if (TOUCH.active) {
      if (competitiveRun()) {
        const submit = { id: "submit", x: 6, y: 149, w: 164, h: 14 };
        g.fillStyle = touchPressed("win", "submit") ? "rgba(240,168,136,0.42)" : "rgba(144,232,176,0.28)";
        g.fillRect(submit.x, submit.y, submit.w, submit.h);
        g.fillStyle = C.goalOpen;
        g.textAlign = "center";
        g.fillText(S.score.lbDone ? "TIME SUBMITTED" : "SUBMIT TIME", submit.x + submit.w / 2, submit.y + 10);
        WIN_HITS.push(submit);
      }
      const title = { id: "title", x: 6, y: 165, w: 164, h: 13 };
      g.fillStyle = touchPressed("win", "title") ? "rgba(240,168,136,0.42)" : "rgba(58,66,80,0.9)";
      g.fillRect(title.x, title.y, title.w, title.h);
      g.fillStyle = C.ui;
      g.textAlign = "center";
      g.fillText("TITLE SCREEN", title.x + title.w / 2, title.y + 9);
      WIN_HITS.push(title);
      g.textAlign = "left";
    }
  }
  g.textAlign = "center";
}

// ── Loop ───────────────────────────────────────────────────────────────────
function applyDevFixture() {
  if (!DEV) return false;
  let fixture = "", params = null;
  try {
    params = new URLSearchParams(location.search);
    fixture = params.get("fixture") || "";
  } catch (e) {}
  const requestedDifficulty = params && params.get("difficulty");
  if (ADVENTURE_DIFFICULTIES.includes(requestedDifficulty)) {
    adventureDifficultyPref = requestedDifficulty;
    configureRunRules("adventure");
  }
  if (params && params.get("mode") === "timed") runModePref = "speedrun";
  if (params && params.has("testlevel"))
    S.devLevel = clamp(parseInt(params.get("testlevel") || "0", 10) || 0, 0, LEVELS.length - 1);
  if (params && params.get("touch") === "1") {
    TOUCH.active = true;
    document.getElementById("touch").hidden = false;
    leftHanded = params.get("hand") === "left";
    applyTouchLayout();
    resize();
  }
  if (!fixture) return false;

  const placePlayer = (x, y) => {
    const p = S.player;
    Object.assign(p, {
      x, y, vx: 0, vy: 0, invuln: 99, grounded: false,
      dashing: false, canDash: true, spores: MAX_SPORES, chainN: 0,
    });
    S.camLook = 0;
    S.camX = clamp(x + p.w / 2 - W / 2, 0, Math.max(0, WORLD_W - W));
    S.camY = clamp(y + p.h / 2 - H / 2, 0, Math.max(0, WORLD_H - H));
  };
  const openLevel = index => {
    loadLevel(index);
    S.mode = "play";
    S.bannerT = 0;
    resetNotices();
    S.talk = null;
    S.bloomLessonDone = true;
  };

  if (fixture === "level-notice") {
    const requestedLevel = clamp(parseInt(params.get("level") || "0", 10) || 0, 0, LEVELS.length - 1);
    loadLevel(requestedLevel);
    S.mode = "play";
    S.bannerT = 0;
    updateNoticeQueue(0);
    return true;
  }

  if (fixture === "board") {
    const requestedTab = params.get("tab") || "any";
    S.boardTab = ["any", "full", "daily", "reach"].includes(requestedTab) ? requestedTab : "any";
    S.boardFrom = "title";
    S.mode = "board";
    return true;
  }

  if (fixture === "reach") {
    S.daily = false; S.reachTrial = true; S.runMode = "speedrun";
    configureRunRules("speedrun");
    openLevel(REACH_INDEX);
    const section = clamp(parseInt(params.get("section") || "1", 10) || 1, 1, 5);
    const anchors = [
      null,
      [3 * TILE, 144 * TILE - S.player.h],
      [59 * TILE, 136 * TILE - S.player.h],
      [54 * TILE, 91 * TILE - S.player.h],
      [3 * TILE, 84 * TILE - S.player.h],
      [53 * TILE, 57 * TILE - S.player.h],
    ];
    placePlayer(anchors[section][0], anchors[section][1]);
    S.player.grounded = true;
    if (params.get("fallback") === "1") {
      resetNotices();
      S.bannerT = 0;
      S.reachFinalFuelArmed = true;
      S.enemies = S.enemies.filter(e => e.spawnY >= REACH_FINAL_FUEL_CEILING);
      updateReachFinalFuelReset(S.player);
      updateNoticeQueue(0);
    }
    return true;
  }

  if (fixture === "pressed-garden") {
    openLevel(PRESSED_GARDEN_INDEX);
    return true;
  }

  if (fixture === "pause") {
    const requestedLevel = clamp(parseInt(params.get("level") || "0", 10) || 0, 0, LEVELS.length - 1);
    openLevel(requestedLevel);
    S.mode = "pause"; S.pauseSel = 0;
    return true;
  }

  if (fixture === "win") {
    openLevel(params.get("trial") === "reach" ? REACH_INDEX : 0);
    S.mode = "win"; S.runMode = params.get("mode") === "adventure" ? "adventure" : "speedrun";
    S.reachTrial = params.get("trial") === "reach";
    return true;
  }

  if (fixture === "opening") {
    openLevel(0);
    S.bloomLessonDone = false;
    placePlayer(15 * TILE, 8 * TILE - S.player.h);
    S.player.grounded = true;
    return true;
  }
  if (fixture === "bloom") {
    openLevel(0);
    placePlayer(20 * TILE, 6 * TILE);
    S.player.vx = 95;
    spawnBloom(S.player);
    return true;
  }
  if (fixture === "checkpoint") {
    const requestedLevel = clamp(parseInt(params.get("level") || "0", 10) || 0, 0, LEVELS.length - 1);
    openLevel(requestedLevel);
    const cp = S.checkpoints.find(candidate => candidate.mercy) || S.checkpoints[0];
    if (!cp) return false;
    placePlayer(cp.x + 4, cp.y - 8);
    activateCheckpoint(cp);
    updateNoticeQueue(0);
    return true;
  }
  if (fixture === "swallow-mercy") {
    openLevel(LEVELS.findIndex(level => level.name === "THE SWALLOW"));
    const mercy = S.descentMercy;
    if (!mercy) return false;
    placePlayer(mercy.x, mercy.y);
    updateDescentMercy(S.player);
    updateNoticeQueue(0);
    return true;
  }
  if (fixture === "dialogue") {
    const requestedNpc = (params.get("npc") || "").toUpperCase();
    const npcLevel = requestedNpc
      ? LEVELS.findIndex(level => (level.npcs || []).some(npc => npc.name === requestedNpc))
      : 0;
    if (npcLevel < 0) return false;
    openLevel(npcLevel);
    const npc = requestedNpc ? S.npcs.find(actor => actor.name === requestedNpc) : S.npcs[0];
    if (!npc) return false;
    placePlayer(npc.x - 24, npc.y);
    S.talk = { npc, line: 0, t: npc.lines[0].length * 0.035 };
    S.score.metNpcs[npc.name] = true;
    return true;
  }
  if (fixture === "chorus-open" || fixture === "chorus-dive") {
    openLevel(LEVELS.findIndex(level => level.boss === "chorus"));
    const b = S.boss;
    updateChorus(0);
    placePlayer(b.x - 92, b.y - 7);
    if (fixture === "chorus-open") {
      b.state = "gather";
      b.t = 0;
      for (const wsp of b.wisps) {
        wsp.dead = false;
        wsp.mode = "gathered";
        wsp.x = b.x - 4;
        wsp.y = b.y - 4;
      }
      queueNotice("The heart is glowing. Dash straight through it.", 99, NOTICE_PRIORITY.BOSS);
      updateNoticeQueue(0);
    } else {
      b.state = "dives";
      b.t = 0.6;
      for (let i = 0; i < 3; i++) {
        const wsp = b.wisps[i];
        const angle = -0.4 + i * 0.4;
        wsp.mode = "dive";
        wsp.t = 0.35;
        wsp.x = b.x - 56 + i * 12;
        wsp.y = b.y - 32 + i * 14;
        wsp.vx = Math.cos(angle) * CHORUS.DIVE_V;
        wsp.vy = Math.sin(angle) * CHORUS.DIVE_V;
      }
    }
    return true;
  }
  if (fixture.startsWith("root-")) {
    const later = fixture.endsWith("-later");
    const tier = fixture.slice(5).replace(/-later$/, "");
    if (!ROOT_TIERS[tier]) return false;
    openLevel(LEVELS.findIndex(level => level.boss === "unbloomed"));
    const band = ROOT_TIERS[tier];
    const b = S.boss;
    b.pips = tier === "mid" ? 2 : 1;
    b.state = "attack";
    b.t = 0;
    b.arm = null;
    b.sweepSide = false;
    b.sweepHints = later ? 2 : 0;
    bossStartAttack(b);
    b.arm.tier = tier;
    b.arm.y = band.y;
    placePlayer(25 * TILE, band.y - 18);
    S.camY = clamp(band.y + band.h / 2 - H / 2, 0, Math.max(0, WORLD_H - H));
    return true;
  }
  return false;
}

let last = performance.now() / 1000;
let acc = 0;

function frame(nowMs) {
  const now = nowMs / 1000;
  let dt = now - last;
  last = now;
  if (dt > MAX_FRAME_DT) dt = MAX_FRAME_DT;
  acc += dt;
  while (acc >= FIXED_DT) {
    tick(FIXED_DT);
    acc -= FIXED_DT;
  }
  draw();
  requestAnimationFrame(frame);
}

setupTouch();
lbRefresh();
// a challenge link arms the challenger's echo
try {
  const raceId = new URLSearchParams(location.search).get("race");
  if (raceId && lbOn())
    fetchRace(raceId).then(race => {
      if (race) {
        S.pendingGhost = { frames: race.frames, name: "the challenger", category: race.category };
        setRunModePref("speedrun");
        ghostPref = "leader";
        if (race.category === "reach" && rootCleared()) S.titleSel = titleIds().indexOf("reach");
        try { localStorage.setItem("sd_ghost_pref", ghostPref); } catch (e) {}
      }
    });
} catch (e) {}
loadLevel(0);
S.mode = "title";
S.titleSel = titleIds().indexOf("start");
applyDevFixture();
// Narrow local-only bridge for repeatable browser playtests. It is never
// attached on the deployed site, and exposes no credentials or network hooks.
if (DEV) globalThis.__SPORELING_DEV__ = {
  snapshot: () => ({
    mode: S.mode, level: S.levelIdx, boss: S.boss?.kind || null,
    rootTier: S.boss?.arm?.tier || null, rootWarning: S.boss?.arm?.warm || 0,
  }),
  metrics: devMetricsSnapshot,
  cueUnbloomedSweep(fromLeft = true, tier = "ground") {
    const b = S.boss;
    if (!b || b.kind !== "unbloomed" || !ROOT_TIERS[tier]) return false;
    b.pips = 1;
    b.sweepSide = !fromLeft;
    b.state = "attack";
    b.t = 0;
    b.arm = null;
    bossStartAttack(b);
    b.arm.tier = tier;
    b.arm.y = ROOT_TIERS[tier].y;
    return { fromLeft: b.arm.dir > 0, tier, warning: b.arm.warm };
  },
};
requestAnimationFrame(frame);
})();
</script>
