    chamberClear();
  }

  if (S.goal && overlap(p, S.goal)) {
    chamberClear();
    for (let i = 0; i < 22; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = 40 + Math.random() * 90;
      burst(S.goal.x + 8, S.goal.y + 10, Math.cos(a) * sp, Math.sin(a) * sp - 50, 0.9,
        i & 1 ? C.goalGlow : C.goalOpen, 2);
    }
  }

  if (p.invuln <= 0 && hitSpike(p)) killPlayer();

  updateParticles(dt);

  // Camera: smooth follow with facing lookahead
  const tcx = p.x + p.w / 2 - W / 2 + p.facing * 14;
  const tcy = p.y + p.h / 2 - H / 2 - 10;
  S.camX += (tcx - S.camX) * Math.min(1, 8 * dt);
  S.camY += (tcy - S.camY) * Math.min(1, 6 * dt);
  S.camX = clamp(S.camX, 0, Math.max(0, WORLD_W - W));
  S.camY = clamp(S.camY, 0, Math.max(0, WORLD_H - H));

  if (S.shakeT > 0) S.shakeT -= dt;
  clearJust();
}

// ── Draw ───────────────────────────────────────────────────────────────────
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const buf = mkCv(W, H);
const g = buf.getContext("2d");
let scale = 1;

function resize() {
  const raw = Math.min(innerWidth / W, innerHeight / H);
  // Touch devices get fractional scaling so the game fills the screen;
  // desktop stays integer-scaled for crisp pixels
  scale = TOUCH.active ? Math.max(1, raw) : Math.max(1, Math.floor(raw));
  canvas.width = Math.round(W * scale);
  canvas.height = Math.round(H * scale);
  canvas.style.width = canvas.width + "px";
  canvas.style.height = canvas.height + "px";
  ctx.imageSmoothingEnabled = false;
}
addEventListener("resize", resize);
resize();

// Leaderboard interactivity: @names open X profiles, the small panel opens
// the full board, and the board's tabs switch between the two lists.
function canvasPos(e) {
  const r = canvas.getBoundingClientRect();
  return { x: (e.clientX - r.left) / scale, y: (e.clientY - r.top) / scale };
}
function lbHitAt(e) {
  if (S.mode !== "title" && S.mode !== "win" && S.mode !== "board") return null;
  const p2 = canvasPos(e);
  for (const h of LB_HITS)
    if (p2.x >= h.x && p2.x <= h.x + h.w && p2.y >= h.y - 7 && p2.y <= h.y + 3) return h;
  return null;
}
function lbUiHitAt(e) {
  const p2 = canvasPos(e);
  if (S.mode === "board") {
    for (const t of BOARD_TABS)
      if (p2.x >= t.x && p2.x <= t.x + t.w && p2.y >= t.y && p2.y <= t.y + t.h) return { tab: t.tab };
    for (const rh of RACE_HITS)
      if (p2.x >= rh.x && p2.x <= rh.x + rh.w && p2.y >= rh.y - 7 && p2.y <= rh.y + 3) return { race: rh };
    return null;
  }
  if (S.mode === "title" && DAILY_PANEL &&
      p2.x >= DAILY_PANEL.x && p2.x <= DAILY_PANEL.x + DAILY_PANEL.w &&
      p2.y >= DAILY_PANEL.y && p2.y <= DAILY_PANEL.y + DAILY_PANEL.h) return { daily: true };
  if ((S.mode === "title" || S.mode === "win") && LB_PANEL &&
      p2.x >= LB_PANEL.x && p2.x <= LB_PANEL.x + LB_PANEL.w &&
      p2.y >= LB_PANEL.y && p2.y <= LB_PANEL.y + LB_PANEL.h) return { open: true };
  return null;
}
canvas.addEventListener("click", e => {
  const h = lbHitAt(e);
  if (h) { window.open("https://x.com/" + h.name.slice(1).replace(/[^\w]/g, ""), "_blank"); return; }
  const u = lbUiHitAt(e);
  if (!u) return;
  if (u.tab) { S.boardTab = u.tab; SFX.talk(); }
  else if (u.race) {
    SFX.check();
    fetchGhost(u.race.id).then(fr => {
      if (fr) {
        S.pendingGhost = { frames: fr, name: u.race.name };
        S.mode = "title";
        SFX.oneUp();
      }
    });
  }
  else if (u.daily && lbOn()) { startDaily(); }
  else if (u.open && lbOn()) { S.boardFrom = S.mode; S.mode = "board"; SFX.talk(); }
});
canvas.addEventListener("mousemove", e => {
  canvas.style.cursor = (lbHitAt(e) || lbUiHitAt(e)) ? "pointer" : "";
});

function blit() {
  ctx.imageSmoothingEnabled = false;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(buf, 0, 0, W, H, 0, 0, canvas.width, canvas.height);
}

function draw() {
  g.imageSmoothingEnabled = false;

  if (S.mode === "title") { drawTitle(); blit(); return; }
  if (S.mode === "board") { drawBoard(); blit(); return; }
  if (S.mode === "win") { drawWin(); blit(); return; }
  if (S.mode === "gameover") { drawGameOver(); blit(); return; }

  let ox = 0, oy = 0;
  if (S.shakeT > 0) {
    const t = S.shakeT / SHAKE_TIME;
    ox = (Math.random() - 0.5) * 2 * S.shakeMag * t;
    oy = (Math.random() - 0.5) * 2 * S.shakeMag * t;
  }

  drawBackdrop();

  g.save();
  g.translate(Math.round(-S.camX + ox), Math.round(-S.camY + oy));
  g.drawImage(terrainCv, 0, 0);
  drawDecor();
  drawBlooms();
  drawCheckpoints();
  drawBerries();
  drawMovers();
  drawDoors();
  drawMemory();
  drawNPCs();
  drawEnemies();
  drawBoss();
  drawGoal();
  drawTrail();
  if (S.ghostPos && S.mode === "play") {
    g.globalAlpha = 0.45;
    drawMap(g, SPRITES.idle1, Math.round(S.ghostPos.x) - 1, Math.round(S.ghostPos.y) - 2, S.ghostPos.facing < 0, ECHO_PAL);
    g.globalAlpha = 1;
  }
  if (S.mode !== "dead") drawPlayer();
  drawParticles();
  g.restore();

  drawLighting(ox, oy);
  drawForeground();
  if (S.mode !== "credits") drawHUD();
  drawTalk();
  drawBanner();
  drawEndOverlay();

  if (S.mode === "pause") {
    g.fillStyle = "rgba(5,8,12,0.7)";
    g.fillRect(0, 0, W, H);
    g.fillStyle = C.ui;
    g.font = "bold 12px monospace";
    g.textAlign = "center";
    g.fillText("PAUSED", W / 2, 56);
    g.fillStyle = C.uiDim;
    g.font = "8px monospace";
    g.fillText(LEVELS[S.levelIdx].name, W / 2, 70);

    const opts = ["RESUME", "RESTART CHAMBER", "NEW GAME", "TITLE SCREEN"];
    if (DEV) opts.push("◄ " + (S.devLevel + 1) + ". " + LEVELS[S.devLevel].name + " ►");
    g.font = "9px monospace";
    for (let i = 0; i < opts.length; i++) {
      const oy = 86 + i * 14;
      const sel = i === S.pauseSel;
      g.fillStyle = i === 4 ? (sel ? C.goalOpen : "#6a5060") : (sel ? C.title : C.uiDim);
      g.fillText(opts[i], W / 2, oy);
      if (sel) {
        const bx = W / 2 - opts[i].length * 2.8 - 14;
        g.fillStyle = C.cap;
        g.fillRect(bx, oy - 7, 6, 3);
        g.fillStyle = C.bloomStem;
        g.fillRect(bx + 2, oy - 4, 2, 3);
      }
    }
    g.fillStyle = C.uiDim;
    g.font = "7px monospace";
    g.fillText("Move to choose   Jump to select", W / 2, 156);
  }

  if (S.mode === "clear") {
    const a = Math.min(0.5, S.winT * 1.2);
    g.fillStyle = "rgba(6,10,16," + a + ")";
    g.fillRect(0, 0, W, H);
    g.fillStyle = C.title;
    g.font = "bold 14px monospace";
    g.textAlign = "center";
    g.fillText("CHAMBER CLEAR", W / 2, H / 2 - 10);
    g.fillStyle = C.ui;
    g.font = "9px monospace";
    g.fillText("Berries  " + S.berries + " / " + S.berriesTotal, W / 2, H / 2 + 8);
    g.fillStyle = rgb(PAL.accent);
    g.font = "8px monospace";
    g.fillText("+1 spark", W / 2, H / 2 - 26);
    if (LEVELS[S.levelIdx].clearText && S.winT > 0.6) {
      g.fillStyle = C.uiDim;
      g.font = "8px monospace";
      g.fillText(LEVELS[S.levelIdx].clearText, W / 2, H / 2 + 26);
    }
  }

  blit();
}

function drawBackdrop() {
  g.drawImage(skyCv, 0, 0);

  // God rays
  g.globalAlpha = 0.05;
  g.fillStyle = rgb(mix(PAL.fog, [255, 255, 255], 0.3));
  const rOff = wrap(S.camX * 0.1, 170);
  for (let x = -rOff - 170; x < W + 40; x += 170) {
    g.beginPath();
    g.moveTo(x, -10); g.lineTo(x + 26, -10);
    g.lineTo(x - 14, H + 10); g.lineTo(x - 40, H + 10);
    g.closePath(); g.fill();
  }
  g.globalAlpha = 1;

  const lag = Math.max(0, (WORLD_H - H)) === 0 ? 0 : ((WORLD_H - H) - S.camY);

  // Far layer
  const fOff = wrap(S.camX * 0.22, 480);
  const fY = Math.min(40, lag * 0.12);
  g.drawImage(farCv, -fOff, fY); g.drawImage(farCv, 480 - fOff, fY);

  // Fog band
  g.globalAlpha = 0.1;
  g.fillStyle = rgb(PAL.fog);
  g.fillRect(0, H * 0.55, W, H * 0.2);
  g.globalAlpha = 1;

  // Mid layer
  const mOff = wrap(S.camX * 0.5, 480);
  const mY = Math.min(70, lag * 0.25);
  g.drawImage(midCv, -mOff, -mY * 0.3); g.drawImage(midCv, 480 - mOff, -mY * 0.3);

  drawSpores("far");
}

function drawSpores(layer) {
  for (const sp of SPORES) {
    const nearSp = sp.depth > 1;
    if ((layer === "near") !== nearSp) continue;
    const sx = wrap(sp.x + S.time * sp.drift - S.camX * sp.depth, W + 24) - 12;
    const sy = wrap(sp.y + Math.sin(S.time * 0.6 + sp.ph) * 8 - S.camY * sp.depth, H + 24) - 12;
    g.globalAlpha = nearSp ? 0.5 : 0.28;
    g.fillStyle = nearSp ? rgb(PAL.accent) : rgb(mix(PAL.accent, PAL.mid, 0.5));
    g.fillRect(Math.round(sx), Math.round(sy), nearSp ? 2 : 1, nearSp ? 2 : 1);
  }
  g.globalAlpha = 1;
}

function drawDecor() {
  const p = S.player;
  const moss = rgb(PAL.moss), mossHi = rgb(PAL.mossHi), accent = rgb(PAL.accent);
  for (const d of DECOR) {
    if (d.x < S.camX - 24 || d.x > S.camX + W + 24) continue;
    const sway = Math.sin(S.time * 1.8 + d.ph);
    if (d.type === "vine") {
      g.fillStyle = moss;
      const len = Math.round(d.len);
      for (let i = 0; i < len; i += 3) {
        g.fillRect(Math.round(d.x + sway * (i / len) * 2), d.y + i, 1, 3);
      }
      g.fillStyle = mossHi;
      g.fillRect(Math.round(d.x + sway * 2), d.y + len, 2, 2);
      continue;
    }
    const near = p && Math.abs(p.x + p.w / 2 - d.x) < 10 && Math.abs(p.y + p.h - d.y) < 8;
    const sq = near ? 0.6 : 1;
    if (d.type === "grass") {
      g.fillStyle = moss;
      for (let i = 0; i < 3; i++) {
        const bh = (4 + (i % 2) * 2) * sq;
        const bx = d.x + i * 3 - 3 + (i === 1 ? sway : 0);
        g.fillRect(Math.round(bx), Math.round(d.y - bh), 1, Math.round(bh));
      }
      g.fillStyle = mossHi;
      g.fillRect(Math.round(d.x - 3 + sway), Math.round(d.y - 6 * sq), 1, 2);
    } else if (d.type === "mush") {
      const hh = Math.round(5 * sq);
      g.fillStyle = C.bloomStem;
      g.fillRect(d.x, d.y - hh, 2, hh);
      g.fillStyle = C.capLo;
      g.fillRect(d.x - 2, d.y - hh - 2, 6, 3);
      g.fillStyle = C.cap;
      g.fillRect(d.x - 1, d.y - hh - 3, 4, 2);
    } else {
      const pulse = 0.7 + Math.sin(S.time * 3 + d.ph) * 0.3;
      const hh = Math.round(6 * sq);
      g.fillStyle = C.bloomStem;
      g.fillRect(d.x, d.y - hh, 2, hh);
      g.fillStyle = rgb(mix(PAL.accent, PAL.rockLo, 0.5));
      g.fillRect(d.x - 3, d.y - hh - 3, 8, 4);
      g.fillStyle = accent;
      g.globalAlpha = pulse;
      g.fillRect(d.x - 1, d.y - hh - 2, 4, 2);
      g.globalAlpha = 1;
    }
  }
}

function drawBlooms() {
  for (const b of S.blooms) {
    const wilt = b.life < BLOOM_WILT;
    g.globalAlpha = wilt ? Math.max(0.25, b.life / BLOOM_WILT) : 1;
    // sprout with overshoot
    const gt = b.age / 0.12;
    const grow = gt >= 1 ? 1 : gt < 0.7 ? gt * 1.5 : 1.15 - (gt - 0.7) * 0.5;
    const cx = b.x + b.w / 2;
    const bw = Math.round(b.w * Math.min(1.12, grow)), bh = Math.round(b.h * Math.min(1, grow + 0.2));

    g.fillStyle = wilt ? C.wilt : C.bloomStem;
    g.fillRect(Math.round(cx - 1), Math.round(b.y + 2), 3, bh);
    g.fillStyle = wilt ? C.wilt : C.bloom;
    g.fillRect(Math.round(cx - bw / 2), Math.round(b.y), bw, Math.max(1, bh - 1));
    g.fillStyle = wilt ? "#5a4038" : C.bloomHi;
    g.fillRect(Math.round(cx - bw / 2 + 2), Math.round(b.y + 1), Math.max(1, bw - 4), 2);
    if (!wilt) {
      g.fillStyle = C.capHi;
      g.fillRect(Math.round(cx - 6), Math.round(b.y + 3), 2, 2);
      g.fillRect(Math.round(cx + 4), Math.round(b.y + 2), 2, 2);
    } else {
      // crumble warning: notches appear
      g.fillStyle = "#3a2c28";
      g.fillRect(Math.round(cx - bw / 2 + 3), Math.round(b.y), 2, 2);
      g.fillRect(Math.round(cx + bw / 2 - 6), Math.round(b.y + 1), 2, 2);
    }
    g.globalAlpha = 1;
  }
}

function drawCheckpoints() {
  for (const cp of S.checkpoints) {
    const pulse = 0.55 + Math.sin(S.time * 5) * 0.45;
    g.fillStyle = C.bloomStem;
    g.fillRect(cp.x + 6, cp.y + 4, 4, 12);
    g.fillStyle = cp.active ? rgb(PAL.accent) : rgb(mix(PAL.accent, PAL.rockLo, 0.55));
    g.globalAlpha = cp.active ? pulse : 0.75;
    g.fillRect(cp.x + 2, cp.y, 12, 8);
    g.fillStyle = cp.active ? "#ffffff" : rgb(mix(PAL.accent, [255,255,255], 0.3));
    g.globalAlpha = cp.active ? pulse : 0.4;
    g.fillRect(cp.x + 4, cp.y + 1, 3, 2);
    g.globalAlpha = 1;
  }
}

function drawBerries() {
  const bob = Math.sin(S.time * 4) * 1.5;
  for (const ber of S.berryList) {
    if (ber.taken) continue;
    const x = ber.x, y = Math.round(ber.y + bob);
    g.fillStyle = C.berry;
    g.fillRect(x + 1, y + 2, 6, 6);
    g.fillRect(x + 2, y + 1, 4, 8);
    g.fillStyle = C.berryHi;
    g.fillRect(x + 2, y + 3, 2, 2);
    g.fillStyle = C.leaf;
    g.fillRect(x + 3, y, 2, 2);
    g.fillRect(x + 5, y + 1, 2, 1);
  }
}

function drawGoal() {
  if (!S.goal) return;
  const go = S.goal;
  const open = S.mode === "clear" ? S.goalOpen : 0;
  // beacon column
  const pulse = 0.5 + Math.sin(S.time * 2) * 0.2;
  g.globalAlpha = 0.08 * pulse + open * 0.2;
  g.fillStyle = C.goalGlow;
  g.fillRect(go.x + 2, 0, 12, go.y + 10);
  g.globalAlpha = 0.05 * pulse;
  g.fillRect(go.x - 2, 0, 20, go.y + 10);
  g.globalAlpha = 1;

  g.fillStyle = C.bloomStem;
  g.fillRect(go.x + 6, go.y + 12, 4, 12);
  if (open < 0.15) {
    const sway = Math.sin(S.time * 1.5) * 1;
    g.fillStyle = C.goalClosed;
    g.fillRect(Math.round(go.x + 4 + sway), go.y + 4, 8, 12);
    g.fillStyle = "#503040";
    g.fillRect(Math.round(go.x + 6 + sway), go.y + 6, 4, 8);
    g.fillStyle = C.goalOpen;
    g.fillRect(Math.round(go.x + 6 + sway), go.y + 4, 4, 2);
  } else {
    const s = open;
    g.fillStyle = C.goalOpen;
    g.fillRect(Math.round(go.x + 2 - s * 5), go.y + 6, 6, 6);
    g.fillRect(Math.round(go.x + 8 + s * 5), go.y + 6, 6, 6);
    g.fillRect(go.x + 5, Math.round(go.y + 1 - s * 4), 6, 6);
    g.fillRect(go.x + 5, Math.round(go.y + 10 + s * 2), 6, 5);
    g.fillStyle = C.goalGlow;
    g.fillRect(go.x + 6, go.y + 7, 4, 4);
    g.globalAlpha = 0.28 * open;
    g.fillRect(go.x - 6, go.y - 6, 28, 28);
    g.globalAlpha = 1;
  }
}

function drawNPCs() {
  for (const n of S.npcs) {
    const bob = Math.sin(S.time * 2 + n.ph);
    const x = Math.round(n.x), y = Math.round(n.y);
    if (n.big) {
      // reunion spirits float large and luminous
      g.save();
      g.translate(x + 6, y + 8);
      g.scale(1.7, 1.7);
      g.translate(-(x + 6), -(y + 8));
    }
    if (n.sprite === "keeper") {
      g.fillStyle = "#8a7a5a"; g.fillRect(x, y + 8, 12, 6);
      g.fillStyle = "#a89878"; g.fillRect(x + 1, y + 9, 10, 2);
      g.fillStyle = "#6a5a42"; g.fillRect(x + 8, Math.round(y + 2 + bob), 4, 7);
      g.fillStyle = C.eye; g.fillRect(x + 10, Math.round(y + 3 + bob), 1, 2);
      g.fillStyle = "#5a4a36"; g.fillRect(x + 8, Math.round(y - 1 + bob), 4, 3);
      g.fillStyle = "#4a4036"; g.fillRect(x - 3, y + 2, 1, 12);
      g.fillStyle = C.title; g.fillRect(x - 5, Math.round(y + bob * 0.5), 4, 5);
      g.fillStyle = "#fff0c0"; g.fillRect(x - 4, Math.round(y + 1 + bob * 0.5), 2, 2);
    } else if (n.sprite === "twins") {
      const b2 = Math.sin(S.time * 2 + n.ph + 2);
      g.fillStyle = C.bloomStem;
      g.fillRect(x + 1, y + 4, 3, 6); g.fillRect(x + 8, y + 5, 3, 5);
      g.fillStyle = "#d8a848"; g.fillRect(x - 1, Math.round(y + 2 + bob * 0.6), 7, 3);
      g.fillStyle = "#f0c878"; g.fillRect(x, Math.round(y + 1 + bob * 0.6), 5, 2);
      g.fillStyle = "#c89040"; g.fillRect(x + 6, Math.round(y + 3 + b2 * 0.6), 7, 3);
      g.fillStyle = "#e8b060"; g.fillRect(x + 7, Math.round(y + 2 + b2 * 0.6), 5, 2);
      g.fillStyle = C.eye; g.fillRect(x + 2, y + 6, 1, 1); g.fillRect(x + 9, y + 7, 1, 1);
    } else if (n.sprite === "moth") {
      const fl = (S.time * 8 + n.ph) % 2 < 1 ? 1 : 0;
      g.fillStyle = "#c8c0d8";
      g.fillRect(x - fl, y + 2, 4, 3 + fl);
      g.fillRect(x + 6 + (fl ? 0 : 1), y + 2, 4, 3 + fl);
      g.fillStyle = "#8a84a0"; g.fillRect(x + 3, y + 1, 4, 8);
      g.fillStyle = C.eye; g.fillRect(x + 4, y + 2, 1, 1); g.fillRect(x + 6, y + 2, 1, 1);
      g.fillStyle = "#e8e0d0"; g.fillRect(x + 8, y + 7, 5, 4);
      g.fillStyle = "#8a84a0"; g.fillRect(x + 9, y + 8, 3, 1);
    } else if (n.sprite === "granny") {
      g.fillStyle = "#b89060"; g.fillRect(x - 1, Math.round(y + 1 + bob * 0.4), 14, 4);
      g.fillStyle = "#d8b080"; g.fillRect(x + 1, Math.round(y + bob * 0.4), 10, 2);
      g.fillStyle = "#8a6848"; g.fillRect(x + 1, y + 5, 10, 9);
      g.fillStyle = C.eye; g.fillRect(x + 3, y + 7, 2, 1); g.fillRect(x + 7, y + 7, 2, 1);
      g.fillStyle = "#e8d0b0"; g.fillRect(x + 3, y + 10, 6, 3);
      g.fillStyle = C.berry; g.fillRect(x + 5, y + 11, 2, 1);
    } else if (n.sprite === "dog") {
      // German Shepherd, sitting profile — tan coat, black saddle and muzzle
      const tan = "#c68a4e", tanDk = "#9a6634", blk = "#26201c";
      const hb = bob * 0.4;
      g.fillStyle = tan;
      g.fillRect(x + 5, y + 6, 9, 6);                          // haunches
      g.fillRect(x + 2, y + 4, 5, 10);                         // chest + front
      g.fillStyle = blk;
      g.fillRect(x + 6, y + 5, 8, 4);                          // saddle
      g.fillRect(x + 13, y + 9, 3, 2);                         // tail
      g.fillStyle = tanDk;
      g.fillRect(x + 14, y + 10, 2, 2);                        // tail tip
      g.fillRect(x + 3, y + 12, 2, 2);                         // front leg
      g.fillRect(x + 9, y + 12, 2, 2);                         // hind paw
      g.fillStyle = tan;
      g.fillRect(x, Math.round(y + hb), 6, 5);                 // head
      g.fillStyle = blk;
      g.fillRect(x - 3, Math.round(y + 2 + hb), 4, 3);         // muzzle
      g.fillRect(x + 1, Math.round(y - 4 + hb), 2, 5);         // ear
      g.fillRect(x + 4, Math.round(y - 3 + hb), 2, 4);         // ear
      g.fillStyle = tanDk;
      g.fillRect(x + 2, Math.round(y - 3 + hb), 1, 2);         // inner ear
      g.fillStyle = "#d8a040";
      g.fillRect(x + 1, Math.round(y + 1 + hb), 1, 1);         // amber eye
    } else if (n.sprite === "grel") {
      // Three pale pointy-eared friends — the first believers
      const line = "#1a1a20";
      const fig = (fx, fy, fw, fh, body) => {
        fx = Math.round(fx); fy = Math.round(fy);
        g.fillStyle = line;
        g.fillRect(fx, fy, fw, fh);                       // outline
        g.fillRect(fx + 1, fy - 4, 2, 5);                 // left ear spike
        g.fillRect(fx + fw - 3, fy - 3, 2, 4);            // right ear spike
        g.fillStyle = body;
        g.fillRect(fx + 1, fy + 1, fw - 2, fh - 1);       // body fill
        g.fillRect(fx + 1, fy - 3, 1, 3);                 // ear fill
        g.fillRect(fx + fw - 3, fy - 2, 1, 2);
        g.fillStyle = line;
        g.fillRect(fx + fw / 2 - 2 | 0, fy + 4, 1, 2);    // dot eyes (tall)
        g.fillRect(fx + fw / 2 + 1 | 0, fy + 4, 1, 2);
      };
      const b2 = Math.sin(S.time * 2 + n.ph + 2);
      const b3 = Math.sin(S.time * 2 + n.ph + 4);
      fig(x - 5, y + 4 + bob * 0.5, 8, 10, "#d4d4da");    // back left
      fig(x + 9, y + 3 + b3 * 0.5, 8, 11, "#dcdce2");     // back right
      fig(x + 1, y + b2 * 0.5, 10, 14, "#f2f2f6");        // front, tallest
    } else { // echo — a sporeling gone pale
      g.globalAlpha = 0.55 + Math.sin(S.time * 1.5 + n.ph) * 0.1;
      drawMap(g, SPRITES.idle1, x, Math.round(y + bob * 0.5), false, ECHO_PAL);
      g.globalAlpha = 1;
    }
    if (!S.talk || S.talk.npc !== n) {
      g.fillStyle = "rgba(8,12,18,0.6)";
      g.fillRect(x + 2, y - 9, 10, 6);
      g.fillStyle = C.ui;
      g.fillRect(x + 4, y - 7, 1, 1); g.fillRect(x + 6, y - 7, 1, 1); g.fillRect(x + 8, y - 7, 1, 1);
    }
    if (n.big) g.restore();
  }
}

function drawTalk() {
  if (!S.talk || (S.mode !== "play" && S.mode !== "pause" && S.mode !== "reunion")) return;
  const npc = S.talk.npc;
  const full = npc.lines[S.talk.line];
  const shown = full.slice(0, Math.floor(S.talk.t / 0.035) + 1);
  // If the speaker is in the lower half of the screen, the box goes to the
  // top so it never covers them (Grel lives in a pit, after all)
  const npcSy = npc.y - S.camY;
  const bx = 10, bw = W - 20, bh = 38;
  const by = npcSy > H * 0.52 ? 6 : H - bh - 5;
  g.fillStyle = "rgba(4,7,12,0.94)";
  g.fillRect(bx, by, bw, bh);
  g.fillStyle = rgb(PAL.accent);
  g.fillRect(bx, by, bw, 1);
  g.fillRect(bx, by + bh - 1, bw, 1);
  g.textAlign = "left";
  g.fillStyle = C.title;
  g.font = "bold 8px monospace";
  g.fillText(npc.name, bx + 6, by + 10);
  g.fillStyle = "#f6efdd";
  g.font = "8px monospace";
  const maxc = 56;
  let l1 = shown, l2 = "";
  if (shown.length > maxc) {
    let cut = shown.lastIndexOf(" ", maxc);
    if (cut < 20) cut = maxc;
    l1 = shown.slice(0, cut);
    l2 = shown.slice(cut + 1);
  }
  g.fillText(l1, bx + 6, by + 22);
  if (l2) g.fillText(l2, bx + 6, by + 32);
  for (let i = 0; i < npc.lines.length; i++) {
    g.fillStyle = i === S.talk.line ? C.ui : "#3a4250";
    g.fillRect(bx + bw - 8 - (npc.lines.length - 1 - i) * 6, by + bh - 6, 4, 2);
  }
}

function drawEnemies() {
  for (const e of S.enemies) {
    if (e.x < S.camX - 24 || e.x > S.camX + W + 24) continue;
    if (e.t === "slug") {
      const wob = Math.sin(S.time * 6 + e.ph);
      const hh = e.h + (wob > 0 ? 1 : 0);
      const col = e.fast ? "#d85850" : rgb(mix(PAL.mossHi, [0, 0, 0], 0.2));
      const hi = e.fast ? "#f09880" : rgb(mix(PAL.mossHi, [255, 255, 255], 0.35));
      g.fillStyle = col;
      g.fillRect(Math.round(e.x), Math.round(e.y + e.h - hh), e.w, hh);
      g.fillRect(Math.round(e.x + 1), Math.round(e.y + e.h - hh - 1), e.w - 2, 1);
      g.fillStyle = hi;
      g.fillRect(Math.round(e.x + 2), Math.round(e.y + e.h - hh + 1), e.w - 4, 2);
      g.fillStyle = C.eye;
      g.fillRect(Math.round(e.dir > 0 ? e.x + e.w - 4 : e.x + 2), Math.round(e.y + 3), 2, 2);
      g.fillStyle = hi;
      g.fillRect(Math.round(e.x + (e.dir > 0 ? e.w - 3 : 2)), Math.round(e.y - 2 + wob * 0.5), 1, 2);
    } else if (e.t === "puff") {
      const pulse = 1 + Math.sin(S.time * 3 + e.ph) * 0.12;
      const r = 5 * pulse;
      const cx = e.x + 5, cy = e.y + 5;
      g.fillStyle = "#e8e0d0";
      g.fillRect(Math.round(cx - r + 1), Math.round(cy - r), Math.round(r * 2 - 2), Math.round(r * 2));
      g.fillRect(Math.round(cx - r), Math.round(cy - r + 1), Math.round(r * 2), Math.round(r * 2 - 2));
      g.fillStyle = "#c8b8a8";
      g.fillRect(Math.round(cx - 1), Math.round(cy + 1), 2, 2);
      g.fillRect(Math.round(cx - 3), Math.round(cy - 2), 2, 2);
      g.fillStyle = "#fff8ec";
      g.fillRect(Math.round(cx + 1), Math.round(cy - 3), 2, 2);
    } else if (e.t === "skitter") {
      g.fillStyle = rgb(mix(PAL.mossHi, [40, 20, 0], 0.25));
      g.fillRect(Math.round(e.x), Math.round(e.y), e.w, e.h - 1);
      g.fillStyle = rgb(mix(PAL.mossHi, [255, 240, 200], 0.35));
      g.fillRect(Math.round(e.x + 2), Math.round(e.y + 1), e.w - 4, 2);
      g.fillStyle = C.eye;
      g.fillRect(Math.round(e.dir > 0 ? e.x + e.w - 3 : e.x + 1), Math.round(e.y + 1), 2, 2);
      g.fillStyle = rgb(PAL.rockLo);
      for (let i = 0; i < 3; i++)
        g.fillRect(Math.round(e.x + 1 + i * 4 + ((S.time * 30) % 2)), Math.round(e.y + e.h - 1), 2, 1);
    } else if (e.t === "spitter") {
      g.fillStyle = C.bloomStem;
      g.fillRect(Math.round(e.x + 4), Math.round(e.y + 5), 4, 7);
      g.fillStyle = "#c05868";
      g.fillRect(Math.round(e.x), Math.round(e.y + 1), 12, 5);
      g.fillStyle = "#e88898";
      g.fillRect(Math.round(e.x + 2), Math.round(e.y), 8, 2);
      g.fillStyle = e.cd < 0.5 ? "#f06080" : "#5a3040";
      g.fillRect(Math.round(e.x + 5), Math.round(e.y + 3), 3, 2);
    } else if (e.t === "mine") {
      const flash = e.armT > 0 && ((S.time * 12) | 0) % 2 === 0;
      const cx = Math.round(e.x + 5), cy = Math.round(e.y + 5);
      g.fillStyle = flash ? "#ffd0da" : "#8a5560";
      g.fillRect(cx - 3, cy - 3, 6, 6);
      g.fillStyle = flash ? "#f06080" : "#5a3540";
      g.fillRect(cx - 1, cy - 5, 2, 10);
      g.fillRect(cx - 5, cy - 1, 10, 2);
      g.fillStyle = "#fff0f4";
      g.fillRect(cx - 1, cy - 1, 2, 2);
    } else {
      const bob = Math.sin(S.time * 4 + e.ph);
      const cx = e.x + 4, cy = e.y + 4 + bob;
      // Pulsing aura ring — reads as "pop me"
      const ring = (S.time * 1.2 + e.ph) % 1;
      const rr = 3 + ring * 6;
      g.globalAlpha = (1 - ring) * 0.35;
      g.fillStyle = "#ff82aa";
      g.fillRect(Math.round(cx - rr), Math.round(cy - rr), Math.round(rr * 2), 1);
      g.fillRect(Math.round(cx - rr), Math.round(cy + rr), Math.round(rr * 2), 1);
      g.fillRect(Math.round(cx - rr), Math.round(cy - rr), 1, Math.round(rr * 2));
      g.fillRect(Math.round(cx + rr), Math.round(cy - rr), 1, Math.round(rr * 2) + 1);
      g.globalAlpha = 1;
      g.fillStyle = "#ff82aa";
      g.fillRect(Math.round(cx - 3), Math.round(cy - 1), 6, 2);
      g.fillRect(Math.round(cx - 1), Math.round(cy - 3), 2, 6);
      g.fillStyle = "#fff0f6";
      g.fillRect(Math.round(cx - 1), Math.round(cy - 1), 2, 2);
    }
  }
  for (const sh of S.eshots) {
    g.fillStyle = "#f06080";
    g.fillRect(Math.round(sh.x), Math.round(sh.y), sh.w, sh.h);
    g.fillStyle = "#ffc0cc";
    g.fillRect(Math.round(sh.x + 1), Math.round(sh.y + 1), 2, 2);
  }
}

function levelDoors() {
  const out = [];
  if (S.levelIdx === 2) out.push({ x: 18, y: 32, w: 22, h: 32 });      // the crack in the map, on the hidden ledge
  if (LEVELS[S.levelIdx].secret) {
    out.push({ x: 344, y: 144, w: 22, h: 48 });                        // the way back out
    out.push({ x: 18, y: 144, w: 22, h: 48 });                         // the way you came in
  }
  if (S.bossDoor) out.push(S.bossDoor);                                // opened by a soothed boss
  return out;
}

function drawDoors() {
  for (const d of levelDoors()) {
    const pulse = 0.5 + Math.sin(S.time * 2 + d.x) * 0.2;
    g.fillStyle = "#05070b";
    g.fillRect(d.x, d.y, d.w, d.h);
    g.fillStyle = rgb(PAL.accent);
    g.globalAlpha = 0.75;
    g.fillRect(d.x - 1, d.y - 2, d.w + 2, 2);
    g.fillRect(d.x - 1, d.y, 1, d.h);
    g.fillRect(d.x + d.w, d.y, 1, d.h);
    g.globalAlpha = pulse * 0.35;
    g.fillRect(d.x + 2, d.y + 3, d.w - 4, d.h - 3);
    g.globalAlpha = 1;
    g.fillStyle = rgb(PAL.moss);
    g.fillRect(d.x + 3, d.y, 2, 5);
    g.fillRect(d.x + 10, d.y, 2, 8);
    g.fillRect(d.x + 16, d.y, 2, 4);
  }
}

function drawMemory() {
  const m = S.memoryObj;
  if (!m || S.score.secretMemory) return;
  const bob = Math.sin(S.time * 2) * 1.5;
  const x = Math.round(m.x), y = Math.round(m.y + 4 + bob);
  // a folded map of pale spore-ink
  g.fillStyle = rgb(PAL.accent);
  g.fillRect(x + 1, y, 12, 9);
  g.fillStyle = "#f8f6ea";
  g.fillRect(x + 2, y + 1, 10, 7);
  g.fillStyle = rgb(mix(PAL.accent, [60, 70, 90], 0.6));
  g.fillRect(x + 4, y + 2, 3, 1);
  g.fillRect(x + 6, y + 4, 4, 1);
  g.fillRect(x + 3, y + 6, 2, 1);
  g.fillRect(x + 7, y + 1, 1, 6);
  g.globalAlpha = 0.4 + Math.sin(S.time * 3) * 0.2;
  g.fillStyle = rgb(PAL.accent);
  g.fillRect(x - 1, y - 2, 16, 1);
  g.globalAlpha = 1;
}

function drawBarrow(b) {
  const x = Math.round(b.x), y = Math.round(b.y);
  const half = BARROW.W / 2;
  const asleep = b.state === "defeated";
  const t = S.time;
  const breathe = Math.sin(t * (asleep ? 1.2 : 2.6)) * 1.5;
  const bodyC = rgb(mix(PAL.rock, [120, 100, 60], 0.35));
  const bodyHi = rgb(mix(PAL.rockHi, [160, 140, 90], 0.35));
  const bodyLo = rgb(mix(PAL.rockLo, [60, 50, 30], 0.5));
  const H2 = BARROW.H;

  // slime sheen it drags along
  g.globalAlpha = 0.25;
  g.fillStyle = rgb(PAL.accent);
  g.fillRect(x - half - 10, y + H2 - 2, BARROW.W + 20, 2);
  g.globalAlpha = 1;

  // domed body — stepped, breathing
  g.fillStyle = bodyC;
  g.fillRect(x - half, Math.round(y + 8 + breathe * 0.2), BARROW.W, H2 - 8);
  g.fillRect(x - half + 4, Math.round(y + 4 + breathe * 0.4), BARROW.W - 8, 6);
  g.fillRect(x - half + 10, Math.round(y + breathe * 0.6), BARROW.W - 20, 6);
  g.fillRect(x - half + 18, Math.round(y - 4 + breathe * 0.8), BARROW.W - 36, 5);
  // mantle bands
  g.fillStyle = bodyLo;
  g.fillRect(x - half + 6, Math.round(y + 7 + breathe * 0.4), BARROW.W - 12, 2);
  g.fillRect(x - half + 12, Math.round(y + 1 + breathe * 0.6), BARROW.W - 24, 2);
  // sheen + speckles
  g.fillStyle = bodyHi;
  g.fillRect(x - half + 12, Math.round(y - 2 + breathe * 0.8), 14, 3);
  for (let i = 0; i < 7; i++) {
    g.fillStyle = i % 2 ? bodyHi : bodyLo;
    g.fillRect(
      x - half + 8 + ((rnd01(i * 3) * (BARROW.W - 18)) | 0),
      Math.round(y + 6 + rnd01(i * 7) * 14 + breathe * 0.3), 2, 2);
  }
  // undulating foot skirt
  g.fillStyle = bodyLo;
  for (let i = 0; i < 8; i++) {
    g.fillRect(x - half + i * 8, Math.round(y + H2 - 3 + Math.sin(t * 6 + i) * 1.2), 8, 3);
  }
  // shell ridge plates along the back — still means "don't touch"
  if (!asleep) {
    for (let i = 0; i < 5; i++) {
      const sx2 = x - half + 10 + i * 10;
      const ry2 = Math.round(y + breathe * 0.6);
      g.fillStyle = rgb(PAL.spikeHi);
      g.beginPath();
      g.moveTo(sx2, ry2);
      g.lineTo(sx2 + 3, ry2 - 8 + Math.round(Math.sin(t * 3 + i)));
      g.lineTo(sx2 + 7, ry2);
      g.closePath(); g.fill();
      g.fillStyle = rgb(PAL.spike);
      g.fillRect(sx2 + 2, ry2 - 4, 2, 4);
    }
  }
  // head — a distinct bulged front segment
  const hx = Math.round(b.x + b.dir * (half - 12));
  const glowing = b.state === "remember";
  g.fillStyle = bodyC;
  g.fillRect(hx - 12, y - 2, 24, 16);
  g.fillRect(hx - 9, y - 6, 18, 6);
  if (glowing) {
    g.fillStyle = rgb(PAL.accent);
    g.globalAlpha = 0.6 + Math.sin(t * 10) * 0.3;
    g.fillRect(hx - 10, y - 5, 20, 13);
    g.globalAlpha = 1;
  }
  g.fillStyle = bodyHi;
  g.fillRect(hx - 7, y - 5, 6, 2);
  g.fillStyle = bodyLo;
  g.fillRect(hx - 8 + (b.dir > 0 ? 6 : 0), y + 8, 10, 2);   // mouth line
  // eye stalks — swaying; they droop when it remembers
  const droop = glowing ? 3 : 0;
  const sway = Math.sin(t * 2.2) * 1.5;
  g.fillStyle = bodyC;
  g.fillRect(Math.round(hx - 3 + b.dir * 5 + sway * 0.4), Math.round(y - 15 + droop), 3, 11);
  g.fillRect(Math.round(hx + 3 + b.dir * 5 + sway * 0.7), Math.round(y - 12 + droop), 3, 8);
  g.fillStyle = bodyHi;
  g.fillRect(Math.round(hx - 4 + b.dir * 5 + sway * 0.4), Math.round(y - 18 + droop), 5, 4);
  g.fillRect(Math.round(hx + 2 + b.dir * 5 + sway * 0.7), Math.round(y - 15 + droop), 5, 4);
  g.fillStyle = asleep ? bodyLo : C.eye;
  g.fillRect(Math.round(hx - 3 + b.dir * 5 + sway * 0.4 + (asleep ? 0 : b.dir)), Math.round(y - 17 + droop), 2, asleep ? 1 : 2);
  g.fillRect(Math.round(hx + 3 + b.dir * 5 + sway * 0.7 + (asleep ? 0 : b.dir)), Math.round(y - 14 + droop), 2, asleep ? 1 : 2);
  if (asleep && Math.random() < 0.02)
    burst(hx, y - 16, 5, -18, 1.4, rgb(PAL.accent), 1);
}

function drawChorus(b) {
  const gathered = b.state === "gather";
  const gone = b.state === "defeated";
  // the core
  if (!gone) {
    const pulse = 1 + Math.sin(S.time * (gathered ? 10 : 3)) * 0.15;
    const r = (gathered ? 14 : 8) * pulse;
    const cx = Math.round(b.x), cy = Math.round(b.y);
    g.globalAlpha = gathered ? 0.9 : 0.5;
    g.fillStyle = gathered ? "#aaf0c8" : "#ff82aa";   // mint = strike now, everywhere in this game
    g.fillRect(Math.round(cx - r), Math.round(cy - r / 2), Math.round(r * 2), Math.round(r));
    g.fillRect(Math.round(cx - r / 2), Math.round(cy - r), Math.round(r), Math.round(r * 2));
    g.fillStyle = "#fff0f6";
    g.fillRect(cx - 2, cy - 2, 4, 4);
    g.globalAlpha = 1;
    if (gathered) {
      // open-heart ring — dash through it
      const ring = (S.time * 2) % 1;
      const rr = 16 + ring * 14;
      g.globalAlpha = (1 - ring) * 0.5;
      g.fillStyle = "#aaf0c8";
      g.fillRect(cx - rr, cy - 1, rr * 2, 2);
      g.fillRect(cx - 1, cy - rr, 2, rr * 2);
      g.globalAlpha = 1;
      // chevrons collapsing inward: hit this, now
      const adv = (S.time * 2.5) % 1;
      const dist = 40 - adv * 18;
      g.globalAlpha = 0.9 - adv * 0.5;
      g.fillStyle = "#aaf0c8";
      for (const [dx2, dy2] of [[-1, 0], [1, 0], [0, -1], [0, 1]]) {
        const ax2 = cx + dx2 * dist, ay2 = cy + dy2 * dist;
        g.beginPath();
        g.moveTo(ax2 - dx2 * 6 - dy2 * 5, ay2 - dy2 * 6 - dx2 * 5);
        g.lineTo(ax2, ay2);
        g.lineTo(ax2 - dx2 * 6 + dy2 * 5, ay2 - dy2 * 6 + dx2 * 5);
        g.closePath();
        g.fill();
      }
      g.globalAlpha = 1;
    }
  }
  // the singers
  for (const wsp of b.wisps || []) {
    if (wsp.dead) continue;
    const wx = Math.round(wsp.x + 4), wy = Math.round(wsp.y + 4);
    const warn = wsp.mode === "warn";
    g.fillStyle = warn ? "#fff0f6" : "#ff82aa";
    g.fillRect(wx - 3, wy - 1, 6, 2);
    g.fillRect(wx - 1, wy - 3, 2, 6);
    g.fillStyle = "#fff0f6";
    g.fillRect(wx - 1, wy - 1, 2, 2);
  }
  if (gone && Math.random() < 0.1)
    burst(b.x + (Math.random() - 0.5) * 60, b.y + (Math.random() - 0.5) * 40, 0, -15, 1.2, "#ff82aa", 1);
}

function drawBoss() {
  const b = S.boss;
  if (!b) return;
  if (b.kind === "barrow") return drawBarrow(b);
  if (b.kind === "chorus") return drawChorus(b);
  const x = Math.round(b.x), y = Math.round(b.y);
  const t = S.time;
  const freed = b.state === "defeated";
  const open = b.state === "open";
  const opening = b.state === "rise" || open;
  const horns = b.capFlash > 0;
  const capW = BOSS.CAP_W, capH = BOSS.CAP_H;
  const rockC = rgb(mix(PAL.rock, [90, 100, 80], 0.35));
  const rockHiC = rgb(mix(PAL.rockHi, [110, 120, 90], 0.3));
  const rockLoC = rgb(PAL.rockLo);
  const mint = rgb(PAL.accent);

  if (freed) {
    // The freed flower — pops open at the floral explosion
    const bloom = clamp((S.endT - 0.8) / 0.5, 0, 1);
    const sway = Math.sin(t * 1.2) * 2;
    g.fillStyle = "#6a8468";
    g.fillRect(x - 4, y - 6, 8, 26);
    for (let i = 0; i < 5; i++) {
      const px = x - 30 + i * 15 + sway * (i % 2 ? 0.5 : -0.5);
      const ph = 14 + bloom * 14 + (i % 2) * 4;
      g.fillStyle = i % 2 ? "#7ea27c" : "#8fb08a";
      g.fillRect(Math.round(px), Math.round(y - 8 - ph * bloom), 12, Math.round(ph));
      g.fillStyle = "#c8d8c0";
      g.fillRect(Math.round(px + 2), Math.round(y - 8 - ph * bloom), 8, 2);
    }
    g.fillStyle = "#d8a8b8";
    g.fillRect(x - 16, y - 12 - 10 * bloom, 32, 8 + 8 * bloom);
    g.fillStyle = "#f0d0da";
    g.fillRect(x - 10, y - 10 - 10 * bloom, 20, 4 + 4 * bloom);
    for (let i = 0; i < 4; i++) {
      const sx2 = x - 9 + i * 6;
      g.fillStyle = "#e8e4c8";
      g.fillRect(sx2, Math.round(y - 16 - 14 * bloom + Math.sin(t * 2 + i) * 1.5), 2, 8);
      g.fillStyle = "#fff8dc";
      g.fillRect(sx2 - 1, Math.round(y - 18 - 14 * bloom + Math.sin(t * 2 + i) * 1.5), 4, 3);
    }
    return;
  }

  // Hazards: falling rain + aimed bolts
  for (const sh of b.shots) {
    g.fillStyle = "#f06080";
    g.fillRect(Math.round(sh.x), Math.round(sh.y), 8, 8);
    g.fillStyle = "#ffb0c0";
    g.fillRect(Math.round(sh.x + 2), Math.round(sh.y + 1), 3, 3);
  }
  for (const bo of b.bolts) {
    g.fillStyle = "#f06080";
    g.fillRect(Math.round(bo.x), Math.round(bo.y + 2), 8, 4);
    g.fillRect(Math.round(bo.x + 2), Math.round(bo.y), 4, 8);
    g.fillStyle = "#fff0f4";
    g.fillRect(Math.round(bo.x + 3), Math.round(bo.y + 3), 2, 2);
  }

  // Root arms — three hanging, swaying tangles
  g.fillStyle = "#5a4a36";
  for (let i = 0; i < 3; i++) {
    let ax = x - 18 + i * 18, ay = y + 2;
    for (let s = 0; s < 6; s++) {
      ax += Math.sin(t * 1.6 + i * 2 + s * 0.8) * 2.5;
      g.fillRect(Math.round(ax), Math.round(ay), 3, 6);
      ay += 5;
    }
  }
  // Sweeping arm
  if (b.arm && b.arm.warm <= 0) {
    const a = b.arm;
    g.fillStyle = "#6a5a42";
    for (let s = 0; s < 5; s++) {
      g.fillRect(Math.round(a.x + s * 6 * -a.dir), Math.round(a.y + 6 + Math.sin(t * 8 + s) * 3), 6, 5);
    }
    g.fillStyle = "#8a744e";
    g.fillRect(Math.round(a.x), Math.round(a.y + 4), 8, 8);
  }

  // Throat slash under the cap
  if (opening || b.state === "warn") {
    const glow = open ? 1 : 0.5 + Math.sin(t * 8) * 0.2;
    g.fillStyle = open ? mint : "#f08a50";
    g.globalAlpha = glow;
    g.fillRect(x - 2, y - 8, 4, 14);
    g.fillRect(x - 1, y - 12, 2, 22);
    g.globalAlpha = 1;
  }

  // Cracked cap — a broken crown
  const gap = open ? 10 : opening ? 5 : 0;
  const tilt = open ? 3 : 0;
  // left half
  g.fillStyle = rockC;
  g.fillRect(x - capW / 2 - gap, y - capH - tilt, capW / 2 - 2, capH);
  g.fillStyle = rockHiC;
  g.fillRect(x - capW / 2 - gap, y - capH - tilt, capW / 2 - 2, 4);
  g.fillRect(x - capW / 2 - gap + 4, y - capH - 8 - tilt, 10, 8);   // crown point
  g.fillRect(x - 14 - gap, y - capH - 6 - tilt, 8, 6);
  // right half
  g.fillStyle = rockC;
  g.fillRect(x + 2 + gap, y - capH - tilt, capW / 2 - 2, capH);
  g.fillStyle = rockHiC;
  g.fillRect(x + 2 + gap, y - capH - tilt, capW / 2 - 2, 4);
  g.fillRect(x + capW / 2 - 14 + gap, y - capH - 9 - tilt, 10, 9);  // crown point
  g.fillRect(x + 8 + gap, y - capH - 5 - tilt, 8, 5);
  // crack lines + spore-eyes
  g.fillStyle = rockLoC;
  g.fillRect(x - 24 - gap, y - capH + 4, 2, 14);
  g.fillRect(x + 16 + gap, y - capH + 6, 2, 12);
  g.fillRect(x - 8 - gap, y - 14, 2, 8);
  const blinkE = Math.sin(t * 2.2) > -0.85;
  g.fillStyle = blinkE ? mint : rockLoC;
  g.fillRect(x - 23 - gap, y - capH + 8, 3, 3);
  g.fillRect(x + 17 + gap, y - capH + 10, 3, 3);
  g.fillRect(x - 7 - gap, y - 12, 3, 3);
  // horns when punished
  if (horns) {
    g.fillStyle = rgb(PAL.spikeHi);
    for (let i = 0; i < 5; i++) {
      const hx = x - capW / 2 + 6 + i * 16;
      g.beginPath();
      g.moveTo(hx, y - capH - tilt);
      g.lineTo(hx + 3, y - capH - 10 - tilt);
      g.lineTo(hx + 6, y - capH - tilt);
      g.closePath(); g.fill();
    }
  }
  // mint landing glow: builds during rise, blazes while open
  if (open) {
    g.globalAlpha = 0.3 + Math.sin(t * 12) * 0.12;
    g.fillStyle = mint;
    g.fillRect(x - capW / 2 + 4, y - capH - 14, capW - 8, 12);
    g.globalAlpha = 1;
  } else if (b.state === "rise") {
    g.globalAlpha = 0.08 + (b.t / BOSS.RISE) * 0.16;
    g.fillStyle = mint;
    g.fillRect(x - capW / 2 + 4, y - capH - 12, capW - 8, 10);
    g.globalAlpha = 1;
  }
}

function drawTrail() {
  for (const t of S.trail) {
    g.globalAlpha = (t.life / t.max) * 0.4;
    g.fillStyle = C.bloomHi;
    g.fillRect(Math.round(t.x) - 1, Math.round(t.y) - 2, 12, 5);
    g.fillRect(Math.round(t.x), Math.round(t.y) + 1, 10, 9);
  }
  g.globalAlpha = 1;
}

function drawPlayer() {
  const p = S.player;
  let map;
  if (p.anim === "run") map = SPRITES["run" + ((p.frame & 3) + 1)];
  else if (p.anim === "jump" || p.anim === "dash") map = SPRITES.jump;
  else if (p.anim === "fall" || p.anim === "glide" || p.anim === "slide") map = SPRITES.fall;
  else map = (p.frame === 3) ? SPRITES.idle2 : SPRITES.idle1;

  g.save();
  g.translate(Math.round(p.x + 5), Math.round(p.y + 5));
  const sx = (p.anim === "dash" ? 1.25 : 1) * (2 - p.squish);
  const sy = (p.anim === "dash" ? 0.8 : 1) * p.squish;
  g.scale(sx, sy);
  if (p.dashing || p.anim === "dash") {
    g.fillStyle = C.bloomHi;
    g.globalAlpha = 0.35;
    g.fillRect(-8, -7, 16, 14);
    g.globalAlpha = 1;
  }
  drawMap(g, map, -6, -7, p.facing < 0);
  if (p.anim === "glide") {
    // The cap inflates into a parasol
    g.fillStyle = C.capLo;
    g.fillRect(-8, -7, 16, 2);
    g.fillStyle = C.cap;
    g.fillRect(-8, -9, 16, 2);
    g.fillRect(-7, -11, 14, 2);
    g.fillRect(-5, -12, 10, 1);
    g.fillStyle = C.capHi;
    g.fillRect(-4, -11, 5, 2);
    g.fillRect(-7, -9, 2, 1);
    g.fillStyle = C.capSpot;
    g.fillRect(3, -10, 2, 2);
  }
  if (p.anim === "slide") {
    // Mycelial threads gripping the wall
    g.fillStyle = rgb(PAL.mossHi);
    const wx = p.wallDir > 0 ? 5 : -7;
    g.fillRect(wx, -3, 2, 1);
    g.fillRect(wx, 1, 2, 1);
    g.fillRect(wx, 5, 2, 1);
  }
  if (p.anim === "idle" && (p.frame & 1) === 0) {
    g.fillStyle = "#c4a878";
    g.fillRect(6, -9, 1, 1);
  }
  g.restore();
}

function drawParticles() {
  for (const pt of S.particles) {
    g.globalAlpha = Math.max(0, pt.life / pt.max);
    g.fillStyle = pt.col;
    g.fillRect(pt.x | 0, pt.y | 0, pt.s, pt.s);
  }
  g.globalAlpha = 1;
}

// ── Lighting (posterized, half-res for pixel chunk) ────────────────────────
const LSC = 2;
const darkCv = mkCv(W / LSC, H / LSC);
const dctx = darkCv.getContext("2d");
const glowCv = mkCv(W / LSC, H / LSC);
const gctx = glowCv.getContext("2d");

function collectLights() {
  const out = [];
  const p = S.player;
  if (p && S.mode !== "dead")
    out.push({ x: p.x + 5, y: p.y + 5, r: 56 + Math.sin(S.time * 7) * 3, a: 0.95, col: "244,220,174", ga: 0.06 });
  for (const b of S.blooms)
    out.push({ x: b.x + b.w / 2, y: b.y + 2, r: 30, a: 0.7, col: "240,168,136", ga: 0.1 });
  for (const cp of S.checkpoints) {
    const pulse = 0.75 + Math.sin(S.time * 5) * 0.25;
    out.push({ x: cp.x + 8, y: cp.y + 4, r: cp.active ? 40 : 24, a: (cp.active ? 0.9 : 0.55) * pulse, col: rgbs(PAL.accent), ga: cp.active ? 0.14 : 0.07 });
  }
  for (const ber of S.berryList)
    if (!ber.taken) out.push({ x: ber.x + 4, y: ber.y + 4, r: 16, a: 0.5, col: "240,128,152", ga: 0.08 });
  if (S.goal) {
    const open = S.mode === "clear" ? S.goalOpen : 0;
    out.push({ x: S.goal.x + 8, y: S.goal.y + 9, r: 36 + open * 40, a: 0.75 + open * 0.25, col: "255,208,232", ga: 0.12 + open * 0.2 });
  }
  for (const L of STATIC_LIGHTS)
    out.push({ x: L.x, y: L.y, r: L.r, a: L.a + Math.sin(S.time * 3 + L.ph) * 0.12, col: L.col, ga: L.ga });
  for (const e of S.enemies) {
    if (e.t === "puff") out.push({ x: e.x + 5, y: e.y + 5, r: 14, a: 0.35, col: "232,224,208", ga: 0.05 });
    else if (e.t === "wisp") out.push({ x: e.x + 4, y: e.y + 4, r: 20, a: 0.55, col: "255,130,170", ga: 0.1 });
    else out.push({ x: e.x + 6, y: e.y + 4, r: 12, a: 0.3, col: "224,232,180", ga: 0.04 });
  }
  for (const n of S.npcs)
    out.push({ x: n.x + 6, y: n.y + 4, r: 28, a: 0.65, col: n.sprite === "echo" ? "184,216,248" : n.sprite === "grel" ? "240,240,246" : "240,200,120", ga: 0.07 });
  if (S.memoryObj && !S.score.secretMemory)
    out.push({ x: S.memoryObj.x + 7, y: S.memoryObj.y + 8, r: 34, a: 0.8, col: rgbs(PAL.accent), ga: 0.1 });
  for (const d of levelDoors())
    out.push({ x: d.x + d.w / 2, y: d.y + d.h / 2, r: 26, a: 0.5, col: rgbs(PAL.accent), ga: 0.06 });
  if (S.boss) {
    const b = S.boss;
    if (b.kind === "barrow") {
      out.push({ x: b.x, y: b.y + 8, r: 44, a: 0.4, col: "200,220,140", ga: 0.05 });
      if (b.state === "remember")
        out.push({ x: b.x + b.dir * 20, y: b.y, r: 30, a: 0.85, col: rgbs(PAL.accent), ga: 0.14 });
    } else if (b.kind === "chorus") {
      const gath = b.state === "gather";
      out.push({ x: b.x, y: b.y, r: gath ? 52 : 30, a: gath ? 0.9 : 0.5, col: gath ? "170,240,200" : "255,164,205", ga: gath ? 0.16 : 0.08 });
      for (const wsp of b.wisps || [])
        if (!wsp.dead) out.push({ x: wsp.x + 4, y: wsp.y + 4, r: 14, a: 0.45, col: "255,164,205", ga: 0.05 });
    } else if (b.state === "defeated") {
      out.push({ x: b.x, y: b.y - 16, r: 70, a: 0.9, col: rgbs(PAL.accent), ga: 0.14 });
    } else {
      out.push({ x: b.x, y: b.y - 14, r: 46, a: 0.5, col: b.state === "open" ? rgbs(PAL.accent) : b.state === "warn" ? "240,138,80" : "170,240,200", ga: b.state === "open" ? 0.16 : 0.06 });
    }
  }
  for (const e of S.enemies)
    if (e.t === "mine") out.push({ x: e.x + 5, y: e.y + 5, r: 14, a: e.armT > 0 ? 0.8 : 0.35, col: "255,130,150", ga: 0.06 });
  for (const m of S.movers)
    out.push({ x: m.x + m.w / 2, y: m.y + 3, r: 20, a: 0.4, col: rgbs(PAL.accent), ga: 0.04 });
  return out;
}

function ringCircle(cc, sx, sy, r, alphaBase, colPrefix) {
  const steps = [1, 0.62, 0.34];
  for (const st of steps) {
    cc.fillStyle = colPrefix + (alphaBase * 0.4) + ")";
    cc.beginPath();
    cc.arc(sx, sy, r * st, 0, Math.PI * 2);
    cc.fill();
  }
}

function drawLighting(ox, oy) {
  const lights = collectLights();
  const lw = W / LSC, lh = H / LSC;

  dctx.globalCompositeOperation = "source-over";
  dctx.clearRect(0, 0, lw, lh);
  dctx.fillStyle = dMod("dim") ? "rgba(2,4,9,0.78)" : "rgba(3,6,13,0.52)";
  dctx.fillRect(0, 0, lw, lh);
  dctx.globalCompositeOperation = "destination-out";

  gctx.globalCompositeOperation = "source-over";
  gctx.clearRect(0, 0, lw, lh);

  const dimR = dMod("dim") ? 0.6 : 1;
  for (const L of lights) {
    const sx = (L.x - S.camX + ox) / LSC, sy = (L.y - S.camY + oy) / LSC;
    const r = L.r * dimR / LSC;
    if (sx < -r || sx > lw + r || sy < -r || sy > lh + r) continue;
    ringCircle(dctx, sx, sy, r, L.a, "rgba(255,255,255,");
    if (L.ga) ringCircle(gctx, sx, sy, r, L.ga * 2.2, "rgba(" + L.col + ",");
  }

  g.imageSmoothingEnabled = false;
  g.drawImage(darkCv, 0, 0, lw, lh, 0, 0, W, H);
  g.globalCompositeOperation = "lighter";
  g.drawImage(glowCv, 0, 0, lw, lh, 0, 0, W, H);
  g.globalCompositeOperation = "source-over";
}

function drawForeground() {
  drawSpores("near");
  const dark = mix(PAL.skyT, [0, 0, 0], 0.4);
  g.fillStyle = rgb(dark);
  // Silhouette grass along the bottom edge
  const per = 46, off = wrap(S.camX * 1.35, per);
  const base = Math.floor(S.camX * 1.35 / per);
  for (let k = -1; k <= Math.ceil(W / per) + 1; k++) {
    const x = k * per - off, i = base + k;
    const n = 2 + (rnd01(i * 9) * 3 | 0);
    for (let j = 0; j < n; j++) {
      const bx = x + rnd01(i * 31 + j) * 30;
      const hgt = 5 + rnd01(i * 13 + j * 5) * 9;
      const sway = Math.sin(S.time * 1.6 + i + j) * 1.2;
      g.beginPath();
      g.moveTo(bx - 2, H + 1);
      g.lineTo(bx + sway, H - hgt);
      g.lineTo(bx + 2, H + 1);
      g.closePath(); g.fill();
    }
  }
  // Hanging tendrils along the top edge
  const per2 = 90, off2 = wrap(S.camX * 1.2, per2);
  const base2 = Math.floor(S.camX * 1.2 / per2);
  for (let k = -1; k <= Math.ceil(W / per2) + 1; k++) {
    const x = k * per2 - off2, i = base2 + k;
    if (rnd01(i * 5) > 0.6) continue;
    const len = 8 + rnd01(i * 3) * 14;
    const sway = Math.sin(S.time * 1.3 + i) * 1.5;
    g.fillRect(Math.round(x + sway), -1, 2, Math.round(len));
    g.fillRect(Math.round(x + sway * 1.4), Math.round(len - 3), 2, 3);
  }
}

function drawHUD() {
  g.fillStyle = "rgba(8,12,18,0.55)";
  g.fillRect(4, 4, 46, 12);
  g.fillStyle = C.berry;
  g.fillRect(7, 7, 5, 5);
  g.fillStyle = C.berryHi;
  g.fillRect(8, 8, 2, 2);
  g.fillStyle = C.ui;
  g.font = "8px monospace";
  g.textAlign = "left";
  g.fillText(S.berries + "/" + S.berriesTotal, 16, 13);

  // Sparks (lives)
  g.fillStyle = "rgba(8,12,18,0.55)";
  g.fillRect(4, 18, 30, 12);
  g.fillStyle = S.lives > 1 ? C.cap : C.berry;
  g.fillRect(7, 21, 7, 3);
  g.fillStyle = S.lives > 1 ? C.capHi : C.berryHi;
  g.fillRect(8, 21, 3, 1);
  g.fillStyle = C.bodySh;
  g.fillRect(9, 24, 3, 3);
  g.fillStyle = S.lives > 1 || (DEV && S.devInf) ? C.ui : C.berryHi;
  g.font = "8px monospace";
  g.fillText(DEV && S.devInf ? "x∞" : "x" + S.lives, 17, 27);

  const p = S.player;
  if (!p) return;
  g.fillStyle = "rgba(8,12,18,0.55)";
  g.fillRect(W - 38, 4, 34, 19);
  g.fillStyle = (p.canDash || p.grounded) ? C.bloomHi : C.uiDim;
  g.fillRect(W - 34, 7, 8, 5);
  g.fillStyle = (p.canDash || p.grounded) ? C.bloomStem : "#445";
  g.fillRect(W - 31, 10, 2, 3);
  g.fillStyle = C.uiDim;
  g.font = "7px monospace";
  g.fillText(p.canDash || p.dashing ? "DASH" : "...", W - 24, 13);
  // Spore pips — blooms left this airtime
  for (let i = 0; i < MAX_SPORES; i++) {
    g.fillStyle = i < p.spores ? rgb(PAL.accent) : "#3a4250";
    g.fillRect(W - 34 + i * 8, 16, 5, 4);
  }

  // Boss thorn pips
  if (S.boss && S.boss.state !== "defeated") {
    g.fillStyle = "rgba(8,12,18,0.55)";
    g.fillRect(W / 2 - 22, 4, 44, 12);
    for (let i = 0; i < 3; i++) {
      const on = i < S.boss.pips;
      g.fillStyle = on ? "#c05468" : "#3a2a34";
      g.fillRect(W / 2 - 15 + i * 12, 7, 7, 6);
      g.fillStyle = on ? "#f08098" : "#2a1f26";
      g.fillRect(W / 2 - 13 + i * 12, 5, 3, 3);
    }
  }
}

function drawEndOverlay() {
  if (S.memoryBeat > 0) {
    const a = clamp(Math.min(S.memoryBeat, 5 - S.memoryBeat) * 1.5, 0, 1);
    g.globalAlpha = a;
    g.fillStyle = "rgba(4,7,12,0.85)";
    g.fillRect(W / 2 - 130, 48, 260, 40);
    g.fillStyle = rgb(PAL.accent);
    g.fillRect(W / 2 - 130, 48, 260, 1);
    g.textAlign = "center";
    g.fillStyle = C.title;
    g.font = "bold 9px monospace";
    g.fillText("MEMORY FOUND — THE FIRST MAP", W / 2, 62);
    g.fillStyle = C.ui;
    g.font = "8px monospace";
    g.fillText("“There was always one more place", W / 2, 74);
    g.fillText("than the maps could hold.”", W / 2, 83);
    g.globalAlpha = 1;
  }

  // The light that fills the screen — from the floral explosion onward
  if ((S.mode === "freed" || S.mode === "reunion" || S.mode === "credits") && S.glow > 0) {
    const pulse = S.glow >= 1 ? 1 : S.glow + Math.sin(S.time * 1.5) * 0.03;
    g.globalAlpha = clamp(pulse * 0.85, 0, 0.92);
    g.fillStyle = "rgb(228,252,238)";
    g.fillRect(0, 0, W, H);
    g.globalAlpha = 1;
  }

  if (S.mode === "freed" || S.mode === "reunion") {
    g.textAlign = "center";
    g.fillStyle = S.glow > 0.45 ? "#3a4a40" : C.uiDim;
    g.font = "7px monospace";
    g.fillText("Jump to skip", W / 2, H - 6);
  }

  if (S.mode === "freed") {
    const ink = S.glow > 0.45;
    if (S.endBeat >= 1) {
      g.textAlign = "center";
      g.fillStyle = ink ? "#3a4a40" : C.goalOpen;
      g.font = "8px monospace";
      g.fillText("“You were never meant to wake her by force.”", W / 2, 44);
    }
    if (S.endBeat >= 2) {
      g.fillStyle = ink ? "#2a3a30" : C.ui;
      g.font = "8px monospace";
      g.fillText("“You only had to reach her.”", W / 2, 58);
    }
  }

  if (S.mode === "credits") {
    const lines = [
      ["SPORELING DASH", "bold 14px monospace", C.title],
      ["A game about going higher", "8px monospace", C.uiDim],
      ["", "", ""],
      ["Created by thoughtcrimegpt", "9px monospace", C.ui],
      ["Code, art, and sound by thoughtcrimegpt", "8px monospace", C.ui],
      ["", "", ""],
      ["Thanks to the sporelings", "8px monospace", C.uiDim],
      ["who kept climbing", "8px monospace", C.uiDim],
    ];
    const scroll = H + 20 - S.creditsT * 16;
    g.textAlign = "center";
    for (let i = 0; i < lines.length; i++) {
      if (!lines[i][0]) continue;
      const ly = scroll + i * 18;
      if (ly < -10 || ly > H + 10) continue;
      g.fillStyle = lines[i][2];
      g.font = lines[i][1];
      g.fillText(lines[i][0], W / 2, ly);
    }
    g.fillStyle = C.uiDim;
    g.font = "7px monospace";
    g.fillText("Jump to skip", W / 2, H - 6);
  }
}

function drawBanner() {
  if (S.bannerT > 0) {
    const L = LEVELS[S.levelIdx];
    const dur = L.unlockText ? 3.6 : 2.4;
    const a = clamp(Math.min(S.bannerT, dur - S.bannerT) * 2, 0, 1);
    g.globalAlpha = a;
    g.fillStyle = "rgba(8,12,18,0.6)";
    g.fillRect(W / 2 - 70, 24, 140, 18);
    g.fillStyle = C.title;
    g.font = "bold 10px monospace";
    g.textAlign = "center";
    g.fillText(L.name, W / 2, 36);
    if (L.unlockText) {
      g.fillStyle = "rgba(8,12,18,0.7)";
      g.fillRect(W / 2 - 116, 44, 232, 12);
      g.fillStyle = rgb(PAL.accent);
      g.font = "7px monospace";
      g.fillText(L.unlockText, W / 2, 52);
    }
    g.globalAlpha = 1;
  }
  if (S.hint && S.mode === "play") {
    const a = clamp(Math.min(S.hint.t, 4 - S.hint.t) * 2.5, 0, 1);
    g.globalAlpha = a;
    g.fillStyle = "rgba(8,12,18,0.75)";
    g.fillRect(W / 2 - 110, 24, 220, 13);
    g.fillStyle = C.goalOpen;
    g.font = "7px monospace";
    g.textAlign = "center";
    g.fillText(S.hint.text, W / 2, 33);
    g.globalAlpha = 1;
  }
}

  g.fillRect(x - 6 * s, y - 14 * s, 12 * s, 7 * s);
  g.fillStyle = C.capHi;
  g.fillRect(x - 4 * s, y - 13 * s, 3 * s, 2 * s);
}

// Live leaderboard panel — alternates any% and full completion.
// Compact on the title, full-height with top 15 on the win screen.
function drawLbPanel(tall) {
  LB_HITS = [];
  LB_PANEL = null;
  if (!lbOn()) return;
  const showFull = ((S.time / 6) | 0) % 2 === 1;
  const list = showFull ? LB_CACHE.full : LB_CACHE.any;
  const px = tall ? W - 144 : W - 122;
  const pw = tall ? 140 : 118;
  const ph = tall ? H - 8 : 72;
  const rows = tall ? 13 : 5;
  const nameLen = tall ? 16 : 11;
  LB_PANEL = { x: px, y: 4, w: pw, h: ph };
  g.textAlign = "left";
  g.fillStyle = "rgba(8,12,18,0.82)";
  g.fillRect(px, 4, pw, ph);
  g.fillStyle = rgb(PALS[0].accent);
  g.fillRect(px, 4, pw, 1);
  g.fillStyle = C.title;
  g.font = "bold 7px monospace";
  g.fillText(showFull ? "FULL BLOOM 100%" : "FASTEST — ANY%", px + 5, 14);
  g.font = "7px monospace";
  if (!list || !list.length) {
    g.fillStyle = C.uiDim;
    g.fillText(list ? "no runs yet" : "...", px + 5, 26);
  } else {
    for (let i = 0; i < Math.min(rows, list.length); i++) {
      const ry = 26 + i * (tall ? 10 : 9);
      const nm = String(list[i].name);
      const label = (i + 1) + " " + nm.slice(0, nameLen);
      g.fillStyle = i === 0 ? rgb(PALS[0].accent) : C.ui;
      g.fillText(label, px + 5, ry);
      if (nm[0] === "@") {
        // underlined = click to open their X profile
        g.fillRect(px + 5, ry + 1, Math.min(label.length * 4.2, pw - 42) | 0, 1);
        LB_HITS.push({ x: px + 5, y: ry, w: pw - 10, name: nm });
      }
      g.textAlign = "right";
      g.fillText(fmtMs(list[i].time_ms), px + pw - 5, ry);
      g.textAlign = "left";
    }
  }
  g.fillStyle = C.goalOpen;
  g.font = "7px monospace";
  g.fillText("▸ full board", px + 5, 4 + ph - 5);
  g.textAlign = "center";
}

// The full leaderboard screen — complete names, tab between the two boards
function drawBoard() {
  g.drawImage(skyCv, 0, 0);
  drawSpores("far");
  LB_HITS = [];
  BOARD_TABS = [];
  LB_PANEL = null;

  g.fillStyle = "rgba(6,9,14,0.92)";
  g.fillRect(8, 6, W - 16, H - 12);
  g.fillStyle = rgb(PALS[0].accent);
  g.fillRect(8, 6, W - 16, 1);

  g.textAlign = "center";
  g.fillStyle = C.title;
  g.font = "bold 10px monospace";
  g.fillText("LEADERBOARD", W / 2, 20);

  // tabs
  RACE_HITS = [];
  const tabs = [["any", "ANY%", 48], ["full", "FULL 100%", 80], ["daily", "TODAY'S SPORE", 106]];
  let tx = W / 2 - 125;
  for (const [tab, label, tw] of tabs) {
    const active = S.boardTab === tab;
    g.fillStyle = active ? rgb(PALS[0].accent) : "rgba(30,38,50,0.9)";
    g.fillRect(tx, 27, tw, 13);
    g.fillStyle = active ? "#10151d" : C.uiDim;
    g.font = "bold 7px monospace";
    g.fillText(label, tx + tw / 2, 36);
    BOARD_TABS.push({ x: tx, y: 27, w: tw, h: 13, tab });
    tx += tw + 8;
  }

  const list = LB_CACHE[S.boardTab];
  g.textAlign = "left";
  g.font = "8px monospace";
  if (!list || !list.length) {
    g.fillStyle = C.uiDim;
    g.fillText(list ? "no runs yet — be the first" : "loading...", 18, 60);
  } else {
    for (let i = 0; i < Math.min(14, list.length); i++) {
      const ry = 54 + i * 8.4;
      const nm = String(list[i].name);
      g.fillStyle = i === 0 ? rgb(PALS[0].accent) : C.ui;
      g.fillText((i + 1 < 10 ? " " : "") + (i + 1), 16, ry);
      if (list[i].has_ghost && list[i].id) {
        g.fillStyle = "#aaf0c8";
        g.fillText("▸", 27, ry);
        RACE_HITS.push({ x: 14, y: ry, w: 18, id: list[i].id, name: nm });
      }
      g.fillStyle = i === 0 ? rgb(PALS[0].accent) : C.ui;
      g.fillText(nm, 36, ry);
      if (nm[0] === "@") {
        g.fillRect(36, ry + 1, Math.min(nm.length * 4.8, 170) | 0, 1);
        LB_HITS.push({ x: 36, y: ry, w: 178, name: nm });
      }
      g.textAlign = "right";
      g.fillText(fmtMs(list[i].time_ms), W - 18, ry);
      g.textAlign = "left";
    }
  }

  g.textAlign = "center";
  g.fillStyle = C.uiDim;
  g.font = "7px monospace";
  g.fillText("◄ ► switch   ·   ▸ race that echo   ·   " + jumpBtnName() + " — back", W / 2, H - 11);
}

function drawWin() {
  g.drawImage(skyCv, 0, 0);
  g.drawImage(farCv, 0, 0);
  drawSpores("far");
  drawSpores("near");
  drawLbPanel(true);

  // Everything else lives in the left column now
  g.textAlign = "left";
  g.fillStyle = C.title;
  g.font = "bold 14px monospace";
  g.fillText("FULL BLOOM", 10, 26);

  g.fillStyle = C.goalOpen;
  g.font = "7px monospace";
  g.fillText("“...you came. Little spark, you came.”", 10, 42);
  g.fillText("“The ones you freed are singing", 10, 52);
  g.fillText("  again. Listen.”", 10, 61);
  g.fillStyle = C.uiDim;
  g.fillText("— THE MOTHER BLOOM", 10, 72);

  g.fillStyle = C.ui;
  g.font = "8px monospace";
  const m = Math.floor(S.score.time / 60), s = Math.floor(S.score.time % 60);
  const met = Object.keys(S.score.metNpcs).length;
  g.fillText("Berries   " + S.score.berries + " / " + S.score.total, 10, 90);
  g.fillText("Freed     " + S.score.freed, 10, 101);
  g.fillText("Voices    " + met + " / " + TOTAL_NPCS, 10, 112);
  g.fillText("Memory    " + (S.score.secretMemory ? "1" : "0") + " / 1", 10, 123);
  g.fillText("Deaths    " + S.score.deaths, 10, 134);
  g.fillText("Time      " + m + ":" + (s < 10 ? "0" : "") + s, 10, 145);

  if (S.lbConfirm) {
    // Are you sure?
    g.fillStyle = "rgba(4,7,12,0.94)";
    g.fillRect(4, 148, 168, 28);
    g.fillStyle = rgb(PALS[0].accent);
    g.fillRect(4, 148, 168, 1);
    g.fillStyle = C.ui;
    g.font = "7px monospace";
    g.fillText("Submit to the public leaderboard?", 10, 159);
    g.fillStyle = C.title;
    g.fillText(dashBtnName() + " — yes    " + jumpBtnName() + " — no", 10, 170);
  } else {
    if (lbOn()) {
      const blink = S.lbMsg || (Math.sin(S.time * 5) * 0.5 + 0.5) > 0.25;
      if (blink) {
        g.fillStyle = S.lbMsg ? rgb(PALS[0].accent) : C.goalOpen;
        g.font = "7px monospace";
        g.fillText(S.lbMsg || "Press " + dashBtnName() + " — submit your time", 10, 160);
      }
    } else if (met < TOTAL_NPCS) {
      g.fillStyle = C.uiDim;
      g.font = "7px monospace";
      g.fillText("Someone never got to say hello.", 10, 160);
    }

    if ((Math.sin(S.time * 4) * 0.5 + 0.5) > 0.28) {
      g.fillStyle = C.uiDim;
      g.font = "7px monospace";
      g.fillText(jumpBtnName() + " — title screen", 10, 172);
    }
  }
  g.textAlign = "center";
}

// ── Loop ───────────────────────────────────────────────────────────────────
let last = performance.now() / 1000;
let acc = 0;

function frame(nowMs) {
  const now = nowMs / 1000;
  let dt = now - last;
  last = now;
  if (dt > MAX_FRAME_DT) dt = MAX_FRAME_DT;
  acc += dt;
  while (acc >= FIXED_DT) {
    tick(FIXED_DT);
    acc -= FIXED_DT;
  }
  draw();
  requestAnimationFrame(frame);
}

setupTouch();
lbRefresh();
// a challenge link arms the challenger's echo
try {
  const raceId = new URLSearchParams(location.search).get("race");
  if (raceId && lbOn())
    fetchGhost(raceId).then(fr => { if (fr) S.pendingGhost = { frames: fr, name: "the challenger" }; });
} catch (e) {}
loadLevel(0);
S.mode = "title";
requestAnimationFrame(frame);
})();
