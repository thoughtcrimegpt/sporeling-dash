        x: b.x + b.dir * (half - 10), y: b.y + 2,
        vx: Math.sign(dx || 1) * (50 + Math.abs(dx) * 0.4),
        vy: -220 - Math.random() * 60, grav: true, w: 8, h: 8,
        ghost: true, floor: 13 * TILE,   // passes through the shelves — no hiding
      });
      blip(260, 150, 0.12, "square", 0.1);
    }
    if (b.spitN >= BARROW.GLOBS[phase - 1] && b.spitT <= -0.5) { b.state = "burrow"; b.t = 0; b.mx = b.x; }
  }

  // The grounded shell still means "don't touch"
  if ((b.state === "intro" || b.state === "landed" || b.state === "dazed") && p.invuln <= 0 &&
      overlap(p, { x: b.x - half, y: b.y, w: BARROW.W, h: BARROW.H }))
    hurtPlayer(b.x, "the Barrow's hide");
}

// ── Boss: The Lonely Chorus — dash through the gathered core ───────────────
function updateChorus(dt) {
  const b = S.boss, p = S.player;
  b.t += dt;
  const phase = 4 - b.pips;
  if (!b.wisps.length) {
    for (let i = 0; i < CHORUS.N_WISPS; i++)
      b.wisps.push({ ang: i / CHORUS.N_WISPS * Math.PI * 2, x: b.x, y: b.y, w: 8, h: 8, mode: "orbit", t: 0, dead: false });
  }

  for (const wsp of b.wisps) {
    if (wsp.dead) continue;
    wsp.t += dt;
    if (wsp.mode === "orbit") {
      wsp.ang += dt * 1.4;
      wsp.x = b.x + Math.cos(wsp.ang) * CHORUS.ORBIT_R - 4;
      wsp.y = b.y + Math.sin(wsp.ang) * CHORUS.ORBIT_R * 0.7 - 4;
    } else if (wsp.mode === "warn") {
      if (Math.random() < 0.6) burst(wsp.x + 4, wsp.y + 4, 0, 0, 0.2, "#fff0f6", 1);
      if (wsp.t > CHORUS.DIVE_WARN * (b.grace ? 1.45 : 1)) {
        wsp.mode = "dive"; wsp.t = 0;
        const tx = p.x + 1, ty = p.y + 1;
        const d = Math.hypot(tx - wsp.x, ty - wsp.y) || 1;
        wsp.vx = (tx - wsp.x) / d * CHORUS.DIVE_V;
        wsp.vy = (ty - wsp.y) / d * CHORUS.DIVE_V;
        blip(600, 300, 0.15, "sawtooth", 0.1);
      }
    } else if (wsp.mode === "dive") {
      wsp.x += wsp.vx * dt;
      wsp.y += wsp.vy * dt;
      if (Math.random() < 0.5) burst(wsp.x + 4, wsp.y + 4, 0, 0, 0.25, "#ff82aa", 1);
      if (wsp.t > CHORUS.DIVE_TIME || wsp.x < 16 || wsp.x > WORLD_W - 24 || wsp.y > 14 * TILE - 10 || wsp.y < 2 * TILE) {
        wsp.mode = "return"; wsp.t = 0;
      }
    } else if (wsp.mode === "return") {
      wsp.x += (b.x + Math.cos(wsp.ang) * CHORUS.ORBIT_R - 4 - wsp.x) * Math.min(1, dt * 3);
      wsp.y += (b.y + Math.sin(wsp.ang) * CHORUS.ORBIT_R * 0.7 - 4 - wsp.y) * Math.min(1, dt * 3);
      if (wsp.t > 1) wsp.mode = "orbit";
    }
    if (b.state !== "gather" && overlap(p, wsp)) {
      if (p.dashing) {
        wsp.dead = true;
        SFX.pop();
        for (let i = 0; i < 6; i++) {
          const a = Math.random() * Math.PI * 2;
          burst(wsp.x + 4, wsp.y + 4, Math.cos(a) * 70, Math.sin(a) * 70, 0.4, "#ff82aa", 2);
        }
      } else if (p.invuln <= 0) {
        hurtPlayer(wsp.x + 4, "a diving wisp");
      }
    }
  }

  if (b.state === "intro") {
    if (b.t > 2) {
      b.state = "orbit"; b.t = 0; SFX.bossWarn();
    }
  } else if (b.state === "orbit") {
    if (b.t > CHORUS.ORBIT) {
      b.t = 0; b.state = "dives";
      const alive = b.wisps.filter(w2 => !w2.dead && w2.mode === "orbit");
      for (let i = 0; i < Math.min(CHORUS.DIVERS[phase - 1], alive.length); i++) {
        alive[i].mode = "warn"; alive[i].t = 0;
      }
    }
  } else if (b.state === "dives") {
    if (b.t > 2.2) {
      b.state = "gather"; b.t = 0;
      blip(880, 1320, 0.35, "sine", 0.15);
      for (const wsp of b.wisps) { wsp.dead = false; wsp.mode = "gathered"; wsp.t = 0; }
      // teach at the exact actionable moment, every window until the first hit
      if (b.pips === 3) queueNotice("The heart is glowing. Dash straight through it.", 2.2, NOTICE_PRIORITY.BOSS);
    }
  } else if (b.state === "gather") {
    for (const wsp of b.wisps) {
      wsp.x += (b.x - 4 - wsp.x) * Math.min(1, dt * 6);
      wsp.y += (b.y - 4 - wsp.y) * Math.min(1, dt * 6);
    }
    const core = { x: b.x - 14, y: b.y - 14, w: 28, h: 28 };
    if (overlap(p, core)) {
      if (p.dashing) {
        b.pips--;
        b.grace = false;
        p.invuln = 1.5; p.spores = MAX_SPORES; p.chainN = 0; p.canDash = true;
        S.shakeT = 0.2; S.shakeMag = 2.5;
        SFX.bossHit();
        for (let i = 0; i < 20; i++) {
          const a = Math.random() * Math.PI * 2;
          burst(b.x, b.y, Math.cos(a) * 100, Math.sin(a) * 100, 0.6,
            i & 1 ? rgb(PAL.accent) : "#fff0f6", 2);
        }
        if (b.pips <= 0) { bossVanquished(b); return; }
        b.state = "orbit"; b.t = 0;
        for (const wsp of b.wisps) { wsp.mode = "orbit"; wsp.t = 0; }
      } else if (p.invuln <= 0) {
        hurtPlayer(b.x, "the gathered chorus");
      }
    }
    if (b.t > CHORUS.GATHER[phase - 1] * (b.grace ? 1.45 : 1)) {
      b.state = "orbit"; b.t = 0;
      for (const wsp of b.wisps) { wsp.mode = "orbit"; wsp.t = 0; }
    }
  }
  if (b.state !== "gather" && b.state !== "defeated" && p.invuln <= 0 && !p.dashing &&
      overlap(p, { x: b.x - 10, y: b.y - 10, w: 20, h: 20 })) {
    hurtPlayer(b.x, "the chorus heart");
  }
}

// ── Boss: The Unbloomed ────────────────────────────────────────────────────
function bossPhase(b) { return 4 - b.pips; } // 1, 2, 3

function nextRootTier(b, phase) {
  const order = ROOT_TIER_ORDER[phase];
  if (!order) return null;
  if (b.rootPhase !== phase) {
    b.rootPhase = phase;
    b.rootPhaseN = 0;
  }
  let index = b.rootPhaseN % order.length;
  if (order[index] === b.lastRootTier) index = (index + 1) % order.length;
  const tier = order[index];
  b.rootPhaseN++;
  b.sweepN = (b.sweepN || 0) + 1;
  b.lastRootTier = tier;
  return tier;
}

function bossStartAttack(b) {
  const phase = bossPhase(b);
  b.boltN = 0;
  b.boltT = 0.3;
  // The root sweep only joins from phase 2 — phase 1 teaches the landing
  if (phase >= 2) {
    const tier = nextRootTier(b, phase);
    const band = ROOT_TIERS[tier];
    const fromLeft = (b.sweepSide = !b.sweepSide);
    b.arm = {
      x: fromLeft ? ROOT_X_MIN : ROOT_X_MAX, dir: fromLeft ? 1 : -1,
      y: band.y, w: ROOT_W, h: band.h, warm: BOSS.WARN, tier,
    };
    b.sweepHints = (b.sweepHints || 0) + 1;
    b.shots = [];
    b.bolts = [];
    b.lanes = [16 * TILE, 31.5 * TILE, 47 * TILE].map(x => x + (Math.random() - 0.5) * 30);
    b.rainT = 0; b.rainN = 0;
    SFX.bossWarn();
    blip(tier === "upper" ? 230 : tier === "mid" ? 180 : 135, 70, 0.35, "sawtooth", 0.12);
  }
}

// ── The Shoggoth — what was wearing the Mother's voice ─────────────────────
const SHOG = {
  W: 64, H: 36,
  CRAWL_V: [41, 52, 67],          // slither speed per phase
  CRAWL_T: 2.0,
  LUNGE_V: 300, LUNGE_WARN: [0.9, 0.75, 0.6],
  SLAM_WARN: [1.05, 0.9, 0.72], SLAM_ACTIVE: 0.4, TENT_H: 72, TENT_W: 22,
  EYE_OPEN: [2.8, 2.3, 1.8],      // risen-eye window per phase
  STUN: [2.8, 2.3, 1.9],          // exposed-core window per phase
  MINION_MAX: 3, BOUNCE_V: -390,
  FLOOR: 21 * 16,
};
const FALSE_BLOOM_T = 6.0;        // fixed length — the clock is fair to everyone

// Third hit on the Unbloomed: the victory you were promised, briefly
function beginFalseBloom(b) {
  b.state = "falsebloom";
  b.t = 0;
  b.fbBeat = 0;
  b.arm = null; b.shots = []; b.bolts = [];
  S.eshots = [];
  if (S.practice) b.t = FALSE_BLOOM_T - 1.0;   // practice skips the theater
}

function updateFalseBloom(dt) {
  const b = S.boss;
  b.t += dt;
  const t = b.t;
  if (t < 2.2) {
    // the ending you know: it falls, it glows, you won
    if (b.fbBeat < 1) { b.fbBeat = 1; SFX.bossHit(); S.shakeT = 0.4; S.shakeMag = 2; }
    if (Math.random() < 0.5) {
      const a = Math.random() * Math.PI * 2;
      burst(b.x, b.y - 10, Math.cos(a) * 90, Math.sin(a) * 90 - 40, 0.8,
        Math.random() < 0.5 ? C.bloomHi : rgb(PAL.accent), 2);
    }
    b.y += (SHOG.FLOOR - 44 - b.y) * Math.min(1, dt * 2.5);
  } else if (t < 3.6) {
    // ...and then the petals grey out
    if (b.fbBeat < 2) { b.fbBeat = 2; blip(58, 30, 1.4, "sine", 0.22); }
    if (Math.random() < 0.55) {
      const a = Math.random() * Math.PI * 2;
      burst(b.x + (Math.random() - 0.5) * 50, b.y - 6, Math.cos(a) * 50, Math.sin(a) * 50 + 20, 0.9,
        Math.random() < 0.5 ? "#6a6270" : "#4a4450", 2);
    }
  } else if (t < FALSE_BLOOM_T) {
    // the crown cracks; the elevators sink; something pours out
    if (b.fbBeat < 3) {
      b.fbBeat = 3;
      S.shakeT = 1.2; S.shakeMag = 2.2;
      blip(46, 24, 2.0, "sawtooth", 0.16);
      SFX.bossHorn();
    }
    for (const m of S.movers) { m.yA += 46 * dt; m.yB += 46 * dt; m.y += 46 * dt; }
    if (Math.random() < 0.7)
      burst(b.x + (Math.random() - 0.5) * 30, b.y - 4, (Math.random() - 0.5) * 40, -50 - Math.random() * 70, 0.7,
        Math.random() < 0.5 ? "#6a4a8a" : "#3a2b4a", 2);
  } else {
    spawnShoggoth();
  }
}

function spawnShoggoth() {
  try { localStorage.setItem("sd_shoggoth", "1"); } catch (e) {}
  S.movers = [];
  S.shogGates = true;
  S.boss = {
    kind: "shoggoth", state: "emerge", t: 0, pips: 3, grace: true,
    x: 31.5 * 16, y: SHOG.FLOOR - SHOG.H, dir: 1,
    atkI: 0, vx: 0, tent: null, tents: [], minions: [], rollers: [], grinN: 0, grinT: 0,
    windowHint: false, capFlash: 0, arm: null, shots: [], bolts: [], lanes: [],
  };
  S.shakeT = 0.5; S.shakeMag = 3;
  S.shogTitleT = 3.4;
  SFX.bossWarn();
}

function stageShoggothPractice() {
  spawnShoggoth();
  const p = S.player;
  const x = 24 * TILE + 3;
  const y = 20 * TILE + 4;
  p.x = x; p.y = y;
  p.vx = 0; p.vy = 0; p.invuln = 1;
  S.spawn = { x, y };
  S.checkPt = { x, y };
  S.camLook = 0;
  S.camX = clamp(p.x + p.w / 2 - W / 2, 0, Math.max(0, WORLD_W - W));
  S.camY = clamp(p.y + p.h / 2 - H / 2, 0, Math.max(0, WORLD_H - H));
}

const shogSeen = () => {
  try { return localStorage.getItem("sd_shoggoth") === "1"; } catch (e) { return false; }
};

function updateShoggoth(dt) {
  const b = S.boss, p = S.player;
  b.t += dt;
  const phase = 4 - b.pips;
  const gm = b.grace ? 1.45 : 1;
  const half = SHOG.W / 2;
  b.y = SHOG.FLOOR - SHOG.H;

  // Spore minions — the boss's own furniture. Bounce off their caps for height.
  for (const m of b.minions) {
    if (m.dead) continue;
    m.ph += dt;
    m.x += (m.cx - m.x) * Math.min(1, dt * 1.2) + Math.sin(m.ph * 1.3) * 12 * dt;
    m.y += (m.cy - m.y) * Math.min(1, dt * 1.2) + Math.cos(m.ph * 1.7) * 10 * dt;
    const box = { x: m.x, y: m.y, w: 14, h: 12 };
    if (p.dashing && overlap(p, box)) {
      m.dead = true;
      p.spores = Math.min(MAX_SPORES, p.spores + 1);
      SFX.pop();
      for (let i = 0; i < 8; i++)
        burst(m.x + 7, m.y + 6, (Math.random() - 0.5) * 90, (Math.random() - 0.5) * 90, 0.4, "#c9a0f0", 2);
    } else if (p.vy > 40 && p.y + p.h < m.y + 8 && overlap({ x: p.x, y: p.y + p.h - 2, w: p.w, h: 4 }, box)) {
      // stomp-bounce: a soft cap, a big lift
      p.vy = SHOG.BOUNCE_V;
      p.canDash = true;
      m.squish = 0.25;
      m.bounces--;
      SFX.stomp();
      if (m.bounces <= 0) {
        m.dead = true;
        for (let i = 0; i < 8; i++)
          burst(m.x + 7, m.y + 6, (Math.random() - 0.5) * 70, (Math.random() - 0.5) * 70, 0.4, "#c9a0f0", 2);
      }
    }
    if (m.squish > 0) m.squish -= dt;
  }
  b.minions = b.minions.filter(m => !m.dead);

  // Tentacle slams — telegraphed columns, then the floor erupts
  for (const tn of b.tents) {
    tn.t += dt;
    if (!tn.live && tn.t > tn.warn) {
      tn.live = true;
      S.shakeT = 0.15; S.shakeMag = 2.2;
      blip(120, 50, 0.2, "square", 0.14);
      for (let i = 0; i < 8; i++)
        burst(tn.x + SHOG.TENT_W / 2, SHOG.FLOOR, (Math.random() - 0.5) * 90, -40 - Math.random() * 70, 0.5, "#6a4a8a", 2);
    }
    if (tn.live && tn.t < tn.warn + SHOG.SLAM_ACTIVE && p.invuln <= 0 &&
        overlap(p, { x: tn.x, y: SHOG.FLOOR - SHOG.TENT_H, w: SHOG.TENT_W, h: SHOG.TENT_H }))
      hurtPlayer(tn.x + SHOG.TENT_W / 2, "the Shoggoth's tentacle");
  }
  b.tents = b.tents.filter(tn => tn.t < tn.warn + SHOG.SLAM_ACTIVE + 0.25);

  // Grinning spores — they roll along the floor wearing a face they stole.
  // Jump them, or dash them apart.
  for (const r of b.rollers) {
    r.x += r.vx * dt;
    r.spin += Math.abs(r.vx) * dt * 0.4;
    const box = { x: r.x, y: SHOG.FLOOR - 12, w: 12, h: 12 };
    if (p.dashing && overlap(p, box)) {
      r.dead = true;
      p.spores = Math.min(MAX_SPORES, p.spores + 1);
      SFX.pop();
      for (let i = 0; i < 8; i++)
        burst(r.x + 6, SHOG.FLOOR - 6, (Math.random() - 0.5) * 90, -Math.random() * 70, 0.4, "#9a6ec0", 2);
    } else if (p.invuln <= 0 && overlap(p, box)) {
      hurtPlayer(r.x + 6, "a grinning spore");
    }
    if (r.x < 3 * 16 || r.x > 61 * 16 - 12) r.dead = true;
  }
  b.rollers = b.rollers.filter(r => !r.dead);

  if (b.state === "defeated" || b.state === "melting") {
    if (b.state === "melting") {
      if (Math.random() < 0.6)
        burst(b.x + (Math.random() - 0.5) * SHOG.W, SHOG.FLOOR - 4, (Math.random() - 0.5) * 30, -20 - Math.random() * 40, 0.7,
          Math.random() < 0.5 ? "#6a4a8a" : C.bloomHi, 2);
      if (b.t > 2.4) { b.state = "defeated"; S.shogGates = false; startEnding(); }
    }
    return;
  }

  if (b.state === "emerge") {
    if (Math.random() < 0.5)
      burst(b.x + (Math.random() - 0.5) * 40, b.y + 20, (Math.random() - 0.5) * 30, -40, 0.6, "#3a2b4a", 2);
    if (b.t > 2.2) {
      b.state = "crawl"; b.t = 0;
      queueNotice("Stomp the raised eye. You can stand on the rolling spores.", 5, NOTICE_PRIORITY.BOSS);
    }
  } else if (b.state === "crawl") {
    const tx = p.x + 5;
    b.dir = tx < b.x ? -1 : 1;
    b.x += b.dir * SHOG.CRAWL_V[phase - 1] * dt;
    b.x = clamp(b.x, 4 * 16 + half, 60 * 16 - half);
    if (Math.random() < 0.25)
      burst(b.x - b.dir * half, SHOG.FLOOR, -b.dir * 20, -10, 0.35, "#3a2b4a", 2);
    if (b.t > SHOG.CRAWL_T * (phase === 3 ? 0.7 : 1)) {
      b.t = 0;
      const cycle = ["lungeWarn", "slamWarn", "grin", "summon", "eyeOpen"];
      b.state = cycle[b.atkI % 5];
      b.atkI++;
      if (b.state === "lungeWarn") SFX.bossWarn();
      if (b.state === "slamWarn") blip(200, 90, 0.3, "sawtooth", 0.12);
      if (b.state === "eyeOpen") blip(880, 1175, 0.35, "sine", 0.15);
      if (b.state === "summon") blip(500, 800, 0.3, "triangle", 0.12);
      if (b.state === "grin") {
        b.grinN = phase + 1; b.grinT = 0.9 * (b.grace ? 1.45 : 1);   // the smile is the tell
        blip(660, 520, 0.12, "triangle", 0.1);
        blip(520, 400, 0.12, "triangle", 0.1, 0.14);
      }
      if (b.state === "slamWarn") {
        b.tents.push({ x: p.x + 5 - SHOG.TENT_W / 2, t: 0, warn: SHOG.SLAM_WARN[phase - 1] * gm, live: false });
        if (phase === 3)
          b.tents.push({ x: 2 * b.x - (p.x + 5) - SHOG.TENT_W / 2, t: -0.25, warn: SHOG.SLAM_WARN[2] * gm, live: false });
        b.state = "crawl";   // the body keeps slithering while the floor rises
        b.t = -0.6;
      }
      if (b.state === "eyeOpen") b.windowHint = false;
    }
  } else if (b.state === "lungeWarn") {
    if (Math.random() < 0.5)
      burst(b.x - b.dir * half, b.y + 10, -b.dir * 30, (Math.random() - 0.5) * 20, 0.3, "#c9a0f0", 2);
    if (b.t > SHOG.LUNGE_WARN[phase - 1] * gm) {
      b.state = "lunge"; b.t = 0;
      b.vx = b.dir * SHOG.LUNGE_V;
      whoosh(0.3, 0.18, 900);
    }
  } else if (b.state === "lunge") {
    b.x += b.vx * dt;
    if (Math.random() < 0.6)
      burst(b.x - Math.sign(b.vx) * half, b.y + SHOG.H - 4, -Math.sign(b.vx) * 40, -15, 0.3, "#6a4a8a", 2);
    if (b.x - half <= 3 * 16 || b.x + half >= 61 * 16) {
      b.x = clamp(b.x, 3 * 16 + half, 61 * 16 - half);
      b.state = "crawl"; b.t = 0;
      S.shakeT = 0.2; S.shakeMag = 2.6;
      blip(90, 40, 0.25, "square", 0.15);
    }
  } else if (b.state === "grin") {
    b.grinT -= dt;
    if (b.grinT <= 0 && b.grinN > 0) {
      b.grinT = 0.35;
      b.grinN--;
      const dir = phase === 3 && b.grinN % 2 ? -Math.sign((p.x + 5) - b.x) || 1 : Math.sign((p.x + 5) - b.x) || 1;
      b.rollers.push({ x: b.x + dir * (SHOG.W / 2 - 4), vx: dir * (95 + Math.random() * 20), spin: 0, dead: false });
      blip(300, 180, 0.1, "square", 0.09);
    }
    if (b.grinN <= 0 && b.grinT < -0.3) { b.state = "crawl"; b.t = 0; }
  } else if (b.state === "summon") {
    if (b.t > 1.0) {
      const spots = [[-74, 236], [74, 236], [0, 214]];
      let si = 0;
      while (b.minions.length < SHOG.MINION_MAX && si < spots.length) {
        const [ox, oy] = spots[si++];
        if (!b.minions.some(m => Math.abs(m.cx - (b.x + ox)) < 20)) {
          b.minions.push({ x: b.x, y: b.y, cx: clamp(b.x + ox, 40, WORLD_W - 56), cy: oy, ph: Math.random() * 6, bounces: 2, squish: 0 });
          burst(b.x, b.y + 6, (Math.random() - 0.5) * 60, -80, 0.5, "#c9a0f0", 2);
        }
      }
      b.state = "crawl"; b.t = 0;
    }
  } else if (b.state === "eyeOpen") {
    if (!b.windowHint) {
      b.windowHint = true;
      if (b.grace) queueNotice("The eye is up. Stomp it now.", 2.8, NOTICE_PRIORITY.BOSS);
    }
    if (b.t > SHOG.EYE_OPEN[phase - 1] * gm) { b.state = "crawl"; b.t = 0; }
    const eye = { x: b.x - 8, y: b.y - 44, w: 16, h: 14 };
    if (p.vy > 0 && overlap(p, eye)) {
      b.state = "stunned"; b.t = 0;
      p.vy = -280; p.invuln = 1; p.canDash = true; p.spores = MAX_SPORES; p.chainN = 0;
      S.shakeT = 0.2; S.shakeMag = 2.6;
      SFX.stomp();
      blip(700, 200, 0.35, "triangle", 0.16);
      for (let i = 0; i < 14; i++)
        burst(b.x, b.y - 38, (Math.random() - 0.5) * 120, (Math.random() - 0.5) * 120, 0.5, "#c9a0f0", 2);
    }
  } else if (b.state === "stunned") {
    if (b.t > SHOG.STUN[phase - 1] * gm) { b.state = "crawl"; b.t = 0; }
    const core = { x: b.x - 12, y: b.y + 6, w: 24, h: 24 };
    if (overlap(p, core) && p.dashing) {
      b.pips--;
      b.grace = false;
      p.invuln = 1.5; p.spores = MAX_SPORES; p.chainN = 0; p.canDash = true;
      S.shakeT = 0.3; S.shakeMag = 3;
      S.freezeT = 0.08;
      SFX.bossHit();
      for (let i = 0; i < 22; i++) {
        const a = Math.random() * Math.PI * 2;
        burst(b.x, b.y + 16, Math.cos(a) * 120, Math.sin(a) * 120, 0.7,
          i & 1 ? rgb(PAL.accent) : "#c9a0f0", 2);
      }
      if (b.pips <= 0) {
        b.state = "melting"; b.t = 0;
        b.tents = []; b.minions = []; b.rollers = [];
        S.eshots = [];
        S.shakeT = 0.6; S.shakeMag = 3;
      } else {
        b.state = "crawl"; b.t = 0;
      }
    }
  }

  // The mass itself hurts — except when it's stunned and open
  if (b.state !== "stunned" && b.state !== "emerge" && p.invuln <= 0 &&
      overlap(p, { x: b.x - half + 4, y: b.y + 4, w: SHOG.W - 8, h: SHOG.H - 4 }))
    hurtPlayer(b.x, "the Shoggoth");
}

function bossLanded(b) {
  const p = S.player;
  b.pips--;
  b.capFlash = 0;
  b.arm = null;
  b.shots = [];
  b.bolts = [];
  p.vy = -260; p.invuln = 1.5; p.canDash = true; p.spores = MAX_SPORES; p.chainN = 0;
  S.shakeT = 0.25; S.shakeMag = 3;
  S.freezeT = 0.1;
  SFX.bossHit();
  for (let i = 0; i < 24; i++) {
    const a = Math.random() * Math.PI * 2;
    burst(b.x, b.y - 14, Math.cos(a) * 110, Math.sin(a) * 110 - 30, 0.7,
      i & 1 ? rgb(PAL.accent) : C.bloomHi, 2);
  }
  if (b.pips <= 0) {
    // the victory you were promised — for a moment
    beginFalseBloom(b);
  } else {
    b.state = "recover"; b.t = 0;
    if (b.pips === 2) S.movers.forEach((m, i) => { m.shift += 0.45 + i * 0.15; });
  }
}

function updateBoss(dt) {
  const b = S.boss, p = S.player;
  if (!b || b.state === "defeated") return;
  if (b.state === "falsebloom") return updateFalseBloom(dt);
  if (b.kind === "shoggoth") return updateShoggoth(dt);
  if (b.kind === "barrow") return updateBarrow(dt);
  if (b.kind === "chorus") return updateChorus(dt);
  b.t += dt;
  b.capFlash = Math.max(0, b.capFlash - dt);
  const phase = bossPhase(b);
  const openY = b.homeY - (phase === 3 ? 12 : 0);

  if (b.state === "intro") {
    if (b.t > 2.2) { b.state = "warn"; b.t = 0; SFX.bossWarn(); }
  } else if (b.state === "warn") {
    if (Math.random() < 0.3)
      burst(b.x + (Math.random() - 0.5) * 60, b.y - 10, (Math.random() - 0.5) * 30, -20, 0.4, "#f0a060", 2);
    if (b.t > BOSS.WARN) { b.state = "attack"; b.t = 0; bossStartAttack(b); }
  } else if (b.state === "attack") {
    // Aimed spore bolts — dodge them, you can't stand on them
    const nBolts = phase === 3 ? 4 : 3;
    if (!b.arm && b.boltN < nBolts) {
      b.boltT -= dt;
      if (b.boltT <= 0) {
        b.boltT = phase === 3 ? 0.45 : 0.55;
        b.boltN++;
        const ox = b.x, oy = b.y - 6;
        const dx = (p.x + 5) - ox, dy = (p.y + 5) - oy;
        const d = Math.hypot(dx, dy) || 1;
        b.bolts.push({ x: ox - 4, y: oy - 4, vx: dx / d * BOSS.BOLT_V, vy: dy / d * BOSS.BOLT_V, w: 8, h: 8 });
        blip(520, 220, 0.1, "sawtooth", 0.1);
        for (let i = 0; i < 4; i++)
          burst(ox, oy, (Math.random() - 0.5) * 40, (Math.random() - 0.5) * 40, 0.25, "#f06080", 2);
      }
    }
    if (b.t > BOSS.ATTACK) {
      b.state = "rise"; b.t = 0;
      if (phase === 3) [0, 0.28, 0.56].forEach(d => blip(392, 392, 0.12, "triangle", 0.16, d));
    }
  } else if (b.state === "rise") {
    b.y += (openY - b.y) * Math.min(1, dt * 4);
    if (b.t > BOSS.RISE) { b.state = "open"; b.t = 0; blip(880, 1175, 0.3, "sine", 0.14); }
  } else if (b.state === "open") {
    if (!b.windowHint) {
      b.windowHint = true;
      queueNotice("Hold Jump and glide down onto the open crown.", 4, NOTICE_PRIORITY.BOSS);
    }
    if (b.t > BOSS.OPEN[3 - b.pips] * (b.grace ? 1.45 : 1)) { b.state = "recover"; b.t = 0; b.capFlash = 0.4; }
  } else if (b.state === "recover") {
    b.y += (b.homeY - b.y) * Math.min(1, dt * 3);
    if (b.t > BOSS.RECOVER) { b.state = "warn"; b.t = 0; SFX.bossWarn(); }
  }

  // Root sweep
  if (b.arm) {
    const a = b.arm;
    if (a.warm > 0) {
      a.warm -= dt;
      if (!reducedMotion && Math.random() < 0.5)
        burst(a.x + 14, a.y + 10, (Math.random() - 0.5) * 20, -30 - Math.random() * 30, 0.35, "#f0a060", 2);
    } else {
      a.x += a.dir * BOSS.SWEEP_V * dt;
      if (!reducedMotion && Math.random() < 0.4)
        burst(a.x + 14, a.y + a.h, (Math.random() - 0.5) * 30, 10, 0.3, rgb(PAL.mossHi), 1);
      if (overlap(p, a)) hurtPlayer(a.x + a.w / 2, "a " + a.tier + " root");
      if (a.x < ROOT_X_MIN || a.x > ROOT_X_MAX) b.arm = null;
    }
  }

  // Spore rain (phase 2+)
  if (phase >= 2 && !b.arm && b.lanes.length && b.rainN < 9 && b.state !== "open") {
    b.rainT -= dt;
    if (b.rainT <= 0) {
      b.rainT = 0.55;
      const lane = b.lanes[b.rainN % 3];
      b.shots.push({ x: lane, y: 2 * TILE, w: 8, h: 8 });
      burst(lane + 4, 2 * TILE, 0, 20, 0.4, "#f06080", 2);
      b.rainN++;
    }
  }
  for (const sh of b.shots) {
    sh.y += BOSS.RAIN_V * dt;
    if (overlap(p, sh)) { hurtPlayer(sh.x + 4, "the spore rain"); sh.dead = true; }
    if (sh.y > 21 * TILE - 8) {
      sh.dead = true;
      for (let i = 0; i < 4; i++) burst(sh.x + 4, sh.y + 6, (Math.random() - 0.5) * 40, -20, 0.3, "#f06080", 1);
    }
  }
  b.shots = b.shots.filter(sh => !sh.dead);

  // Aimed bolts — pure dodge hazards
  for (const bo of b.bolts) {
    bo.x += bo.vx * dt;
    bo.y += bo.vy * dt;
    if (Math.random() < 0.4)
      burst(bo.x + 4, bo.y + 4, (Math.random() - 0.5) * 15, (Math.random() - 0.5) * 15, 0.2, "#f06080", 1);
    if (overlap(p, bo)) { hurtPlayer(bo.x + 4, "an aimed bolt"); bo.dead = true; }
    if (isSolid(tileAt(Math.floor((bo.x + 4) / TILE), Math.floor((bo.y + 4) / TILE))) ||
        bo.x < -16 || bo.x > WORLD_W + 16 || bo.y < -16 || bo.y > WORLD_H + 16) {
      bo.dead = true;
      for (let i = 0; i < 4; i++)
        burst(bo.x + 4, bo.y + 4, (Math.random() - 0.5) * 50, (Math.random() - 0.5) * 50, 0.25, "#f06080", 1);
    }
  }
  b.bolts = b.bolts.filter(bo => !bo.dead);

  // Phase 3: the center floor pulses hazardous
  if (phase === 3 && !b.arm) {
    b.floorPulseT += dt;
    const cyc = b.floorPulseT % 3.2;
    if (cyc > 2.2 && cyc < 3.0) {
      if (Math.random() < 0.5)
        burst(20 * TILE + Math.random() * 24 * TILE, 21 * TILE, 0, -30 - Math.random() * 40, 0.3, "#f06080", 1);
      if (p.grounded && p.x > 20 * TILE && p.x < 44 * TILE && p.y + p.h > 20.5 * TILE)
        hurtPlayer(p.x + 5 + (Math.random() < 0.5 ? 30 : -30), "the burning floor");
    } else if (cyc > 1.6 && cyc <= 2.2 && Math.random() < 0.3) {
      burst(20 * TILE + Math.random() * 24 * TILE, 21 * TILE, 0, -15, 0.4, "#f0a060", 1);
    }
  }

  // Cap contact
  const capTop = { x: b.x - BOSS.CAP_W / 2 + 6, y: b.y - BOSS.CAP_H - 8, w: BOSS.CAP_W - 12, h: 12 };
  const capBox = { x: b.x - BOSS.CAP_W / 2, y: b.y - BOSS.CAP_H, w: BOSS.CAP_W, h: BOSS.CAP_H + 6 };
  if (p.vy > 0 && overlap(p, capTop)) {
    if (b.state === "open") {
      b.grace = false;
      bossLanded(b);
    } else if (p.invuln <= 0) {
      b.capFlash = 0.5;
      SFX.bossHorn();
      hurtPlayer(p.x + 5 + (p.x + 5 < b.x ? 60 : -60), "the closed crown");
      p.vy = -220;
    }
  } else if (overlap(p, capBox)) {
    if (p.dashing) { endDash(p); p.vx = (p.x + 5 < b.x ? -1 : 1) * 140; p.vy = -100; }
    else if (p.invuln <= 0) hurtPlayer(b.x, "the Unbloomed");
  }
}

// ── Ending: freed flower → reunion → credits ───────────────────────────────
// The ghost of a better run, interpolated on the run clock
function updateGhost() {
  S.ghostPos = null;
  const gh = S.ghost;
  if (!gh || !gh.frames || !gh.frames.length) return;
  const t = S.score.time / 0.2;
  const i = Math.min(gh.frames.length - 1, Math.floor(t));
  const j = Math.min(gh.frames.length - 1, i + 1);
  const a = gh.frames[i], b2 = gh.frames[j];
  if (!a || a[0] !== S.levelIdx) return;   // the echo is in another chamber
  const f = t - i;
  const sameLvl = b2 && b2[0] === a[0];
  S.ghostPos = {
    x: a[1] + ((sameLvl ? b2[1] : a[1]) - a[1]) * f,
    y: a[2] + ((sameLvl ? b2[2] : a[2]) - a[2]) * f,
    facing: a[3],
  };
}

async function fetchGhost(id) {
  try {
    const r = await fetch(LB.url + "/rest/v1/scores?id=eq." + id + "&select=ghost", {
      headers: { apikey: LB.key, Authorization: "Bearer " + LB.key },
    });
    if (!r.ok) return null;
    const j = await r.json();
    return j[0] && j[0].ghost ? JSON.parse(j[0].ghost) : null;
  } catch (e) { return null; }
}

function startEnding() {
  try { if (!S.practice) localStorage.setItem("sd_beaten", "1"); } catch (e) {}
  // remember your best echo
  try {
    if (competitiveRun() && !S.daily) {
      const pb = JSON.parse(localStorage.getItem("sd_pb") || "null");
      if (!pb || S.score.time < pb.t)
        localStorage.setItem("sd_pb", JSON.stringify({ t: S.score.time, frames: S.rec }));
    }
  } catch (e) {}
  S.mode = "freed";
  S.endT = 0; S.endBeat = 0;
  S.glow = 0; S.endBoom = false;
  S.talk = null;
  S.shakeT = 0.8; S.shakeMag = 2;   // a short tremble, then the bloom
  SFX.clear();
}

function fastForwardEnding() {
  S.endT = Math.max(S.endT, 6.4);
  S.endBoom = true;
  S.glow = 0.25;
  S.endBeat = 2;
  S.shakeT = 0;
  if (S.boss) S.boss.y = 21 * TILE - 24;
}

function startReunion() {
  const names = Object.keys(S.score.metNpcs).filter(n => REUNION_LINES[n]);
  if (!names.length) { S.mode = "credits"; S.creditsT = 0; SFX.win(); return; }
  S.reunion = { names, idx: -1, t: 2.2, actors: [] };
  S.npcs = [];
  S.mode = "reunion";
}

function gainHealth(msg) {
  if (S.health < S.maxHealth) {
    S.health++;
    queueNotice(msg || "Recovered 1 health.", 2.5, NOTICE_PRIORITY.STATUS);
  }
  SFX.oneUp();
}

// Getting hit removes one health. The last hit starts a checkpoint retry.
function hurtPlayer(sx, cause) {
  const p = S.player;
  if (p.invuln > 0) return;
  if (!(DEV && S.devInf) && S.health <= 1) { killPlayer(cause); return; }
  if (!(DEV && S.devInf)) S.health--;
  p.invuln = 1.2;
  p.vx = (p.x + p.w / 2 < sx ? -1 : 1) * 170;
  p.vy = -170;
  p.wjLock = 0.2;
  p.dashing = false; p.dashT = 0;
  S.shakeT = 0.12; S.shakeMag = 2;
  SFX.hurt();
  SFX.oof();
  for (let i = 0; i < 8; i++) {
    burst(p.x + 5, p.y + 5, (Math.random() - 0.5) * 90, -20 - Math.random() * 40, 0.35, C.berryHi, 1);
  }
}

function killPlayer(cause) {
  const p = S.player;
  S.mode = "dead";
  S.deathT = 0;
  S.deathCause = cause || "the dark";
  recordDevAttempt(S.deathCause, true);
  S.score.deaths++;
  fallenPost(S.levelIdx, p.x, p.y);
  if (!(DEV && S.devInf)) S.health = Math.max(0, S.health - 1);
  SFX.death();
  for (let i = 0; i < 16; i++) {
    const a = Math.random() * Math.PI * 2;
    burst(p.x + 5, p.y + 5, Math.cos(a) * 80, Math.sin(a) * 80, 0.5,
      Math.random() > 0.5 ? C.cap : C.body, 2);
  }
}

function respawn() {
  const p = S.player;
  p.x = S.checkPt.x; p.y = S.checkPt.y;
  p.vx = 0; p.vy = 0;
  p.dashing = false; p.dashT = 0;
  p.canDash = true; p.spores = MAX_SPORES; p.chainN = 0; p.grounded = false;
  p.grip = GRIP_TIME; p.wallCoyote = 0; p.wjLock = 0; p.gliding = false; p.sliding = false;
  p.coyote = 0; p.jumpBuf = 0; p.dashBuf = 0;
  S.health = S.maxHealth;
  p.invuln = 0.5;
  S.blooms = [];
  spawnEnemies();
  S.deathT = 0;
  S.mode = "play";
  beginDevAttempt();
  S.jumpHeldForCut = false;
  for (let i = 0; i < 10; i++) {
    const a = Math.random() * Math.PI * 2;
    burst(p.x + 5, p.y + 5, Math.cos(a) * 40, Math.sin(a) * 40, 0.4, rgb(PAL.accent), 2);
  }
}

// Dash through one of the Stopped and it finally blooms
function updateFallen(dt) {
  const p = S.player;
  if (!p || !S.fallen) return;
  for (const f of S.fallen) {
    if (f.freed) continue;
    if (p.dashing && overlap(p, f)) {
      f.freed = true;
      S.score.freed++;
      p.spores = Math.min(MAX_SPORES, p.spores + 1);
      SFX.pop();
      for (let i = 0; i < 14; i++) {
        const a = Math.random() * Math.PI * 2;
        burst(f.x + 5, f.y + 6, Math.cos(a) * 60, Math.sin(a) * 60 - 30, 0.7,
          i & 1 ? C.goalGlow : rgb(PAL.accent), 2);
      }
    } else if (!S.stoppedHint && Math.abs(p.x - f.x) < 70 && Math.abs(p.y - f.y) < 50) {
      S.stoppedHint = true;
      let seen = false;
      try { seen = localStorage.getItem("sd_stopped") === "1"; } catch (e) {}
      if (!seen) {
        try { localStorage.setItem("sd_stopped", "1"); } catch (e) {}
        queueNotice("That gray sporeling is stuck. Air-dash through them.", 4.5, NOTICE_PRIORITY.TUTORIAL);
      }
    }
  }
}

function updateParticles(dt) {
  for (const pt of S.particles) {
    pt.life -= dt;
    pt.x += pt.vx * dt;
    pt.y += pt.vy * dt;
    pt.vy += 140 * dt;
  }
  S.particles = S.particles.filter(pt => pt.life > 0);
  for (const t of S.trail) t.life -= dt;
  S.trail = S.trail.filter(t => t.life > 0);
}

// ── Update ─────────────────────────────────────────────────────────────────
function cameraTargetX(p) {
  const px = p.x + p.w / 2;
  const b = S.boss;
  // The Chorus is fixed at the arena's center. A player-only camera can leave
  // its short gather window at the screen edge, so frame both subjects.
  if (b && b.kind === "chorus" && b.state !== "defeated")
    return (px + b.x) / 2 - W / 2;
  return px - W / 2 + S.camLook;
}

async function fetchRace(id) {
  try {
    const r = await fetch(LB.url + "/rest/v1/scores?id=eq." + id + "&select=ghost,category", {
      headers: { apikey: LB.key, Authorization: "Bearer " + LB.key },
    });
    if (!r.ok) return null;
    const row = (await r.json())[0];
    if (!row || !row.ghost) return null;
    return { frames: JSON.parse(row.ghost), category: row.category || "any" };
  } catch (e) { return null; }
}

function rootCameraCenterY(p) {
  const a = S.boss && S.boss.kind === "unbloomed" ? S.boss.arm : null;
  if (!a) return null;
  const playerY = p.y + p.h / 2 - 10;
  const rootY = a.y + a.h / 2;
  return Math.abs(playerY - rootY) <= H - 44 ? (playerY + rootY) / 2 : null;
}

const TALK_CHAR_TIME = 0.035;
const TALK_HOLD_TIME = 2.4;

function advanceTalk() {
  if (!S.talk || !S.talk.npc?.lines?.length) return false;
  const talk = S.talk;
  const fullAt = talk.npc.lines[talk.line].length * TALK_CHAR_TIME;
  if (talk.t < fullAt) {
    talk.t = fullAt;
  } else if (talk.line < talk.npc.lines.length - 1) {
    talk.line++;
    talk.t = 0;
    SFX.talk();
  } else {
    talk.t = Math.max(talk.t, fullAt);
  }
  return true;
}

function tick(dt) {
  const inp = readInput();
  S.time += dt;
  if (S.shogTitleT > 0) S.shogTitleT -= dt;
  if (just.KeyM) {
    musicOn = !musicOn;
    try { localStorage.setItem("sd_music", musicOn ? "1" : "0"); } catch (e) {}
    queueNotice(musicOn ? "♪ music on" : "♪ music off", 1.4, NOTICE_PRIORITY.CONTROL);
  }

  if (S.mode === "board") {
    const tabOrder = ["any", "full", "daily", "reach"];
    const ti = tabOrder.indexOf(S.boardTab);
    if (inp.ax > 0.5 && S.boardAx <= 0.5) { S.boardTab = tabOrder[(ti + 1) % tabOrder.length]; SFX.talk(); }
    if (inp.ax < -0.5 && S.boardAx >= -0.5) { S.boardTab = tabOrder[(ti + tabOrder.length - 1) % tabOrder.length]; SFX.talk(); }
    S.boardAx = inp.ax;
    if (inp.jumpEdge || inp.pauseEdge) S.mode = S.boardFrom || "title";
    clearJust();
    return;
  }

  if (S.mode === "notes") {
    S.notesY = clamp(S.notesY + inp.ay * 130 * dt, 0, Math.max(0, NOTES_MEASURED - (H - 58)));
    if (inp.jumpEdge || inp.pauseEdge) S.mode = "title";
    clearJust();
    return;
  }

  if (S.mode === "title") {
    // UTC midnight rolled over while idling — refetch today's dream
    if (lbOn() && LB_DAY && LB_DAY !== dailySeedStr()) { LB_CACHE.daily = null; lbRefresh(); }
    const ids = titleIds();
    if (S.titleSel >= ids.length) S.titleSel = ids.length - 1;
    if (inp.ay < -0.5 && S.titleAy >= -0.5) { S.titleSel = (S.titleSel + ids.length - 1) % ids.length; SFX.talk(); }
    if (inp.ay > 0.5 && S.titleAy <= 0.5) { S.titleSel = (S.titleSel + 1) % ids.length; SFX.talk(); }
    S.titleAy = inp.ay;
    const cur = ids[S.titleSel];
    const right = inp.ax > 0.5 && S.devAx <= 0.5;
    const left = inp.ax < -0.5 && S.devAx >= -0.5;
    if (cur === "devlevel") {
      if (right) { S.devLevel = (S.devLevel + 1) % LEVELS.length; SFX.talk(); }
      if (left) { S.devLevel = (S.devLevel + LEVELS.length - 1) % LEVELS.length; SFX.talk(); }
    } else if (cur === "devhealth" && (right || left)) {
      S.devInf = !S.devInf; SFX.talk();
    } else if (cur === "practice") {
      if (right) { stepPrac(1, true); SFX.talk(); }
      if (left) { stepPrac(-1, true); SFX.talk(); }
    } else if (cur === "mode" && (right || left)) {
      setRunModePref(right ? "speedrun" : "adventure"); SFX.talk();
    } else if (cur === "difficulty" && (right || left)) {
      cycleAdventureDifficulty(right ? 1 : -1); SFX.talk();
    } else if (cur === "levelselect") {
      if (right) { stepAdventureLevel(1); SFX.talk(); }
      if (left) { stepAdventureLevel(-1); SFX.talk(); }
    } else if (cur === "ghost") {
      if (right) { cycleGhostPref(1); SFX.talk(); }
      if (left) { cycleGhostPref(-1); SFX.talk(); }
    }
    S.devAx = inp.ax;
    if (inp.startEdge) activateTitleItem(cur);
    clearJust();
    return;
  }

  if (S.mode === "gameover") {
    updateParticles(dt);
    if (inp.jumpEdge) {
      if (S.practice) restartCurrentChamber();
      else S.mode = "title";
    }
    clearJust();
    return;
  }

  if (S.mode === "freed") {
    S.endT += dt;
    const p = S.player, b = S.boss;
    p.vy = Math.min(p.vy + GRAVITY * dt, MAX_FALL);
    p.grounded = false;
    moveAxis(p, 0, p.vy * dt);
    if (b) b.y += ((21 * TILE - 24) - b.y) * Math.min(1, dt * 2.5);
    // The floral explosion
    if (S.endT > 0.8 && !S.endBoom) {
      S.endBoom = true;
      SFX.bloom(); SFX.win();
      S.shakeT = 0.2; S.shakeMag = 3;
      const petals = ["#d8a8b8", "#f0d0da", "#8fb08a", "#c8d8c0", rgb(PAL.accent), "#fff8dc"];
      for (let i = 0; i < 46; i++) {
        const a = Math.random() * Math.PI * 2;
        const sp = 60 + Math.random() * 160;
        burst(b.x, b.y - 14, Math.cos(a) * sp, Math.sin(a) * sp - 40, 0.9 + Math.random() * 0.8,
          petals[i % petals.length], 2 + (Math.random() * 2 | 0));
      }
    }
    // Light pours out and fills the screen, then settles to a warm haze
    if (S.endBoom) {
      const gt = S.endT - 0.8;
      S.glow = gt < 0.8 ? Math.min(1, gt / 0.8) : Math.max(0.25, 1 - (gt - 0.8) * 0.7);
      if (Math.random() < 0.4)
        burst(b.x + (Math.random() - 0.5) * 90, b.y - 20, (Math.random() - 0.5) * 20, -40 - Math.random() * 40, 1.4, rgb(PAL.accent), 2);
    }
    // A gentle 3-second tremble that fades out, then stillness
    if (S.endT < 3) {
      S.shakeT = 0.1;
      S.shakeMag = 1.8 * (1 - S.endT / 3);
    } else {
      S.shakeT = 0;
    }
    if (S.endT > 1.8 && S.endBeat === 0) S.endBeat = 1;
    if (S.endT > 3.2 && S.endBeat === 1) S.endBeat = 2;
    if (inp.jumpEdge) { fastForwardEnding(); startReunion(); clearJust(); return; }
    if (S.endT > 5.2) startReunion();
    S.camX += (clamp(b.x - W / 2, 0, WORLD_W - W) - S.camX) * Math.min(1, dt * 2);
    S.camY += (Math.max(0, WORLD_H - H) - S.camY) * Math.min(1, dt * 2);
    updateParticles(dt);
    clearJust();
    return;
  }

  if (S.mode === "reunion") {
    const r = S.reunion;
    S.shakeT = 0;
    if (inp.talkEdge) advanceTalk();
    if (inp.jumpEdge) {
      fastForwardEnding();
      S.talk = null;
      S.mode = "credits"; S.creditsT = 0; SFX.win();
      clearJust();
      return;
    }
    r.t += dt;
    if (S.talk) S.talk.t += dt;
    // spirits drift gently
    for (const a of r.actors) a.y = a.baseY + Math.sin(S.time * 1.4 + a.ph) * 4;
    // linger on the full group before the credits
    const wait = r.idx >= r.names.length - 1 ? 5.0 : 3.6;
    if (r.t > wait) {
      r.t = 0;
      r.idx++;
      if (r.idx >= r.names.length) {
        S.mode = "credits"; S.creditsT = 0; SFX.win();
        clearJust();
        return;
      }
      const name = r.names[r.idx];
      const sprite = REUNION_SPRITES[name];
      // floating in an arc above the player, front and center
      const arc = [[-40, -6], [42, -6], [-80, 8], [82, 8], [0, -22], [-120, 20], [122, 20]][r.idx] || [0, -40];
      const line = (name === "THE CARTOGRAPHER" && S.score.secretMemory)
        ? CARTOGRAPHER_SECRET_LINE : REUNION_LINES[name];
      const actor = {
        name, sprite, lines: [line], big: true,
        x: S.player.x + arc[0],
        baseY: 21 * TILE - 96 + arc[1],
        y: 21 * TILE - 96 + arc[1],
        ph: Math.random() * 6, c: 0, r: 0,
      };
      r.actors.push(actor);
      S.npcs = r.actors;
      S.talk = { npc: actor, line: 0, t: 0 };
      SFX.talk();
      for (let i = 0; i < 10; i++)
        burst(actor.x + 6, actor.y + 8, (Math.random() - 0.5) * 60, (Math.random() - 0.5) * 50, 0.6, rgb(PAL.accent), 2);
    }
    updateParticles(dt);
    clearJust();
    return;
  }

  if (S.mode === "credits") {
    S.shakeT = 0;
    S.creditsT += dt;
    if (S.reunion)
      for (const a of S.reunion.actors) a.y = a.baseY + Math.sin(S.time * 1.4 + a.ph) * 4;
    updateParticles(dt);
    if (inp.jumpEdge || S.creditsT > 17) {
      S.mode = "win";
      S.lbMsg = "";
      S.lbConfirm = false;
      lbRefresh();
    }
    clearJust();
    return;
  }

  if (S.mode === "clear") {
    S.winT += dt;
    S.goalOpen = Math.min(1, S.goalOpen + dt * 1.4);
    updateParticles(dt);
    if (S.winT > 2.0) {
      if (S.daily || S.reachTrial) {
        try {
          if (S.daily) localStorage.setItem("sd_root_cleared", "1");
          if (S.reachTrial) {
            localStorage.setItem("sd_reach_done", "1");
            const pb = JSON.parse(localStorage.getItem("sd_reach_pb") || "null");
            if (!pb || S.score.time < pb.t)
              localStorage.setItem("sd_reach_pb", JSON.stringify({ t: S.score.time, frames: S.rec }));
          }
        } catch (e) {}
        // the trial is one chamber — the top IS the finish line
        S.mode = "win";
        S.lbMsg = ""; S.lbConfirm = false;
        lbRefresh();
        SFX.win();
      } else if (S.levelIdx < MAIN_LAST_INDEX) {
        loadLevel(S.levelIdx + 1);
        S.mode = "play";
      } else {
        S.mode = "win";
        SFX.win();
      }
    }
    clearJust();
    return;
  }

  if (S.mode === "win") {
    updateParticles(dt);
    if (inp.boardEdge && lbOn() && competitiveRun()) {
      activateWinItem("board");
      clearJust();
      return;
    }
    if (inp.dashEdge && competitiveRun()) activateWinItem("submit");
    if (inp.jumpEdge) activateWinItem(S.lbConfirm ? "cancel" : "title");
    clearJust();
    return;
  }

  if (inp.pauseEdge) {
    if (S.mode === "play") {
      S.mode = "pause"; S.pauseSel = 0; S.pauseAy = 0; S.devAx = 0; S.devLevel = S.levelIdx;
      if (S.pracSel === 0 && reachGet() > 0) S.pracSel = Math.max(1, Math.min(S.levelIdx, reachGet()));
    }
    else if (S.mode === "pause") S.mode = "play";
  }
  if (S.mode === "pause") {
    const ids = pauseIds();
    if (S.pauseSel >= ids.length) S.pauseSel = 0;
    const nOpts = ids.length;
    if (inp.ay < -0.5 && S.pauseAy >= -0.5) { S.pauseSel = (S.pauseSel + nOpts - 1) % nOpts; SFX.talk(); }
    if (inp.ay > 0.5 && S.pauseAy <= 0.5) { S.pauseSel = (S.pauseSel + 1) % nOpts; SFX.talk(); }
    S.pauseAy = inp.ay;
    const cur = ids[S.pauseSel];
    if (cur === "devrow") {
      if (inp.ax > 0.5 && S.devAx <= 0.5) activatePauseItem(cur, 1);
      if (inp.ax < -0.5 && S.devAx >= -0.5) activatePauseItem(cur, -1);
    } else if (cur === "practice") {
      if (inp.ax > 0.5 && S.devAx <= 0.5) activatePauseItem(cur, 1);
      if (inp.ax < -0.5 && S.devAx >= -0.5) activatePauseItem(cur, -1);
    }
    S.devAx = inp.ax;
    if (inp.jumpEdge || inp.dashEdge) {
      activatePauseItem(cur);
    }
    clearJust();
    return;
  }

  if (S.mode === "play" && inp.talkEdge) advanceTalk();

  if (S.mode === "dead") {
    if (competitiveRun()) S.score.time += dt;
    S.deathT += dt;
    updateParticles(dt);
    if (S.deathT > 0.55) {
      respawn();
    }
    clearJust();
    return;
  }

  S.score.time += dt;
  // Competitive runs alone record and replay ghosts. Adventure keeps no trace.
  if (competitiveRun()) {
    while (S.score.time >= S.rec.length * 0.2) {
      S.rec.push([S.levelIdx, Math.round(S.player.x), Math.round(S.player.y), S.player.facing]);
    }
    updateGhost();
  } else {
    S.ghostPos = null;
  }
  if (S.bannerT > 0) S.bannerT -= dt;
  updateNoticeQueue(dt);

  if (S.freezeT > 0) {
    S.freezeT -= dt;
    if (inp.jumpEdge) S.player.jumpBuf = JUMP_BUF;
    if (S.shakeT > 0) S.shakeT -= dt;
    clearJust();
    return;
  }

  updateMovers(dt);

  const p = S.player;
  const wasGrounded = p.grounded;
  p.grounded = onGround(p);

  if (p.grounded) {
    p.coyote = COYOTE;
    p.grip = GRIP_TIME;
    if (!p.dashing && onRealGround(p)) { p.canDash = true; p.spores = MAX_SPORES; p.chainN = 0; }
    if (!wasGrounded) {
      p.squish = 0.72; p.squishT = 0.12;
      SFX.land();
      for (let i = 0; i < 3; i++) {
        burst(p.x + p.w / 2 + (Math.random() - 0.5) * 8, p.y + p.h, (Math.random() - 0.5) * 40, -8 - Math.random() * 14, 0.25, rgb(PAL.rockHi), 1);
      }
    }
  } else {
    p.coyote = Math.max(0, p.coyote - dt);
  }

  if (inp.jumpEdge) p.jumpBuf = JUMP_BUF;
  else p.jumpBuf = Math.max(0, p.jumpBuf - dt);

  if (inp.dashEdge) p.dashBuf = DASH_BUF;
  else p.dashBuf = Math.max(0, (p.dashBuf || 0) - dt);
  if (!p.dashing && p.canDash && p.dashBuf > 0) { p.dashBuf = 0; doDash(p, inp.ax, inp.ay); }

  if (p.dashing) {
    p.dashT -= dt;
    S.trail.push({ x: p.x, y: p.y, facing: p.facing, life: 0.22, max: 0.22 });
    p.vx = p.dashDX * DASH_SPEED;
    p.vy = p.dashDY * DASH_SPEED;
    p.grounded = false;
    moveAxis(p, p.vx * dt, 0);
    moveAxis(p, 0, p.vy * dt);
    if (p.dashing && p.dashT <= 0) {
      p.grounded = onGround(p);
      endDash(p);
    }
  } else {
    // Wall-cling: push into a real wall while airborne. Free but temporary —
    // the threads tire (grip) and never refill spores. Unlocks at The Spire.
    p.sliding = false;
    if (wallsUnlocked() && !p.grounded) {
      const wd = touchingWallDir(p);
      if (wd !== 0 && Math.sign(inp.ax) === wd && p.vy > -40) {
        p.sliding = true;
        p.wallDir = wd;
        p.wallCoyote = 0.1;
        if (p.grip > 0) p.grip -= dt;
        if (Math.random() < 0.25)
          burst(wd > 0 ? p.x + p.w : p.x, p.y + 4 + Math.random() * 6, -wd * 12, 20 + Math.random() * 20, 0.25, rgb(PAL.rockHi), 1);
      }
    }
    if (!p.sliding) p.wallCoyote = Math.max(0, p.wallCoyote - dt);

    // Horizontal movement (briefly locked after a wall-jump so the kick sticks)
    if (p.wjLock > 0) {
      p.wjLock -= dt;
    } else {
      const target = inp.ax * MAX_RUN;
      let acc;
      if (p.grounded) acc = (target === 0 || Math.abs(target) < Math.abs(p.vx) || Math.sign(target) !== Math.sign(p.vx || target)) ? MOVE_FRICTION : MOVE_ACCEL;
      else acc = AIR_ACCEL;
      p.vx = approach(p.vx, target, acc * dt);
      if (inp.ax !== 0) p.facing = Math.sign(inp.ax);
    }

    if (p.jumpBuf > 0) {
      if (p.coyote > 0) doJump(p);
      else if (wallsUnlocked() && p.wallCoyote > 0) doWallJump(p);
    }

    if (S.jumpHeldForCut && !inp.jumpDown && p.vy < 0) {
      p.vy *= JUMP_CUT;
      S.jumpHeldForCut = false;
    }
    if (p.vy >= 0) S.jumpHeldForCut = false;

    // Spore-glide: hold jump while falling and the cap opens like a parasol.
    // Only slows descent — never gains height. Unlocks at Mycel Gardens.
    const wasGliding = p.gliding;
    p.gliding = glideUnlocked() && !p.grounded && !p.dashing && !p.sliding && p.vy > 20 && inp.jumpDown;
    if (p.gliding && !wasGliding) whoosh(0.15, 0.05, 600);

    p.vy += GRAVITY * dt;
    if (p.vy > MAX_FALL) p.vy = MAX_FALL;
    if (p.sliding) p.vy = Math.min(p.vy, p.grip > 0 ? WALL_SLIDE_V : WALL_TIRED_V);
    else if (p.gliding) {
      p.vy = Math.min(p.vy, GLIDE_FALL * (dMod("heavy") ? 1.9 : 1));
      if (Math.random() < 0.15)
        burst(p.x + Math.random() * 10, p.y - 4, (Math.random() - 0.5) * 10, -12, 0.4, "#c4a878", 1);
    }

    p.grounded = false;
    moveAxis(p, p.vx * dt, 0);
    moveAxis(p, 0, p.vy * dt);
    if (!p.grounded) p.grounded = onGround(p);
  }

  if (p.squishT > 0) {
    p.squishT -= dt;
    p.squish += (1 - p.squish) * Math.min(1, dt * 14);
  } else {
    p.squish += (1 - p.squish) * Math.min(1, dt * 16);
  }

  p.animT += dt;
  if (p.dashing) p.anim = "dash";
  else if (!p.grounded) p.anim = p.sliding ? "slide" : p.gliding ? "glide" : (p.vy < -20 ? "jump" : "fall");
  else if (Math.abs(p.vx) > 12) p.anim = "run";
  else p.anim = "idle";
  if (p.animT > 0.1) { p.animT = 0; p.frame = (p.frame + 1) & 3; }

  if (p.invuln > 0) p.invuln -= dt;

  updateReachFinalFuelReset(p);

  for (const b of S.blooms) { b.life -= dt; b.age += dt; }
  for (const b of S.blooms) {
    if (b.life <= 0) {
      for (let i = 0; i < 6; i++) {
        burst(b.x + Math.random() * b.w, b.y + 2, (Math.random() - 0.5) * 30, 20 + Math.random() * 40, 0.4, C.wilt, 1 + (Math.random() * 2 | 0));
      }
    }
  }
  S.blooms = S.blooms.filter(b => b.life > 0);

  for (const ber of S.berryList) {
    if (ber.taken) continue;
    if (overlap(p, ber)) {
      ber.taken = true;
      S.berries++;
      S.score.pickups++;
      if (S.score.pickups % S.berriesPerHeal === 0)
        gainHealth(S.berriesPerHeal + " berries restore 1 health.");
      SFX.berry();
      for (let i = 0; i < 7; i++) {
        const a = Math.random() * Math.PI * 2;
        burst(ber.x + 4, ber.y + 4, Math.cos(a) * 55, Math.sin(a) * 55 - 25, 0.35, C.berryHi, 2);
      }
    } else if (Math.random() < 0.015) {
      burst(ber.x + Math.random() * 8, ber.y + Math.random() * 6, 0, -8, 0.5, C.berryHi, 1);
    }
  }

  for (const keepsake of S.keepsakeList) {
    if (keepsake.taken || !overlap(p, keepsake)) continue;
    keepsake.taken = true;
    if (!hasKeepsake(keepsake.id)) {
      S.keepsakes.push(keepsake.id);
      saveKeepsakes();
    }
    SFX.check(); SFX.oneUp();
    queueNotice("Keepsake found. " + S.keepsakes.length + " / " + TOTAL_KEEPSAKES, 3.2, NOTICE_PRIORITY.STATUS);
    for (let i = 0; i < 16; i++) {
      const a = Math.random() * Math.PI * 2;
      burst(keepsake.x + 6, keepsake.y + 7, Math.cos(a) * 65, Math.sin(a) * 65 - 25, 0.7, C.goalOpen, 2);
    }
  }

  for (const cp of S.checkpoints) {
    if (!cp.active && checkpointEligible(p, cp)) activateCheckpoint(cp);
  }
  updateDescentMercy(p);

  updateEnemies(dt);
  updateFallen(dt);
  if (S.boss) updateBoss(dt);
  if (S.mode !== "play") { clearJust(); return; }   // boss landing may have started the ending

  // The two breaks in the map, and the quiet way back out.
  if (S.secretCd > 0) S.secretCd -= dt;
  if (S.levelIdx === 2 && !S.daily && !S.reachTrial && S.secretCd <= 0 && p.y + p.h < 5 * TILE && p.x < 64) {
    enterSecret(UNDRAWN_INDEX, { x: 5.5 * TILE, y: 4 * TILE - p.h }); clearJust(); return;
  }
  if (S.levelIdx === LEVELS.findIndex(level => level.name === "THE BLOOMHEART") &&
      !S.daily && !S.reachTrial && S.secretCd <= 0 && p.x + p.w > 54.5 * TILE && p.y < 8 * TILE) {
    enterSecret(PRESSED_GARDEN_INDEX, { x: 52 * TILE, y: 8 * TILE - p.h }); clearJust(); return;
  }
  if (LEVELS[S.levelIdx].secret && p.x > 21 * TILE) { exitSecret(); clearJust(); return; }

  // The First Map
  if (S.memoryObj && !S.score.secretMemory && overlap(p, S.memoryObj)) {
    S.score.secretMemory = true;
    S.memoryBeat = 5;
    SFX.check(); SFX.oneUp();
    for (let i = 0; i < 18; i++) {
      const a = Math.random() * Math.PI * 2;
      burst(S.memoryObj.x + 7, S.memoryObj.y + 8, Math.cos(a) * 60, Math.sin(a) * 60 - 20, 0.8, rgb(PAL.accent), 2);
    }
  }
  if (S.memoryBeat > 0) S.memoryBeat -= dt;

  // NPC dialogue — ambient, proximity-based, never blocks play
  let nearNpc = null;
  for (const n of S.npcs) {
    if (Math.abs(p.x + 5 - (n.x + 6)) < 26 && Math.abs(p.y + 5 - (n.y + 6)) < 26) { nearNpc = n; break; }
  }
  if (nearNpc) {
    if (!S.talk || S.talk.npc !== nearNpc) {
      S.talk = { npc: nearNpc, line: 0, t: 0 };
      S.score.metNpcs[nearNpc.name] = true;
      SFX.talk();
    } else {
      S.talk.t += dt;
      const cur = nearNpc.lines[S.talk.line];
      if (S.talk.t > cur.length * TALK_CHAR_TIME + TALK_HOLD_TIME && S.talk.line < nearNpc.lines.length - 1) {
        S.talk.line++;
        S.talk.t = 0;
        SFX.talk();
      }
    }
  } else {
    S.talk = null;
  }

  // Goal beacon particles
  if (S.goal && Math.random() < 0.12) {
    burst(S.goal.x + 3 + Math.random() * 10, S.goal.y + 8, (Math.random() - 0.5) * 8, -25 - Math.random() * 30, 1.1, C.goalGlow, 1);
  }

  if (S.bossDoor && overlap(p, S.bossDoor)) {
    S.bossDoor = null;
    chamberClear();
  }

  if (S.goal && overlap(p, S.goal)) {
    chamberClear();
    for (let i = 0; i < 22; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = 40 + Math.random() * 90;
      burst(S.goal.x + 8, S.goal.y + 10, Math.cos(a) * sp, Math.sin(a) * sp - 50, 0.9,
        i & 1 ? C.goalGlow : C.goalOpen, 2);
    }
  }

  if (p.invuln <= 0 && hitSpike(p)) killPlayer(p.y > WORLD_H + 8 ? "the long dark below" : "the spikes");

  updateParticles(dt);

  // Camera: eased lookahead toward travel direction, vertical dead zone so
  // jumps don't bounce the screen, fast downward catch-up so landings read
  if (p.facing === S.lookFace) S.lookHoldT += dt;
  else { S.lookFace = p.facing; S.lookHoldT = 0; }
  if (reducedMotion) {
    S.camLook += (0 - S.camLook) * Math.min(1, 12 * dt);
  } else if (S.lookHoldT > CAM_LOOK_DELAY) {
    S.camLook += (p.facing * CAM_LOOK - S.camLook) * Math.min(1, CAM_LOOK_EASE * dt);
  }
  const tcx = cameraTargetX(p);
  S.camX += (tcx - S.camX) * Math.min(1, CAM_X_EASE * dt);
  const pcy = p.y + p.h / 2 - 10;
  const ccy = S.camY + H / 2;
  const rootFrameY = rootCameraCenterY(p);
  let tyc = rootFrameY === null ? ccy : rootFrameY;
  if (rootFrameY === null && pcy < ccy - CAM_DEAD_Y) tyc = pcy + CAM_DEAD_Y;
  else if (rootFrameY === null && pcy > ccy + CAM_DEAD_Y) tyc = pcy - CAM_DEAD_Y;
  const vEase = p.vy > 60 ? CAM_DOWN_EASE : CAM_UP_EASE;
  S.camY += (tyc - H / 2 - S.camY) * Math.min(1, vEase * dt);
  S.camX = clamp(S.camX, 0, Math.max(0, WORLD_W - W));
  S.camY = clamp(S.camY, 0, Math.max(0, WORLD_H - H));

  if (S.shakeT > 0) S.shakeT -= dt;
  clearJust();
}

// ── Draw ───────────────────────────────────────────────────────────────────
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
// The buffer renders at 2x: every art pixel is still a perfect uniform
// block (drawn as exact 2x2 cells), but text rasterizes at double
// resolution — the same chunky world, far crisper lettering.
const SS = 2;
const buf = mkCv(W * SS, H * SS);
const g = buf.getContext("2d");
g.scale(SS, SS);
let scale = 1;

function resize() {
  // Size the backing store in DEVICE pixels: on 4K/HiDPI screens the game
  // pixels land 1:1 on physical pixels instead of being filtered up by the
  // compositor. Still chunky, no longer blurry.
  const dpr = window.devicePixelRatio || 1;
  const raw = Math.min(innerWidth * dpr / W, innerHeight * dpr / H);
  // Touch devices get fractional scaling so the game fills the screen;
  // desktop stays integer-scaled for crisp pixels
  scale = TOUCH.active ? Math.max(1, raw) : Math.max(1, Math.floor(raw));
  canvas.width = Math.round(W * scale);
  canvas.height = Math.round(H * scale);
  canvas.style.width = (canvas.width / dpr) + "px";
  canvas.style.height = (canvas.height / dpr) + "px";
  ctx.imageSmoothingEnabled = false;
  // re-run when the window moves to a monitor with a different pixel ratio
  try { matchMedia("(resolution: " + dpr + "dppx)").addEventListener("change", resize, { once: true }); } catch (e) {}
}
addEventListener("resize", resize);
resize();

// Leaderboard interactivity: @names open X profiles, the small panel opens
// the full board, and the board's tabs switch between the two lists.
function canvasPos(e) {
  // rect-relative: correct at any pixel ratio
  const r = canvas.getBoundingClientRect();
  return { x: (e.clientX - r.left) * (W / r.width), y: (e.clientY - r.top) * (H / r.height) };
}
function talkLayout() {
  if (!S.talk) return null;
  const npcSy = S.talk.npc.y - S.camY;
  const compactTouch = TOUCH.active && innerWidth > innerHeight;
  const bx = compactTouch ? 48 : 10;
  const bw = compactTouch ? W - 104 : W - 20;
  const bh = compactTouch ? 56 : 38;
  return { x: bx, y: npcSy > H * 0.52 ? 6 : H - bh - 5, w: bw, h: bh, compactTouch };
}
function talkHitAt(e) {
  if (!S.talk || (S.mode !== "play" && S.mode !== "reunion")) return false;
  const p2 = canvasPos(e);
  const box = talkLayout();
  const inRect = r => p2.x >= r.x && p2.x <= r.x + r.w && p2.y >= r.y && p2.y <= r.y + r.h;
  if (box && inRect(box)) return true;
  const npc = S.talk.npc;
  const pad = TOUCH.active ? 16 : 8;
  const size = npc.big ? 36 : 14;
  return inRect({
    x: npc.x - S.camX - pad,
    y: npc.y - S.camY - pad,
    w: size + pad * 2,
    h: size + pad * 2,
  });
}
function lbHitAt(e) {
  if (S.mode !== "title" && S.mode !== "win" && S.mode !== "board") return null;
  const p2 = canvasPos(e);
  for (const h of LB_HITS)
    if (p2.x >= h.x && p2.x <= h.x + h.w && p2.y >= h.y - 7 && p2.y <= h.y + 3) return h;
  return null;
}
function lbUiHitAt(e) {
  const p2 = canvasPos(e);
  if (S.mode === "pause") {
    for (const hit of PAUSE_HITS)
      if (p2.x >= hit.x && p2.x <= hit.x + hit.w && p2.y >= hit.y && p2.y <= hit.y + hit.h)
        return { pause: hit };
    return null;
  }
  if (S.mode === "win") {
    for (const hit of WIN_HITS)
      if (p2.x >= hit.x && p2.x <= hit.x + hit.w && p2.y >= hit.y && p2.y <= hit.y + hit.h)
        return { win: hit };
  }
  if (S.mode === "board") {
    for (const t of BOARD_TABS)
      if (p2.x >= t.x && p2.x <= t.x + t.w && p2.y >= t.y && p2.y <= t.y + t.h) return { tab: t.tab };
    for (const rh of RACE_HITS)
      if (p2.x >= rh.x && p2.x <= rh.x + rh.w && p2.y >= rh.y - 7 && p2.y <= rh.y + 3) return { race: rh };
    return null;
  }
  if (S.mode === "title") {
    for (const hit of TITLE_HITS)
      if (p2.x >= hit.x && p2.x <= hit.x + hit.w && p2.y >= hit.y && p2.y <= hit.y + hit.h)
        return { title: hit };
  }
  if (S.mode === "title" && DAILY_PANEL &&
      p2.x >= DAILY_PANEL.x && p2.x <= DAILY_PANEL.x + DAILY_PANEL.w &&
      p2.y >= DAILY_PANEL.y && p2.y <= DAILY_PANEL.y + DAILY_PANEL.h) return { daily: true };
  if (S.mode === "title" && NOTES_HIT &&
      p2.x >= NOTES_HIT.x && p2.x <= NOTES_HIT.x + NOTES_HIT.w &&
      p2.y >= NOTES_HIT.y && p2.y <= NOTES_HIT.y + NOTES_HIT.h) return { notes: true };
  if ((S.mode === "title" || S.mode === "win") && LB_PANEL &&
      p2.x >= LB_PANEL.x && p2.x <= LB_PANEL.x + LB_PANEL.w &&
      p2.y >= LB_PANEL.y && p2.y <= LB_PANEL.y + LB_PANEL.h) return { open: true };
  return null;
}
canvas.addEventListener("click", e => {
  if (talkHitAt(e)) { advanceTalk(); return; }
  const h = lbHitAt(e);
  if (h) { window.open("https://x.com/" + h.name.slice(1).replace(/[^\w]/g, ""), "_blank"); return; }
  const u = lbUiHitAt(e);
  if (!u) return;
  if (u.tab) { S.boardTab = u.tab; SFX.talk(); }
  else if (u.title) {
    S.titleSel = u.title.index;
    touchPulse("title", u.title.id);
    activateTitleItem(u.title.id);
  }
  else if (u.pause) {
    S.pauseSel = u.pause.index;
    touchPulse("pause", u.pause.id + ":" + u.pause.dir);
    activatePauseItem(u.pause.id, u.pause.dir);
  }
  else if (u.win) {
    touchPulse("win", u.win.id);
    activateWinItem(u.win.id);
  }
  else if (u.race) {
    SFX.check();
    fetchRace(u.race.id).then(race => {
      if (race) {
        S.pendingGhost = { frames: race.frames, name: u.race.name, category: race.category };
        setRunModePref("speedrun");
        ghostPref = "leader";
        try { localStorage.setItem("sd_ghost_pref", ghostPref); } catch (e) {}
        if (race.category === "root") startDaily();
        else if (race.category === "reach") {
          if (rootCleared()) startReach(); else S.mode = "title";
        } else S.mode = "title";
        SFX.oneUp();
      }
    });
  }
  else if (u.daily) { if (dailyUnlocked()) startDaily(); else SFX.talk(); }
  else if (u.notes) { S.mode = "notes"; S.notesY = 0; SFX.talk(); }
  else if (u.open && lbOn()) { S.boardFrom = S.mode; S.mode = "board"; SFX.talk(); }
});
canvas.addEventListener("mousemove", e => {
  const uiHit = lbUiHitAt(e);
  NOTES_HOVER = !!uiHit?.notes;
  canvas.style.cursor = (talkHitAt(e) || lbHitAt(e) || uiHit) ? "pointer" : "";
});
canvas.addEventListener("mouseleave", () => { NOTES_HOVER = false; });

function blit() {
  ctx.imageSmoothingEnabled = false;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(buf, 0, 0, buf.width, buf.height, 0, 0, canvas.width, canvas.height);
}

function draw() {
  g.imageSmoothingEnabled = false;
  syncTouchVisibility();

  if (S.mode === "title") { drawTitle(); blit(); return; }
  if (S.mode === "board") { drawBoard(); blit(); return; }
  if (S.mode === "notes") { drawNotes(); blit(); return; }
  if (S.mode === "win") { drawWin(); blit(); return; }
  if (S.mode === "gameover") { drawGameOver(); blit(); return; }

  let ox = 0, oy = 0;
  if (S.shakeT > 0 && !reducedMotion) {
    const t = S.shakeT / SHAKE_TIME;
    ox = (Math.random() - 0.5) * 2 * S.shakeMag * t;
    oy = (Math.random() - 0.5) * 2 * S.shakeMag * t;
  }

  drawBackdrop();

  g.save();
  g.translate(Math.round(-S.camX + ox), Math.round(-S.camY + oy));
  g.drawImage(terrainCv, 0, 0);
  drawDecor();
  drawOke();
  drawBlooms();
  drawCheckpoints();
  drawBerries();
  drawMovers();
  drawDoors();
  drawKeepsakes();
  drawMemory();
  drawNPCs();
  drawEnemies();
  drawBoss();
  drawStrikeMark();
  drawGoal();
  drawTrail();
  // The Stopped — faded where real players fell, swaying faintly
  if (S.fallen) {
    for (const f of S.fallen) {
      if (f.freed) continue;
      const sway = Math.sin(S.time * 1.3 + f.ph);
      g.globalAlpha = 0.3 + 0.05 * sway;
      drawMap(g, SPRITES.idle2, Math.round(f.x) - 1, Math.round(f.y) - 2 + (sway > 0 ? 0 : 1), sway < 0, WILT_PAL);
      g.globalAlpha = 1;
    }
  }

  if (competitiveRun() && S.ghostPos && S.mode === "play") {
    g.globalAlpha = 0.45;
    drawMap(g, SPRITES.idle1, Math.round(S.ghostPos.x) - 1, Math.round(S.ghostPos.y) - 2, S.ghostPos.facing < 0, ECHO_PAL);
    if (S.ghost && S.ghost.name) {
      g.globalAlpha = 0.7;
      g.font = "7px monospace";
      g.textAlign = "center";
      g.fillStyle = "#c0e0e8";
      g.fillText(S.ghost.name, Math.round(S.ghostPos.x) + 5, Math.round(S.ghostPos.y) - 6);
      g.textAlign = "left";
    }
    g.globalAlpha = 1;
  }
  if (S.mode !== "dead") drawPlayer();
  drawParticles();
  g.restore();

  drawLighting(ox, oy);
  drawForeground();
  drawBossWarnings();
  if (S.mode !== "credits") drawHUD();
  // THE SHOGGOTH — announced in something like blood
  if (S.shogTitleT > 0 && S.mode === "play") {
    const life = 3.4;
    const a = Math.min(1, (life - S.shogTitleT) / 0.35) * Math.min(1, S.shogTitleT / 0.6);
    const jx = (Math.random() - 0.5) * 2, jy = (Math.random() - 0.5) * 1.5;
    g.globalAlpha = a;
    g.textAlign = "center";
    g.font = "bold 22px monospace";
    g.fillStyle = "#2a060c";
    g.fillText("THE SHOGGOTH", W / 2 + jx + 2, 66 + jy + 2);
    g.fillStyle = "#a01420";
    g.fillText("THE SHOGGOTH", W / 2 + jx, 66 + jy);
    g.fillStyle = "#c22030";
    g.fillText("THE SHOGGOTH", W / 2 + jx - 1, 66 + jy - 1);
    // the letters run
    const grown = Math.max(0, life - S.shogTitleT) * 9;
    for (let i = 0; i < 10; i++) {
      const dx2 = W / 2 - 70 + i * 15 + ((i * 37) % 6);
      const dl = 3 + ((i * 53) % 9) + grown * (0.5 + ((i * 29) % 10) / 10);
      g.fillStyle = i % 2 ? "#a01420" : "#7a0e18";
      g.fillRect(Math.round(dx2 + jx), Math.round(69 + jy), 2, Math.round(Math.min(dl, 30)));
    }
    g.globalAlpha = 1;
    g.textAlign = "left";
  }

  // Keep the cause visible during the short retry pause.
  if (S.mode === "dead" && S.deathCause) {
    g.textAlign = "center";
    g.fillStyle = "rgba(4,6,10,0.82)";
    const cw = ("hit by " + S.deathCause).length * 5.2 + 14;
    g.fillRect(W / 2 - cw / 2, 48, cw, 16);
    g.fillStyle = "#f0b0a0";
    g.font = "bold 8px monospace";
    g.fillText("hit by " + S.deathCause, W / 2, 59);
    g.textAlign = "left";
  }
  drawTalk();
  drawBanner();
  drawOpeningLesson();
  drawEndOverlay();

  if (S.mode === "pause") {
    PAUSE_HITS = [];
    g.fillStyle = "rgba(5,8,12,0.7)";
    g.fillRect(0, 0, W, H);
    g.fillStyle = C.ui;
    g.font = "bold 12px monospace";
    g.textAlign = "center";
    g.fillText("PAUSED", W / 2, 56);
    g.fillStyle = C.uiDim;
    g.font = "8px monospace";
    g.fillText(LEVELS[S.levelIdx].name, W / 2, 70);

    const ids = pauseIds();
    const compactMenu = ids.length > 6;
    const touchMenu = TOUCH.active;
    const menuY = touchMenu ? 78 : compactMenu ? 80 : 82;
    const menuStep = touchMenu ? (ids.length > 7 ? 11 : 13) : compactMenu ? 11 : 12;
    const rowH = touchMenu ? menuStep : Math.max(10, menuStep - 1);
    const rowX = touchMenu ? 44 : 68, rowW = touchMenu ? 232 : 184;
    const labels = ids.map(id =>
      id === "resume" ? "RESUME" :
      id === "restart" ? "RESTART CHAMBER" :
      id === "practice" ? "◄ PRACTICE: " + pracName(S.pracSel === 0 ? 1 : S.pracSel) + " ►" :
      id === "motion" ? "REDUCED MOTION: " + (reducedMotion ? "ON" : "OFF") :
      id === "touchhand" ? "TOUCH LAYOUT: " + (leftHanded ? "LEFT-HANDED" : "RIGHT-HANDED") :
      id === "newgame" ? "NEW GAME" :
      id === "titlescr" ? "TITLE SCREEN" :
      "◄ TEST " + devLevelLabel() + " ►");
    g.font = "9px monospace";
    for (let i = 0; i < labels.length; i++) {
      const rowY = menuY + i * menuStep;
      const oy = rowY + 9;
      const sel = i === S.pauseSel;
      const pressed = touchPressed("pause", ids[i] + ":-1") || touchPressed("pause", ids[i] + ":0") || touchPressed("pause", ids[i] + ":1");
      g.fillStyle = pressed ? "rgba(240,168,136,0.34)" : sel ? "rgba(240,168,136,0.18)" : "rgba(8,12,18,0.64)";
      g.fillRect(rowX, rowY, rowW, rowH);
      if (sel) { g.fillStyle = C.goalOpen; g.fillRect(rowX, rowY, 2, rowH); }
      g.fillStyle = ids[i] === "devrow" ? (sel ? C.goalOpen : "#6a5060")
        : ids[i] === "practice" ? (sel ? rgb(PALS[0].accent) : C.uiDim)
        : (sel ? C.title : C.uiDim);
      g.font = ids[i] === "devrow" ? "bold 6px monospace" : "9px monospace";
      g.fillText(labels[i], W / 2, oy);
      if (ids[i] === "practice" || ids[i] === "devrow") {
        const third = rowW / 3;
        PAUSE_HITS.push({ id: ids[i], index: i, dir: -1, x: rowX, y: rowY, w: third, h: rowH });
        PAUSE_HITS.push({ id: ids[i], index: i, dir: 0, x: rowX + third, y: rowY, w: third, h: rowH });
        PAUSE_HITS.push({ id: ids[i], index: i, dir: 1, x: rowX + third * 2, y: rowY, w: third, h: rowH });
      } else {
        PAUSE_HITS.push({ id: ids[i], index: i, dir: 0, x: rowX, y: rowY, w: rowW, h: rowH });
      }
    }
    if (ids[S.pauseSel] === "practice" && !touchMenu) {
      g.fillStyle = C.wilt;
      g.font = "7px monospace";
      g.fillText("This starts a separate practice run. It won't be submitted.", W / 2, compactMenu ? 158 : 152);
    }
    g.fillStyle = C.uiDim;
    g.font = "7px monospace";
    g.fillText(touchMenu ? "Tap an option." : "Move to choose. Press Jump to select.", W / 2, touchMenu ? 177 : compactMenu ? 171 : 168);
  }

  if (S.mode === "clear") {
    const a = Math.min(0.5, S.winT * 1.2);
    g.fillStyle = "rgba(6,10,16," + a + ")";
    g.fillRect(0, 0, W, H);
    g.fillStyle = C.title;
    g.font = "bold 14px monospace";
    g.textAlign = "center";
    g.fillText("CHAMBER CLEAR", W / 2, H / 2 - 10);
    g.fillStyle = C.ui;
    g.font = "9px monospace";
    g.fillText("Berries  " + S.berries + " / " + S.berriesTotal, W / 2, H / 2 + 8);
    g.fillStyle = rgb(PAL.accent);
    g.font = "8px monospace";
    g.fillText("+1 health", W / 2, H / 2 - 26);
    if (LEVELS[S.levelIdx].clearText && S.winT > 0.6) {
      g.fillStyle = C.uiDim;
      g.font = "8px monospace";
      g.fillText(LEVELS[S.levelIdx].clearText, W / 2, H / 2 + 26);
    }
    if (competitiveRun() && S.split) {
      const ahead = S.split.d <= 0;
      g.fillStyle = ahead ? rgb(PALS[0].accent) : "#f08080";
      g.font = "bold 8px monospace";
      g.fillText((ahead ? "−" : "+") + Math.abs(S.split.d).toFixed(1) + "s  vs " + S.split.name, W / 2, H / 2 + 42);
    }
  }

  blit();
}

function drawBackdrop() {
  g.drawImage(skyCv, 0, 0);

  // God rays
  g.globalAlpha = 0.05;
  g.fillStyle = rgb(mix(PAL.fog, [255, 255, 255], 0.3));
  const rOff = wrap(S.camX * 0.1, 170);
  for (let x = -rOff - 170; x < W + 40; x += 170) {
    g.beginPath();
    g.moveTo(x, -10); g.lineTo(x + 26, -10);
    g.lineTo(x - 14, H + 10); g.lineTo(x - 40, H + 10);
    g.closePath(); g.fill();
  }
  g.globalAlpha = 1;

  const lag = Math.max(0, (WORLD_H - H)) === 0 ? 0 : ((WORLD_H - H) - S.camY);

  // Far layer
  const fOff = wrap(S.camX * 0.22, 480);
  const fY = Math.min(40, lag * 0.12);
  g.drawImage(farCv, -fOff, fY); g.drawImage(farCv, 480 - fOff, fY);

  // Fog band
  g.globalAlpha = 0.1;
  g.fillStyle = rgb(PAL.fog);
  g.fillRect(0, H * 0.55, W, H * 0.2);
  g.globalAlpha = 1;

  // Mid layer
  const mOff = wrap(S.camX * 0.5, 480);
  const mY = Math.min(70, lag * 0.25);
  g.drawImage(midCv, -mOff, -mY * 0.3); g.drawImage(midCv, 480 - mOff, -mY * 0.3);

  drawSpores("far");
}

function drawSpores(layer) {
  for (const sp of SPORES) {
    const nearSp = sp.depth > 1;
    if ((layer === "near") !== nearSp) continue;
    const sx = wrap(sp.x + S.time * sp.drift - S.camX * sp.depth, W + 24) - 12;
    const sy = wrap(sp.y + Math.sin(S.time * 0.6 + sp.ph) * 8 - S.camY * sp.depth, H + 24) - 12;
    g.globalAlpha = nearSp ? 0.5 : 0.28;
    g.fillStyle = nearSp ? rgb(PAL.accent) : rgb(mix(PAL.accent, PAL.mid, 0.5));
    g.fillRect(Math.round(sx), Math.round(sy), nearSp ? 2 : 1, nearSp ? 2 : 1);
  }
  g.globalAlpha = 1;
}

function drawDecor() {
  const p = S.player;
  const moss = rgb(PAL.moss), mossHi = rgb(PAL.mossHi), accent = rgb(PAL.accent);
  for (const d of DECOR) {
    if (d.x < S.camX - 24 || d.x > S.camX + W + 24) continue;
    const sway = Math.sin(S.time * 1.8 + d.ph);
    if (d.type === "vine") {
      g.fillStyle = moss;
      const len = Math.round(d.len);
      for (let i = 0; i < len; i += 3) {
        g.fillRect(Math.round(d.x + sway * (i / len) * 2), d.y + i, 1, 3);
      }
      g.fillStyle = mossHi;
      g.fillRect(Math.round(d.x + sway * 2), d.y + len, 2, 2);
      continue;
    }
    const near = p && Math.abs(p.x + p.w / 2 - d.x) < 10 && Math.abs(p.y + p.h - d.y) < 8;
    const sq = near ? 0.6 : 1;
    if (d.type === "grass") {
      g.fillStyle = moss;
      for (let i = 0; i < 3; i++) {
        const bh = (4 + (i % 2) * 2) * sq;
        const bx = d.x + i * 3 - 3 + (i === 1 ? sway : 0);
        g.fillRect(Math.round(bx), Math.round(d.y - bh), 1, Math.round(bh));
      }
      g.fillStyle = mossHi;
      g.fillRect(Math.round(d.x - 3 + sway), Math.round(d.y - 6 * sq), 1, 2);
    } else if (d.type === "mush") {
      const hh = Math.round(5 * sq);
      g.fillStyle = C.bloomStem;
      g.fillRect(d.x, d.y - hh, 2, hh);
      g.fillStyle = C.capLo;
      g.fillRect(d.x - 2, d.y - hh - 2, 6, 3);
      g.fillStyle = C.cap;
      g.fillRect(d.x - 1, d.y - hh - 3, 4, 2);
    } else {
      const pulse = 0.7 + Math.sin(S.time * 3 + d.ph) * 0.3;
      const hh = Math.round(6 * sq);
      g.fillStyle = C.bloomStem;
      g.fillRect(d.x, d.y - hh, 2, hh);
      g.fillStyle = rgb(mix(PAL.accent, PAL.rockLo, 0.5));
      g.fillRect(d.x - 3, d.y - hh - 3, 8, 4);
      g.fillStyle = accent;
      g.globalAlpha = pulse;
      g.fillRect(d.x - 1, d.y - hh - 2, 4, 2);
      g.globalAlpha = 1;
    }
  }
}

function drawBlooms() {
  for (const b of S.blooms) {
    const wilt = b.life < BLOOM_WILT;
    g.globalAlpha = wilt ? Math.max(0.25, b.life / BLOOM_WILT) : 1;
    // sprout with overshoot
    const gt = b.age / 0.12;
    const grow = gt >= 1 ? 1 : gt < 0.7 ? gt * 1.5 : 1.15 - (gt - 0.7) * 0.5;
    const cx = b.x + b.w / 2;
    const bw = Math.round(b.w * Math.min(1.12, grow)), bh = Math.round(b.h * Math.min(1, grow + 0.2));

    g.fillStyle = wilt ? C.wilt : C.bloomStem;
    g.fillRect(Math.round(cx - 1), Math.round(b.y + 2), 3, bh);
    g.fillStyle = wilt ? C.wilt : C.bloom;
    g.fillRect(Math.round(cx - bw / 2), Math.round(b.y), bw, Math.max(1, bh - 1));
    g.fillStyle = wilt ? "#5a4038" : C.bloomHi;
    g.fillRect(Math.round(cx - bw / 2 + 2), Math.round(b.y + 1), Math.max(1, bw - 4), 2);
    if (!wilt) {
      g.fillStyle = C.capHi;
      g.fillRect(Math.round(cx - 6), Math.round(b.y + 3), 2, 2);
      g.fillRect(Math.round(cx + 4), Math.round(b.y + 2), 2, 2);
    } else {
      // crumble warning: notches appear
      g.fillStyle = "#3a2c28";
      g.fillRect(Math.round(cx - bw / 2 + 3), Math.round(b.y), 2, 2);
      g.fillRect(Math.round(cx + bw / 2 - 6), Math.round(b.y + 1), 2, 2);
    }
    g.globalAlpha = 1;
  }
}

function drawCheckpoints() {
  for (const cp of S.checkpoints) {
    const pulse = 0.55 + Math.sin(S.time * 5) * 0.45;
    g.fillStyle = C.bloomStem;
    g.fillRect(cp.x + 6, cp.y + 4, 4, 12);
    g.fillStyle = cp.active ? rgb(PAL.accent) : rgb(mix(PAL.accent, PAL.rockLo, 0.55));
    g.globalAlpha = cp.active ? pulse : 0.75;
    g.fillRect(cp.x + 2, cp.y, 12, 8);
    g.fillStyle = cp.active ? "#ffffff" : rgb(mix(PAL.accent, [255,255,255], 0.3));
    g.globalAlpha = cp.active ? pulse : 0.4;
    g.fillRect(cp.x + 4, cp.y + 1, 3, 2);
    g.globalAlpha = 1;
  }
}

function drawBerries() {
  const bob = Math.sin(S.time * 4) * 1.5;
  for (const ber of S.berryList) {
    if (ber.taken) continue;
    const x = ber.x, y = Math.round(ber.y + bob);
    g.fillStyle = C.berry;
    g.fillRect(x + 1, y + 2, 6, 6);
    g.fillRect(x + 2, y + 1, 4, 8);
    g.fillStyle = C.berryHi;
    g.fillRect(x + 2, y + 3, 2, 2);
    g.fillStyle = C.leaf;
    g.fillRect(x + 3, y, 2, 2);
    g.fillRect(x + 5, y + 1, 2, 1);
  }
}

function drawGoal() {
  if (!S.goal) return;
  const go = S.goal;
  const open = S.mode === "clear" ? S.goalOpen : 0;
  // beacon column
  const pulse = 0.5 + Math.sin(S.time * 2) * 0.2;
  g.globalAlpha = 0.08 * pulse + open * 0.2;
  g.fillStyle = C.goalGlow;
  g.fillRect(go.x + 2, 0, 12, go.y + 10);
  g.globalAlpha = 0.05 * pulse;
  g.fillRect(go.x - 2, 0, 20, go.y + 10);
  g.globalAlpha = 1;

  g.fillStyle = C.bloomStem;
  g.fillRect(go.x + 6, go.y + 12, 4, 12);
  if (open < 0.15) {
    const sway = Math.sin(S.time * 1.5) * 1;
    g.fillStyle = C.goalClosed;
    g.fillRect(Math.round(go.x + 4 + sway), go.y + 4, 8, 12);
    g.fillStyle = "#503040";
    g.fillRect(Math.round(go.x + 6 + sway), go.y + 6, 4, 8);
    g.fillStyle = C.goalOpen;
    g.fillRect(Math.round(go.x + 6 + sway), go.y + 4, 4, 2);
  } else {
    const s = open;
    g.fillStyle = C.goalOpen;
    g.fillRect(Math.round(go.x + 2 - s * 5), go.y + 6, 6, 6);
    g.fillRect(Math.round(go.x + 8 + s * 5), go.y + 6, 6, 6);
    g.fillRect(go.x + 5, Math.round(go.y + 1 - s * 4), 6, 6);
    g.fillRect(go.x + 5, Math.round(go.y + 10 + s * 2), 6, 5);
    g.fillStyle = C.goalGlow;
    g.fillRect(go.x + 6, go.y + 7, 4, 4);
    g.globalAlpha = 0.28 * open;
    g.fillRect(go.x - 6, go.y - 6, 28, 28);
    g.globalAlpha = 1;
  }
}

function drawNPCs() {
  for (const n of S.npcs) {
    const bob = Math.sin(S.time * 2 + n.ph);
    const x = Math.round(n.x), y = Math.round(n.y);
    if (n.big) {
      // reunion spirits float large and luminous
      g.save();
      g.translate(x + 6, y + 8);
      g.scale(1.7, 1.7);
      g.translate(-(x + 6), -(y + 8));
    }
    if (n.sprite === "keeper") {
      g.fillStyle = "#8a7a5a"; g.fillRect(x, y + 8, 12, 6);
      g.fillStyle = "#a89878"; g.fillRect(x + 1, y + 9, 10, 2);
      g.fillStyle = "#6a5a42"; g.fillRect(x + 8, Math.round(y + 2 + bob), 4, 7);
      g.fillStyle = C.eye; g.fillRect(x + 10, Math.round(y + 3 + bob), 1, 2);
      g.fillStyle = "#5a4a36"; g.fillRect(x + 8, Math.round(y - 1 + bob), 4, 3);
      g.fillStyle = "#4a4036"; g.fillRect(x - 3, y + 2, 1, 12);
      g.fillStyle = C.title; g.fillRect(x - 5, Math.round(y + bob * 0.5), 4, 5);
      g.fillStyle = "#fff0c0"; g.fillRect(x - 4, Math.round(y + 1 + bob * 0.5), 2, 2);
    } else if (n.sprite === "twins") {
      const b2 = Math.sin(S.time * 2 + n.ph + 2);
      g.fillStyle = C.bloomStem;
      g.fillRect(x + 1, y + 4, 3, 6); g.fillRect(x + 8, y + 5, 3, 5);
      g.fillStyle = "#d8a848"; g.fillRect(x - 1, Math.round(y + 2 + bob * 0.6), 7, 3);
      g.fillStyle = "#f0c878"; g.fillRect(x, Math.round(y + 1 + bob * 0.6), 5, 2);
      g.fillStyle = "#c89040"; g.fillRect(x + 6, Math.round(y + 3 + b2 * 0.6), 7, 3);
      g.fillStyle = "#e8b060"; g.fillRect(x + 7, Math.round(y + 2 + b2 * 0.6), 5, 2);
      g.fillStyle = C.eye; g.fillRect(x + 2, y + 6, 1, 1); g.fillRect(x + 9, y + 7, 1, 1);
    } else if (n.sprite === "moth") {
      const fl = (S.time * 8 + n.ph) % 2 < 1 ? 1 : 0;
      g.fillStyle = "#c8c0d8";
      g.fillRect(x - fl, y + 2, 4, 3 + fl);
      g.fillRect(x + 6 + (fl ? 0 : 1), y + 2, 4, 3 + fl);
      g.fillStyle = "#8a84a0"; g.fillRect(x + 3, y + 1, 4, 8);
      g.fillStyle = C.eye; g.fillRect(x + 4, y + 2, 1, 1); g.fillRect(x + 6, y + 2, 1, 1);
      g.fillStyle = "#e8e0d0"; g.fillRect(x + 8, y + 7, 5, 4);
      g.fillStyle = "#8a84a0"; g.fillRect(x + 9, y + 8, 3, 1);
    } else if (n.sprite === "granny") {
      g.fillStyle = "#b89060"; g.fillRect(x - 1, Math.round(y + 1 + bob * 0.4), 14, 4);
      g.fillStyle = "#d8b080"; g.fillRect(x + 1, Math.round(y + bob * 0.4), 10, 2);
      g.fillStyle = "#8a6848"; g.fillRect(x + 1, y + 5, 10, 9);
      g.fillStyle = C.eye; g.fillRect(x + 3, y + 7, 2, 1); g.fillRect(x + 7, y + 7, 2, 1);
      g.fillStyle = "#e8d0b0"; g.fillRect(x + 3, y + 10, 6, 3);
      g.fillStyle = C.berry; g.fillRect(x + 5, y + 11, 2, 1);
    } else if (n.sprite === "dog") {
      // German Shepherd, sitting profile — tan coat, black saddle and muzzle
      const tan = "#c68a4e", tanDk = "#9a6634", blk = "#26201c";
      const hb = bob * 0.4;
      g.fillStyle = tan;
      g.fillRect(x + 5, y + 6, 9, 6);                          // haunches
      g.fillRect(x + 2, y + 4, 5, 10);                         // chest + front
      g.fillStyle = blk;
      g.fillRect(x + 6, y + 5, 8, 4);                          // saddle
      g.fillRect(x + 13, y + 9, 3, 2);                         // tail
      g.fillStyle = tanDk;
      g.fillRect(x + 14, y + 10, 2, 2);                        // tail tip
      g.fillRect(x + 3, y + 12, 2, 2);                         // front leg
      g.fillRect(x + 9, y + 12, 2, 2);                         // hind paw
      g.fillStyle = tan;
      g.fillRect(x, Math.round(y + hb), 6, 5);                 // head
      g.fillStyle = blk;
      g.fillRect(x - 3, Math.round(y + 2 + hb), 4, 3);         // muzzle
      g.fillRect(x + 1, Math.round(y - 4 + hb), 2, 5);         // ear
      g.fillRect(x + 4, Math.round(y - 3 + hb), 2, 4);         // ear
      g.fillStyle = tanDk;
      g.fillRect(x + 2, Math.round(y - 3 + hb), 1, 2);         // inner ear
      g.fillStyle = "#d8a040";
      g.fillRect(x + 1, Math.round(y + 1 + hb), 1, 1);         // amber eye
    } else if (n.sprite === "jb") {
      // JB — swept dark hair, sunset coat, and the satchel he carries everywhere
      const hair = "#251918", hairHi = "#452721", skin = "#c97948";
      const shirt = "#a85f2b", shirtHi = "#d08a42", bag = "#1d1919";
      const hb = Math.round(bob * 0.4);
      g.fillStyle = shirt;
      g.fillRect(x + 2, y + 7, 10, 7);                         // ochre coat
      g.fillStyle = shirtHi;
      g.fillRect(x + 3, y + 9, 2, 1); g.fillRect(x + 8, y + 8, 2, 1);
      g.fillRect(x + 6, y + 12, 2, 1);                        // worn floral marks
      g.fillStyle = bag;
      g.fillRect(x + 3, y + 7, 1, 2); g.fillRect(x + 4, y + 9, 1, 2);
      g.fillRect(x + 5, y + 11, 1, 3);                        // cross-body strap
      g.fillRect(x + 9, y + 10, 4, 4);                        // satchel
      g.fillStyle = skin;
      g.fillRect(x + 3, y + 1 + hb, 8, 7);                    // face
      g.fillRect(x + 11, y + 4 + hb, 2, 2);                   // profile nose
      g.fillRect(x + 2, y + 4 + hb, 2, 2);                    // ear
      g.fillStyle = hair;
      g.fillRect(x + 1, y + 1 + hb, 3, 5);                    // swept back
      g.fillRect(x + 2, y - 1 + hb, 9, 3);
      g.fillRect(x + 8, y - 2 + hb, 4, 2);
      g.fillRect(x + 10, y - 1 + hb, 3, 2);
      g.fillStyle = hairHi;
      g.fillRect(x + 4, y + hb, 5, 1);
      g.fillStyle = C.eye;
      g.fillRect(x + 8, y + 3 + hb, 3, 1);                    // brow
      g.fillRect(x + 9, y + 4 + hb, 1, 1);                    // eye
    } else if (n.sprite === "grel") {
      // Three pale pointy-eared friends — the first believers
      const line = "#1a1a20";
      const fig = (fx, fy, fw, fh, body) => {
        fx = Math.round(fx); fy = Math.round(fy);
        g.fillStyle = line;
        g.fillRect(fx, fy, fw, fh);                       // outline
        g.fillRect(fx + 1, fy - 4, 2, 5);                 // left ear spike
        g.fillRect(fx + fw - 3, fy - 3, 2, 4);            // right ear spike
        g.fillStyle = body;
        g.fillRect(fx + 1, fy + 1, fw - 2, fh - 1);       // body fill
        g.fillRect(fx + 1, fy - 3, 1, 3);                 // ear fill
        g.fillRect(fx + fw - 3, fy - 2, 1, 2);
        g.fillStyle = line;
        g.fillRect(fx + fw / 2 - 2 | 0, fy + 4, 1, 2);    // dot eyes (tall)
        g.fillRect(fx + fw / 2 + 1 | 0, fy + 4, 1, 2);
      };
      const b2 = Math.sin(S.time * 2 + n.ph + 2);
      const b3 = Math.sin(S.time * 2 + n.ph + 4);
      fig(x - 5, y + 4 + bob * 0.5, 8, 10, "#d4d4da");    // back left
      fig(x + 9, y + 3 + b3 * 0.5, 8, 11, "#dcdce2");     // back right
      fig(x + 1, y + b2 * 0.5, 10, 14, "#f2f2f6");        // front, tallest
    } else { // echo — a sporeling gone pale
      g.globalAlpha = 0.55 + Math.sin(S.time * 1.5 + n.ph) * 0.1;
