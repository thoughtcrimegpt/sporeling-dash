<!DOCTYPE html>
<html lang="en">
<head>

<meta name="description" content="In Sporeling Dash, your air-dash creates a temporary platform beneath you.">
<title>Sporeling Dash</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #0a0c10; overflow: hidden; }
  body { display: flex; align-items: center; justify-content: center; touch-action: none; overscroll-behavior: none; }
  canvas {
    display: block;
    image-rendering: crisp-edges; image-rendering: pixelated;
    background: #0a0c10;
  }
  /* Touch controls — shown only on touch devices */
  #touch { position: fixed; inset: 0; z-index: 4; pointer-events: none;
    font-family: monospace; -webkit-user-select: none; user-select: none; }
  #touch[hidden] { display: none; }
  #stick, #btnJump, #btnDash, #btnPause { pointer-events: auto; touch-action: none; }
  #stick { position: fixed; left: calc(14px + env(safe-area-inset-left, 0px)); bottom: calc(16px + env(safe-area-inset-bottom, 0px)); width: 128px; height: 128px;
    border-radius: 50%; background: rgba(232,224,208,0.07); border: 2px solid rgba(232,224,208,0.22); }
  #nub { position: absolute; left: 42px; top: 42px; width: 44px; height: 44px; border-radius: 50%;
    background: rgba(240,200,120,0.4); border: 2px solid rgba(240,200,120,0.65);
    transition: transform 0.03s linear; }
  #btnJump, #btnDash { position: fixed; width: 78px; height: 78px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 19px; font-weight: bold;
    transition: transform 0.05s ease, background 0.05s ease; }
  #btnJump { right: calc(18px + env(safe-area-inset-right, 0px)); bottom: calc(88px + env(safe-area-inset-bottom, 0px)); color: rgba(144,232,176,0.85);
    background: rgba(144,232,176,0.12); border: 2px solid rgba(144,232,176,0.45); }
  #btnDash { right: calc(108px + env(safe-area-inset-right, 0px)); bottom: calc(16px + env(safe-area-inset-bottom, 0px)); color: rgba(240,168,136,0.85);
    background: rgba(240,168,136,0.12); border: 2px solid rgba(240,168,136,0.45); }
  #btnJump.pressed { background: rgba(144,232,176,0.4); transform: scale(0.92); }
  #btnDash.pressed { background: rgba(240,168,136,0.4); transform: scale(0.92); }
  #btnPause { position: fixed; top: calc(10px + env(safe-area-inset-top, 0px)); right: calc(10px + env(safe-area-inset-right, 0px)); width: 36px; height: 28px;
    border-radius: 6px; display: flex; align-items: center; justify-content: center;
    color: rgba(232,224,208,0.6); font-size: 11px;
    background: rgba(8,12,18,0.5); border: 1px solid rgba(232,224,208,0.25); }
  #touch.left-handed #stick { left: auto; right: calc(14px + env(safe-area-inset-right, 0px)); }
  #touch.left-handed #btnJump { right: auto; left: calc(18px + env(safe-area-inset-left, 0px)); }
  #touch.left-handed #btnDash { right: auto; left: calc(108px + env(safe-area-inset-left, 0px)); }
  #touch.left-handed #btnPause { right: auto; left: calc(10px + env(safe-area-inset-left, 0px)); }
  #rotateHint { display: none; position: fixed; top: 8px; left: 50%; transform: translateX(-50%);
    color: #e8e0d0; font: 10px monospace; background: rgba(8,12,18,0.75);
    padding: 6px 10px; border-radius: 6px; z-index: 5; pointer-events: none; }

  #share { position: fixed; inset: 0; z-index: 10; background: rgba(4,6,10,0.8);
    display: flex; align-items: center; justify-content: center; }
  #share[hidden] { display: none; }
  #shareBox { background: #10151d; border: 1px solid #90e8b0; padding: 12px;
    max-width: 92vw; text-align: center; }
  #shareImg { display: block; width: min(480px, 86vw); image-rendering: auto; margin: 0 auto 10px; }
  #shareBtns { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
  #shareBtns button, #shareBtns a { font: bold 12px monospace; color: #10151d;

  #shareBtns #shareDl { background: #f0c878; }
  @media (pointer: coarse) and (orientation: portrait) { #rotateHint { display: block; } }

// ═══════════════════════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════════════════════

const tri = u => { u = ((u % 1) + 1) % 1; return u < 0.5 ? u * 2 : 2 - u * 2; };

// Boss tuning — The Unbloomed
const BOSS = {
  WARN: 0.7, RECOVER: 1.0, RISE: 0.8,
  OPEN: [1.7, 1.35, 1.1],         // landing window per phase (pips 3/2/1)

};

  ground: Object.freeze({ id: "ground", y: 19.5 * TILE, h: 24 }),
  mid: Object.freeze({ id: "mid", y: 12.25 * TILE, h: 24 }),
  upper: Object.freeze({ id: "upper", y: 5.25 * TILE, h: 24 }),
});

  3: Object.freeze(["ground", "upper", "mid"]),
});
const ROOT_X_MIN = 15 * TILE;
const ROOT_X_MAX = 48 * TILE;
const ROOT_W = 32;

// glowing belly mid-leap)
const BARROW = {
  W: 64, H: 26,
  MOUND_V: [75, 95, 118],         // burrowing speed per phase
  DIG_MAX: 2.6,                   // it surfaces even if it can't reach you
  TELEGRAPH: 0.6,                 // crack warning before the eruption
  LAUNCH_VY: -255, GRAV: [330, 375, 420], DRIFT: 55,
  GLOBS: [2, 3, 4],
  GLOB_V: 120,
};

// Boss tuning — The Lonely Chorus (dash through the gathered core)
const CHORUS = {
  ORBIT_R: 68, ORBIT: 2.0,
  DIVERS: [2, 3, 4],
  DIVE_WARN: 0.5, DIVE_V: 230, DIVE_TIME: 0.9,
  GATHER: [2.4, 1.45, 1.15],      // core-open window per phase (long first — learn it)
  N_WISPS: 7,
};
const rgb = c => "rgb(" + c[0] + "," + c[1] + "," + c[2] + ")";
const rgbs = c => c[0] + "," + c[1] + "," + c[2];
const mix = (a, b, t) => [a[0] + (b[0] - a[0]) * t | 0, a[1] + (b[1] - a[1]) * t | 0, a[2] + (b[2] - a[2]) * t | 0];

const C = {
  cap: "#e8764e", capHi: "#f8b088", capLo: "#8a4432", capSpot: "#c05038",
  body: "#f4dcae", bodySh: "#d0b088", eye: "#241810", eyeShine: "#fff6e0", blush: "#e89890",
  berry: "#e04868", berryHi: "#f08098", leaf: "#58a070",
  ui: "#e8e0d0", uiDim: "#7a8494", title: "#f0c878",
  bloom: "#d07858", bloomHi: "#f0a888", bloomStem: "#6a9060", wilt: "#6a5048",
  goalClosed: "#704858", goalOpen: "#f098b8", goalGlow: "#ffd0e8",
};

// ── Utils ──────────────────────────────────────────────────────────────────
const clamp = (v, a, b) => v < a ? a : v > b ? b : v;
const rnd01 = i => { const s = Math.sin(i * 127.1 + 311.7) * 43758.5453; return s - Math.floor(s); };
const wrap = (v, m) => ((v % m) + m) % m;
const approach = (v, t, step) => v < t ? Math.min(t, v + step) : Math.max(t, v - step);
const mkCv = (w, h) => { const c = document.createElement("canvas"); c.width = w; c.height = h; return c; };

// ── Audio ──────────────────────────────────────────────────────────────────
let AC = null, masterGain = null;
function audioInit() {
  if (!AC) {
    try {
      AC = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = AC.createGain();
      masterGain.gain.value = 0.32;
      masterGain.connect(AC.destination);
      startDrone();
    } catch (e) { AC = null; return; }
  }
  if (AC.state !== "running") {
    AC.resume();
    // iOS unlock: play a one-sample silent buffer inside the user gesture
    try {
      const b = AC.createBuffer(1, 1, 22050);
      const src = AC.createBufferSource();
      src.buffer = b;
      src.connect(AC.destination);
      src.start(0);
    } catch (e) {}
  }
}
// touchend is the gesture iOS reliably accepts for audio unlock
["keydown", "pointerdown", "touchstart", "touchend", "click"].forEach(ev =>
  addEventListener(ev, audioInit, { passive: true }));
document.addEventListener("visibilitychange", () => {
  if (!document.hidden && AC && AC.state === "suspended") AC.resume();
});

function startDrone() {
  const voice = (freq, gain) => {
    const o = AC.createOscillator(), gn = AC.createGain();
    o.type = "sine"; o.frequency.value = freq;
    gn.gain.value = gain;
    o.connect(gn); gn.connect(masterGain);
    o.start();
    return gn;
  };
  const mid = voice(55, 0.045);
  voice(82.5, 0.03);
  // Unsettling sub-bass: a deep detuned pair that slowly beats against
  // itself, breathing on an even slower cycle
  const sub1 = voice(31, 0.12);
  const sub2 = voice(32.3, 0.1);
  const lfo = AC.createOscillator(), lfoG = AC.createGain();
  lfo.frequency.value = 0.05; lfoG.gain.value = 0.06;
  lfo.connect(lfoG); lfoG.connect(sub1.gain); lfoG.connect(sub2.gain);
  lfo.start();
  const lfo2 = AC.createOscillator(), lfo2G = AC.createGain();
  lfo2.frequency.value = 0.09; lfo2G.gain.value = 0.02;
  lfo2.connect(lfo2G); lfo2G.connect(mid.gain);
  lfo2.start();
}

function blip(freq, endFreq, dur, type, vol, delay) {
  if (!AC || AC.state !== "running") return;
  const t = AC.currentTime + (delay || 0);
  const o = AC.createOscillator(), gn = AC.createGain();
  o.type = type;
  o.frequency.setValueAtTime(freq, t);
  o.frequency.exponentialRampToValueAtTime(Math.max(1, endFreq), t + dur);
  gn.gain.setValueAtTime(vol, t);
  gn.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.connect(gn); gn.connect(masterGain);
  o.start(t); o.stop(t + dur + 0.02);
}

function whoosh(dur, vol, freq) {
  if (!AC || AC.state !== "running") return;
  const t = AC.currentTime;
  const len = Math.max(1, (dur * AC.sampleRate) | 0);
  const b = AC.createBuffer(1, len, AC.sampleRate);
  const d = b.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  const src = AC.createBufferSource(); src.buffer = b;
  const f = AC.createBiquadFilter();
  f.type = "bandpass"; f.frequency.value = freq; f.Q.value = 0.8;
  const gn = AC.createGain();
  gn.gain.setValueAtTime(vol, t);
  gn.gain.exponentialRampToValueAtTime(0.001, t + dur);
  src.connect(f); f.connect(gn); gn.connect(masterGain);
  src.start(t);
}

// ── Music — a small procedural score. One motif, many moods. ───────────────
// Hollow Knight rules: felt more than heard. Everything sits far below the
// SFX, through its own lowpass, on top of the cave's standing drone.
let MUS = null;
let musicOn = true;
try { musicOn = localStorage.getItem("sd_music") !== "0"; } catch (e) {}
let reducedMotion = false;
try { reducedMotion = localStorage.getItem("sd_reduced_motion") === "1"; } catch (e) {}

}
const MUS_VOL = 0.8;

// scale = semitone steps; deg indexes it (wraps up octaves); root = semis from C
const MUS_TRACKS = {

function musicWanted() {
  if (!musicOn) return null;
  const m = S.mode;
  if (m === "freed" || m === "credits" || m === "gameover") return null;
  if (m === "title" || m === "notes" || m === "board") return "dream";
  if (S.boss && S.boss.state === "falsebloom") return null;   // the false quiet
  if (S.boss && S.boss.kind === "shoggoth") return "shoggoth";
  return LEVEL_MUSIC[S.levelIdx] || "dream";
}

function mfreq(trk, deg, oct) {
  const s = trk.scale;
  const d = ((deg % s.length) + s.length) % s.length;
  const semis = trk.root + s[d] + 12 * Math.floor(deg / s.length);
  return 130.81 * Math.pow(2, semis / 12 + oct);
}

function mnote(t, freq, dur, wave, vol, att) {
  const o = AC.createOscillator(), gn = AC.createGain();
  o.type = wave;
  o.frequency.value = freq;
  gn.gain.setValueAtTime(0.0001, t);
  gn.gain.linearRampToValueAtTime(vol, t + (att || 0.02));
  gn.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.connect(gn); gn.connect(MUS.out);
  o.start(t); o.stop(t + dur + 0.05);
}

function musicTick() {
  if (!AC || AC.state !== "running") return;
  if (!MUS) {
    const out = AC.createGain();
    out.gain.value = 0;
    const lp = AC.createBiquadFilter();
    lp.type = "lowpass"; lp.frequency.value = 1700; lp.Q.value = 0.5;
    out.connect(lp); lp.connect(masterGain);
    MUS = { out, cur: null, step: 0, nextT: 0 };
  }
  const want = musicWanted();
  if (want !== MUS.cur) {
    const t = AC.currentTime;
    MUS.out.gain.cancelScheduledValues(t);
    MUS.out.gain.setValueAtTime(MUS.out.gain.value, t);
    MUS.out.gain.linearRampToValueAtTime(0, t + 1.1);
    MUS.cur = want;
    MUS.step = 0;
    MUS.nextT = t + 1.2;
    if (want) MUS.out.gain.linearRampToValueAtTime(MUS_VOL, t + 2.4);
    return;
  }
  if (!MUS.cur) return;
  const trk = MUS_TRACKS[MUS.cur];
  const sd = 60 / trk.bpm / 4;
  if (MUS.nextT < AC.currentTime) MUS.nextT = AC.currentTime + 0.05;
  while (MUS.nextT < AC.currentTime + 0.8) {
    const st = MUS.step, t = MUS.nextT;
    for (const e of trk.bass) if (e[0] === st) mnote(t, mfreq(trk, e[1], trk.bassOct), sd * e[2] * 0.95, trk.bassWave, trk.bv, 0.03);
    for (const e of trk.lead) if (e[0] === st) mnote(t, mfreq(trk, e[1], trk.leadOct), sd * e[2] * 0.95, trk.leadWave, trk.lv, 0.015);
    for (const e of trk.pad) if (e[0] === st)
      for (const dg of e[1]) mnote(t, mfreq(trk, dg, 0), sd * e[2], "sine", trk.pv, sd * e[2] * 0.3);
    MUS.step = (MUS.step + 1) % 32;
    MUS.nextT += sd;
  }
}

function dailySeedStr() {
  const d = new Date();
  return d.getUTCFullYear() + "-" +

    String(d.getUTCDate()).padStart(2, "0");
}

  petal: "PETAL RUN",
};
function seededRand(str) {
  let h = 2166136261;
  for (const ch of str) { h ^= ch.charCodeAt(0); h = Math.imul(h, 16777619); }
  return () => {
    h = Math.imul(h ^ (h >>> 15), 2246822507);
    h = Math.imul(h ^ (h >>> 13), 3266489909);
    return ((h ^= h >>> 16) >>> 0) / 4294967296;
  };
}
function dailyMods() {
  const rand = seededRand(dailySeedStr());
  const pool = ["mirror", "dim", "sparks2", "brittle", "restless", "heavy", "petal"];
  const mods = [];
  while (mods.length < 3) {
    const m = pool[(rand() * pool.length) | 0];
    if (mods.includes(m)) continue;
    if ((m === "petal" && mods.includes("sparks2")) ||
        (m === "sparks2" && mods.includes("petal"))) continue;
    mods.push(m);
  }
  return mods;
}

function prefetchLeader(slot, list) {

  if (GHOST_CACHE[slot] && GHOST_CACHE[slot].id === top.id) return;

  });
}

const fmtMs = ms => {
  const t = Math.max(0, Math.round(ms / 100) / 10);
  const m = Math.floor(t / 60);
  const s2 = t - m * 60;
  return m + ":" + (s2 < 10 ? "0" : "") + s2.toFixed(1);
};

async function lbFetch(cat) {
  try {
    const r = await fetch(LB.url + "/rest/v1/scores?category=eq." + cat +
      "&select=name,time_ms,id,has_ghost&order=time_ms.asc&limit=100", {
      headers: { apikey: LB.key, Authorization: "Bearer " + LB.key },
    });
    if (!r.ok) return null;
    const rows = await r.json();
    // one row per sporeling: rows arrive fastest-first, keep each name's best
    const seen = {};
    const out = [];
    for (const row of rows) {
      const k = String(row.name || "").trim().toLowerCase();
      if (seen[k]) continue;
      seen[k] = true;
      out.push(row);
      if (out.length >= 15) break;
    }
    return out;
  } catch (e) { return null; }
}

}

// Returns { ok, id } — the id makes "race my echo" challenge links possible
async function lbPost(name, cat, ms, ghost) {
  try {
    const body = { name, category: cat, time_ms: ms };
    if (ghost) { body.ghost = ghost; body.has_ghost = true; }
    const r = await fetch(LB.url + "/rest/v1/scores", {
      method: "POST",
      headers: {
        apikey: LB.key, Authorization: "Bearer " + LB.key,
        "Content-Type": "application/json", Prefer: "return=representation",
      },
      body: JSON.stringify(body),
    });
    if (!r.ok) return { ok: false, id: null };
    const j = await r.json();
    return { ok: true, id: j[0] ? j[0].id : null };
  } catch (e) { return { ok: false, id: null }; }
}

const FALLEN_CACHE = {};   // levelIdx -> [{x,y}] newest first
function fallenPost(lvl, x, y) {
  if (!lbOn() || DEV) return;
  if (y > WORLD_H - 16) return;               // void deaths leave nothing to stand on
  let fx = x;
  if (dMod("mirror")) fx = WORLD_W - 16 - fx;  // store unmirrored coords
  fetch(LB.url + "/rest/v1/scores", {
    method: "POST",
    headers: { apikey: LB.key, Authorization: "Bearer " + LB.key, "Content-Type": "application/json" },
    body: JSON.stringify({ name: "fallen", category: "fallen", time_ms: 1, ghost: JSON.stringify([lvl, Math.round(fx), Math.round(y)]) }),
  }).catch(() => {});
}
async function fallenFetch() {
  if (!lbOn()) return;
  try {
    const r = await fetch(LB.url + "/rest/v1/scores?category=eq.fallen&select=ghost&order=id.desc&limit=300", {
      headers: { apikey: LB.key, Authorization: "Bearer " + LB.key },
    });
    if (!r.ok) return;
    const rows = await r.json();
    for (const k of Object.keys(FALLEN_CACHE)) delete FALLEN_CACHE[k];
    for (const row of rows) {
      try {
        const [lvl, x, y] = JSON.parse(row.ghost);
        (FALLEN_CACHE[lvl] = FALLEN_CACHE[lvl] || []).push({ x, y });
      } catch (e) {}
    }
  } catch (e) {}
}

// Where do you stand? Count faster runs, add one.
async function lbRank(cat, ms) {
  try {
    const r = await fetch(LB.url + "/rest/v1/scores?category=eq." + cat + "&time_ms=lt." + ms + "&select=id&limit=1", {
      headers: { apikey: LB.key, Authorization: "Bearer " + LB.key, Prefer: "count=exact" },
    });
    const total = parseInt((r.headers.get("content-range") || "").split("/")[1], 10);
    return isNaN(total) ? null : total + 1;
  } catch (e) { return null; }
}

// A shareable card: your time, your completion, your rank
function buildShareCard(name, cat, ms, rank) {
  const cv = mkCv(640, 360);
  const c2 = cv.getContext("2d");
  c2.imageSmoothingEnabled = false;
  const gr = c2.createLinearGradient(0, 0, 0, 360);
  gr.addColorStop(0, "#0a0e18");
  gr.addColorStop(1, "#1c1030");
  c2.fillStyle = gr;
  c2.fillRect(0, 0, 640, 360);
  for (let i = 0; i < 70; i++) {
    c2.globalAlpha = 0.2 + rnd01(i) * 0.4;
    c2.fillStyle = i % 3 ? "#90e8b0" : "#f0a888";
    const sz = 2 + (rnd01(i * 7) * 3 | 0);
    c2.fillRect(rnd01(i * 3) * 640, rnd01(i * 13) * 360, sz, sz);
  }
  c2.globalAlpha = 1;
  c2.fillStyle = "#90e8b0";
  c2.fillRect(0, 0, 640, 3);
  c2.fillRect(0, 357, 640, 3);
  c2.textAlign = "center";
  c2.fillStyle = "#f0c878";
  c2.font = "bold 34px monospace";
  c2.fillText("SPORELING DASH", 320, 50);
  const isRoot = cat === "root" || cat.indexOf("daily-") === 0;
  const isReach = cat === "reach";
  c2.fillStyle = isRoot ? "#f0c878" : cat === "full" ? "#f098b8" : "#90e8b0";
  c2.font = "bold 18px monospace";
  c2.fillText(isRoot ? "THE PALE ROOT"
    : isReach ? "THE REACH"
      : cat === "full" ? "★ FULL BLOOM 100% ★" : "ANY% CLEAR", 320, 80);
  c2.save();
  c2.translate(320 - 36, 100);
  c2.scale(6, 6);
  drawMap(c2, SPRITES.idle1, 0, 0, false);
  c2.restore();
  c2.fillStyle = "#fff6e0";
  c2.font = "bold 46px monospace";
  c2.fillText(fmtMs(ms), 320, 230);
  c2.fillStyle = "#90e8b0";
  c2.font = "bold 21px monospace";
  c2.fillText(rank ? "#" + rank + " ON THE LEADERBOARD" : "ON THE LEADERBOARD", 320, 260);
  const met = Object.keys(S.score.metNpcs).length;
  c2.fillStyle = "#e8e0d0";
  c2.font = "15px monospace";
  c2.fillText(name + "  ·  " + S.score.berries + "/" + S.score.total + " berries  ·  " +
    met + "/" + TOTAL_NPCS + " voices  ·  " + S.score.deaths + " deaths", 320, 292);
  if (isRoot && S.dailyMods) {
    c2.fillStyle = "#90e8b0";
    c2.font = "13px monospace";
    c2.fillText(S.dailyMods.map(m => MOD_NAMES[m]).join("  +  "), 320, 316);
  } else if (S.score.secretMemory) {
    c2.fillStyle = "#dee6c8";
    c2.font = "13px monospace";
    c2.fillText("Found the Undrawn Map", 320, 316);
  }
  c2.fillStyle = "#7a8494";
  c2.font = "14px monospace";
  c2.fillText("thoughtcrimegpt.github.io/sporeling-dash", 320, 344);
  return cv.toDataURL("image/jpeg", 0.92);
}

const mainFullEligible = () => !S.daily && !S.reachTrial &&
  S.score.berries === S.score.total && S.score.secretMemory &&
  Object.keys(S.score.metNpcs).length === TOTAL_NPCS && S.keepsakes.length === TOTAL_KEEPSAKES;

function submitScore() {
  if (!lbOn()) { S.lbMsg = "The leaderboard is offline."; return; }
  if (S.practice) { S.lbMsg = "Practice runs can't be submitted."; return; }
  if (!competitiveRun()) { S.lbMsg = "Adventure runs aren't submitted."; return; }
  if (S.score.lbDone) { S.lbMsg = "You already submitted this run."; return; }
  let name = "";
  try { name = localStorage.getItem("sd_name") || ""; } catch (e) {}
  if (!name) name = "@";   // start them off with the handle prefix
  name = window.prompt(
    "Enter the name you want on the leaderboard. This is required.\n\n" +
    "If you enter an exact X handle such as @yourhandle, it will link to that profile. " +
    "Anything else will be shown as plain text.",
    name) || "";
  name = name.trim().replace(/[^\w@.\- ]/g, "").slice(0, 20);
  if (!name || name === "@") { S.lbMsg = "A name is required. Press " + dashBtnName() + " to try again."; return; }
  try { localStorage.setItem("sd_name", name); } catch (e) {}
  const ms = Math.round(S.score.time * 1000);
  const met = Object.keys(S.score.metNpcs).length;
  const full = mainFullEligible();
  // this run's echo rides along with the score
  let ghost = null;
  try {
    const j = JSON.stringify(S.rec);
    if (j.length > 20 && j.length < 150000) ghost = j;
  } catch (e) {}
  S.score.lbDone = true;
  S.lbMsg = "Submitting...";
  const gameUrl = "https://thoughtcrimegpt.github.io/sporeling-dash/";

  if (S.reachTrial) {
    const cat = "reach";
    lbPost(name, cat, ms, ghost).then(res => {
      S.lbMsg = res.ok ? "Your time is on The Reach board." : "That didn't submit. Try again later.";
      if (!res.ok) { S.score.lbDone = false; return; }
      lbRefresh();
      lbRank(cat, ms).then(rank => {
        const link = res.id ? gameUrl + "?race=" + res.id : gameUrl;
        const tweet = fmtMs(ms) + ". " + (rank ? "#" + rank + " " : "") + "on THE REACH. Race my ghost: " + link;
        showShare(buildShareCard(name, cat, ms, rank), tweet);
      });
    });
    return;
  }

  if (S.daily) {
    const cat = "root";   // the trial's one eternal board
    lbPost(name, cat, ms, ghost).then(res => {
      S.lbMsg = res.ok ? "Your time is on the Root board." : "That didn't submit. Try again later.";
      if (!res.ok) { S.score.lbDone = false; return; }
      lbRefresh();
      lbRank(cat, ms).then(rank => {
        const link = res.id ? gameUrl + "?race=" + res.id : gameUrl;
        const tweet = fmtMs(ms) + ". " + (rank ? "#" + rank + " " : "") +
          "on THE PALE ROOT 🍄 Race my ghost: " + link;
        showShare(buildShareCard(name, cat, ms, rank), tweet);
      });
    });
    return;
  }

  Promise.all([lbPost(name, "any", ms, ghost), full ? lbPost(name, "full", ms, ghost) : Promise.resolve({ ok: true, id: null })])
    .then(res => {
      S.lbMsg = res[0].ok && res[1].ok ? (full ? "Your time is on both boards." : "Your time is on the Any% board.") : "That didn't submit. Try again later.";
      if (!res[0].ok) S.score.lbDone = false;
      lbRefresh();
      if (res[0].ok) {
        const cat = full ? "full" : "any";
        const result = full && res[1].ok ? res[1] : res[0];
        lbRank(cat, ms).then(rank => {
          const link = result.id && ghost ? gameUrl + "?race=" + result.id : gameUrl;
          const tweet = fmtMs(ms) + ". " + (rank ? "#" + rank + " " : "") +
            "on the Sporeling Dash " + (full ? "100%" : "any%") + " leaderboard 🍄 Race my ghost: " + link;
          showShare(buildShareCard(name, cat, ms, rank), tweet);
        });
      }
    });
}

function activateWinItem(id) {
  if (id === "board") {
    if (lbOn() && competitiveRun()) { S.boardFrom = "win"; S.mode = "board"; }
    return;
  }
  if (id === "submit") {
    if (!lbOn()) S.lbMsg = "Leaderboard offline";
    else if (S.score.lbDone) S.lbMsg = "Already submitted";
    else if (!S.lbConfirm) S.lbConfirm = true;
    else { S.lbConfirm = false; submitScore(); }
    return;
  }
  if (id === "cancel") { S.lbConfirm = false; return; }
  if (id === "title") {
    if (S.lbConfirm) S.lbConfirm = false;
    else S.mode = "title";
  }
}

const keys = Object.create(null);
const just = Object.create(null);
const padPrev = { jump: false, dash: false, pause: false };
const TOUCH = { active: false, ax: 0, ay: 0, jump: false, dash: false, pause: false };
const touchPrev = { jump: false, dash: false, pause: false };
let focusInputLock = false;
let focusReady = true;
let leftHanded = false;

const RUN_MODES = ["adventure", "speedrun"];

function setRunModePref(mode) {

function cycleGhostPref(dir = 1) {

function applyTouchLayout() {
  const root = document.getElementById("touch");
  if (!root) return;
  if (leftHanded) root.classList.add("left-handed");
  else root.classList.remove("left-handed");
}

function syncTouchVisibility() {

  root.hidden = !gameplayVisible;

function touchPulse(kind, id) {

}

function touchPressed(kind, id) {

}

function toggleTouchHand() {

addEventListener("keydown", e => {
  if (!keys[e.code]) just[e.code] = true;
  keys[e.code] = true;
  if (["Space","ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.code)) e.preventDefault();
});
addEventListener("keyup", e => { keys[e.code] = false; });

function gp() {
  const list = navigator.getGamepads ? navigator.getGamepads() : [];
  for (let i = 0; i < list.length; i++) if (list[i]?.connected) return list[i];
  return null;
}

function readInput() {
  let ax = 0, ay = 0;
  if (keys.KeyA || keys.ArrowLeft)  ax -= 1;
  if (keys.KeyD || keys.ArrowRight) ax += 1;
  if (keys.KeyW || keys.ArrowUp)    ay -= 1;
  if (keys.KeyS || keys.ArrowDown)  ay += 1;
  // Preserve a one-tick directional impulse when keydown and keyup both land
  // between fixed updates. Without this, quick menu taps and dash aims vanish.
  if (ax === 0)
    ax = (just.KeyD || just.ArrowRight ? 1 : 0) - (just.KeyA || just.ArrowLeft ? 1 : 0);
  if (ay === 0)
    ay = (just.KeyS || just.ArrowDown ? 1 : 0) - (just.KeyW || just.ArrowUp ? 1 : 0);

  let jumpDown = !!(keys.Space || keys.KeyZ || keys.KeyK);
  let dashDown = !!(keys.ShiftLeft || keys.ShiftRight || keys.KeyJ);
  let pauseDown = !!(keys.Escape || keys.KeyP);
  let jumpEdge = !!(just.Space || just.KeyZ || just.KeyK);
  let dashEdge = !!(just.ShiftLeft || just.ShiftRight || just.KeyJ);
  let pauseEdge = !!(just.Escape || just.KeyP);
  let startEdge = !!(just.Enter || just.Space);
  let talkEdge = !!(just.Enter || just.KeyE);
  let dailyEdge = !!just.KeyD;
  let boardEdge = !!just.KeyL;

  const pad = gp();
  if (pad) {
    // Analog stick — magnitude is preserved for fine control
    const dead = 0.22;
    let sx = pad.axes[0] || 0, sy = pad.axes[1] || 0;
    if (Math.abs(sx) < dead) sx = 0; else sx = Math.sign(sx) * (Math.abs(sx) - dead) / (1 - dead);
    if (Math.abs(sy) < dead) sy = 0; else sy = Math.sign(sy) * (Math.abs(sy) - dead) / (1 - dead);

    if (pad.buttons[14]?.pressed) sx = -1;
    if (pad.buttons[15]?.pressed) sx =  1;
    if (pad.buttons[12]?.pressed) sy = -1;
    if (pad.buttons[13]?.pressed) sy =  1;

    const ax6 = pad.axes[6], ax7 = pad.axes[7];
    if (typeof ax6 === "number" && Math.abs(ax6) > 0.5) sx = Math.sign(ax6);
    if (typeof ax7 === "number" && Math.abs(ax7) > 0.5) sy = Math.sign(ax7);

    if (sx || sy) { ax = sx; ay = sy; }

    const a = !!pad.buttons[0]?.pressed;
    const b = !!pad.buttons[1]?.pressed;
    const x = !!pad.buttons[2]?.pressed;
    const y = !!pad.buttons[3]?.pressed;
    const rb = !!pad.buttons[5]?.pressed;
    const lb = !!pad.buttons[4]?.pressed;
    const sel = !!pad.buttons[8]?.pressed;   // Select/Back — leaderboard
    const st = !!pad.buttons[9]?.pressed;
    if (a || b) jumpDown = true;
    if (x || rb || lb) dashDown = true;
    if (st) pauseDown = true;
    if ((a || b) && !padPrev.jump) {
      jumpEdge = true;
      if (a) startEdge = true;
    }
    if ((x || rb || lb) && !padPrev.dash) dashEdge = true;
    if (st && !padPrev.pause) { pauseEdge = true; startEdge = true; }
    if (y && !padPrev.y) { dailyEdge = true; talkEdge = true; }
    if (sel && !padPrev.sel) boardEdge = true;
    padPrev.jump = a || b; padPrev.dash = x || rb || lb; padPrev.pause = st;
    padPrev.y = y; padPrev.sel = sel;
  } else {
    padPrev.jump = jumpDown; padPrev.dash = dashDown; padPrev.pause = pauseDown;
    padPrev.y = false; padPrev.sel = false;
  }

  if (TOUCH.active) {
    if (TOUCH.ax || TOUCH.ay) { ax = TOUCH.ax; ay = TOUCH.ay; }
    if (TOUCH.jump) jumpDown = true;
    if (TOUCH.dash) dashDown = true;
    if (TOUCH.pause) pauseDown = true;
    if (TOUCH.jump && !touchPrev.jump) jumpEdge = true;
    if (TOUCH.dash && !touchPrev.dash) dashEdge = true;
    if (TOUCH.pause && !touchPrev.pause) pauseEdge = true;
    touchPrev.jump = TOUCH.jump; touchPrev.dash = TOUCH.dash; touchPrev.pause = TOUCH.pause;
  }

  const len = Math.hypot(ax, ay);
  if (len > 1) { ax /= len; ay /= len; }
  // After focus returns, require every control to pass through neutral once.
  // Browsers can miss keyup/touchend while switching tabs or apps; accepting
  // those stale inputs is indistinguishable from the game moving by itself.
  if (focusInputLock) {
    const neutral = Math.abs(ax) < 0.01 && Math.abs(ay) < 0.01 &&
      !jumpDown && !dashDown && !pauseDown;
    if (focusReady && neutral) focusInputLock = false;
    return {
      ax: 0, ay: 0, jumpDown: false, jumpEdge: false, dashEdge: false,
      pauseEdge: false, startEdge: false, talkEdge: false, dailyEdge: false, boardEdge: false,
    };
  }
  return { ax, ay, jumpDown, jumpEdge, dashEdge, pauseEdge, startEdge, talkEdge, dailyEdge, boardEdge };
}

function clearJust() { for (const k in just) delete just[k]; }

function releaseTransientInput() {
  for (const k in keys) delete keys[k];
  clearJust();
  TOUCH.ax = 0; TOUCH.ay = 0;
  TOUCH.jump = false; TOUCH.dash = false; TOUCH.pause = false;
  touchPrev.jump = false; touchPrev.dash = false; touchPrev.pause = false;
  padPrev.jump = false; padPrev.dash = false; padPrev.pause = false;
  padPrev.y = false; padPrev.sel = false;
  const nub = document.getElementById("nub");
  if (nub) nub.style.transform = "";
  for (const id of ["btnJump", "btnDash", "btnPause"])
    document.getElementById(id)?.classList.remove("pressed");
}

// Touch controls — virtual stick + buttons, shown only once a touch device is detected
function setupTouch() {
  const root = document.getElementById("touch");
  const stick = document.getElementById("stick");
  const nub = document.getElementById("nub");
  applyTouchLayout();

  function enable() {
    if (TOUCH.active) return;
    TOUCH.active = true;
    syncTouchVisibility();
    resize();
  }
  if (matchMedia("(pointer: coarse)").matches) enable();
  addEventListener("touchstart", enable, { passive: true });

  let stickId = null;
  function setStick(t) {
    const r = stick.getBoundingClientRect();
    const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
    let dx = (t.clientX - cx) / (r.width / 2), dy = (t.clientY - cy) / (r.height / 2);
    const len = Math.hypot(dx, dy);
    if (len > 1) { dx /= len; dy /= len; }
    // Snap to 8-way intent past a small dead zone — full commitment, like keys.
    // Analog drift made movement mushy and dash aims unreliable on phones.
    const dead = 0.16;
    if (len < dead) {
      TOUCH.ax = 0; TOUCH.ay = 0;
    } else {
      const oct = Math.round(Math.atan2(dy, dx) / (Math.PI / 4));
      TOUCH.ax = Math.round(Math.cos(oct * Math.PI / 4));
      TOUCH.ay = Math.round(Math.sin(oct * Math.PI / 4));
    }
    nub.style.transform = "translate(" + (dx * 34).toFixed(0) + "px," + (dy * 34).toFixed(0) + "px)";
  }
  stick.addEventListener("touchstart", e => {
    e.preventDefault();
    stickId = e.changedTouches[0].identifier;
    setStick(e.changedTouches[0]);
  }, { passive: false });
  stick.addEventListener("touchmove", e => {
    e.preventDefault();
    for (const t of e.changedTouches) if (t.identifier === stickId) setStick(t);
  }, { passive: false });
  const stickEnd = e => {
    for (const t of e.changedTouches) {
      if (t.identifier === stickId) {
        stickId = null;
        TOUCH.ax = 0; TOUCH.ay = 0;
        nub.style.transform = "";
      }
    }
  };
  stick.addEventListener("touchend", stickEnd);
  stick.addEventListener("touchcancel", stickEnd);

  function bindBtn(id, prop) {
    const el = document.getElementById(id);
    el.addEventListener("touchstart", e => {
      e.preventDefault();
      TOUCH[prop] = true;
      el.classList.add("pressed");
      if (navigator.vibrate) navigator.vibrate(10);
    }, { passive: false });
    const up = e => {
      e.preventDefault();
      TOUCH[prop] = false;
      el.classList.remove("pressed");
    };
    el.addEventListener("touchend", up, { passive: false });
    el.addEventListener("touchcancel", up, { passive: false });
  }
  bindBtn("btnJump", "jump");
  bindBtn("btnDash", "dash");
  bindBtn("btnPause", "pause");
}

// . empty  # solid  S spike (auto-oriented)  P start  C checkpoint  B berry  G goal
function buildLevel(w, h, fn) {
  const grid = Array.from({ length: h }, () => Array(w).fill("."));
  const set = (c, r, ch) => { if (r >= 0 && r < h && c >= 0 && c < w) grid[r][c] = ch; };
  const rect = (c0, r0, c1, r1, ch) => {
    for (let r = r0; r <= r1; r++) for (let c = c0; c <= c1; c++) set(c, r, ch || "#");
  };
  const seg = (c0, c1, top) => rect(c0, top, c1, h - 1, "#");
  fn({ set, rect, seg });
  return grid.map(r => r.join(""));
}

function drawMap(gg, map, x, y, flip, pal) {
  const P = pal || SPR_PAL;
  for (let r = 0; r < map.length; r++) {
    const row = map[r];
    for (let c = 0; c < row.length; c++) {
      const ch = flip ? row[row.length - 1 - c] : row[c];
      const col = P[ch];
      if (col) { gg.fillStyle = col; gg.fillRect(x + c, y + r, 1, 1); }
    }
  }
}

// Explanatory text uses one lane. Lower-priority notices wait instead of
// painting over level titles, dialogue, required lessons, or attack warnings.
const NOTICE_PRIORITY = Object.freeze({ STATUS: 20, RUN: 30, TUTORIAL: 60, BOSS: 80, CONTROL: 90 });
let noticeSeq = 0;

function resetNotices() {
  S.hint = null;
  S.hintQueue = [];
}

function queueNotice(text, duration = 3, priority = NOTICE_PRIORITY.STATUS) {
  if (!text) return null;
  if (S.hint && S.hint.text === text) {
    S.hint.t = Math.max(S.hint.t, duration);
    S.hint.duration = Math.max(S.hint.duration, duration);
    return S.hint;
  }
  const queued = S.hintQueue.find(notice => notice.text === text);
  if (queued) {
    queued.t = Math.max(queued.t, duration);
    queued.duration = Math.max(queued.duration, duration);
    queued.priority = Math.max(queued.priority, priority);
    S.hintQueue.sort((a, b) => b.priority - a.priority || a.seq - b.seq);
    return queued;
  }
  const notice = { text, t: duration, duration, priority, seq: noticeSeq++ };
  if (S.hint && priority > S.hint.priority) {
    S.hintQueue.push(S.hint);
    S.hint = null;
  }
  S.hintQueue.push(notice);
  S.hintQueue.sort((a, b) => b.priority - a.priority || a.seq - b.seq);
  return notice;
}

function rootWarningActive() {
  return !!(S.boss && S.boss.kind === "unbloomed" && S.boss.arm && S.boss.arm.warm > 0);
}

function openingLessonNeeded() {
  return !!(S.mode === "play" && S.levelIdx === 0 && !S.bloomLessonDone &&
    S.player && S.player.x >= 15 * TILE);
}

function noticeBlocked() {
  return S.bannerT > 0 || !!S.talk || rootWarningActive() || openingLessonNeeded();
}

function updateNoticeQueue(dt) {
  if (noticeBlocked()) return;
  if (!S.hint && S.hintQueue.length) S.hint = S.hintQueue.shift();
  if (!S.hint) return;
  S.hint.t -= dt;
  if (S.hint.t <= 0) {
    S.hint = null;
    if (S.hintQueue.length) S.hint = S.hintQueue.shift();
  }
}

function beginDevAttempt() {

function recordDevAttempt(outcome, death = false) {
  if (!DEV) return;
  const label = String(outcome || "unknown").slice(0, 48);
  const seconds = Math.max(0, S.score.time - DEV_METRICS.startedAt);
  DEV_METRICS.attempts.push({ level: S.levelIdx, outcome: label, seconds: Math.round(seconds * 100) / 100 });
  if (DEV_METRICS.attempts.length > 40) DEV_METRICS.attempts.shift();
  if (death) DEV_METRICS.deaths[label] = (DEV_METRICS.deaths[label] || 0) + 1;
  DEV_METRICS.startedAt = S.score.time;
}

function devMetricsSnapshot() {
  return {
    deaths: { ...DEV_METRICS.deaths },
    attempts: DEV_METRICS.attempts.map(a => ({ ...a })),

function loadLevel(idx) {
  S.levelIdx = idx;
  const L = LEVELS[idx];
  resetNotices();
  // MIRRORED daily: the whole cave flips — maps, residents, shelves
  LEVEL = dMod("mirror") ? L.map.map(r => r.split("").reverse().join("")) : L.map;
  ROWS = LEVEL.length; COLS = LEVEL[0].length;
  WORLD_W = COLS * TILE; WORLD_H = ROWS * TILE;
  PAL = PALS[L.pal];

  S.berries = 0; S.berriesTotal = 0;
  S.berryList = []; S.keepsakeList = []; S.checkpoints = []; S.descentMercy = null; S.blooms = []; S.particles = []; S.trail = [];
  S.goal = null; S.goalOpen = 0; S.winT = 0; S.deathT = 0;
  S.reachFinalFuelArmed = false;
  S.shakeT = 0; S.freezeT = 0; S.jumpHeldForCut = false;
  S.bannerT = 2.4;
  if (L.unlockText) queueNotice(L.unlockText, 3.6, NOTICE_PRIORITY.TUTORIAL);
  SPIKES = []; STATIC_LIGHTS = []; DECOR = []; SPORES = []; ENEMY_SPAWNS = [];
  S.memoryObj = null; S.boss = null; S.bossDoor = null; S.shogGates = false;
  S.movers = (L.movers || []).map(m => {
    const c0 = dMod("mirror") ? COLS - 1 - m.c1 : m.c0;
    const c1 = dMod("mirror") ? COLS - 1 - m.c0 : m.c1;
    return {
      x: c0 * TILE, w: (c1 - c0 + 1) * TILE,
      yA: m.rA * TILE, yB: m.rB * TILE,
      period: m.period, phase: m.phase || 0, shift: 0,
      y: m.rA * TILE,
    };
  });
  if (L.boss) {
    S.boss = {
      kind: L.boss, state: "intro", t: 0, pips: 3,
      arm: null, shots: [], bolts: [], lanes: [], windowHint: false,
      floorPulseT: 0, capFlash: 0, sweepHints: 0, sweepN: 0,
      sweepSide: false, rootPhase: 0, rootPhaseN: 0, lastRootTier: null,
      grace: true,   // until the first successful hit, windows run 1.45x longer
    };
    if (L.boss === "unbloomed") {
      S.boss.x = 31.5 * TILE; S.boss.y = 6 * TILE; S.boss.homeY = 6 * TILE;
    } else if (L.boss === "barrow") {
      S.boss.x = 24 * TILE; S.boss.y = 13 * TILE - BARROW.H; S.boss.dir = 1;
      S.boss.spitN = 0; S.boss.spitT = 0;
    } else if (L.boss === "chorus") {
      S.boss.x = 20 * TILE; S.boss.y = 10 * TILE;
      S.boss.wisps = [];
    }
  }
  S.talk = null;
  S.npcs = (L.npcs || []).map(n => ({
    ...n,
    x: (dMod("mirror") ? COLS - 1 - n.c : n.c) * TILE + 2,
    y: (n.r + 1) * TILE - NPC_H[n.sprite],
    ph: Math.random() * 6,
  }));

  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      const ch = LEVEL[y][x];
      const px = x * TILE, py = y * TILE;
      if (ch === "P") {
        S.spawn = { x: px + 3, y: py + 4 };
        S.checkPt = { x: S.spawn.x, y: S.spawn.y };
      } else if (ch === "B") {
        S.berryList.push({ x: px + 4, y: py + 4, w: 8, h: 8, taken: false });
        S.berriesTotal++;
      } else if (ch === "C") {
        S.checkpoints.push({ x: px, y: py, w: TILE, h: TILE, active: false });
      } else if (ch === "G") {
        S.goal = { x: px, y: py - 4, w: TILE, h: TILE + 8 };
      } else if (ch === "S") {
        let dir = "up";
        if (isSolid(tileAt(x, y + 1))) dir = "up";
        else if (isSolid(tileAt(x, y - 1))) dir = "down";
        else if (isSolid(tileAt(x - 1, y))) dir = "right";
        else if (isSolid(tileAt(x + 1, y))) dir = "left";
        SPIKES.push({ tx: x, ty: y, dir });
      } else if (ch === "M") {
        S.memoryObj = { x: px + 1, y: py, w: 14, h: 16 };
      } else if (ch === "K" && L.keepsakeId && (L.repeatKeepsake || !hasKeepsake(L.keepsakeId))) {
        S.keepsakeList.push({ x: px + 2, y: py + 1, w: 12, h: 14, id: L.keepsakeId, taken: false });
      } else if (ch === "e" || ch === "E") {
        ENEMY_SPAWNS.push({ t: "slug", x: px + 2, y: py + TILE - 8, fast: ch === "E" });
      } else if (ch === "f") {
        ENEMY_SPAWNS.push({ t: "puff", x: px + 3, y: py + 3 });
      } else if (ch === "w") {
        ENEMY_SPAWNS.push({ t: "wisp", x: px + 4, y: py + 4 });
      } else if (ch === "k") {
        ENEMY_SPAWNS.push({ t: "skitter", x: px + 2, y: py + TILE - 6 });
      } else if (ch === "s") {
        ENEMY_SPAWNS.push({ t: "spitter", x: px + 2, y: py + TILE - 12 });
      } else if (ch === "n") {
        ENEMY_SPAWNS.push({ t: "mine", x: px + 4, y: py + 4 });
      }
    }
  }

  if (mercyRetriesEnabled()) {
    for (const cp of L.mercyCheckpoints || []) {
      S.checkpoints.push({
        x: cp.c * TILE,
        y: cp.r * TILE,
        w: TILE,
        h: TILE,
        active: false,
        mercy: true,
      });
    }
    if (L.descentMercy) {
      S.descentMercy = {
        triggerY: L.descentMercy.triggerRow * TILE,
        x: L.descentMercy.c * TILE + 3,
        y: L.descentMercy.r * TILE + 4,
        active: false,
      };
    }
  }

  // On dream nights the cave remembers more of its children — seeded surge,
  // identical for everyone running today's spore. Clones spawn a few tiles
  // away and come back wrong: faster, hungrier, or changed outright.
  if (S.daily) {
    const rand = seededRand(dailySeedStr() + ":" + idx);
    const gentle = L.name === "THE SKITTERWAY";   // the low-ceiling gauntlet stays fair
    const chance = gentle ? 0.25 : 0.55;
    const needsFloor = t => t === "slug" || t === "skitter" || t === "spitter";
    const extra = [];
    for (const sp of ENEMY_SPAWNS) {
      if (rand() >= chance) continue;
      const sgn = rand() < 0.5 ? -1 : 1;
      let nx = null;
      for (const mag of [40, 56, 24]) {
        const cx = sp.x + sgn * mag;
        const tx = Math.floor((cx + 5) / TILE), ty = Math.floor((sp.y + 4) / TILE);
        if (cx <= 4 || cx >= WORLD_W - 16 || isSolid(tileAt(tx, ty))) continue;
        if (needsFloor(sp.t) && !isSolid(tileAt(tx, ty + 1))) continue;
        nx = cx; break;
      }
      if (nx === null) continue;
      const clone = { ...sp, x: nx };
      if (!gentle) {
        clone.hard = true;
        if (clone.t === "slug") clone.fast = true;        // hungrier
        else if (clone.t === "puff") clone.t = "wisp";    // changed outright
      }
      extra.push(clone);
    }
    ENEMY_SPAWNS.push(...extra);
  }

  // The Stopped: real players fell here, and here they stand
  S.fallen = [];
  {
    const seen = {};
    for (const f of FALLEN_CACHE[idx] || []) {
      let fx = f.x;
      if (dMod("mirror")) fx = WORLD_W - 16 - fx;
      const key = ((fx / 32) | 0) + "," + ((f.y / 32) | 0);
      if (seen[key]) continue;
      seen[key] = 1;
      if (Math.hypot(fx - S.spawn.x, f.y - S.spawn.y) < 80) continue;
      S.fallen.push({ x: fx, y: f.y, w: 10, h: 12, ph: Math.random() * 6, freed: false });
      if (S.fallen.length >= 10) break;
    }
  }

  // Flora on walkable ground + vines under ceilings
  const seed = idx * 977;
  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      if (!isSolid(tileAt(x, y))) continue;
      const px = x * TILE, py = y * TILE;
      if (tileAt(x, y - 1) === ".") {
        const r = rnd01(x * 7 + y * 131 + seed);
        if (r < 0.5) {
          const type = r < 0.09 ? "glow" : r < 0.28 ? "mush" : "grass";
          DECOR.push({ x: px + 3 + ((rnd01(x * 13 + y + seed) * 10) | 0), y: py, type, ph: rnd01(x + y * 57) * Math.PI * 2 });
        }
      }
      if (tileAt(x, y + 1) === "." && rnd01(x * 31 + y * 17 + seed) < 0.22) {
        DECOR.push({ x: px + 4 + ((rnd01(x * 5 + y + seed) * 8) | 0), y: py + TILE, type: "vine", ph: rnd01(x * 3 + y) * Math.PI * 2, len: 6 + rnd01(x + y + seed) * 12 });
      }
    }
  }

  const nSp = Math.min(70, 24 + ((WORLD_W * WORLD_H) / 12000 | 0));
  for (let i = 0; i < nSp; i++) {
    SPORES.push({
      x: rnd01(i * 5 + 2 + seed) * WORLD_W,
      y: rnd01(i * 11 + 3 + seed) * WORLD_H,
      depth: 0.25 + rnd01(i * 3 + 1) * 1.15,
      drift: 4 + rnd01(i * 17 + 4) * 10,
      ph: rnd01(i * 23 + 5) * Math.PI * 2,
    });
  }

  spawnEnemies();
  bakeSky();
  bakeParallax();
  bakeTerrain();

  S.player = makePlayer(S.spawn.x, S.spawn.y);
  S.camLook = 0;
  S.camX = clamp(S.player.x - W / 2, 0, Math.max(0, WORLD_W - W));
  S.camY = clamp(S.player.y - H / 2, 0, Math.max(0, WORLD_H - H));
  beginDevAttempt();
}

// ── Baking: sky (dithered gradient) ────────────────────────────────────────
function bakeSky() {
  skyCv = mkCv(W, H);
  const c = skyCv.getContext("2d");
  const img = c.createImageData(W, H);
  const bayer = [[0, 2], [3, 1]];
  const steps = 9;
  for (let y = 0; y < H; y++) {
    const v = (y / H) * steps;
    const base = Math.floor(v), frac = v - base;
    for (let x = 0; x < W; x++) {
      const th = (bayer[y & 1][x & 1] + 0.5) / 4;
      const band = clamp(frac > th ? base + 1 : base, 0, steps);
      const col = mix(PAL.skyT, PAL.skyB, band / steps);
      const i = (y * W + x) * 4;
      img.data[i] = col[0]; img.data[i + 1] = col[1]; img.data[i + 2] = col[2]; img.data[i + 3] = 255;
    }
  }
  c.putImageData(img, 0, 0);
}

// ── Baking: parallax silhouette strips ─────────────────────────────────────
function bakeParallax() {
  const seed = S.levelIdx * 977;
  farCv = mkCv(480, H);
  const f = farCv.getContext("2d");
  f.fillStyle = rgb(PAL.far);
  for (let i = 0; i < 5; i++) {
    const x = 20 + i * 96 + rnd01(i * 3 + seed) * 50;
    const hgt = 52 + rnd01(i * 7 + seed) * 40;
    const cw = 36 + rnd01(i * 11 + seed) * 30;
    f.fillRect(x - 3, H - hgt, 7, hgt);
    f.fillRect(x - cw / 2, H - hgt - 4, cw, 11);
    f.fillRect(x - cw / 2 + 4, H - hgt - 8, cw - 8, 5);
    f.fillRect(x - cw / 2 + 9, H - hgt - 11, cw - 18, 3);
    // pale spots on caps
    f.fillStyle = rgb(mix(PAL.far, PAL.fog, 0.25));
    f.fillRect(x - cw / 4, H - hgt - 2, 3, 2);
    f.fillRect(x + cw / 5, H - hgt + 1, 2, 2);
    f.fillStyle = rgb(PAL.far);
  }
  midCv = mkCv(480, H);
  const m = midCv.getContext("2d");
  m.fillStyle = rgb(PAL.mid);
  for (let i = 0; i < 7; i++) {
    const x = 10 + i * 68 + rnd01(i * 13 + seed) * 36;
    const len = 14 + rnd01(i * 5 + seed) * 28;
    const wid = 7 + rnd01(i * 9 + seed) * 9;
    m.beginPath();
    m.moveTo(x - wid / 2, 0); m.lineTo(x + wid / 2, 0); m.lineTo(x, len);
    m.closePath(); m.fill();
    if (rnd01(i * 17 + seed) < 0.6) {
      const mh = 16 + rnd01(i * 19 + seed) * 16;
      const mw = 14 + rnd01(i * 23 + seed) * 12;
      const mx = x + 26;
      m.fillRect(mx - 2, H - mh, 4, mh);
      m.fillRect(mx - mw / 2, H - mh - 3, mw, 6);
      m.fillRect(mx - mw / 2 + 3, H - mh - 5, mw - 6, 3);
    }
  }
}

// ── Baking: autotiled terrain ──────────────────────────────────────────────
function bakeTerrain() {
  terrainCv = mkCv(WORLD_W, WORLD_H);
  const t = terrainCv.getContext("2d");
  const seed = S.levelIdx * 977;
  const rock = rgb(PAL.rock), rockHi = rgb(PAL.rockHi), rockLo = rgb(PAL.rockLo);
  const moss = rgb(PAL.moss), mossHi = rgb(PAL.mossHi), accent = rgb(PAL.accent);

  for (let ty = 0; ty < ROWS; ty++) {
    for (let tx = 0; tx < COLS; tx++) {
      if (!isSolid(tileAt(tx, ty))) continue;
      const px = tx * TILE, py = ty * TILE;
      const upO = !isSolid(tileAt(tx, ty - 1));
      const dnO = !isSolid(tileAt(tx, ty + 1));
      const lfO = !isSolid(tileAt(tx - 1, ty));
      const rtO = !isSolid(tileAt(tx + 1, ty));

      // Base with dithered 4x4 shade clusters
      t.fillStyle = rock;
      t.fillRect(px, py, TILE, TILE);
      for (let cy = 0; cy < 4; cy++) {
        for (let cx = 0; cx < 4; cx++) {
          const r = rnd01(tx * 53 + ty * 97 + cx * 7 + cy * 13 + seed);
          if (r < 0.16) { t.fillStyle = rockHi; t.fillRect(px + cx * 4, py + cy * 4, 4, 4); }
          else if (r > 0.8) { t.fillStyle = rockLo; t.fillRect(px + cx * 4, py + cy * 4, 4, 4); }
        }
      }
      // Speckle
      for (let i = 0; i < 4; i++) {
        const r = rnd01(tx * 131 + ty * 37 + i * 5 + seed);
        t.fillStyle = r < 0.5 ? rockHi : rockLo;
        t.fillRect(px + ((r * 371) % 14 | 0) + 1, py + ((r * 733) % 14 | 0) + 1, 1, 1);
      }

      // Edges
      if (upO) {
        t.fillStyle = moss;
        t.fillRect(px, py, TILE, 4);
        t.fillStyle = mossHi;
        t.fillRect(px, py, TILE, 1);
        for (let i = 0; i < 3; i++) {
          const r = rnd01(tx * 19 + i * 41 + seed);
          t.fillRect(px + (r * 14 | 0) + 1, py + 1, 2, 1 + (r * 2 | 0));
        }
        // moss drip down left/right rims
        if (lfO) t.fillRect(px, py, 1, 6);
        if (rtO) t.fillRect(px + TILE - 1, py, 1, 6);
      }
      if (dnO) {
        t.fillStyle = rockLo;
        t.fillRect(px, py + TILE - 3, TILE, 3);
        if (rnd01(tx * 29 + ty * 3 + seed) < 0.3) {
          t.fillRect(px + 4 + (rnd01(tx + seed) * 8 | 0), py + TILE, 2, 3 + (rnd01(tx * 3 + seed) * 4 | 0));
        }
      }
      if (lfO) { t.fillStyle = rockHi; t.fillRect(px, py + (upO ? 4 : 0), 1, TILE - (upO ? 4 : 0)); }
      if (rtO) { t.fillStyle = rockLo; t.fillRect(px + TILE - 1, py + (upO ? 4 : 0), 1, TILE - (upO ? 4 : 0)); }

      // Deep-rock details: cracks + glowing crystals
      const deep = !upO && !dnO && !lfO && !rtO;
      if (deep) {
        const r = rnd01(tx * 211 + ty * 173 + seed);
        if (r < 0.25) {
          t.fillStyle = rockLo;
          const cx0 = px + 3 + (r * 33 % 8 | 0), cy0 = py + 3 + (r * 77 % 8 | 0);
          t.fillRect(cx0, cy0, 1, 3); t.fillRect(cx0 + 1, cy0 + 2, 2, 1);
        } else if (r > 0.94 && STATIC_LIGHTS.length < 40) {
          t.fillStyle = accent;
          const cx0 = px + 5 + (r * 51 % 6 | 0), cy0 = py + 5 + (r * 91 % 6 | 0);
          t.fillRect(cx0, cy0, 2, 2);
          t.fillRect(cx0 + 1, cy0 - 1, 1, 1);
          STATIC_LIGHTS.push({ x: cx0 + 1, y: cy0 + 1, r: 16, a: 0.4, col: rgbs(PAL.accent), ga: 0.05, ph: r * 7 });
        }
      }

      // The Reach's outer shell is smooth stone: solid, but deliberately
      // different from the rough interior walls that the player can cling to.
      if (S.levelIdx === REACH_INDEX && (tx === 0 || tx === COLS - 1)) {
        const edgeX = tx === 0 ? px + TILE - 2 : px;
        t.fillStyle = rockHi;
        t.fillRect(edgeX, py, 2, TILE);
        t.fillStyle = accent;
        t.globalAlpha = 0.28;
        t.fillRect(edgeX, py + ((ty * 5) % 11), 2, 3);
        t.globalAlpha = 1;
      }
    }
  }

  // Spikes baked in
  for (const sp of SPIKES) {
    const px = sp.tx * TILE, py = sp.ty * TILE;
    t.fillStyle = rgb(PAL.spike);
    for (let i = 0; i < 4; i++) {
      t.beginPath();
      if (sp.dir === "up") {
        t.moveTo(px + i * 4, py + TILE); t.lineTo(px + i * 4 + 2, py + 5); t.lineTo(px + i * 4 + 4, py + TILE);
      } else if (sp.dir === "down") {
        t.moveTo(px + i * 4, py); t.lineTo(px + i * 4 + 2, py + TILE - 5); t.lineTo(px + i * 4 + 4, py);
      } else if (sp.dir === "right") {
        t.moveTo(px, py + i * 4); t.lineTo(px + TILE - 5, py + i * 4 + 2); t.lineTo(px, py + i * 4 + 4);
      } else {
        t.moveTo(px + TILE, py + i * 4); t.lineTo(px + 5, py + i * 4 + 2); t.lineTo(px + TILE, py + i * 4 + 4);
      }
      t.closePath(); t.fill();
    }
    t.fillStyle = rgb(PAL.spikeHi);
    for (let i = 0; i < 4; i++) {
      if (sp.dir === "up") t.fillRect(px + 1 + i * 4, py + 10, 1, 3);
      else if (sp.dir === "down") t.fillRect(px + 1 + i * 4, py + 3, 1, 3);
      else if (sp.dir === "right") t.fillRect(px + 3, py + 1 + i * 4, 3, 1);
      else t.fillRect(px + 10, py + 1 + i * 4, 3, 1);
    }
  }
}

// ── Collision ──────────────────────────────────────────────────────────────
function overlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function solidsNear(x, y, w, h) {
  const out = [];
  const x0 = Math.floor(x / TILE) - 1, y0 = Math.floor(y / TILE) - 1;
  const x1 = Math.floor((x + w) / TILE) + 1, y1 = Math.floor((y + h) / TILE) + 1;
  for (let ty = y0; ty <= y1; ty++) {
    for (let tx = x0; tx <= x1; tx++) {
      if (isSolid(tileAt(tx, ty)))
        out.push({ x: tx * TILE, y: ty * TILE, w: TILE, h: TILE, tx, ty });
    }
  }
  for (const b of S.blooms) {
    if (b.life > BLOOM_WILT * 0.3)
      out.push({ x: b.x, y: b.y, w: b.w, h: b.h, oneWay: true });
  }
  for (const m of S.movers) {
    out.push({ x: m.x, y: m.y, w: m.w, h: 8, oneWay: true, mover: true });
  }
  return out;
}

function solidBlocked(x, y, w, h) {
  const box = { x, y, w, h };
  for (const r of solidsNear(x, y, w, h)) {
    if (!r.oneWay && overlap(box, r)) return true;
  }
  return false;
}

function checkpointPathClear(p, cp) {
  const x0 = p.x + p.w / 2, y0 = p.y + p.h / 2;
  const x1 = cp.x + cp.w / 2, y1 = cp.y + cp.h / 2;
  const steps = Math.max(1, Math.ceil(Math.hypot(x1 - x0, y1 - y0) / 4));
  for (let i = 1; i < steps; i++) {
    const a = i / steps;
    if (isSolid(tileAt(Math.floor((x0 + (x1 - x0) * a) / TILE), Math.floor((y0 + (y1 - y0) * a) / TILE)))) return false;
  }
  return true;
}

function checkpointEligible(p, cp) {
  const px = p.x + p.w / 2, py = p.y + p.h / 2;
  const cx = cp.x + cp.w / 2, cy = cp.y + cp.h / 2;
  const dx = px - cx, dy = py - cy;
  if (Math.abs(dx) > 32 || Math.abs(dy) > 24) return false;

  // Approach from an open neighboring tile. This admits a close pass above or
  // beside the marker, but rejects reaching it through the platform below.
  const tx = Math.floor(cx / TILE), ty = Math.floor(cy / TILE);
  const ax = Math.abs(dx) >= Math.abs(dy) ? Math.sign(dx) : 0;
  const ay = ax === 0 ? Math.sign(dy) : 0;
  if (isSolid(tileAt(tx + ax, ty + ay))) return false;
  return checkpointPathClear(p, cp);
}

function activateCheckpoint(cp) {
  cp.active = true;
  S.checkPt = { x: cp.x + 3, y: cp.y - 4 };
  queueNotice("Checkpoint saved. You'll restart here.", 2.4, NOTICE_PRIORITY.STATUS);
  SFX.check();
  for (let i = 0; i < 10; i++) {
    burst(cp.x + 8, cp.y + 4, (Math.random() - 0.5) * 50, -40 - Math.random() * 40, 0.55, rgb(PAL.accent), 2);
  }
}

function updateDescentMercy(p) {
  const mercy = S.descentMercy;
  if (!mercy || mercy.active || p.y + p.h < mercy.triggerY) return false;
  mercy.active = true;
  S.checkPt = { x: mercy.x, y: mercy.y };
  queueNotice("If the shaft gets you, you'll restart here.", 2.4, NOTICE_PRIORITY.STATUS);
  SFX.check();
  for (let i = 0; i < 8; i++) {
    burst(p.x + p.w / 2, p.y + p.h / 2, (Math.random() - 0.5) * 45, -20 - Math.random() * 30, 0.45, rgb(PAL.accent), 2);
  }
  return true;
}

function moveAxis(p, dx, dy) {
  if (dx !== 0) {
    p.x += dx;
    for (const r of solidsNear(p.x, p.y, p.w, p.h)) {
      if (r.oneWay) continue;
      if (!overlap(p, r)) continue;
      // Ledge assist: pop up onto ledges you barely clip
      const lift = (p.y + p.h) - r.y;
      if (lift > 0 && lift <= LEDGE_ASSIST && p.vy >= -30 &&
          !solidBlocked(p.x, r.y - p.h, p.w, p.h)) {
        p.y = r.y - p.h;
        p.grounded = true; p.canDash = true; p.spores = MAX_SPORES; p.chainN = 0; p.coyote = COYOTE;
        continue;
      }
      p.x = dx > 0 ? r.x - p.w : r.x + r.w;
      p.vx = 0;
      if (p.dashing) endDash(p);
    }
  }
  if (dy !== 0) {
    const prevBottom = p.y + p.h;
    p.y += dy;
    for (const r of solidsNear(p.x, p.y, p.w, p.h)) {
      if (!overlap(p, r)) continue;
      if (r.oneWay && (dy < 0 || prevBottom > r.y + 1)) continue;
      if (dy > 0) {
        p.y = r.y - p.h;
        p.vy = 0;
        p.grounded = true;
        // Only REAL ground (incl. moving shelves) refreshes the dash and
        // refills spores — landing on your own bloom does not
        if (!r.oneWay || r.mover) { p.canDash = true; p.spores = MAX_SPORES; p.chainN = 0; }
        p.coyote = COYOTE;
        if (p.dashing) endDash(p);
      } else {
        // Ceiling corner forgiveness
        const oL = (p.x + p.w) - r.x, oR = (r.x + r.w) - p.x;
        if (oL > 0 && oL <= CORNER_NUDGE && !solidBlocked(p.x - oL, p.y, p.w, p.h)) { p.x -= oL; continue; }
        if (oR > 0 && oR <= CORNER_NUDGE && !solidBlocked(p.x + oR, p.y, p.w, p.h)) { p.x += oR; continue; }
        p.y = r.y + r.h;
        p.vy = 0;
        if (p.dashing) endDash(p);
      }
    }
  }
}

function onGround(p) {
  const probe = { x: p.x + 1, y: p.y + p.h, w: p.w - 2, h: 2 };
  for (const r of solidsNear(probe.x, probe.y, probe.w, probe.h)) {
    if (r.oneWay && r.y < p.y + p.h - 1) continue;
    if (overlap(probe, r)) return true;
  }
  return false;
}

const wallsUnlocked = () => S.levelIdx >= WALL_LEVEL;
// HEAVY AIR no longer removes the glide — it just makes it sink faster.
// The Swallow must always be survivable.
const glideUnlocked = () => S.levelIdx >= GLIDE_LEVEL;

// -1 = wall on the left, 1 = wall on the right, 0 = none (real tiles only)
function touchingWallDir(p) {
  const l = { x: p.x - 1, y: p.y + 2, w: 1, h: p.h - 4 };
  const r = { x: p.x + p.w, y: p.y + 2, w: 1, h: p.h - 4 };
  for (const s of solidsNear(p.x - 2, p.y, p.w + 4, p.h)) {
    if (s.oneWay) continue;
    if (S.levelIdx === REACH_INDEX && (s.tx <= 0 || s.tx >= COLS - 1)) continue;
    if (overlap(r, s)) return 1;
    if (overlap(l, s)) return -1;
  }
  return 0;
}

function onRealGround(p) {
  const probe = { x: p.x + 1, y: p.y + p.h, w: p.w - 2, h: 3 };
  for (const r of solidsNear(probe.x, probe.y, probe.w, probe.h)) {
    if (r.oneWay && !r.mover) continue;
    if (overlap(probe, r)) return true;
  }
  return false;
}

function hitSpike(p) {
  const hb = { x: p.x + 2, y: p.y + 2, w: p.w - 4, h: p.h - 3 };
  for (const sp of SPIKES) {
    const box = { x: sp.tx * TILE + 3, y: sp.ty * TILE + 3, w: 10, h: 10 };
    if (overlap(hb, box)) return true;
  }
  return p.y > WORLD_H + 8;
}

// ── Actions ────────────────────────────────────────────────────────────────
function burst(x, y, vx, vy, life, col, s) {
  S.particles.push({ x, y, vx, vy, life, max: life, col, s });
}

// ── Enemies ────────────────────────────────────────────────────────────────
// What took you — named for the death label
const ENEMY_NAMES = {
  slug: "a slug", puff: "a spore puff", wisp: "a wisp",
  skitter: "a skitter", spitter: "a spitter", mine: "a sporemine",
};
const REACH_FINAL_FUEL_CEILING = 56 * TILE;
const REACH_FINAL_ARM_Y = 54 * TILE;
const REACH_FINAL_RESET_Y = 55 * TILE;

function enemyFromSpawn(sp) {
  const sm = dMod("restless") ? 1.35 : 1;   // RESTLESS: everything hurries
  let e;
  if (sp.t === "slug")
    e = { t: "slug", x: sp.x, y: sp.y, w: 12, h: 8, dir: 1, speed: (sp.fast ? 44 : 22) * sm, fast: sp.fast, ph: Math.random() * 6, pauseT: 0 };
  else if (sp.t === "puff")
    e = { t: "puff", cx: sp.x, cy: sp.y, x: sp.x, y: sp.y, w: 10, h: 10, ph: Math.random() * 6 };
  else if (sp.t === "skitter")
    e = { t: "skitter", x: sp.x, y: sp.y, w: 12, h: 6, dir: Math.random() < 0.5 ? -1 : 1, speed: 165 * sm * (sp.hard ? 1.2 : 1), ph: Math.random() * 6, pauseT: 0 };
  else if (sp.t === "spitter")
    e = { t: "spitter", x: sp.x, y: sp.y, w: 12, h: 12, hard: sp.hard, cd: (sp.hard ? 0.6 : 1) + Math.random(), ph: Math.random() * 6 };
  else if (sp.t === "mine")
    e = { t: "mine", cx: sp.x, cy: sp.y, x: sp.x, y: sp.y, w: 10, h: 10, armT: 0, ph: Math.random() * 6 };
  else
    e = { t: "wisp", x: sp.x, y: sp.y, hx: sp.x, hy: sp.y, w: 8, h: 8, ph: Math.random() * 6 };
  e.spawnX = sp.x;
  e.spawnY = sp.y;
  return e;
}

function spawnEnemies() {
  S.enemies = ENEMY_SPAWNS.map(enemyFromSpawn);
  S.eshots = [];
}

function resetReachFinalFuel() {
  if (!S.reachTrial || S.levelIdx !== REACH_INDEX) return false;
  const lowerEnemies = S.enemies.filter(e => e.spawnY >= REACH_FINAL_FUEL_CEILING);
  const finalSpawns = ENEMY_SPAWNS.filter(sp => sp.y < REACH_FINAL_FUEL_CEILING);
  S.enemies = lowerEnemies.concat(finalSpawns.map(enemyFromSpawn));
  S.eshots = [];
  return true;
}

function updateReachFinalFuelReset(p) {
  if (!S.reachTrial || S.levelIdx !== REACH_INDEX) {
    S.reachFinalFuelArmed = false;
    return false;
  }
  if (p.y < REACH_FINAL_ARM_Y) S.reachFinalFuelArmed = true;
  if (!S.reachFinalFuelArmed || !p.grounded || p.y <= REACH_FINAL_RESET_Y) return false;
  S.reachFinalFuelArmed = false;
  if (!resetReachFinalFuel()) return false;
  queueNotice("The last climb resets.", 2.2, NOTICE_PRIORITY.STATUS);
  return true;
}

function killEnemy(e, byDash) {
  e.dead = true;
  S.score.freed++;
  // Enemies are fuel: every kill refunds a spore
  S.player.spores = Math.min(MAX_SPORES, S.player.spores + 1);
  SFX.pop();
  if (byDash) { S.shakeT = 0.1; S.shakeMag = 1.5; }
  for (let i = 0; i < 10; i++) {
    const a = Math.random() * Math.PI * 2;
    burst(e.x + e.w / 2, e.y + e.h / 2, Math.cos(a) * 70, Math.sin(a) * 70 - 20, 0.45,
      i & 1 ? rgb(PAL.accent) : C.body, 2);
  }
}

function updateEnemies(dt) {
  const p = S.player;
  for (const e of S.enemies) {
    if (e.t === "slug") {
      // They hesitate at the edge before turning back — the last place
      // they meant to keep going from
      if (e.pauseT > 0) {
        e.pauseT -= dt;
      } else {
        const nx = e.x + e.dir * e.speed * dt;
        const aheadX = e.dir > 0 ? nx + e.w + 1 : nx - 2;
        const atx = Math.floor(aheadX / TILE);
        const midTy = Math.floor((e.y + e.h - 2) / TILE);
        const footTy = Math.floor((e.y + e.h + 3) / TILE);
        if (isSolid(tileAt(atx, midTy)) || !isSolid(tileAt(atx, footTy))) {
          e.dir *= -1;
          e.pauseT = 0.55;
        } else {
          e.x = nx;
        }
      }
    } else if (e.t === "puff") {
      e.x = e.cx + Math.sin(S.time * 0.9 + e.ph) * 10;
      e.y = e.cy + Math.sin(S.time * 1.4 + e.ph) * 14;
    } else if (e.t === "skitter") {
      // fast floor racer — hop it
      const nx = e.x + e.dir * e.speed * dt;
      const aheadX = e.dir > 0 ? nx + e.w + 1 : nx - 2;
      const atx = Math.floor(aheadX / TILE);
      const midTy = Math.floor((e.y + e.h - 2) / TILE);
      const footTy = Math.floor((e.y + e.h + 3) / TILE);
      if (isSolid(tileAt(atx, midTy)) || !isSolid(tileAt(atx, footTy))) e.dir *= -1;
      else e.x = nx;
      if (Math.random() < 0.25)
        burst(e.x + (e.dir > 0 ? 0 : e.w), e.y + e.h, -e.dir * 25, -8, 0.2, rgb(PAL.rockHi), 1);
    } else if (e.t === "spitter") {
      // stationary turret — lobs a slow glob when you linger in range
      e.cd -= dt;
      const dx = (p.x + 5) - (e.x + 6);
      const d = Math.hypot(dx, (p.y + 5) - (e.y + 6));
      if (e.cd <= 0 && d < 150) {
        e.cd = e.hard ? 1.6 : 2.6;
        S.eshots.push({ x: e.x + 4, y: e.y - 4, vx: Math.sign(dx) * (40 + Math.abs(dx) * 0.45), vy: -175, grav: true, w: 7, h: 7 });
        blip(300, 170, 0.12, "square", 0.09);
        burst(e.x + 6, e.y - 2, 0, -35, 0.3, "#f06080", 2);
      }
    } else if (e.t === "mine") {
      // drifting sporemine — arms when you come close, bursts into four pellets
      e.x = e.cx + Math.sin(S.time * 0.8 + e.ph) * 8;
      e.y = e.cy + Math.sin(S.time * 1.1 + e.ph) * 10;
      if (e.armT > 0) {
        e.armT -= dt;
        if (Math.random() < 0.6)
          burst(e.x + 5, e.y + 5, (Math.random() - 0.5) * 30, (Math.random() - 0.5) * 30, 0.2, "#f06080", 1);
        if (e.armT <= 0) {
          e.dead = true;
          SFX.pop();
          for (const v of [[62, 62], [-62, 62], [62, -62], [-62, -62]])
            S.eshots.push({ x: e.x + 3, y: e.y + 3, vx: v[0], vy: v[1], w: 6, h: 6 });
          for (let i = 0; i < 8; i++) {
            const a = Math.random() * Math.PI * 2;
            burst(e.x + 5, e.y + 5, Math.cos(a) * 70, Math.sin(a) * 70, 0.4, "#f06080", 2);
          }
        }
      } else if (Math.hypot((p.x + 5) - (e.x + 5), (p.y + 5) - (e.y + 5)) < 44) {
        e.armT = 0.6;
        blip(700, 950, 0.1, "square", 0.1);
      }
    } else {
      const dx = (p.x + 5) - (e.x + 4), dy = (p.y + 5) - (e.y + 4);
      const d = Math.hypot(dx, dy);
      if (d < 90 && !S.wispHinted) {
        S.wispHinted = true;
        queueNotice("Air-dash through gray sporelings to wake them up.", 4, NOTICE_PRIORITY.TUTORIAL);
      }
      // Wisps hang back while someone living is speaking
      if (d < 110 && d > 4 && !S.talk) {
        const wv = dMod("restless") ? 40 : 30;
        e.x += dx / d * wv * dt;
        e.y += dy / d * wv * dt;
      } else {
        e.x += (e.hx - e.x) * dt * 0.6;
        e.y += (e.hy - e.y + Math.sin(S.time * 2 + e.ph) * 8) * dt * 0.6;
      }
      if (Math.random() < 0.08)
        burst(e.x + 4, e.y + 4, (Math.random() - 0.5) * 12, (Math.random() - 0.5) * 12, 0.35, rgb(PAL.accent), 1);
    }

    if (!overlap(p, e)) continue;
    if (p.dashing) { killEnemy(e, true); continue; }
    if (p.vy > 40 && (p.y + p.h) - e.y < 7) {
      // Stomp: bounce + dash re-armed
      killEnemy(e, false);
      p.vy = -235;
      p.canDash = true;
      p.grounded = false;
      p.squish = 1.25; p.squishT = 0.1;
      SFX.stomp();
      continue;
    }
    const eb = { x: e.x + 2, y: e.y + 2, w: e.w - 4, h: e.h - 4 };
    const pb = { x: p.x + 2, y: p.y + 2, w: p.w - 4, h: p.h - 4 };
    if (p.invuln <= 0 && overlap(pb, eb)) hurtPlayer(e.x + e.w / 2, ENEMY_NAMES[e.t] || "one of the stopped");
  }
  S.enemies = S.enemies.filter(e => !e.dead);

  // Enemy projectiles: spitter globs (arcing) and mine pellets (straight)
  for (const sh of S.eshots) {
    if (sh.grav) sh.vy += 620 * dt;
    sh.x += sh.vx * dt;
    sh.y += sh.vy * dt;
    if (p.invuln <= 0 && overlap(p, sh)) { hurtPlayer(sh.x + 3, "a spore glob"); sh.dead = true; }
    if (!sh.ghost && isSolid(tileAt(Math.floor((sh.x + 3) / TILE), Math.floor((sh.y + 3) / TILE)))) {
      sh.dead = true;
      for (let i = 0; i < 3; i++)
        burst(sh.x + 3, sh.y + 3, (Math.random() - 0.5) * 40, -20 * Math.random(), 0.25, "#f06080", 1);
    }
    if (sh.ghost && sh.floor && sh.y + sh.h >= sh.floor) {
      sh.dead = true;
      for (let i = 0; i < 3; i++)
        burst(sh.x + 3, sh.y + 3, (Math.random() - 0.5) * 40, -25 * Math.random(), 0.25, "#f06080", 1);
    }
    if (sh.x < -20 || sh.x > WORLD_W + 20 || sh.y > WORLD_H + 20) sh.dead = true;
  }
  S.eshots = S.eshots.filter(sh => !sh.dead);
}

// ── Moving platforms (fungal shelves / boss elevators) ─────────────────────
function updateMovers(dt) {
  const p = S.player;
  for (const m of S.movers) {
    const prevY = m.y;
    const u = S.time / m.period + m.phase + (m.shift || 0);
    m.y = m.yA + (m.yB - m.yA) * tri(u);
    const dy = m.y - prevY;
    if (p && !p.dashing && p.vy >= 0 &&
        p.y + p.h >= prevY - 2 && p.y + p.h <= prevY + 3 &&
        p.x + p.w > m.x && p.x < m.x + m.w) {
      p.y += dy;
      p.grounded = true;
    }
  }
}

function drawMovers() {
  for (const m of S.movers) {
    const x = Math.round(m.x), y = Math.round(m.y);
    g.fillStyle = C.bloomStem;
    g.fillRect(x + m.w / 2 - 2, y + 3, 4, 5);
    g.fillStyle = rgb(PAL.rockHi);
    g.fillRect(x, y, m.w, 4);
    g.fillStyle = rgb(PAL.mossHi);
    g.fillRect(x, y, m.w, 1);
    g.fillStyle = rgb(PAL.rockLo);
    g.fillRect(x + 2, y + 4, m.w - 4, 2);
    g.fillStyle = rgb(PAL.accent);
    g.globalAlpha = 0.5 + Math.sin(S.time * 3 + m.x) * 0.2;
    g.fillRect(x + 3, y + 1, 2, 2);
    g.fillRect(x + m.w - 5, y + 1, 2, 2);
    g.globalAlpha = 1;
  }
}

function bloomPlacement(p) {
  const centered = Math.round(p.x + p.w / 2 - BLOOM_W / 2);
  const lead = clamp(p.vx * BLOOM_PREDICT_TIME, -BLOOM_LEAD_MAX, BLOOM_LEAD_MAX);
  const desired = Math.round(centered + lead);
  const y = Math.round(p.y + p.h);
  const minX = 0, maxX = Math.max(0, WORLD_W - BLOOM_W);
  const preferred = clamp(desired, minX, maxX);
  if (!solidBlocked(preferred, y, BLOOM_W, BLOOM_H)) return { x: preferred, y, lead };

  // Near a wall, walk the cap back toward the player's centered position first.
  // One-way blooms and moving shelves are intentionally ignored by solidBlocked.
  const towardCenter = Math.sign(centered - preferred) || (lead >= 0 ? -1 : 1);
  for (let d = 1; d <= BLOOM_W; d++) {
    const candidates = [preferred + towardCenter * d, preferred - towardCenter * d];
    for (const raw of candidates) {
      const x = clamp(raw, minX, maxX);
      if (!solidBlocked(x, y, BLOOM_W, BLOOM_H)) return { x, y, lead: x - centered };
    }
  }
  return { x: preferred, y, lead };
}

function spawnBloom(p) {
  if (S.blooms.length >= MAX_BLOOMS) {
    const oldest = S.blooms.reduce((a, b) => a.age > b.age ? a : b);
    oldest.life = Math.min(oldest.life, BLOOM_WILT * 0.6);
  }
  const place = bloomPlacement(p);
  const bx = place.x, by = place.y;
  const chain = CHAIN_WILT[Math.min(p.chainN || 0, CHAIN_WILT.length - 1)];
  p.chainN = (p.chainN || 0) + 1;
  S.blooms.push({ x: bx, y: by, w: BLOOM_W, h: BLOOM_H, life: BLOOM_LIFE * chain * (dMod("brittle") ? 0.5 : 1), age: 0 });
  if (S.levelIdx === 0) S.bloomLessonDone = true;
  SFX.bloom();
  for (let i = 0; i < 10; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = 30 + Math.random() * 70;
    burst(bx + BLOOM_W / 2, by + 2, Math.cos(a) * sp, Math.sin(a) * sp - 20, 0.4,
      Math.random() > 0.5 ? C.bloomHi : C.cap, 1 + (Math.random() * 2 | 0));
  }
}

function endDash(p) {
  if (!p.dashing) return;
  p.dashing = false;
  p.dashT = 0;
  if (p.slamDash) {
    p.slamDash = false;
    if (onGround(p)) { doSlam(p); return; }
  }
  p.vx *= 0.3;
  p.vy *= 0.3;
  // The bloom sprouts where the dash ENDS — if you have spores left
  if (!p.grounded && !onGround(p)) {
    if (p.spores > 0) { p.spores--; spawnBloom(p); }
    else failBloom(p);
  }
}

// Down-slam: a straight-down dash rides all the way to the ground and hits
// like a landing meteor — no bloom, just impact: dust shocks out along the
// ground both ways, sparks kick up, and anything close gets popped.
function doSlam(p) {
  p.vx = 0; p.vy = 0;
  p.grounded = true;
  S.shakeT = 0.22; S.shakeMag = 3.2;
  S.freezeT = 0.04;
  blip(90, 40, 0.25, "square", 0.18);
  blip(200, 60, 0.12, "sawtooth", 0.1);
  whoosh(0.25, 0.1, 300);
  // dust shockwave racing out along the ground, both directions
  for (let i = 0; i < 14; i++) {
    const dir = i % 2 ? 1 : -1;
    const sp = 80 + Math.random() * 140;
    burst(p.x + 5 + dir * (2 + Math.random() * 6), p.y + p.h - 1,
      dir * sp, -8 - Math.random() * 22, 0.45, rgb(PAL.rockHi), 2);
  }
  // sparks straight up from the impact
  for (let i = 0; i < 10; i++) {
    burst(p.x + 5, p.y + p.h - 2, (Math.random() - 0.5) * 70, -60 - Math.random() * 100, 0.4,
      i & 1 ? "#f0c878" : rgb(PAL.accent), 2);
  }
  for (const e of S.enemies) {
    if (!e.dead && Math.abs(e.x + e.w / 2 - (p.x + 5)) < 46 && Math.abs(e.y + e.h / 2 - (p.y + 6)) < 30)
      killEnemy(e, true);
  }
}

function failBloom(p) {
  blip(240, 90, 0.15, "triangle", 0.1);
  for (let i = 0; i < 6; i++) {
    burst(p.x + p.w / 2, p.y + p.h, (Math.random() - 0.5) * 60, 10 + Math.random() * 30, 0.35, C.wilt, 1 + (Math.random() * 2 | 0));
  }
}

function dir8(x, y, facing) {
  if (Math.abs(x) < 0.25 && Math.abs(y) < 0.25) return { dx: facing, dy: 0 };
  const snap = Math.round(Math.atan2(y, x) / (Math.PI / 4)) * (Math.PI / 4);
  let dx = Math.cos(snap), dy = Math.sin(snap);
  if (Math.abs(dx) < 0.1) dx = 0;
  if (Math.abs(dy) < 0.1) dy = 0;
  if (Math.abs(dx) > 0.9) dx = Math.sign(dx);
  if (Math.abs(dy) > 0.9) dy = Math.sign(dy);
  const len = Math.hypot(dx, dy) || 1;
  return { dx: dx / len, dy: dy / len };
}

function doDash(p, ax, ay) {
  const d = dir8(ax, ay, p.facing);
  SFX.dash();
  p.dashing = true;
  // A pure-down dash becomes a slam: it rides until it finds the ground
  p.slamDash = d.dy > 0.9 && d.dx === 0;
  p.dashT = p.slamDash ? 0.7 : DASH_TIME;
  p.dashDX = d.dx; p.dashDY = d.dy;
  p.canDash = false;
  p.vx = d.dx * DASH_SPEED;
  p.vy = d.dy * DASH_SPEED;
  p.grounded = false;
  p.coyote = 0;
  if (d.dx) p.facing = Math.sign(d.dx);
  S.freezeT = DASH_FREEZE;
  S.shakeT = SHAKE_TIME;
  S.shakeMag = SHAKE_MAG;
}

function doWallJump(p) {
  p.vy = -280;
  p.vx = -p.wallDir * WALL_JUMP_VX;
  p.facing = -p.wallDir;
  p.canDash = true;   // kicking off a wall re-arms the dash; spores untouched
  p.grounded = false;
  p.coyote = 0;
  p.jumpBuf = 0;
  p.wallCoyote = 0;
  p.wjLock = 0.14;
  p.squish = 1.25; p.squishT = 0.1;
  S.jumpHeldForCut = true;
  blip(370, 720, 0.12, "square", 0.15);
  for (let i = 0; i < 5; i++) {
    burst(p.wallDir > 0 ? p.x + p.w : p.x, p.y + 5,
      -p.wallDir * (20 + Math.random() * 40), (Math.random() - 0.5) * 40, 0.25, rgb(PAL.mossHi), 1);
  }
}

function doJump(p) {
  p.vy = JUMP_V;
  p.grounded = false;
  p.coyote = 0;
  p.canDash = true;   // jumping (incl. off a bloom) is what re-arms the dash
  p.jumpBuf = 0;
  p.squish = 1.28;
  p.squishT = 0.1;
  S.jumpHeldForCut = true;
  SFX.jump();
  for (let i = 0; i < 4; i++) {
    burst(p.x + p.w / 2, p.y + p.h, (Math.random() - 0.5) * 50, -15 - Math.random() * 25, 0.22, rgb(PAL.mossHi), 1);
  }
}

// ── Secret rooms ────────────────────────────────────────────────────────────
function enterSecret(targetIndex, returnPoint) {
  S.secretSave = {
    hostIndex: S.levelIdx,
    berries: S.berries,
    taken: S.berryList.map(b => b.taken),
    checkPt: { ...S.checkPt },
    returnPoint,
  };
  loadLevel(targetIndex);
  S.mode = "play";
  SFX.check();
}

function exitSecret() {
  const sv = S.secretSave;
  if (!sv) return;
  loadLevel(sv.hostIndex);
  resetNotices();
  S.berries = sv.berries;
  S.berryList.forEach((b, i) => { b.taken = sv.taken[i]; });
  S.checkPt = sv.checkPt;
  S.secretSave = null;
  S.bannerT = 0;
  S.secretCd = 1.5;
  const p = S.player;
  p.x = sv.returnPoint.x; p.y = sv.returnPoint.y;
  p.vx = 0; p.vy = 0; p.invuln = 1;
  S.camLook = 0;
  S.camX = clamp(p.x - W / 2, 0, Math.max(0, WORLD_W - W));
  S.camY = clamp(p.y - H / 2, 0, Math.max(0, WORLD_H - H));
  S.mode = "play";
}

// A chamber is cleared — by goal-flower or by soothing its boss
function chamberClear() {
  recordDevAttempt("clear");
  S.mode = "clear";
  S.winT = 0;
  S.goalOpen = 0;
  if (!S.daily && !S.reachTrial && S.levelIdx + 1 <= MAIN_LAST_INDEX) reachSet(S.levelIdx + 1);
  // Split vs the echo you're racing: when did THEY leave this chamber?
  S.split = null;
  if (competitiveRun() && S.ghost && S.ghost.frames) {
    const nxt = S.levelIdx + 1;
    const idx = S.ghost.frames.findIndex(f => f[0] === nxt);
    if (idx > 0) S.split = { d: S.score.time - idx * 0.2, name: S.ghost.name || "the echo" };
  }
  S.score.berries += S.berries;
  S.score.total += S.berriesTotal;
  if (S.health < S.maxHealth) S.health++;
  SFX.clear();
}

// Mid-bosses open a door instead of whisking you away —
// finish your berry-collecting, leave when you're ready
function bossVanquished(b) {
  b.state = "defeated";
  S.eshots = [];
  SFX.bossHit();
  for (let i = 0; i < 30; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = 50 + Math.random() * 120;
    burst(b.x, b.y, Math.cos(a) * sp, Math.sin(a) * sp - 30, 0.8,
      i & 1 ? rgb(PAL.accent) : C.bloomHi, 2);
  }
  S.bossDoor = b.kind === "barrow"
    ? { x: 44 * TILE + 6, y: 13 * TILE - 48, w: 22, h: 48 }
    : { x: 36 * TILE + 6, y: 14 * TILE - 48, w: 22, h: 48 };
  SFX.check();
  queueNotice("The exit is open.", 3.5, NOTICE_PRIORITY.STATUS);
}

// ── Boss: Barrow, the Oldest Slug — it swims the earth; stomp the belly ────
function updateBarrow(dt) {
  const b = S.boss, p = S.player;
  b.t += dt;
  const phase = 4 - b.pips;
  const floorY = 13 * TILE;
  const half = BARROW.W / 2;

  const gm = b.grace ? 1.45 : 1;
  if (b.state === "defeated") return;

  if (b.state === "intro") {
    if (b.t > 1.8) {
      b.state = "burrow"; b.t = 0; b.mx = b.x;
      SFX.bossWarn();
      for (let i = 0; i < 10; i++)
        burst(b.x + (Math.random() - 0.5) * BARROW.W, floorY, (Math.random() - 0.5) * 60, -30 - Math.random() * 50, 0.5, rgb(PAL.rockLo), 2);
    }
  } else if (b.state === "burrow") {
    // it swims through the earth toward you — only the mound shows
    const tx = clamp(p.x + 5, 3 * TILE, 45 * TILE);
    b.mx += Math.sign(tx - b.mx) * Math.min(BARROW.MOUND_V[phase - 1] * dt, Math.abs(tx - b.mx));
    if (Math.random() < 0.4)
      burst(b.mx + (Math.random() - 0.5) * 20, floorY, (Math.random() - 0.5) * 30, -20 - Math.random() * 30, 0.35, rgb(PAL.rockLo), 2);
    if (Math.abs(tx - b.mx) < 6 || b.t > BARROW.DIG_MAX) {
      b.state = "telegraph"; b.t = 0;
      blip(200, 90, 0.3, "sawtooth", 0.12);
    }
  } else if (b.state === "telegraph") {
    if (Math.random() < 0.7)
      burst(b.mx + (Math.random() - 0.5) * 30, floorY, (Math.random() - 0.5) * 40, -40 - Math.random() * 40, 0.3, "#f06080", 2);
    if (b.t > BARROW.TELEGRAPH * gm) {
      b.state = "arc"; b.t = 0;
      b.x = b.mx; b.y = floorY - BARROW.H;
      // grace slows the fall more than the launch: same height, longer hang
      b.vy = BARROW.LAUNCH_VY / (b.grace ? 1.2 : 1);
      // teach the verb once, on the first leap — then let them figure it out
      if (b.grace && !b.taughtLeap) {
        b.taughtLeap = true;
        queueNotice("The belly is glowing. Hold Up and press " + dashBtnName() + ".", 3.8, NOTICE_PRIORITY.BOSS);
      }
      b.dir = (p.x + 5) >= b.x ? 1 : -1;
      b.vx = b.dir * BARROW.DRIFT;
      S.shakeT = 0.15; S.shakeMag = 2.2;
      SFX.bossHorn();
      for (let i = 0; i < 16; i++)
        burst(b.x + (Math.random() - 0.5) * 40, floorY, (Math.random() - 0.5) * 100, -60 - Math.random() * 90, 0.55, rgb(PAL.rockLo), 2);
      if (p.invuln <= 0 && Math.abs(p.x + 5 - b.x) < 34 && p.y + p.h > floorY - 44)
        hurtPlayer(b.x, "the Barrow erupting");
    }
  } else if (b.state === "arc") {
    // the leap: soft belly out, glowing — meet it up there
    b.vy += (BARROW.GRAV[phase - 1] / gm) * dt;
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    b.x = clamp(b.x, 2 * TILE + half, 46 * TILE - half);
    if (Math.random() < 0.3)
      burst(b.x + (Math.random() - 0.5) * BARROW.W * 0.7, b.y + BARROW.H, (Math.random() - 0.5) * 20, 20, 0.35, rgb(PAL.accent), 1);
    const body = { x: b.x - half, y: b.y, w: BARROW.W, h: BARROW.H };
    const belly = { x: b.x - half - 2, y: b.y + BARROW.H - 10, w: BARROW.W + 4, h: 22 };
    const upDash = p.dashing && p.dashDY < -0.5;
    if ((upDash && overlap(p, belly)) ||
        (p.vy > 40 && p.y + p.h < b.y + 14 && overlap(p, body))) {
      if (upDash) {
        endDash(p);          // the dash ends here — the bloom drives into the stomach
        p.vy = 90;           // pushed back down, clear of the crash
      } else {
        p.vy = -270;
      }
      b.pips--;
      b.grace = false;
      p.invuln = 1.5; p.canDash = true; p.spores = MAX_SPORES; p.chainN = 0;
      S.shakeT = 0.2; S.shakeMag = 2.5;
      SFX.bossHit();
      for (let i = 0; i < 18; i++) {
        const a = Math.random() * Math.PI * 2;
        burst(b.x, b.y + BARROW.H / 2, Math.cos(a) * 90, Math.sin(a) * 90 - 20, 0.6,
          i & 1 ? rgb(PAL.accent) : C.body, 2);
      }
      // the brood stirs
      if (S.enemies.filter(e => e.t === "slug").length < 3) {
        S.enemies.push({ t: "slug", x: b.x - 34, y: floorY - 8, w: 12, h: 8, dir: -1, speed: 34, ph: Math.random() * 6, pauseT: 0 });
        S.enemies.push({ t: "slug", x: b.x + 24, y: floorY - 8, w: 12, h: 8, dir: 1, speed: 34, ph: Math.random() * 6, pauseT: 0 });
      }
      if (b.pips <= 0) { b.y = floorY - BARROW.H; bossVanquished(b); return; }
      b.state = "stunfall"; b.t = 0; b.vx = 0; b.vy = 300;
    } else if (p.invuln <= 0 && overlap(p, body)) {
      hurtPlayer(b.x, "the Barrow's hide");
    }
    if (b.y >= floorY - BARROW.H && b.vy > 0) {
      b.y = floorY - BARROW.H;
      b.state = "landed"; b.t = 0; b.spitN = 0; b.spitT = 0.35;
      S.shakeT = 0.18; S.shakeMag = 2.4;
      blip(110, 45, 0.22, "square", 0.15);
      for (let i = 0; i < 10; i++)
        burst(b.x + (Math.random() - 0.5) * BARROW.W, floorY, (Math.random() - 0.5) * 80, -30 - Math.random() * 50, 0.45, rgb(PAL.rockLo), 2);
    }
  } else if (b.state === "stunfall") {
    b.vy += 700 * dt;
    b.y += b.vy * dt;
    if (b.y >= floorY - BARROW.H) {
      b.y = floorY - BARROW.H;
      b.state = "dazed"; b.t = 0;
      for (let i = 0; i < 8; i++)
        burst(b.x + (Math.random() - 0.5) * BARROW.W, floorY, (Math.random() - 0.5) * 60, -25 - Math.random() * 40, 0.4, rgb(PAL.rockLo), 2);
    }
  } else if (b.state === "dazed") {
    if (b.t > 0.9) { b.state = "burrow"; b.t = 0; b.mx = b.x; }
  } else if (b.state === "landed") {
    b.spitT -= dt;
    if (b.spitT <= 0 && b.spitN < BARROW.GLOBS[phase - 1]) {
      b.spitT = 0.4;
      b.spitN++;
      const dx = (p.x + 5) - b.x;
      S.eshots.push({
